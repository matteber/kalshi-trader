// V1.0.0: legacy v30.12 analyze() preserved verbatim as analyzeLegacyV30.
// New analyze() (immediately below) does universal gates + delegates
// to STRATEGIES registry, then falls back to this for any unmatched market.
// In Phase 0 the registry is empty, so this is what fires for everything
// (= byte-identical v30.12 behavior). In later phases, registered strategies
// (WEATHER, ENERGY, etc.) preempt this for the tickers they match.
function analyzeLegacyV30(m,cfg){
  var days=dtu(m.close_time);
  if(days<=0)return null;
  if(days<0.021)return null;// closing within 30 minutes
  var yb=m.yes_bid,ya=m.yes_ask,nb=m.no_bid,na=m.no_ask||nb+4,lp=m.last_price;
  if(yb<=0&&nb<=0&&lp<=0)return null;
  // V30.10: replace strict volume>0 reject with liquidityScore.
  // OI-based liquidity is a fallback when Kalshi doesn't report volume_24h.
  var liqMult=(cfg&&cfg.liqMult)||0.5;
  var liqScore=liquidityScore(m,liqMult);
  if(liqScore<=0)return null;
  // Annotate market for downstream strategies
  m.liqScore=liqScore;
  var sum=yb+nb,mid=Math.round((yb+ya)/2),sp=ya-yb,nsp=na-nb;
  if(sp<0||sp>50)return null;
  var urg=days<0.25?2.0:days<0.5?1.6:days<1?1.3:days<2?1.15:days<4?1.05:1.0;

  // Maker fee (0.0175) since we post limit orders
  function mFee(price){return Math.ceil(0.0175*price/100*(1-price/100)*100);}

  // V30.11: Round-trip-aware EV. Most strategies might exit early at fair-value
  // mid (with another maker fee) before settlement. This bakes that probability
  // into the EV calc so we don't over-credit "hold to 100c" payoff when our own
  // exit logic will sell us out earlier.
  // exitProb: prob we exit early instead of holding to settlement
  //   - WX/FAV with high conviction: ~0.20 (mostly hold)
  //   - VALUE: ~0.50 (often takes greedy maker exits)
  //   - VOL: ~0.70 (short-horizon by design)
  // When we exit early, we collect approximately mid-price (our-side mid),
  // pay mFee(mid). Settlement payoff stays 100c win / 0c lose.
  function rtEV(probWin,price,sideMid,exitProb){
    var entryFee=mFee(price);
    // Two scenarios:
    //   (a) Hold to settlement: collect 100c on win, 0c on loss; one fee paid (entry).
    //   (b) Exit early at sideMid: collect (sideMid - mFee(sideMid)) regardless of
    //       eventual outcome (we're out of the position). Two fees total.
    // EV(hold) = probWin*(100 - price - entryFee) - (1-probWin)*(price + entryFee)
    var holdEV=probWin*(100-price-entryFee)-(1-probWin)*(price+entryFee);
    // EV(exit early at our-side mid) = sideMid - entryFee - mFee(sideMid) - price
    var exitEV=sideMid-price-entryFee-mFee(sideMid);
    // Blended EV based on exit probability
    return (1-exitProb)*holdEV + exitProb*exitEV;
  }

  // V30.11: 50c fee-trap filter. Per Kalshi's official fee schedule, the
  // taker/maker fee peaks at the 50c price point (probability-weighted by
  // p*(1-p)). The favorite-longshot literature (Whelan 2026) also shows
  // 40-60c contracts have the worst expected returns net of fees. Skip any
  // signal whose entry price falls 40-60c AND post-fee EV < 2c. Higher edges
  // can still fire (40c/+5c EV passes); marginal mid-priced trades get killed.
  function in50Trap(price,evCents){
    return price>=40&&price<=60&&evCents<2;
  }

  // Clamp price to avoid post_only cross: must be strictly below ask
  // For YES orders: price < yes_ask. For NO orders: price < no_ask.
  function clampYes(p){return Math.min(p,ya-1);}
  function clampNo(p){return Math.min(p,na-1);}

  // Favorite-longshot bias adjustment (Whelan 2026)
  // Favorites are underpriced by this amount
  function biasAdj(midPct){
    if(midPct>=90)return 0.03;
    if(midPct>=80)return 0.05;
    if(midPct>=70)return 0.04;
    if(midPct>=60)return 0.03;
    if(midPct>=50)return 0.03;
    return 0;
  }

  // ============================================================
  // STRATEGY 1: WEATHER EDGE (WX) - Highest priority, real data edge
  // Hourly forecast + NormalCDF probability vs market price.
  // ============================================================
  if(m._wxForecast!=null){
    var fcVal=m._wxForecast;
    var sub=(m.subtitle||"").replace(/[^a-zA-Z0-9.<> ]/g," ").toLowerCase();
    var rangeMatch=sub.match(/(\d+)\s*to\s*(\d+)/);
    var aboveMatch=sub.match(/or above/)||sub.match(/above/);
    var belowMatch=sub.match(/or below/)||sub.match(/below/);

    var strike=null,strikeLo=null,strikeHi=null,mktType="unknown";
    if(rangeMatch){
      strikeLo=parseFloat(rangeMatch[1]);strikeHi=parseFloat(rangeMatch[2]);
      mktType="range";strike=(strikeLo+strikeHi)/2;
    }else if(aboveMatch){
      var am=sub.match(/([\d.]+)/);if(am)strike=parseFloat(am[1]);
      mktType="above";
    }else if(belowMatch){
      var bm=sub.match(/([\d.]+)/);if(bm)strike=parseFloat(bm[1]);
      mktType="below";
    }
    if(mktType==="unknown"){
      var tkMatch=m.ticker.match(/[-](B|T)([\d.]+)$/);
      if(tkMatch){strike=parseFloat(tkMatch[2]);mktType=tkMatch[1]==="T"?"above":"below";}
    }

    if(strike!=null&&!isNaN(fcVal)&&mktType!=="unknown"){
      var modelSpread=m._wxSpread||3;
      var daysOut=m._wxDaysOut||1;
      // v29 fix: MORE CONSERVATIVE forecast errors after 0-4 loss on Apr 20
      // Denver was 8F off, NYC 4F off. Old values way too tight.
      var forecastError=daysOut<=0.5?2.5:daysOut<=1?3.0:daysOut<=2?4.0:daysOut<=4?5.0:6.0;
      var totalSD=Math.sqrt(modelSpread*modelSpread+forecastError*forecastError);
      if(totalSD<3)totalSD=3;// min SD raised from 2 to 3

      var fcProb;
      if(mktType==="range"&&strikeLo!=null&&strikeHi!=null){
        fcProb=normCDF(strikeHi,fcVal,totalSD)-normCDF(strikeLo,fcVal,totalSD);
      }else if(mktType==="above"){
        fcProb=1-normCDF(strike,fcVal,totalSD);
      }else{
        fcProb=normCDF(strike,fcVal,totalSD);
      }
      fcProb=Math.min(0.95,Math.max(0.05,fcProb));// tighter caps

      var mktProb=mid/100;
      var probDiff=Math.abs(fcProb-mktProb);
      // v29 fix: Raised threshold from 15% to 20% for single markets
      var wxThreshold=mktType==="range"?0.10:0.20;
      if(probDiff>=wxThreshold){
        var wxSide=fcProb>mktProb?"yes":"no";
        var wxPost=wxSide==="yes"?clampYes(Math.round((yb+ya)/2)):clampNo(Math.round((nb+na)/2));
        var hrInfo=m._wxHourCount?m._wxHourCount+"hr":"daily";
        var typeLabel=mktType==="range"?(strikeLo+"-"+strikeHi+"F"):mktType+" "+strike+"F";
        // Confidence weighting: hourly data > daily fallback
        var confMult=m._wxHourCount>=6?1.2:m._wxHourCount>=3?1.0:0.8;
        // V30.11: Round-trip EV for WX. Strong forecast edge -> mostly held to settle.
        // exitProb=0.20. Side mid for WX is the our-side mid.
        var wxSideMid=wxSide==="yes"?mid:(100-mid);
        var wxEVrt=rtEV(fcProb,wxPost,wxSideMid,0.20);
        // v29 fix: Minimum 15c contract price (no longshots)
        if(wxPost>=15&&!in50Trap(wxPost,wxEVrt))return{sig:"WX",side:wxSide,edge:probDiff,prob:fcProb,price:wxPost,
          label:"WX "+m._wxCity+" fc:"+Math.round(fcVal)+"F "+typeLabel+" "+wxSide.toUpperCase()+"@"+wxPost+"c SD:"+totalSD.toFixed(0)+"F ("+hrInfo+") EV:+"+wxEVrt.toFixed(0)+"c",
          score:probDiff*120*urg*confMult,
          reason:"Forecast "+Math.round(fcVal)+"F ("+hrInfo+"). "+typeLabel+". SD:"+totalSD.toFixed(1)+"F. Prob: "+Math.round(fcProb*100)+"% vs mkt "+mid+"%. Edge: "+Math.round(probDiff*100)+"%. EV(rt):+"+wxEVrt.toFixed(1)+"c."};
      }
    }
  }

  // ============================================================
  // STRATEGY 2: FAVORITE BIAS (FAV) - Academic-backed edge
  // Kalshi favorites (65c+) are systematically underpriced.
  // Post maker limit at ask-1 to capture the bias.
  // Whelan 2026: contracts above 50c earn positive returns.
  // V30.11: now uses round-trip EV (exitProb=0.20, FAV usually held to settle).
  // ============================================================
  if(mid>=65&&mid<=93&&sp>=1&&sp<=12&&m.liqScore>=500&&days>=0.25){
    var favBias=biasAdj(mid);
    var adjProb=mid/100+favBias;
    var favPost=clampYes(ya-1);
    var favFee=mFee(favPost);
    // Round-trip EV: bake in 20% probability we exit early at our-side mid (=mid for YES)
    var favEV=rtEV(adjProb,favPost,mid,0.20);
    // Single-trip EV reported alongside for diagnostics
    var favEVst=adjProb*(100-favPost-favFee)-(1-adjProb)*(favPost+favFee);
    if(favEV>1&&favPost>=5&&favPost<=95&&!in50Trap(favPost,favEV)){
      return{sig:"FAV",side:"yes",edge:favEV/100,prob:adjProb,price:favPost,
        label:"Fav YES "+mid+"% adj:"+Math.round(adjProb*100)+"% @"+favPost+"c EV:+"+favEV.toFixed(1)+"c",
        score:favEV*urg*Math.sqrt(Math.min(m.volume,20000)/1000),
        reason:"Favorite at "+mid+"% + "+Math.round(favBias*100)+"% bias = "+Math.round(adjProb*100)+"%. Post YES@"+favPost+"c (ask-1). EV(rt):+"+favEV.toFixed(1)+"c (single:+"+favEVst.toFixed(1)+"c), fee:"+favFee+"c. Vol:"+Math.round(m.volume)+"."};
    }
  }
  // NO-side favorites (mid <= 35, so NO side is 65%+)
  if(mid<=35&&mid>=7&&nsp>=1&&nsp<=12&&m.liqScore>=500&&days>=0.25){
    var nMid=100-mid;
    var nBias=biasAdj(nMid);
    var nAdjProb=nMid/100+nBias;
    var nFavPost=clampNo(na-1);
    var nFavFee=mFee(nFavPost);
    // For NO side, our-side mid is (100 - market mid) = nMid
    var nFavEV=rtEV(nAdjProb,nFavPost,nMid,0.20);
    var nFavEVst=nAdjProb*(100-nFavPost-nFavFee)-(1-nAdjProb)*(nFavPost+nFavFee);
    if(nFavEV>1&&nFavPost>=5&&nFavPost<=95&&!in50Trap(nFavPost,nFavEV)){
      return{sig:"FAV",side:"no",edge:nFavEV/100,prob:nAdjProb,price:nFavPost,
        label:"Fav NO "+nMid+"% adj:"+Math.round(nAdjProb*100)+"% @"+nFavPost+"c EV:+"+nFavEV.toFixed(1)+"c",
        score:nFavEV*urg*Math.sqrt(Math.min(m.volume,20000)/1000),
        reason:"NO favorite at "+nMid+"% + "+Math.round(nBias*100)+"% bias = "+Math.round(nAdjProb*100)+"%. Post NO@"+nFavPost+"c (ask-1). EV(rt):+"+nFavEV.toFixed(1)+"c (single:+"+nFavEVst.toFixed(1)+"c), fee:"+nFavFee+"c. Vol:"+Math.round(m.volume)+"."};
    }
  }

  // ============================================================
  // STRATEGY 3: MARKET MAKER (MM) - Tightened for realistic fills
  // Spread 8-15c, volume >= 1000, both sides >= 10c.
  // No round-trip adjustment: MM holds both sides to settlement and one
  // always wins, so single-fee math is already accurate.
  // ============================================================
  if(sp>=8&&sp<=15&&m.liqScore>=1000){
    var mmYes=clampYes(yb+1);
    var mmNo=clampNo(nb+1);
    var mmYesFee=mFee(mmYes);
    var mmNoFee=mFee(mmNo);
    var mmCost=mmYes+mmNo+mmYesFee+mmNoFee;
    var mmProfit=100-mmCost;
    if(mmProfit>=3&&mmYes>=10&&mmNo>=10&&mmYes<=90&&mmNo<=90){
      return{sig:"MM",side:"both",edge:mmProfit/100,prob:0.5,
        price:mmYes,price2:mmNo,
        label:"MM sp:"+sp+"c Y@"+mmYes+" N@"+mmNo+" +"+mmProfit+"c/pair v:"+Math.round(m.volume/1000)+"k",
        score:mmProfit*urg*Math.sqrt(Math.min(m.volume,20000)/1000),
        reason:"Post Y@"+mmYes+"c + N@"+mmNo+"c. Cost:"+mmCost+"c (fees "+mmYesFee+"+"+mmNoFee+"c). Profit:"+mmProfit+"c/pair. Spread:"+sp+"c Vol:"+Math.round(m.volume)+"."};
    }
  }

  // ============================================================
  // STRATEGY 4: VALUE - Post inside wide spreads with bias adjustment
  // V30.11: Round-trip EV (exitProb=0.50, often takes greedy maker exit).
  // ============================================================
  if(sp>=6&&sp<=20&&m.liqScore>=500){
    var postYes=clampYes(yb+Math.max(2,Math.floor(sp*0.35)));
    var postNo=clampNo(nb+Math.max(2,Math.floor(nsp*0.35)));
    var yProb=mid/100;var nProb=1-yProb;
    if(mid>=50)yProb=Math.min(0.97,yProb+biasAdj(mid));
    else nProb=Math.min(0.97,nProb+biasAdj(100-mid));
    var pyFee=mFee(postYes);var pnFee=mFee(postNo);
    var yEV=yProb*(100-postYes-pyFee)-(1-yProb)*(postYes+pyFee);
    var nEV=nProb*(100-postNo-pnFee)-(1-nProb)*(postNo+pnFee);
    var bestSide=yEV>=nEV?"yes":"no";
    var bestPost=bestSide==="yes"?postYes:postNo;
    var bestFee=bestSide==="yes"?pyFee:pnFee;
    var bestProb=bestSide==="yes"?yProb:nProb;
    var bestSideMid=bestSide==="yes"?mid:(100-mid);
    // Round-trip EV: VALUE often takes greedy maker exits (exitProb=0.50)
    var bestEVrt=rtEV(bestProb,bestPost,bestSideMid,0.50);
    var bestEVst=Math.max(yEV,nEV);// for diagnostics
    if(bestEVrt>3&&bestPost>=5&&bestPost<=95&&!in50Trap(bestPost,bestEVrt)){
      return{sig:"VALUE",side:bestSide,edge:bestEVrt/100,prob:bestProb,
        price:bestPost,
        label:"Value "+bestSide.toUpperCase()+"@"+bestPost+"c EV:+"+bestEVrt.toFixed(0)+"c",
        score:(bestEVrt/100)*80*urg,
        reason:"Post "+bestSide.toUpperCase()+"@"+bestPost+"c (35% into spread). Bid:"+yb+" Ask:"+ya+". EV(rt):+"+bestEVrt.toFixed(1)+"c (single:+"+bestEVst.toFixed(1)+"c), fee:"+bestFee+"c. Vol:"+Math.round(m.volume)+"."};
    }
  }

  // ============================================================
  // STRATEGY 5: VOLUME MOMENTUM (VOL) - V30.11 round-trip + 50c trap
  // VOL is short-horizon by design; exitProb=0.70.
  // ============================================================
  if(m.liqScore>=1000&&sp>=0&&sp<=10){
    var vmPost=clampYes(Math.round((yb+ya)/2));
    if(mid>=58&&mid<=82){
      var volProb=mid/100;
      var volEVst=((mid-50)/100)*100;// single-trip approx in cents (display)
      var volEVrt=rtEV(volProb,vmPost,mid,0.70);
      if(volEVrt>=cfg.me*100&&!in50Trap(vmPost,volEVrt))
        return{sig:"VOL",side:"yes",edge:volEVrt/100,prob:volProb,price:vmPost,
          label:"Vol YES "+mid+"% "+(m.volume>=1e3?Math.round(m.volume/1000)+"k":Math.round(m.volume))+"@"+vmPost+"c EV:+"+volEVrt.toFixed(0)+"c",
          score:(volEVrt/100)*50*urg,
          reason:"Post YES@"+vmPost+"c (mid). "+mid+"%, EV(rt):+"+volEVrt.toFixed(1)+"c, vol "+Math.round(m.volume)+", sp "+sp+"c."};
    }
    var nmPost=clampNo(Math.round((nb+na)/2));
    if(mid>=18&&mid<=42){
      var nVolProb=(100-mid)/100;
      var volEVst2=((50-mid)/100)*100;
      var volEVrt2=rtEV(nVolProb,nmPost,100-mid,0.70);
      if(volEVrt2>=cfg.me*100&&!in50Trap(nmPost,volEVrt2))
        return{sig:"VOL",side:"no",edge:volEVrt2/100,prob:nVolProb,price:nmPost,
          label:"Vol NO "+(100-mid)+"% "+(m.volume>=1e3?Math.round(m.volume/1000)+"k":Math.round(m.volume))+"@"+nmPost+"c EV:+"+volEVrt2.toFixed(0)+"c",
          score:(volEVrt2/100)*50*urg,
          reason:"Post NO@"+nmPost+"c (mid). "+mid+"%, EV(rt):+"+volEVrt2.toFixed(1)+"c, vol "+Math.round(m.volume)+", sp "+sp+"c."};
    }
  }

  return null;
}

// ============================================================
// V1.0.0 ANALYZE WRAPPER
// -----------------------------------------------------------
// Universal pre-checks (days/spread/liquidity), build ctx, then
// call STRATEGIES in priority order. If no registered strategy
// fires, fall back to legacy v30.12 behavior (analyzeLegacyV30).
//
// Phase 0: registry contains only disabled placeholders, so this
// always falls through = identical v30.12 behavior.
// Phase 1+: WEATHER/ENERGY strategies match relevant tickers and
// preempt legacy.
// ============================================================
function analyze(m,cfg){
  // ---- Universal pre-checks ----
  var days=dtu(m.close_time);
  if(days<=0)return null;
  if(days<0.021)return null;// closing within 30 minutes
  var yb=m.yes_bid,ya=m.yes_ask,nb=m.no_bid,na=m.no_ask||nb+4,lp=m.last_price;
  if(yb<=0&&nb<=0&&lp<=0)return null;
  var liqMult=(cfg&&cfg.liqMult)||0.5;
  var liqScore=liquidityScore(m,liqMult);
  if(liqScore<=0)return null;
  m.liqScore=liqScore;
  var sp=ya-yb;
  if(sp<0||sp>50)return null;

  // ---- Build ctx for registered strategies ----
  // (Most useful pre-computed fields; strategies can recompute as needed.)
  var ctx={
    cfg:cfg||{},days:days,
    yb:yb,ya:ya,nb:nb,na:na,lp:lp,
    sp:sp,nsp:na-nb,
    mid:Math.round((yb+ya)/2),
    urg:days<0.25?2.0:days<0.5?1.6:days<1?1.3:days<2?1.15:days<4?1.05:1.0,
    liqScore:liqScore,liqMult:liqMult
  };

  // ---- Try registered strategies first (priority order) ----
  var sig=runStrategies(m,ctx);
  if(sig&&sig.claimed){
    // A strategy matched this ticker but had no signal. Don't fall back to legacy
    // (specialist has exclusive claim on its tickers).
    return null;
  }
  if(sig)return sig;

  // ---- Fallback: legacy v30.12 strategy chain ----
  return analyzeLegacyV30(m,cfg);
}

// ============================================================
// POSITION SIZING (Kelly Criterion)
// ============================================================
function kelly(prob,price,frac,maxCents,days){
  if(!price||price<=0||price>=100||!maxCents||maxCents<=0)return 0;
  var cost=price/100,b=(1-cost)/cost;
  var p=Math.min(0.97,Math.max(0.03,prob||0.5));
  var f=Math.max(0,(b*p-(1-p))/b);
  var urg=days<0.5?1.5:days<1?1.25:days<2?1.1:1.0;
  var r=Math.min(Math.round(f*frac*maxCents*urg),maxCents);
  return isNaN(r)?0:r;
}

// ============================================================
// PAPER TRADE SIMULATION
// ============================================================
function sim(s){
  var fr={WX:0.90,FAV:0.92,MM:0.85,VALUE:0.85,VOL:0.78};
  var er={WX:0.70,FAV:0.60,MM:0.80,VALUE:0.55,VOL:0.50};
  if(Math.random()>(fr[s.sig]||0.7))return{filled:false};
  var realized=s.edge*(er[s.sig]||0.5);
  var noise=(Math.random()-0.5)*0.06;
  var trueProb=Math.min(0.97,Math.max(0.03,(s.prob||0.5)+realized+noise));
  return{filled:true,won:Math.random()<trueProb};
}

// ============================================================
// V30: MARKET MEMORY (price history per market in localStorage)
// km_<ticker> -> { ticker, title, observations:[], signalCount, maxScore, maxEdge, firstSeen, lastSeen, settled }
// Each observation: {ts, yb, ya, nb, na, mid, sp, vol, sig, edge, score, daysLeft}
// Cap: 20 observations per market, ~2MB total budget.
// ============================================================
function mmKey(ticker){return"km_"+(ticker||"").slice(0,80);}
function mmGet(ticker){
  try{var r=localStorage.getItem(mmKey(ticker));return r?JSON.parse(r):null;}catch(e){return null;}
}
function mmSet(ticker,data){
  try{localStorage.setItem(mmKey(ticker),JSON.stringify(data));return true;}catch(e){return false;}
}
function mmDel(ticker){try{localStorage.removeItem(mmKey(ticker));}catch(e){}}
// List all market memory keys
function mmList(){
  var keys=[];
  try{
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.indexOf("km_")===0)keys.push(k);
    }
  }catch(e){}
  return keys;
}
// Record an observation for a market (with or without signal)
function mmRecord(m,signal){
  if(!m||!m.ticker)return;
  var rec=mmGet(m.ticker);
  var now=Date.now();
  if(!rec){
    rec={ticker:m.ticker,title:m.title||"",observations:[],
      signalCount:0,maxScore:0,maxEdge:0,
      firstSeen:now,lastSeen:now,settled:null,settledAt:null};
  }
  var mid=Math.round((m.yes_bid+m.yes_ask)/2);
  var sp=m.yes_ask-m.yes_bid;
  var days=dtu(m.close_time);
  var obs={ts:now,yb:m.yes_bid,ya:m.yes_ask,nb:m.no_bid,na:m.no_ask||m.no_bid+4,
    mid:mid,sp:sp,vol:Math.round(m.volume||0),
    sig:signal?signal.sig:null,
    edge:signal?Math.round((signal.edge||0)*1000)/1000:0,
    score:signal?Math.round(signal.score||0):0,
    daysLeft:Math.round(days*10)/10};
  rec.observations.push(obs);
  if(rec.observations.length>20)rec.observations.shift();
  rec.lastSeen=now;
  if(signal){
    rec.signalCount=(rec.signalCount||0)+1;
    if(signal.score>(rec.maxScore||0))rec.maxScore=Math.round(signal.score);
    if(signal.edge>(rec.maxEdge||0))rec.maxEdge=Math.round(signal.edge*1000)/1000;
    rec.lastSig=signal.sig;
    rec.lastSide=signal.side;
    rec.lastPrice=signal.price;
  }
  mmSet(m.ticker,rec);
  return rec;
}
// Classify volatility based on recent observations
function mmVolatility(rec){
  if(!rec||!rec.observations||rec.observations.length<3)return"new";
  var obs=rec.observations.slice(-5);
  var min=999,max=0;
  for(var i=0;i<obs.length;i++){
    if(obs[i].mid<min)min=obs[i].mid;
    if(obs[i].mid>max)max=obs[i].mid;
  }
  var range=max-min;
  if(range<2)return"stable";
  if(range<5)return"trending";
  return"volatile";
}
// Prune settled or stale market memories (>3 days old & no signal)
function mmPrune(){
  var keys=mmList(),pruned=0,now=Date.now();
  for(var i=0;i<keys.length;i++){
    try{
      var raw=localStorage.getItem(keys[i]);
      if(!raw){localStorage.removeItem(keys[i]);pruned++;continue;}
      var rec=JSON.parse(raw);
      // Remove if settled > 24h ago, or no signals seen in 3 days
      if(rec.settled&&(now-(rec.settledAt||rec.lastSeen||0))>86400000){
        localStorage.removeItem(keys[i]);pruned++;
      }else if((now-(rec.lastSeen||0))>259200000){
        localStorage.removeItem(keys[i]);pruned++;
      }
    }catch(e){try{localStorage.removeItem(keys[i]);pruned++;}catch(e2){}}
  }
  return pruned;
}

  var s=lsLoad();
  if(!s.byStrategy[sig])s.byStrategy[sig]={settled:0,won:0,lost:0,pnl:0,virtualWinRate:0};
  s.byStrategy[sig].settled++;
  if(won){s.byStrategy[sig].won++;s.vWon=(s.vWon||0)+1;}
  else{s.byStrategy[sig].lost++;s.vLost=(s.vLost||0)+1;}
  s.byStrategy[sig].pnl=(s.byStrategy[sig].pnl||0)+pnlCents;
  s.byStrategy[sig].virtualWinRate=s.byStrategy[sig].won/s.byStrategy[sig].settled;
  s.vSettled=(s.vSettled||0)+1;
  s.vPnl=(s.vPnl||0)+pnlCents;
  s.updated=Date.now();
  lsSave(s);
  return s;
}

// ============================================================
// V30.1: REAL TRADE LEDGER (executed paper + live trades)
// kt_realLedger: array of records {id, ts, ticker, title, sig, side,
//   entryPx, entryPx2 (MM), qty, cost, mode (paper|live),
//   status (open|closed|settled), exitPx, exitTs, won, pnl, fees, source}
// Closed = sold via executeSell. Settled = resolved by Kalshi outcome.
// Cap: 1000 entries FIFO.
// ============================================================
function rtLoad(){try{var r=localStorage.getItem("kt_realLedger");return r?JSON.parse(r):[];}catch(e){return[];}}
function rtSave(arr){try{localStorage.setItem("kt_realLedger",JSON.stringify(arr.slice(-1000)));}catch(e){}}
function rtMakeId(){return"rt_"+Date.now().toString(36)+"_"+Math.floor(Math.random()*1e6).toString(36);}
function rtAdd(rec){
  var arr=rtLoad();
  rec.id=rec.id||rtMakeId();
  rec.ts=rec.ts||Date.now();
  rec.status=rec.status||"open";
  arr.push(rec);
  rtSave(arr);
  return rec.id;
}
function rtUpdate(id,patch){
  var arr=rtLoad();
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===id){
      var k=Object.keys(patch);for(var j=0;j<k.length;j++)arr[i][k[j]]=patch[k[j]];
      rtSave(arr);return arr[i];
    }
  }
  return null;
}
// Find open ledger entries by ticker (for matching settlements)
function rtFindOpenByTicker(ticker,mode){
  var arr=rtLoad(),hits=[];
  for(var i=0;i<arr.length;i++){
    if(arr[i].ticker===ticker&&arr[i].status==="open"){
      if(!mode||arr[i].mode===mode)hits.push({i:i,r:arr[i]});
    }
  }
  return hits;
}
// Aggregate stats across the ledger (filterable by mode)
function rtAggregate(mode){
  var arr=rtLoad();
  var agg={
    total:0,open:0,won:0,lost:0,
    pnl:0,fees:0,deployed:0,
    byStrategy:{},
    byMode:{paper:{won:0,lost:0,pnl:0,deployed:0},live:{won:0,lost:0,pnl:0,deployed:0}}
  };
  for(var i=0;i<arr.length;i++){
    var r=arr[i];
    if(mode&&r.mode!==mode)continue;
    agg.total++;
    var deploy=(r.cost||0);
    agg.deployed+=deploy;// lifetime capital deployed (open + settled)
    if(r.status==="open"){agg.open++;continue;}
    if(!agg.byStrategy[r.sig])agg.byStrategy[r.sig]={settled:0,won:0,lost:0,pnl:0,deployed:0};
    agg.byStrategy[r.sig].settled++;
    agg.byStrategy[r.sig].deployed+=deploy;
    var bm=agg.byMode[r.mode];
    if(bm)bm.deployed+=deploy;
    if(r.won){
      agg.won++;agg.byStrategy[r.sig].won++;
      if(bm)bm.won++;
    }else{
      agg.lost++;agg.byStrategy[r.sig].lost++;
      if(bm)bm.lost++;
    }
    var p=(r.pnl||0);
    agg.pnl+=p;agg.byStrategy[r.sig].pnl+=p;
    if(bm)bm.pnl+=p;
    agg.fees+=(r.fees||0);
  }
  // Compute ROI
  agg.roi=agg.deployed>0?(agg.pnl/agg.deployed)*100:0;
  var sk=Object.keys(agg.byStrategy);
  for(var s=0;s<sk.length;s++){
    var st=agg.byStrategy[sk[s]];
    st.winRate=st.settled>0?st.won/st.settled:0;
    st.roi=st.deployed>0?(st.pnl/st.deployed)*100:0;
  }
  var bmk=Object.keys(agg.byMode);
  for(var bi=0;bi<bmk.length;bi++){
    var bb=agg.byMode[bmk[bi]];
    bb.roi=bb.deployed>0?(bb.pnl/bb.deployed)*100:0;
  }
  return agg;
}
// ============================================================
// V30.2: KALSHI HISTORY SYNC
// Pulls full /portfolio/fills and /portfolio/settlements from Kalshi,
// reconstructs per-ticker P&L and stores in kt_kalshiHistory.
// Each entry: {ticker, buys:[{px,qty,ts,side}], sells:[{px,qty,ts,side}],
//   settlement:{result,revenue}, totalCost, totalProceeds, pnl, fees,
//   status: settled|closed|open, won, lastTs}
// ============================================================
function khLoad(){try{var r=localStorage.getItem("kt_kalshiHistory");return r?JSON.parse(r):null;}catch(e){return null;}}
function khSave(d){try{localStorage.setItem("kt_kalshiHistory",JSON.stringify(d));}catch(e){}}
// v1.0.0-beta.2: separate cache for HISTORICAL fills (fills older than Kalshi's
// trades_created_ts cutoff). These are immutable -- once a fill is on the
// historical tier it can't change -- so we cache them for 24h to avoid re-fetching
// hundreds-to-thousands of records on every sync cycle.
//
// Schema: {fills:[...], cachedAt:<ms>, cutoffTs:<iso>}.
// cutoffTs is what Kalshi reported when we fetched. If Kalshi advances the cutoff
// (which happens as the 3-month window rolls forward), new fills move from live
// to historical and we need to re-fetch. We invalidate the cache when the cutoff
// advances past our cachedAt time.
function khLoadHistoricalFills(){try{var r=localStorage.getItem("kt_kalshiHistoricalFills");return r?JSON.parse(r):null;}catch(e){return null;}}
function khSaveHistoricalFills(d){try{localStorage.setItem("kt_kalshiHistoricalFills",JSON.stringify(d));}catch(e){}}
// v1.0.0-beta.2: cache the cutoff timestamps separately so we can log them and
// detect when the live/historical boundary advances.
function khLoadCutoff(){try{var r=localStorage.getItem("kt_kalshiCutoff");return r?JSON.parse(r):null;}catch(e){return null;}}
function khSaveCutoff(d){try{localStorage.setItem("kt_kalshiCutoff",JSON.stringify(d));}catch(e){}}
// Reconstructs per-ticker history from raw fills + settlements arrays.
function khReconstruct(fills,settlements){
  var byT={};
  // V1.0.0-beta1.6 BUG FIX: dedupe fills before processing.
  // Kalshi's /portfolio/fills endpoint can return the same fill twice across
  // pagination boundaries (cursor overlap, server-side reordering during paginated
  // fetch, or rare upstream double-write). When that happens, the buy/sell qty and
  // cost get double-counted, inflating totalCost or totalProceeds and bending the
  // realized P&L the wrong direction. Dedup by trade_id (preferred) or by composite
  // key (ticker, action, side, created_time, count, price) for fills lacking trade_id.
  var seenFills={};
  var dedupedFills=[];
  for(var di=0;di<fills.length;di++){
    var df=fills[di];
    if(!df||!df.ticker)continue;
    var fkey;
    if(df.trade_id){
      fkey="t:"+df.trade_id;
    }else{
      // Composite key fallback. Include price+count to avoid collapsing legitimately
      // identical-looking fills that just happen to be on the same ms.
      var fpx=df.yes_price_dollars||df.no_price_dollars||df.yes_price||df.no_price||"";
      var fct=df.count||df.count_fp||"";
      fkey="c:"+df.ticker+"|"+(df.action||"")+"|"+(df.side||"")+"|"+(df.created_time||"")+"|"+fct+"|"+fpx;
    }
    if(seenFills[fkey])continue;
    seenFills[fkey]=true;
    dedupedFills.push(df);
  }
  var fillsDropped=fills.length-dedupedFills.length;

  for(var i=0;i<dedupedFills.length;i++){
    var f=dedupedFills[i];
    var tk=f.ticker;if(!tk)continue;
    if(!byT[tk])byT[tk]={ticker:tk,buys:[],sells:[],settlement:null,
      totalCost:0,totalProceeds:0,pnl:0,fees:0,status:"open",lastTs:0,
      title:f.market_title||""};
    var px=0;
    if(f.yes_price!=null)px=f.yes_price;
    else if(f.yes_price_dollars!=null)px=Math.round(parseFloat(f.yes_price_dollars)*100);
    else if(f.no_price!=null)px=f.no_price;
    else if(f.no_price_dollars!=null)px=Math.round(parseFloat(f.no_price_dollars)*100);
    var qty=f.count||parseFloat(f.count_fp||"0")||0;
    if(qty<=0||px<=0)continue;
    var fee=0;
    // V1.0.0-beta1.7 BUG FIX: per docs.kalshi.com/api-reference/portfolio/get-fills
    // the fills endpoint returns a single `fee_cost` field (in dollars), NOT split
    // maker_fees_dollars/taker_fees_dollars (those exist on the ORDERS endpoint, a
    // different API). The previous code read the wrong fields, so every fill
    // came back with fee=0 -- which then over-stated net realized P&L by exactly
    // the total fees paid lifetime. From the May 10 evening log: 198 fills at
    // typical ~1c fee each ~= $2 of fees being silently ignored.
    if(f.fee_cost!=null)fee+=Math.round(parseFloat(f.fee_cost)*100);
    // Legacy fallbacks. If Kalshi ever re-introduces the split fields, or if
    // a historical fill record was captured under an older schema, we still pick
    // them up. The `else if` chain prevents double-counting if both forms exist.
    else if(f.maker_fees_dollars!=null||f.taker_fees_dollars!=null){
      if(f.maker_fees_dollars)fee+=Math.round(parseFloat(f.maker_fees_dollars)*100);
      if(f.taker_fees_dollars)fee+=Math.round(parseFloat(f.taker_fees_dollars)*100);
    }
    var ts=new Date(f.created_time||0).getTime()||0;
    var sd=f.side||"yes";
    var entry={px:px,qty:qty,ts:ts,side:sd,fee:fee};
    if(f.action==="buy"){byT[tk].buys.push(entry);byT[tk].totalCost+=qty*px;}
    else if(f.action==="sell"){byT[tk].sells.push(entry);byT[tk].totalProceeds+=qty*px;}
    byT[tk].fees+=fee;
    if(ts>byT[tk].lastTs)byT[tk].lastTs=ts;
  }

  // V1.0.0-beta1.6 BUG FIX: dedupe settlements before processing AND track per-ticker
  // settlement state. Two-step protection:
  //   (a) Skip exact-duplicate settlement records (same ticker + same settled_time).
  //   (b) Skip a settlement entirely if we already processed one for that ticker --
  //       even if the second one is "different," processing it would double-count
  //       proceeds because we've already credited the payout from the first one.
  // Why this matters: the May 8 evening screenshot showed +$23.66 NET P&L when the
  // user's actual account change was -$37.95 - a $61 over-statement. The most
  // likely cause is settlement-double-count: 236 settlement records spread across
  // only 152 tickers (a 1.55x ratio). Some tickers have legitimate multiple records
  // (multi-outcome events), but processing them sequentially with the existing
  // proceeds-add logic compounds wins.
  var seenSettlementKeys={};
  var dedupedSettlements=[];
  for(var di2=0;di2<settlements.length;di2++){
    var ds=settlements[di2];
    if(!ds||!ds.ticker)continue;
    var skey=ds.ticker+"|"+(ds.settled_time||ds.created_time||"");
    if(seenSettlementKeys[skey])continue;
    seenSettlementKeys[skey]=true;
    dedupedSettlements.push(ds);
  }
  var settlementsDroppedDup=settlements.length-dedupedSettlements.length;

  // Track which tickers have already had a settlement processed so we never
  // double-credit proceeds for the same position.
  var ticker_settled={};
  var settlementsSkippedDup=0;

  for(var s=0;s<dedupedSettlements.length;s++){
    var st=dedupedSettlements[s];
    var tk2=st.ticker;if(!tk2)continue;
    // Hard guard: one settlement per ticker.
    if(ticker_settled[tk2]){
      settlementsSkippedDup++;
      continue;
    }
    // V30.12: Use Kalshi settlement record's own fields when fills are missing.
    // Settlements include yes_total_cost_dollars/no_total_cost_dollars/yes_count_fp/
    // no_count_fp - everything we need. The v30.8 "drop orphans" fix prevented
    // phantom $0-cost LOSSES from being counted, but also threw away REAL settlements
    // whose buys were paginated out. Now we always count; we just sometimes get the
    // cost basis from the settlement record instead of from fills.
    var stYesCost=Math.round(parseFloat(st.yes_total_cost_dollars||"0")*100);
    var stNoCost=Math.round(parseFloat(st.no_total_cost_dollars||"0")*100);
    var stYesQty=parseFloat(st.yes_count_fp||st.yes_count||"0")||0;
    var stNoQty=parseFloat(st.no_count_fp||st.no_count||"0")||0;
    var settlementHasData=(stYesCost+stNoCost)>0||(stYesQty+stNoQty)>0;

    if(!byT[tk2]){
      // Pure orphan: no fills at all. Use settlement record as source of truth.
      // Without a settlement that has data, we still skip (genuine phantom).
      if(!settlementHasData)continue;
      byT[tk2]={ticker:tk2,buys:[],sells:[],settlement:null,
        totalCost:stYesCost+stNoCost,totalProceeds:0,
        pnl:0,fees:0,status:"settled",lastTs:0,
        title:st.market_title||"",
        // synthesize "buys" so heldYes/heldNo math below works
        _syntheticBuys:true};
      // Create synthetic buy entries reflecting what the settlement says we held
      if(stYesQty>0){
        var synYesPx=stYesQty>0?Math.round(stYesCost/stYesQty):50;
        byT[tk2].buys.push({px:synYesPx,qty:stYesQty,ts:0,side:"yes",fee:0,_synth:true});
      }
      if(stNoQty>0){
        var synNoPx=stNoQty>0?Math.round(stNoCost/stNoQty):50;
        byT[tk2].buys.push({px:synNoPx,qty:stNoQty,ts:0,side:"no",fee:0,_synth:true});
      }
    }else if(byT[tk2].buys.length===0){
      // We have an entry (created via sells?) but no buys. Augment with settlement data.
      if(!settlementHasData)continue;
      byT[tk2].totalCost+=stYesCost+stNoCost;
      if(stYesQty>0){
        var synYesPx2=Math.round(stYesCost/stYesQty);
        byT[tk2].buys.push({px:synYesPx2,qty:stYesQty,ts:0,side:"yes",fee:0,_synth:true});
      }
      if(stNoQty>0){
        var synNoPx2=Math.round(stNoCost/stNoQty);
        byT[tk2].buys.push({px:synNoPx2,qty:stNoQty,ts:0,side:"no",fee:0,_synth:true});
      }
    }

    var result=st.market_result||"";// "yes" | "no" | ""
    var heldYes=0,heldNo=0;
    for(var bi=0;bi<byT[tk2].buys.length;bi++){
      if(byT[tk2].buys[bi].side==="yes")heldYes+=byT[tk2].buys[bi].qty;
      else heldNo+=byT[tk2].buys[bi].qty;
    }
    for(var sl=0;sl<byT[tk2].sells.length;sl++){
      if(byT[tk2].sells[sl].side==="yes")heldYes-=byT[tk2].sells[sl].qty;
      else heldNo-=byT[tk2].sells[sl].qty;
    }
    if(heldYes<0)heldYes=0;if(heldNo<0)heldNo=0;
    var settleProceeds=0;
    if(result==="yes"){settleProceeds=Math.round(heldYes*100);}
    else if(result==="no"){settleProceeds=Math.round(heldNo*100);}
    else{
      var rd=st.revenue_dollars!=null?parseFloat(st.revenue_dollars)*100:
            (st.revenue!=null?parseFloat(st.revenue):0);
      settleProceeds=Math.round(rd||0);
    }
    byT[tk2].settlement={result:result,revenue:settleProceeds,
      heldYes:heldYes,heldNo:heldNo,
      ts:new Date(st.settled_time||st.created_time||0).getTime()||0};
    byT[tk2].totalProceeds+=settleProceeds;
    // v1.0.0-beta.2: settlements also have a fee_cost field (per docs.kalshi.com/
    // api-reference/portfolio/get-settlements). This is the settlement-side fee
    // Kalshi charges when a market resolves. Previously we only captured fill
    // fees. Add settlement fee to the per-record fees so realized P&L reflects
    // all fees paid on a ticker, not just trading fees.
    if(st.fee_cost!=null){
      var sfee=Math.round(parseFloat(st.fee_cost)*100);
      if(sfee>0)byT[tk2].fees+=sfee;
    }
    byT[tk2].status="settled";
    if(byT[tk2].settlement.ts>byT[tk2].lastTs)byT[tk2].lastTs=byT[tk2].settlement.ts;
    // V1.0.0-beta1.6: mark this ticker as fully processed; further settlement
    // records for the same ticker are skipped (above) to prevent double-credit.
    ticker_settled[tk2]=true;
  }
  // V1.0.0-beta1.6: surface dedup work so we can monitor for future API quirks.
  // Stash on the result for the caller to log.
  var out=[];
  var keys=Object.keys(byT);
  for(var k=0;k<keys.length;k++){
    var rec=byT[keys[k]];
    rec.pnl=rec.totalProceeds-rec.totalCost-rec.fees;
    rec.won=rec.pnl>0;
    if(!rec.settlement&&rec.sells.length>0&&rec.buys.length>0)rec.status="closed";
    else if(rec.settlement)rec.status="settled";
    else rec.status="open";
    out.push(rec);
  }
  out.sort(function(a,b){return(b.lastTs||0)-(a.lastTs||0);});
  // V1.0.0-beta1.7 BUG FIX: handle unreconstructable records.
  //
  // Kalshi's /portfolio/fills endpoint returns ONLY fills newer than the
  // historical cutoff (`trades_created_ts`). Older buy fills are accessible
  // only via /historical/fills (a different endpoint, not yet wired up here).
  // Sell fills + settlement records persist longer.
  //
  // Original issue: when a ticker has a sell fill in current history but its
  // corresponding buy fill is past the cutoff AND the settlement record has
  // no `yes_total_cost_dollars`/`no_total_cost_dollars`, khReconstruct would
  // compute: totalCost = 0, totalProceeds = sell qty*px, pnl = +totalProceeds
  // = PHANTOM WIN.
  //
  // v1.0.0-beta.7 EXPANSION: the original check missed records where the
  // settlement DID provide synthetic cost basis (yes_total_cost_dollars > 0).
  // In that case, the orphan path at lines 2864-2894 creates SYNTHETIC buy
  // entries from the settlement data. But the synthetic buy describes only
  // the LEFTOVER position at settlement, not the original cost basis for the
  // contracts that were already sold (which is what we'd need to compute
  // realized PnL on those sells). The result: we compute (real sell proceeds)
  // - (synthetic cost of leftover) = inflated phantom win.
  //
  // Confirmed via P&L Investigation panel screenshot (May 13, 2026):
  //   Row #1: +$18.16 cost $0.80 proc $18.96 b=1 s=6 SETTLED KXHIGHT...
  // User confirmed this trade does NOT match real Kalshi history. 1 synth
  // buy at $0.80, 6 real sells totaling $18.96, settled with no leftover
  // payout. The +$18 is entirely phantom.
  //
  // Fix: also flag a record unreconstructable when sells exist AND all buys
  // are synthetic (means real buy fills aged out; we can't honestly compute
  // PnL because we don't know what was paid for the contracts that got sold).
  //
  // Proper long-term fix: fetch /historical/fills for missing buys. The
  // endpoint integration is already there (beta.2) but the response is empty
  // for accounts whose history fits within the live tier - so it doesn't
  // help here. The unreconstructable exclusion is the only way to keep the
  // realized P&L honest.
  var unreconstructableTickers=[];
  var unreconstructableProceedsC=0;
  for(var rk=0;rk<keys.length;rk++){
    var rec2=byT[keys[rk]];
    // Determine if all buy entries are synthetic (from settlement augmentation,
    // not from real fills). If so, we don't have a real cost basis for any
    // contracts that were sold via the real sell fills.
    var hasRealBuys=false;
    for(var bii=0;bii<rec2.buys.length;bii++){
      if(!rec2.buys[bii]._synth){hasRealBuys=true;break;}
    }
    // Original case: no buys at all + real sells + no settlement cost data.
    var case1=rec2.buys.length===0&&rec2.sells.length>0&&rec2.totalCost<=0&&rec2.totalProceeds>0;
    // New case: only synthetic buys + real sells. Settlement provided a synth
    // cost basis but it only describes the leftover position, not the cost
    // of the contracts that were already sold via the real sells.
    var case2=!hasRealBuys&&rec2.buys.length>0&&rec2.sells.length>0;
    if(case1||case2){
      rec2.unreconstructable=true;
      unreconstructableTickers.push(rec2.ticker);
      unreconstructableProceedsC+=rec2.totalProceeds;
    }
  }
  // Attach diagnostics to the array for caller's log line.
  out._dedup={fillsDropped:fillsDropped,settlementsDroppedDup:settlementsDroppedDup,
    settlementsSkippedDup:settlementsSkippedDup,
    rawFills:fills.length,dedupedFills:dedupedFills.length,
    rawSettlements:settlements.length,dedupedSettlements:dedupedSettlements.length,
    unreconstructableCount:unreconstructableTickers.length,
    unreconstructableProceedsC:unreconstructableProceedsC,
    unreconstructableSample:unreconstructableTickers.slice(0,5)};
  return out;
}
function khAggregate(records){
  var agg={total:0,settled:0,closed:0,open:0,won:0,lost:0,
    cost:0,proceeds:0,pnl:0,fees:0,roi:0,
    openCost:0,openCount:0,
    // V30.10: gross dollar tracking for header display
    grossWonC:0,// sum of profit on winning trades only (cents)
    grossLostC:0};// sum of cost lost on losing trades only (cents, positive magnitude)
  for(var i=0;i<records.length;i++){
    var r=records[i];
    agg.total++;
    if(r.status==="open"){
      agg.open++;agg.openCount++;
      agg.openCost+=(r.totalCost||0);
      continue;// don't count open positions in realized ROI
    }
    // V1.0.0-beta1.7: skip unreconstructable records (sells present but buys
    // missing because original buy fills are past Kalshi's historical cutoff).
    // Counting these inflates wins because we have proceeds but no cost basis.
    // They're surfaced separately via _dedup.unreconstructableCount.
    if(r.unreconstructable){
      continue;
    }
    agg.cost+=(r.totalCost||0);
    agg.proceeds+=(r.totalProceeds||0);
    agg.pnl+=(r.pnl||0);
    agg.fees+=(r.fees||0);
    if(r.status==="settled"){
      agg.settled++;
      if(r.won){agg.won++;agg.grossWonC+=(r.pnl||0);}
      else {agg.lost++;agg.grossLostC+=Math.abs(r.pnl||0);}
    }else if(r.status==="closed"){
      agg.closed++;
      if(r.pnl>0){agg.won++;agg.grossWonC+=r.pnl;}
      else if(r.pnl<0){agg.lost++;agg.grossLostC+=Math.abs(r.pnl);}
    }
  }
  agg.roi=agg.cost>0?(agg.pnl/agg.cost)*100:0;
  return agg;
}

// ============================================================
// V30.8: ROLLING WINDOW STATS for projections.
// Computes win/loss counts, avg win, avg loss (cents), trades/day, expected
// value per trade, projected daily P&L with +/- 1 SD band, all from the
// authoritative khist.records reconstructed from Kalshi history.
//
// `windowDays` of 0 means lifetime (no time filter).
// Returns null when fewer than 3 settled trades exist in the window
// (sample too small for meaningful projection).
// ============================================================
function khWindowStats(records,windowDays){
  if(!records||records.length===0)return null;
  var now=Date.now();
  var cutoff=windowDays>0?now-(windowDays*86400000):0;
  var wins=[],losses=[];
  var earliestTs=now,latestTs=0;
  for(var i=0;i<records.length;i++){
    var r=records[i];
    if(r.status!=="settled"&&r.status!=="closed")continue;
    var ts=r.lastTs||0;
    if(ts<cutoff)continue;
    if(ts<earliestTs)earliestTs=ts;
    if(ts>latestTs)latestTs=ts;
    var pnl=r.pnl||0;// cents
    if(pnl>0)wins.push(pnl);
    else if(pnl<0)losses.push(-pnl);// store as positive magnitude
    // pnl=0 (rare, MM zero) ignored from win/loss bucket
  }
  var n=wins.length+losses.length;
  if(n<3)return null;// too few samples

  function avg(arr){if(arr.length===0)return 0;var s=0;for(var i=0;i<arr.length;i++)s+=arr[i];return s/arr.length;}
  function sumSqDev(arr,m){var s=0;for(var i=0;i<arr.length;i++){var d=arr[i]-m;s+=d*d;}return s;}

  var avgWin=avg(wins);
  var avgLoss=avg(losses);
  var winRate=wins.length/n;
  var ev=winRate*avgWin-(1-winRate)*avgLoss;// expected cents per trade

  // Trades/day: prefer the actual range of settled trades within the window;
  // if the range is shorter than the window, scale to the window length.
  var spanMs=latestTs-earliestTs;
  var spanDays=spanMs>0?spanMs/86400000:1;
  if(spanDays<1)spanDays=1;// don't extrapolate from <1 day of data
  var tradesPerDay=n/spanDays;

  // Variance of P&L per trade (combine wins as +x, losses as -x).
  // SD per trade = sqrt(E[X^2] - E[X]^2). E[X]=ev. For E[X^2]:
  //   = winRate * avg(wins^2) + (1-winRate) * avg(losses^2)
  // approx using same bucket variances:
  var sqEW=0,sqEL=0;
  for(var w=0;w<wins.length;w++)sqEW+=wins[w]*wins[w];
  for(var l=0;l<losses.length;l++)sqEL+=losses[l]*losses[l];
  var meanSq=(sqEW+sqEL)/n;
  var perTradeVar=Math.max(0,meanSq-ev*ev);
  var perTradeSd=Math.sqrt(perTradeVar);

  // Daily proj = ev * trades/day (cents)
  // Daily SD = sqrt(trades/day) * per-trade SD (sum of n iid: variance scales linearly)
  var dailyProjC=ev*tradesPerDay;
  var dailySdC=perTradeSd*Math.sqrt(tradesPerDay);

  return{
    n:n,wins:wins.length,losses:losses.length,
    winRate:winRate,
    avgWinC:Math.round(avgWin),
    avgLossC:Math.round(avgLoss),
    evC:Math.round(ev),
    tradesPerDay:tradesPerDay,
    dailyProjC:Math.round(dailyProjC),
    dailySdC:Math.round(dailySdC),
    weeklyProjC:Math.round(dailyProjC*7),
    weeklySdC:Math.round(dailySdC*Math.sqrt(7)),
    monthlyProjC:Math.round(dailyProjC*30),
    monthlySdC:Math.round(dailySdC*Math.sqrt(30))
  };
}

// ============================================================
// V30.8: Per-strategy window stats - same windowing applied per `sig` value.
// Pulls strategy from the live trade ledger (kt_realLedger) by ticker match.
// Returns array of {strategy, n, wins, losses, winRate, avgWin, avgLoss, ev, totalPnl}
// sorted by total P&L descending.
// ============================================================
function khStrategyStats(records,windowDays,ledger){
  if(!records||records.length===0)return[];
  // Build ticker -> strategy map from ledger
  var stratByTicker={};
  if(ledger&&ledger.length>0){
    for(var li=0;li<ledger.length;li++){
      var le=ledger[li];
      if(le.ticker&&le.sig&&!stratByTicker[le.ticker]){
        stratByTicker[le.ticker]=le.sig;
      }
    }
  }
  var now=Date.now();
  var cutoff=windowDays>0?now-(windowDays*86400000):0;
  var byStrat={};
  for(var i=0;i<records.length;i++){
    var r=records[i];
    if(r.status!=="settled"&&r.status!=="closed")continue;
    var ts=r.lastTs||0;
    if(ts<cutoff)continue;
    var strat=stratByTicker[r.ticker]||"UNKNOWN";
    if(!byStrat[strat])byStrat[strat]={strategy:strat,wins:[],losses:[],totalPnl:0};
    var pnl=r.pnl||0;
    byStrat[strat].totalPnl+=pnl;
    if(pnl>0)byStrat[strat].wins.push(pnl);
    else if(pnl<0)byStrat[strat].losses.push(-pnl);
  }
  var out=[];
  var keys=Object.keys(byStrat);
  for(var k=0;k<keys.length;k++){
    var b=byStrat[keys[k]];
    var n=b.wins.length+b.losses.length;
    if(n===0)continue;
    var awSum=0;for(var aw=0;aw<b.wins.length;aw++)awSum+=b.wins[aw];
    var alSum=0;for(var al=0;al<b.losses.length;al++)alSum+=b.losses[al];
    var avgW=b.wins.length>0?awSum/b.wins.length:0;
    var avgL=b.losses.length>0?alSum/b.losses.length:0;
    var wr=b.wins.length/n;
    var ev=wr*avgW-(1-wr)*avgL;
    out.push({strategy:b.strategy,n:n,wins:b.wins.length,losses:b.losses.length,
      winRate:wr,avgWinC:Math.round(avgW),avgLossC:Math.round(avgL),
      evC:Math.round(ev),totalPnlC:b.totalPnl});
  }
  out.sort(function(a,b){return b.totalPnlC-a.totalPnlC;});
  return out;
}

function confidence(signal,marketMem,learnedStats){
  var base=50;// neutral start
  if(!signal)return base;
  // Strategy track record (need 20+ samples)
  if(learnedStats&&learnedStats.byStrategy&&learnedStats.byStrategy[signal.sig]){
    var st=learnedStats.byStrategy[signal.sig];
    if(st.settled>=20){
      var winDelta=(st.virtualWinRate||0)-0.65;// 65% breakeven
      base+=winDelta*100;
    }
  }
  // Persistence: signal seen on multiple scans
  if(marketMem&&marketMem.signalCount>=3)base+=10;
  if(marketMem&&marketMem.signalCount>=6)base+=5;
  // Edge magnitude
  var ed=signal.edge||0;
  if(ed>=0.05)base+=8;
  else if(ed>=0.03)base+=4;
  else if(ed<0.02)base-=5;
  // Volatility penalty
  if(marketMem){
    var v=mmVolatility(marketMem);
    if(v==="volatile")base-=10;
    else if(v==="stable"&&marketMem.signalCount>=2)base+=5;
  }
  return Math.min(95,Math.max(5,Math.round(base)));
}

    // worst-case we pull 10000 historical fills. For a $100 account that's

    function pageHistoricalFills(cursor,page){

      if(cursor)qs+="&cursor="+encodeURIComponent(cursor);

        return null;

    // Try to use cached historical fills first to skip the heavy paginated fetch.
