function isSport(m){

  var safe=["fed ","rate ","cpi","inflation","gdp","recession","tariff","congress","senate","house ","president","election","governor","mayor","bitcoin","btc","ethereum","eth","crypto","solana","sol ","dogecoin","temperature","hurricane","tornado","snow","rain","weather","oscar","grammy","emmy","billboard","spotify","netflix","amazon","apple","google","tesla","nvidia","microsoft","stock","s&p","nasdaq","dow ","oil ","gold ","silver","mortgage","housing","jobs","unemployment","wage","gas price","executive order","supreme court","impeach","cabinet","nato","ukraine","iran","china trade","debt ceiling","government shutdown","border","immigration"];
  for(var j=0;j<safe.length;j++){if(t.indexOf(safe[j])>=0)return false;}
  var i;
  for(i=0;i<SP_WORDS.length;i++){if(t.indexOf(SP_WORDS[i])>=0)return true;}
  for(i=0;i<SP_TEAMS.length;i++){if(t.indexOf(SP_TEAMS[i])>=0)return true;}

  if(/[A-Z][a-z]+\s+[A-Z][a-z']+[:\s]+\d+\+/.test(m.title))return true;

  if(/\b(yes|no)\s+[A-Z][a-z]+.*,\s*(yes|no)\s+[A-Z][a-z]+/.test(m.title))return true;

  if(/wins?\s+by\s+(over|under|exactly)\s+\d/i.test(m.title))return true;

  if(/(over|under)\s+\d+\.?\d*\s*(runs?|points?|goals?|hits?|strikeouts?|rbis?|yards?|touchdowns?|saves?|assists?|rebounds?)\s*(scored)?/i.test(m.title))return true;
  return false;
}
function analyze(m,c){
  var days=dtu(m.close_time);if(days<=0||days>c.dw)return null;

function sim(s){
