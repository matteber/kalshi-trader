// ============================================================
// RSA-PSS AUTH (proven working - do not change)
// ============================================================
function _b64(b){var r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
function _al(n){if(n<128)return[n];if(n<256)return[129,n];if(n<65536)return[130,(n>>8)&255,n&255];return[131,(n>>16)&255,(n>>8)&255,n&255];}
function importKey(pem){
  var t=pem.trim(),p1=t.indexOf("BEGIN RSA PRIVATE KEY")>=0,b,d;
  if(p1){b=t.replace(/-----BEGIN RSA PRIVATE KEY-----/,"").replace(/-----END RSA PRIVATE KEY-----/,"").replace(/\s/g,"");
    d=_b64(b);var o=[48,13,6,9,42,134,72,134,247,13,1,1,1,5,0],oc=[4].concat(_al(d.length)),il=o.length+oc.length+d.length,
    oh=[48].concat(_al(2+1+il)),h=oh.concat([2,1,0]).concat(o).concat(oc),pk=new Uint8Array(h.length+d.length);pk.set(h);pk.set(d,h.length);
    return crypto.subtle.importKey("pkcs8",pk,{name:"RSA-PSS",hash:"SHA-256"},false,["sign"]);
  }b=t.replace(/-----BEGIN PRIVATE KEY-----/,"").replace(/-----END PRIVATE KEY-----/,"").replace(/\s/g,"");
  return crypto.subtle.importKey("pkcs8",_b64(b),{name:"RSA-PSS",hash:"SHA-256"},false,["sign"]);
}
function sign(key,kid,meth,path){
  var ts=""+Math.floor(Date.now()/1000),msg=new TextEncoder().encode(ts+meth+path.split("?")[0]);
  return crypto.subtle.sign({name:"RSA-PSS",saltLength:32},key,msg).then(function(s){
    var a=new Uint8Array(s),r="";for(var i=0;i<a.length;i++)r+=String.fromCharCode(a[i]);
    return{"KALSHI-ACCESS-KEY":kid,"KALSHI-ACCESS-TIMESTAMP":ts,"KALSHI-ACCESS-SIGNATURE":btoa(r)};});
}

// ============================================================
// KALSHI API (proven working - do not change)
// ============================================================
var KB="https://api.elections.kalshi.com/trade-api/v2",_px="",_kid="",_ck=null;
function setPx(u){_px=u.replace(/\/+$/,"");}
function setAuth(kid,pem){_kid=kid.trim();return importKey(pem).then(function(k){_ck=k;});}
function api(path,meth,body){
  meth=meth||"GET";var base=_px||KB;
  return sign(_ck,_kid,meth,"/trade-api/v2"+path).then(function(ah){
    var h={"Content-Type":"application/json"};var ks=Object.keys(ah);for(var i=0;i<ks.length;i++)h[ks[i]]=ah[ks[i]];
    var o={method:meth,headers:h};if(!_px)o.mode="cors";if(body)o.body=JSON.stringify(body);return fetch(base+path,o);

// ============================================================
// SPORTS FILTER v6 - Series-prefix approach (cheat sheet Section 5)
// Extract the series ticker (everything before the first hyphen)
// and test against known sports series prefixes.
// ============================================================
function getSeriesTicker(ticker){
  if(!ticker)return "";
  var idx=ticker.indexOf("-");
  return idx>=0?ticker.slice(0,idx):ticker;
}

// Three-layer sports filter:
// Layer 1: KX + sport keyword (catches KXMLBHRR, KXNHLGOAL, KXNBAMENTION, KXITFWMATCH, KXUCLGAME, etc.)
// Layer 2: KXMVE + sport keyword (catches KXMVENBASINGLEGAME, KXMVESPORTSMULTIGAMEEXTENDED, etc.)
// Layer 3: Bare sport league names with exact boundary (NFL, NBA, MLBGAME, etc.)
//
// Safe non-sport KX prefixes: KXFED, KXCPI, KXSPY, KXBTC, KXHIGHTEMP, KXRECSSN, etc.

var BARE_SPORTS_RE=/^(NFL|NFLGAME|NFLSEASON|NBA|NBAGAME|NBASEASON|WNBA|WNBAGAME|NCAAB|NCAAF|NCAAW|NCAAM|NCAABGAME|MLB|MLBGAME|MLBSEASON|NHL|NHLGAME|EPL|EPLGAME|MLS|MLSGAME|UCL|UCLGAME|LALIGA|SERIEA|BUNDESLIGA|LIGUE1|WORLDCUP|EUROCUP|PGA|PGAGAME|LPGA|ATP|WTA|GRANDSLAM|UFC|UFCGAME|MMA|MMAGAME|NASCAR|NASCARGAME|F1|F1RACE|ESPORT|ESPORTS|BOXING|CRICKET|RUGBY|CFB|XFL|USFL|PARLAY)($|-)/;

// KX + sport keyword (no boundary needed - these are always followed by more letters)
// Matches: KXMLBHRR, KXNHLGOAL, KXNBAMENTION, KXITFWMATCH, KXUCLGAME, KXEPLGAME, etc.
// Does NOT match: KXFED, KXCPI, KXSPY, KXBTC, KXHIGHTEMP, KXRECSSN, KXCREDITRATING, etc.
var KX_SPORT_RE=/^KX(MLB|NBA|NHL|NFL|WNBA|NCAA|EPL|MLS|UCL|UFC|MMA|PGA|LPGA|ATP|WTA|NASCAR|F1|ITF|BOXING|CRICKET|RUGBY|SOCCER|TENNIS|ESPORT|LALIGA|SERIEA|BUNDESLIGA|LIGUE1|WORLDCUP|EUROCUP|GRANDSLAM|XFL|USFL|CFB)/;

// KXMVE + sport keyword (Kalshi multi-variable events for sports)
// Matches: KXMVESPORTSMULTIGAMEEXTENDED, KXMVENBASINGLEGAME, KXMVECROSSCATEGORY, etc.
// Does NOT match: KXMVEECON, KXMVECRYPTO, KXMVEPOLITICS, KXMVEWEATHER, etc.
var KXMVE_SPORT_RE=/^KXMVE(SPORT|CROSSCATEGORY|PARLAY|NBA|NFL|MLB|NHL|WNBA|NCAA|MLS|EPL|UCL|UFC|MMA|PGA|LPGA|ATP|WTA|NASCAR|F1|BOXING|CRICKET|RUGBY|SOCCER|TENNIS|ESPORT|BASEBALL|BASKETBALL|FOOTBALL|HOCKEY)/;

function isSport(m){
  var series=getSeriesTicker(m.ticker||"");
  var evSeries=getSeriesTicker(m.event_ticker||"");
  // Layer 1: KX + sport keyword
  if(KX_SPORT_RE.test(series)||KX_SPORT_RE.test(evSeries))return true;
  // Layer 2: KXMVE + sport keyword
  if(KXMVE_SPORT_RE.test(series)||KXMVE_SPORT_RE.test(evSeries))return true;
  // Layer 3: Bare sport league exact match
  return BARE_SPORTS_RE.test(series)||BARE_SPORTS_RE.test(evSeries);
}

// Debug version: returns which rule matched (for log paste diagnostics)
function isSportDebug(m){
  var series=getSeriesTicker(m.ticker||"");
  var evSeries=getSeriesTicker(m.event_ticker||"");
  var km=series.match(KX_SPORT_RE);
  if(km)return"kx-sport:"+km[1]+"->"+series;
  var kme=evSeries.match(KX_SPORT_RE);
  if(kme)return"kx-sport:"+kme[1]+"->"+evSeries;
  var vm=series.match(KXMVE_SPORT_RE);
  if(vm)return"kxmve-sport:"+vm[1]+"->"+series;
  var vme=evSeries.match(KXMVE_SPORT_RE);
  if(vme)return"kxmve-sport:"+vme[1]+"->"+evSeries;
  if(BARE_SPORTS_RE.test(series))return"bare-series:"+series;
  if(BARE_SPORTS_RE.test(evSeries))return"bare-event:"+evSeries;
  return null;
}

// Build a lookup set of canary tickers for fast checks
function canaryTickerSet(){
  var c=canaries(),s={};
  for(var i=0;i<c.length;i++)s[c[i].ticker]=true;
  return s;
}

// Canary validation: ensure non-sport canaries aren't misclassified by ticker detection
function validateCanaries(logFn){
  var all=canaries(),passed=0,failed=[];
  for(var i=0;i<all.length;i++){
    var serTk=getSeriesTicker(all[i].ticker);
    if(!detectSportByTicker(serTk)){
      passed++;
    }else{
      failed.push(all[i].ticker+" (ticker "+serTk+" flagged as sport)");
    }
  }
  if(logFn){
    logFn("CANARY: "+passed+"/"+all.length+" passed");
    if(failed.length>0){
      logFn("CANARY FAILURES: "+failed.join(", "),"error");
    }
  }
  return{passed:passed,total:all.length,failed:failed};
}

// ============================================================
// MARKET FETCHING - Hybrid approach (FAST)
// Step 1: GET /series (1 call) -> build set of allowed series tickers
// Step 2: Bulk paginated GET /markets?status=open&limit=1000 -> filter in-flight
// Sports is now a toggleable category, not hard-excluded.
// ============================================================

// Detect sport series by ticker (used when series has no category from API)
function detectSportByTicker(tk){
  if(KX_SPORT_RE.test(tk)||KXMVE_SPORT_RE.test(tk)||BARE_SPORTS_RE.test(tk))return true;
  return false;
}

function fetchMkts(logFn,catFilter){
  var allowedCats={};
  if(catFilter){
    var parts=catFilter.split(",");
    for(var ci=0;ci<parts.length;ci++){var ct2=parts[ci].trim();if(ct2)allowedCats[ct2]=true;}
  }
  var hasCatFilter=Object.keys(allowedCats).length>0;

  logFn("Fetching series catalog...");
  return api("/series").then(function(d){
    var seriesList=d.series||[];
    logFn("Series catalog: "+seriesList.length+" series found");
    var allowedSeries={},skippedCount=0,catMap={};
    for(var i=0;i<seriesList.length;i++){
      var s=seriesList[i];
      var cat=s.category||"";
      var tk=s.ticker||"";
      // If no category from API, detect by ticker
      if(!cat&&detectSportByTicker(tk))cat="Sports";
      if(!cat)cat="uncategorized";
      if(!catMap[cat])catMap[cat]=0;
      catMap[cat]++;
      // Apply category filter
      if(hasCatFilter&&!allowedCats[cat]){skippedCount++;continue;}
      allowedSeries[tk]=cat;
    }
    var allowedCount=Object.keys(allowedSeries).length;
    logFn("Series filter: "+allowedCount+" allowed, "+skippedCount+" filtered out");

    var cmArr=[];var cmk=Object.keys(catMap);
    for(var ci2=0;ci2<cmk.length;ci2++)cmArr.push({c:cmk[ci2],n:catMap[cmk[ci2]]});
    cmArr.sort(function(a,b){return b.n-a.n;});
    logFn("Series categories: "+cmArr.slice(0,12).map(function(x){return x.c+"("+x.n+")";}).join(", "));

    return{allowedSeries:allowedSeries,skippedCount:skippedCount,
      totalSeries:seriesList.length,allowedCount:allowedCount,catMap:catMap};
  }).catch(function(e){
    logFn("Series fetch failed ("+e.message+"), fetching unfiltered","warn");
    return{allowedSeries:null,skippedCount:0,totalSeries:0,allowedCount:0,catMap:{}};
  }).then(function(info){
    var all=[],cur="",pg=0,filterSkip=0;
    var as=info.allowedSeries;
    function go(){
      var qs="status=open&limit=1000";
      if(cur)qs+="&cursor="+encodeURIComponent(cur);
      return api("/markets?"+qs).then(function(d){
        var mk=d.markets||[];
        for(var i=0;i<mk.length;i++){
          var m=mk[i];
          if(as){
            var serTk=getSeriesTicker(m.ticker||"");
            if(!as[serTk]){filterSkip++;continue;}
          }
          all.push(norm(m));
        }
        cur=d.cursor||"";pg++;
        if(pg%20===0)logFn("Page "+pg+"... "+all.length+" markets");
        if(cur&&mk.length>0&&pg<200)return go();
        return{markets:all,filterSkip:filterSkip,pages:pg,
          skippedCount:info.skippedCount,totalSeries:info.totalSeries,
          allowedCount:info.allowedCount,catMap:info.catMap};
      });
    }
    logFn("Scanning all open markets...");
    return go();
  });
}

var _wxCache={};// {cityCode: {ts, hourly:{date:[temps]}, name}}

// Normal CDF approximation for probability calculation
function normCDF(x,mean,sd){
  if(sd<=0)return x>=mean?1:0;
  var z=(x-mean)/sd;
  var t=1/(1+0.2316419*Math.abs(z));
  var d=0.3989423*Math.exp(-z*z/2);
  var p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.8212560+t*1.330274))));
  return z>0?1-p:p;
}

function parseWeatherTicker(ticker){
  var parts=ticker.split("-");
  var series=parts[0];
  var isHigh=false,isLow=false,city=null,dateIdx=0;

  if(/^KXHIGHTEMP$/i.test(series)){
    isHigh=true;city=parts[1]||"";dateIdx=2;
  }else if(/^KXLOWTEMP$/i.test(series)){
    isLow=true;city=parts[1]||"";dateIdx=2;
  }else if(/^KXHIGH/i.test(series)){
    isHigh=true;city=series.replace(/^KXHIGH/i,"");dateIdx=1;
  }else if(/^KXLOWT/i.test(series)){
    isLow=true;city=series.replace(/^KXLOWT/i,"");dateIdx=1;
  }else{return null;}

  if(!city||!WEATHER_CITIES[city])return null;
  if(!parts[dateIdx])return null;
  var dateStr=parts[dateIdx];
  var yrMatch=dateStr.match(/^(\d{2})([A-Z]{3})(\d{1,2})$/);
  if(!yrMatch)return null;
  var months={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  var mon=months[yrMatch[2]];
  if(mon==null)return null;
  var dt=new Date(2000+parseInt(yrMatch[1]),mon,parseInt(yrMatch[3]));
  var dateKey=dt.toISOString().slice(0,10);
  return{city:city,coords:WEATHER_CITIES[city],isHigh:isHigh,date:dateKey,dt:dt};
}

function fetchWeatherForCity(cityCode){
  var c=WEATHER_CITIES[cityCode];
  if(!c)return Promise.resolve(null);
  var cached=_wxCache[cityCode];
  if(cached&&(Date.now()-cached.ts)<1800000)return Promise.resolve(cached);
  // Fetch HOURLY data for precise high/low calculation
  var url="https://api.open-meteo.com/v1/forecast?latitude="+c.lat+"&longitude="+c.lon
    +"&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min"
    +"&temperature_unit=fahrenheit&forecast_days=7&timezone=America%2FChicago";
  return fetch(url).then(function(r){return r.json();}).then(function(d){
    var daily=d.daily||{};
    var hourly=d.hourly||{};
    // Group hourly temps by date
    var byDate={};
    var times=hourly.time||[];
    var temps=hourly.temperature_2m||[];
    for(var i=0;i<times.length;i++){
      var dk=times[i].slice(0,10);// "2026-04-19"
      var hr=parseInt(times[i].slice(11,13));// hour 0-23
      if(!byDate[dk])byDate[dk]={all:[],day:[],night:[]};
      byDate[dk].all.push(temps[i]);
      if(hr>=8&&hr<=20)byDate[dk].day.push(temps[i]);// 8am-8pm for highs
      if(hr<=9||hr>=22)byDate[dk].night.push(temps[i]);// 10pm-9am for lows
    }
    var result={ts:Date.now(),hourly:byDate,
      highs:daily.temperature_2m_max||[],lows:daily.temperature_2m_min||[],
      dates:daily.time||[],name:c.name};
    _wxCache[cityCode]=result;
    return result;
  }).catch(function(e){return null;});
}

// Fetch forecasts for all weather markets, return promise
function enrichWeatherMarkets(markets,logFn){
  var wxMarkets=[];var cities={};
  for(var i=0;i<markets.length;i++){
    var wp=parseWeatherTicker(markets[i].ticker);
    if(wp){
      markets[i]._wx=wp;
      wxMarkets.push(i);
      cities[wp.city]=true;
    }
  }
  if(wxMarkets.length===0)return Promise.resolve(markets);
  var cityList=Object.keys(cities);
  logFn("Weather: "+wxMarkets.length+" markets across "+cityList.length+" cities, fetching forecasts...");
  var proms=[];
  for(var j=0;j<cityList.length;j++){
    proms.push(fetchWeatherForCity(cityList[j]));
  }
  return Promise.all(proms).then(function(){
    var enriched=0;
    for(var k=0;k<wxMarkets.length;k++){
      var m=markets[wxMarkets[k]];
      var wx=m._wx;
      var fc=_wxCache[wx.city];
      if(!fc||!fc.dates)continue;
      var dateIdx=-1;
      for(var d=0;d<fc.dates.length;d++){
        if(fc.dates[d]===wx.date){dateIdx=d;break;}
      }
      if(dateIdx>=0){
        var hd=fc.hourly[wx.date];
        if(wx.isHigh){
          // HIGH temp: use max of daytime hourly, or daily max as fallback
          var dayTemps=hd&&hd.day.length>=3?hd.day:null;
          if(dayTemps){
            var maxT=-999;for(var t=0;t<dayTemps.length;t++)if(dayTemps[t]>maxT)maxT=dayTemps[t];
            m._wxForecast=maxT;
            // Std dev of daytime temps = measure of uncertainty
            var sum2=0;for(var t2=0;t2<dayTemps.length;t2++)sum2+=(dayTemps[t2]-maxT)*(dayTemps[t2]-maxT);
            m._wxSpread=Math.sqrt(sum2/dayTemps.length);
            m._wxHourCount=dayTemps.length;
          }else{
            m._wxForecast=fc.highs[dateIdx];
            m._wxSpread=3;// default uncertainty
            m._wxHourCount=0;
          }
        }else{
          // LOW temp: use min of night/early morning hourly, or daily min
          var nightTemps=hd&&hd.night.length>=2?hd.night:null;
          if(nightTemps){
            var minT=999;for(var t3=0;t3<nightTemps.length;t3++)if(nightTemps[t3]<minT)minT=nightTemps[t3];
            m._wxForecast=minT;
            var sum3=0;for(var t4=0;t4<nightTemps.length;t4++)sum3+=(nightTemps[t4]-minT)*(nightTemps[t4]-minT);
            m._wxSpread=Math.sqrt(sum3/nightTemps.length);
            m._wxHourCount=nightTemps.length;
          }else{
            m._wxForecast=fc.lows[dateIdx];
            m._wxSpread=3;
            m._wxHourCount=0;
          }
        }
        m._wxType=wx.isHigh?"high":"low";
        m._wxCity=fc.name||wx.city;
        // Days out affects forecast error
        m._wxDaysOut=dateIdx;
        enriched++;
      }
    }
    if(enriched>0)logFn("Weather: "+enriched+" markets enriched with hourly forecast data");
    return markets;
  }).catch(function(e){
    logFn("Weather fetch error: "+e.message,"warn");
    return markets;
  });
}

function analyze(m,cfg){
  var days=dtu(m.close_time);
  if(days<=0)return null;
  // Skip markets closing within 30 minutes - order might fill on a settled market
  if(days<0.021)return null;
  var yb=m.yes_bid,ya=m.yes_ask,nb=m.no_bid,na=m.no_ask||nb+4,lp=m.last_price;
  if(yb<=0&&nb<=0&&lp<=0)return null;
  if(m.volume<=0)return null;
  var sum=yb+nb,mid=Math.round((yb+ya)/2),sp=ya-yb,nsp=na-nb;
  if(sp<0||sp>50)return null;
  var urg=days<0.25?2.0:days<0.5?1.6:days<1?1.3:days<2?1.15:days<4?1.05:1.0;

  // Maker fee (0.0175) since we post limit orders
  function mFee(price){return Math.ceil(0.0175*price/100*(1-price/100)*100);}

  // Clamp price to avoid post_only cross: must be strictly below ask
  // For YES orders: price < yes_ask. For NO orders: price < no_ask.
  function clampYes(p){return Math.min(p,ya-1);}
  function clampNo(p){return Math.min(p,na-1);}

  // Favorite-longshot bias adjustment (Whelan 2026)
  // Favorites are underpriced by this amount
  function biasAdj(midPct){
    if(midPct>=90)return 0.03;
    if(midPct>=80)return 0.05;
    if(midPct>=70)return 0.04;
    if(midPct>=60)return 0.03;
    if(midPct>=50)return 0.03;
    return 0;
  }

  // ============================================================
  // STRATEGY 1: WEATHER EDGE (WX) - Highest priority, real data edge
  // Hourly forecast + NormalCDF probability vs market price.
  // ============================================================
  if(m._wxForecast!=null){
    var fcVal=m._wxForecast;
    var sub=(m.subtitle||"").replace(/[^a-zA-Z0-9.<> ]/g," ").toLowerCase();
    var rangeMatch=sub.match(/(\d+)\s*to\s*(\d+)/);
    var aboveMatch=sub.match(/or above/)||sub.match(/above/);
    var belowMatch=sub.match(/or below/)||sub.match(/below/);

    var strike=null,strikeLo=null,strikeHi=null,mktType="unknown";
    if(rangeMatch){
      strikeLo=parseFloat(rangeMatch[1]);strikeHi=parseFloat(rangeMatch[2]);
      mktType="range";strike=(strikeLo+strikeHi)/2;
    }else if(aboveMatch){
      var am=sub.match(/([\d.]+)/);if(am)strike=parseFloat(am[1]);
      mktType="above";
    }else if(belowMatch){
      var bm=sub.match(/([\d.]+)/);if(bm)strike=parseFloat(bm[1]);
      mktType="below";
    }
    if(mktType==="unknown"){
      var tkMatch=m.ticker.match(/[-](B|T)([\d.]+)$/);
      if(tkMatch){strike=parseFloat(tkMatch[2]);mktType=tkMatch[1]==="T"?"above":"below";}
    }

    if(strike!=null&&!isNaN(fcVal)&&mktType!=="unknown"){
      var modelSpread=m._wxSpread||3;
      var daysOut=m._wxDaysOut||1;
      // v29 fix: MORE CONSERVATIVE forecast errors after 0-4 loss on Apr 20
      // Denver was 8F off, NYC 4F off. Old values way too tight.
      var forecastError=daysOut<=0.5?2.5:daysOut<=1?3.0:daysOut<=2?4.0:daysOut<=4?5.0:6.0;
      var totalSD=Math.sqrt(modelSpread*modelSpread+forecastError*forecastError);
      if(totalSD<3)totalSD=3;// min SD raised from 2 to 3

      var fcProb;
      if(mktType==="range"&&strikeLo!=null&&strikeHi!=null){
        fcProb=normCDF(strikeHi,fcVal,totalSD)-normCDF(strikeLo,fcVal,totalSD);
      }else if(mktType==="above"){
        fcProb=1-normCDF(strike,fcVal,totalSD);
      }else{
        fcProb=normCDF(strike,fcVal,totalSD);
      }
      fcProb=Math.min(0.95,Math.max(0.05,fcProb));// tighter caps

      var mktProb=mid/100;
      var probDiff=Math.abs(fcProb-mktProb);
      // v29 fix: Raised threshold from 15% to 20% for single markets
      var wxThreshold=mktType==="range"?0.10:0.20;
      if(probDiff>=wxThreshold){
        var wxSide=fcProb>mktProb?"yes":"no";
        var wxPost=wxSide==="yes"?clampYes(Math.round((yb+ya)/2)):clampNo(Math.round((nb+na)/2));
        var hrInfo=m._wxHourCount?m._wxHourCount+"hr":"daily";
        var typeLabel=mktType==="range"?(strikeLo+"-"+strikeHi+"F"):mktType+" "+strike+"F";
        // Confidence weighting: hourly data > daily fallback
        var confMult=m._wxHourCount>=6?1.2:m._wxHourCount>=3?1.0:0.8;
        // v29 fix: Minimum 15c contract price (no longshots)
        if(wxPost>=15)return{sig:"WX",side:wxSide,edge:probDiff,prob:fcProb,price:wxPost,
          label:"WX "+m._wxCity+" fc:"+Math.round(fcVal)+"F "+typeLabel+" "+wxSide.toUpperCase()+"@"+wxPost+"c SD:"+totalSD.toFixed(0)+"F ("+hrInfo+")",
          score:probDiff*120*urg*confMult,
          reason:"Forecast "+Math.round(fcVal)+"F ("+hrInfo+"). "+typeLabel+". SD:"+totalSD.toFixed(1)+"F. Prob: "+Math.round(fcProb*100)+"% vs mkt "+mid+"%. Edge: "+Math.round(probDiff*100)+"%."};
      }
    }
  }

  // ============================================================
  // STRATEGY 2: FAVORITE BIAS (FAV) - Academic-backed edge
  // Kalshi favorites (65c+) are systematically underpriced.
  // Post maker limit at ask-1 to capture the bias.
  // Whelan 2026: contracts above 50c earn positive returns.
  // ============================================================
  if(mid>=65&&mid<=93&&sp>=1&&sp<=12&&m.volume>=500&&days>=0.25){
    var favBias=biasAdj(mid);
    var adjProb=mid/100+favBias;// bias-adjusted probability
    var favPost=clampYes(ya-1);
    var favFee=mFee(favPost);
    var favEV=adjProb*(100-favPost-favFee)-(1-adjProb)*(favPost+favFee);
    if(favEV>1&&favPost>=5&&favPost<=95){
      return{sig:"FAV",side:"yes",edge:favEV/100,prob:adjProb,price:favPost,
        label:"Fav YES "+mid+"% adj:"+Math.round(adjProb*100)+"% @"+favPost+"c EV:+"+favEV.toFixed(1)+"c",
        score:favEV*urg*Math.sqrt(Math.min(m.volume,20000)/1000),
        reason:"Favorite at "+mid+"% + "+Math.round(favBias*100)+"% bias = "+Math.round(adjProb*100)+"%. Post YES@"+favPost+"c (ask-1). EV:+"+favEV.toFixed(1)+"c, fee:"+favFee+"c. Vol:"+Math.round(m.volume)+"."};
    }
  }
  // NO-side favorites (mid <= 35, so NO side is 65%+)
  if(mid<=35&&mid>=7&&nsp>=1&&nsp<=12&&m.volume>=500&&days>=0.25){
    var nMid=100-mid;
    var nBias=biasAdj(nMid);
    var nAdjProb=nMid/100+nBias;
    var nFavPost=clampNo(na-1);
    var nFavFee=mFee(nFavPost);
    var nFavEV=nAdjProb*(100-nFavPost-nFavFee)-(1-nAdjProb)*(nFavPost+nFavFee);
    if(nFavEV>1&&nFavPost>=5&&nFavPost<=95){
      return{sig:"FAV",side:"no",edge:nFavEV/100,prob:nAdjProb,price:nFavPost,
        label:"Fav NO "+nMid+"% adj:"+Math.round(nAdjProb*100)+"% @"+nFavPost+"c EV:+"+nFavEV.toFixed(1)+"c",
        score:nFavEV*urg*Math.sqrt(Math.min(m.volume,20000)/1000),
        reason:"NO favorite at "+nMid+"% + "+Math.round(nBias*100)+"% bias = "+Math.round(nAdjProb*100)+"%. Post NO@"+nFavPost+"c (ask-1). EV:+"+nFavEV.toFixed(1)+"c, fee:"+nFavFee+"c. Vol:"+Math.round(m.volume)+"."};
    }
  }

  // ============================================================
  // STRATEGY 3: MARKET MAKER (MM) - Tightened for realistic fills
  // Spread 8-15c, volume >= 1000, both sides >= 10c.
  // No more phantom profits on illiquid wide-spread markets.
  // ============================================================
  if(sp>=8&&sp<=15&&m.volume>=1000){
    var mmYes=clampYes(yb+1);
    var mmNo=clampNo(nb+1);
    var mmYesFee=mFee(mmYes);
    var mmNoFee=mFee(mmNo);
    var mmCost=mmYes+mmNo+mmYesFee+mmNoFee;
    var mmProfit=100-mmCost;
    if(mmProfit>=3&&mmYes>=10&&mmNo>=10&&mmYes<=90&&mmNo<=90){
      return{sig:"MM",side:"both",edge:mmProfit/100,prob:0.5,
        price:mmYes,price2:mmNo,
        label:"MM sp:"+sp+"c Y@"+mmYes+" N@"+mmNo+" +"+mmProfit+"c/pair v:"+Math.round(m.volume/1000)+"k",
        score:mmProfit*urg*Math.sqrt(Math.min(m.volume,20000)/1000),
        reason:"Post Y@"+mmYes+"c + N@"+mmNo+"c. Cost:"+mmCost+"c (fees "+mmYesFee+"+"+mmNoFee+"c). Profit:"+mmProfit+"c/pair. Spread:"+sp+"c Vol:"+Math.round(m.volume)+"."};
    }
  }

  // ============================================================
  // STRATEGY 4: VALUE - Post inside wide spreads with bias adjustment
  // Post 35% into spread as maker. Bias-adjusted probability for favorites.
  // ============================================================
  if(sp>=6&&sp<=20&&m.volume>=500){
    var postYes=clampYes(yb+Math.max(2,Math.floor(sp*0.35)));
    var postNo=clampNo(nb+Math.max(2,Math.floor(nsp*0.35)));
    var yProb=mid/100;var nProb=1-yProb;
    // Apply bias: if favorite side, boost probability
    if(mid>=50)yProb=Math.min(0.97,yProb+biasAdj(mid));
    else nProb=Math.min(0.97,nProb+biasAdj(100-mid));
    var pyFee=mFee(postYes);var pnFee=mFee(postNo);
    var yEV=yProb*(100-postYes-pyFee)-(1-yProb)*(postYes+pyFee);
    var nEV=nProb*(100-postNo-pnFee)-(1-nProb)*(postNo+pnFee);
    var bestSide=yEV>=nEV?"yes":"no";
    var bestEV=Math.max(yEV,nEV);
    var bestPost=bestSide==="yes"?postYes:postNo;
    var bestFee=bestSide==="yes"?pyFee:pnFee;
    if(bestEV>3&&bestPost>=5&&bestPost<=95){
      return{sig:"VALUE",side:bestSide,edge:bestEV/100,prob:bestSide==="yes"?yProb:nProb,
        price:bestPost,
        label:"Value "+bestSide.toUpperCase()+"@"+bestPost+"c EV:+"+bestEV.toFixed(0)+"c",
        score:(bestEV/100)*80*urg,
        reason:"Post "+bestSide.toUpperCase()+"@"+bestPost+"c (35% into spread). Bid:"+yb+" Ask:"+ya+". EV:+"+bestEV.toFixed(1)+"c, fee:"+bestFee+"c. Vol:"+Math.round(m.volume)+"."};
    }
  }

  // ============================================================
  // STRATEGY 5: VOLUME MOMENTUM (VOL) - Keep as-is
  // High volume + tight spread + directional bias
  // ============================================================
  if(m.volume>=1000&&sp>=0&&sp<=10){
    var vmPost=clampYes(Math.round((yb+ya)/2));
    if(mid>=58&&mid<=82){
      var volEdge=((mid-50)/100)*0.10;
      if(volEdge>=cfg.me)return{sig:"VOL",side:"yes",edge:volEdge,prob:mid/100,price:vmPost,
        label:"Vol YES "+mid+"% "+(m.volume>=1e3?Math.round(m.volume/1000)+"k":Math.round(m.volume))+"@"+vmPost+"c",score:volEdge*50*urg,
        reason:"Post YES@"+vmPost+"c (mid). "+mid+"%, vol "+Math.round(m.volume)+", sp "+sp+"c."};
    }
    var nmPost=clampNo(Math.round((nb+na)/2));
    if(mid>=18&&mid<=42){
      var volEdge2=((50-mid)/100)*0.10;
      if(volEdge2>=cfg.me)return{sig:"VOL",side:"no",edge:volEdge2,prob:(100-mid)/100,price:nmPost,
        label:"Vol NO "+(100-mid)+"% "+(m.volume>=1e3?Math.round(m.volume/1000)+"k":Math.round(m.volume))+"@"+nmPost+"c",score:volEdge2*50*urg,
        reason:"Post NO@"+nmPost+"c (mid). "+mid+"%, vol "+Math.round(m.volume)+", sp "+sp+"c."};
    }
  }

  return null;
}

// ============================================================
// POSITION SIZING (Kelly Criterion)
// ============================================================
function kelly(prob,price,frac,maxCents,days){
  if(!price||price<=0||price>=100||!maxCents||maxCents<=0)return 0;
  var cost=price/100,b=(1-cost)/cost;
  var p=Math.min(0.97,Math.max(0.03,prob||0.5));
  var f=Math.max(0,(b*p-(1-p))/b);
  var urg=days<0.5?1.5:days<1?1.25:days<2?1.1:1.0;
  var r=Math.min(Math.round(f*frac*maxCents*urg),maxCents);
  return isNaN(r)?0:r;
}

// ============================================================
// PAPER TRADE SIMULATION
// ============================================================
function sim(s){
  var fr={WX:0.90,FAV:0.92,MM:0.85,VALUE:0.85,VOL:0.78};
  var er={WX:0.70,FAV:0.60,MM:0.80,VALUE:0.55,VOL:0.50};
  if(Math.random()>(fr[s.sig]||0.7))return{filled:false};
  var realized=s.edge*(er[s.sig]||0.5);
  var noise=(Math.random()-0.5)*0.06;
  var trueProb=Math.min(0.97,Math.max(0.03,(s.prob||0.5)+realized+noise));
  return{filled:true,won:Math.random()<trueProb};
}

  // ---- POSITION EXIT MONITORING ----
  // Check if any held position can be sold at current market price for profit
  // Auto-executes sells when profit >= EXIT_MIN_PROFIT per contract
  function checkExits(marketsArr){
    if(demo)return;
    var positions=portfolio.positions||[];
    // In paper mode, use pending positions instead
    if(paper){
      positions=pending.map(function(p){
        return{ticker:p.tk,side:p.side,qty:p.ct,avgPrice:p.pr,totalCost:p.cost};
      });
    }
    if(positions.length===0)return;

    var exitSignals=[];
    for(var i=0;i<positions.length;i++){
      var pos=positions[i];
      if(!pos.ticker||pos.qty<=0)continue;
      if(pos.side==="pair")continue;// skip MM pairs
      // Find this market in current scan
      for(var j=0;j<marketsArr.length;j++){
        var m=marketsArr[j];
        if(m.ticker!==pos.ticker)continue;
        // Check if we can sell for profit
        var sellPrice=pos.side==="yes"?m.yes_bid:m.no_bid;
        var entryPrice=pos.avgPrice;
        var sellFee=kalshiFee(1,sellPrice,true);
        var profit=sellPrice-entryPrice-sellFee;
        // Also track current market value vs entry (even if not profitable)
        var currentMid=Math.round((m.yes_bid+m.yes_ask)/2);
        var priceMove=pos.side==="yes"?(currentMid-entryPrice):(100-currentMid-entryPrice);

        if(profit>=EXIT_MIN_PROFIT){
          exitSignals.push({ticker:pos.ticker,side:pos.side,qty:pos.qty,
            entry:entryPrice,sell:sellPrice,profit:profit,
            title:m.title||pos.ticker,mid:currentMid,move:priceMove});
        }else if(Math.abs(priceMove)>=5){
          // Log significant price moves even without exit opportunity
          var dir=priceMove>0?"up":"down";
          log("POSITION MOVE: "+pos.ticker+" "+pos.side.toUpperCase()+" entry:"+entryPrice+"c now:"+currentMid+"c ("+dir+" "+Math.abs(priceMove)+"c)");
        }
        break;
      }
    }
    if(exitSignals.length>0){
      for(var k=0;k<exitSignals.length;k++){
        var ex=exitSignals[k];

        // Auto-execute sell in live mode
        if(!paper){
          executeSell(ex.ticker,ex.side,ex.qty,ex.sell,"EXIT");
        }
      }
    }
    return exitSignals;

  function cancelStaleOrders(){
    if(demo||paper)return Promise.resolve(0);
    if(!portfolio.resting||portfolio.resting.length===0)return Promise.resolve(0);
    var now=Date.now();
    var stale=[];
    for(var i=0;i<portfolio.resting.length;i++){
      var o=portfolio.resting[i];
      if(!o.id||!o.created)continue;
      var age=now-new Date(o.created).getTime();
      if(age>ORDER_TTL_MS){
        stale.push(o);
      }
    }
    if(stale.length===0)return Promise.resolve(0);

    var canceled=0;
    var chain=Promise.resolve();
    for(var j=0;j<stale.length;j++){
      (function(order){
        chain=chain.then(function(){
          return new Promise(function(resolve){
            setTimeout(function(){
              api("/portfolio/orders/"+order.id,"DELETE").then(function(){
                canceled++;
                // Refund the reserved budget

    });

      setMet(function(p){var n2=cx(p);n2.ev+=all.length;n2.sg+=sc;svM(n2);return n2;});

  // ---- TRADE (with canary guard + cycle-aware budgeting) ----
  function doTrade(m){
    if(!m.signal||est)return;
    if(CANARY_SET.current[m.ticker])return;
    if(!canaryOk)return;
    if(traded.current[m.ticker])return;
    if(paper&&pending.length>=MAX_PENDING){log("Max pending ("+MAX_PENDING+")","warn");return;}
    var evTk=m.event_ticker||getSeriesTicker(m.ticker);
    if(eventTrades.current[evTk]>=(MAX_PER_EVENT||1)){return;}// silent skip for event limit
    var s=m.signal,days=dtu(m.close_time);
    var mb=maxBet();
    if(mb<=0)return;

    // Strategy-specific sizing
    var kfAdj=cfg.kf;// default Kelly fraction
    if(s.sig==="FAV")kfAdj=0.30;// FAV: size up, edge is academically validated
    if(s.sig==="WX")kfAdj=0.15;// WX: conservative after Apr 20 losses
    if(s.sig==="MM")kfAdj=0.10;// MM: size down, fill uncertainty is high
    // MM budget cap: max 10% of total account value per MM trade
    var mmBudgetCap=s.sig==="MM"?Math.floor((balRef.current+deployedRef.current)*0.10):mb;
    var effectiveBudget=Math.min(mb,mmBudgetCap);

    var sz=kelly(s.prob,s.price,kfAdj,effectiveBudget,days);
    if(sz<=0)return;
    var ct2=Math.max(1,Math.floor(sz/s.price)),cost=ct2*s.price;
    // Per-strategy contract caps
    var maxCt=s.sig==="MM"?5:s.sig==="WX"?20:50;// MM: 5 pairs. WX: 20 max. Others: 50
    if(ct2>maxCt){ct2=maxCt;cost=ct2*s.price;}
    if(cost>effectiveBudget){ct2=Math.max(1,Math.floor(effectiveBudget/s.price));cost=ct2*s.price;}
    if(cost<=0)return;

    traded.current[m.ticker]=true;
    if(!eventTrades.current[evTk])eventTrades.current[evTk]=0;
    eventTrades.current[evTk]++;

    if(demo){
      // Demo mode: instant sim (no real markets)
      var res=sim(s);
      setMet(function(p){
        var n=cx(p);n.at++;
        if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
        n.by[s.sig].a++;
        if(res.filled){
          n.fl++;n.by[s.sig].f++;n.pl+=cost;n.lv+=cost;n.by[s.sig].p+=cost;
          if(res.won){
            var win=netWin(ct2,s.price);
            n.w++;n.by[s.sig].w++;n.ea+=win;n.by[s.sig].e+=win;
            n.fe+=feeAmt(ct2,s.price);
            setBal(function(b){return b+win;});
            updDay(true,win,cost);
            setTrades(function(p){return[{t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,won:true,pnl:win}].concat(p).slice(0,50);});
            log("["+s.sig+"] WIN "+m.ticker+" +"+ct(win)+" ("+ct2+"x "+s.side+" @"+s.price+"c)","success");
          }else{
            n.l++;n.by[s.sig].l++;n.ea-=cost;n.by[s.sig].e-=cost;
            setBal(function(b){return b-cost;});
            updDay(false,-cost,cost);
            setTrades(function(p){return[{t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,won:false,pnl:-cost}].concat(p).slice(0,50);});
            log("["+s.sig+"] LOSS "+m.ticker+" -"+ct(cost)+" ("+ct2+"x "+s.side+" @"+s.price+"c)","error");
          }
        }else{log("["+s.sig+"] "+m.ticker+" no fill","warn");}
        svM(n,modeRef.current);return n;
      });
    }else if(paper){
      if(s.sig==="MM"&&s.price2){
        // MM paper: post both sides, track as pending until settlement
        // Profit is guaranteed regardless of outcome (YES price + NO price < 100)
        var mmCt=Math.min(ct2,5);
        var mmTotalCost=mmCt*(s.price+s.price2);
        balRef.current-=mmTotalCost;deployedRef.current+=mmTotalCost;
        setBal(function(b){return b-mmTotalCost;});
        cycleSpent.current+=mmTotalCost;
        setMet(function(p){var n=cx(p);n.at++;n.fl++;n.pl+=mmTotalCost;n.lv+=mmTotalCost;
          if(!n.by["MM"])n.by["MM"]={a:0,f:0,w:0,l:0,p:0,e:0};
          n.by["MM"].a++;n.by["MM"].f++;n.by["MM"].p+=mmTotalCost;svM(n,modeRef.current);return n;});
        var pos={t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:"MM",side:"pair",
          ct:mmCt,pr:s.price,pr2:s.price2,cost:mmTotalCost};
        setPending(function(p){return[pos].concat(p);});
        log("[PAPER MM] "+mmCt+"x Y@"+s.price+"c+N@"+s.price2+"c "+m.ticker+" (cost "+ct(mmTotalCost)+", pending settlement)");
      }else{
        // Single-side paper trade: deduct cost, await settlement
        balRef.current-=cost;deployedRef.current+=cost;
        setBal(function(b){return b-cost;});
        cycleSpent.current+=cost;
        setMet(function(p){var n=cx(p);n.at++;n.fl++;n.pl+=cost;n.lv+=cost;
          if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
          n.by[s.sig].a++;n.by[s.sig].f++;n.by[s.sig].p+=cost;svM(n,modeRef.current);return n;});
        var pos={t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,cost:cost};
        setPending(function(p){return[pos].concat(p);});
        log("[PAPER "+s.sig+"] "+ct2+"x "+s.side+" @"+s.price+"c "+m.ticker+" (cost "+ct(cost)+", pending settlement)");
      }
    }else{
      // Live mode - rate-limited, maker orders (post_only for lower fees)
      // Calculate ACTUAL cost including both MM sides
      var liveCt=ct2;
      var liveCost=cost;
      if(s.sig==="MM"&&s.price2){
        liveCt=Math.min(ct2,5);// MM cap
        liveCost=liveCt*(s.price+s.price2);// BOTH sides
      }

      // Track budget commitment immediately (before async API call)
      deployedRef.current+=liveCost;
      balRef.current-=liveCost;
      setBal(function(b){return b-liveCost;});
      cycleSpent.current+=liveCost;

      // Record attempt in metrics
      setMet(function(p){var n=cx(p);n.at++;n.pl+=liveCost;n.lv+=liveCost;
        if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
        n.by[s.sig].a++;n.by[s.sig].p+=liveCost;svM(n,modeRef.current);return n;});

      function postOrder(tk,sd,pr,ct3,sig2,delay,isMM){
        var ob={ticker:tk,action:"buy",side:sd,count:ct3,type:"limit",post_only:true};
        if(sd==="yes"){ob.yes_price=pr;}else{ob.no_price=pr;}
        setTimeout(function(){
          api("/portfolio/orders","POST",ob).then(function(resp){
            log("[LIVE "+sig2+"] "+ct3+"x "+sd+" @"+pr+"c "+tk,"success");
            // Record fill in metrics and trades
            setMet(function(p){var n=cx(p);n.fl++;
              if(n.by[sig2])n.by[sig2].f++;
              svM(n,modeRef.current);return n;});
            setTrades(function(p){return[{t:Date.now(),tk:tk,tl:m.title,sub:m.subtitle||"",sig:sig2,
              side:sd,ct:ct3,pr:pr,won:null,pnl:0,status:"resting"}].concat(p).slice(0,50);});
          }).catch(function(e){
            // Order rejected - return budget for THIS side
            var refund=ct3*pr;
            deployedRef.current-=refund;
            balRef.current+=refund;
            setBal(function(b){return b+refund;});
            if(!isMM)traded.current[tk]=false;// allow retry for single-side
            log("[LIVE] "+tk+" "+sd+": "+e.message,"error");
          });
        },delay);
      }
      if(s.sig==="MM"&&s.price2){
        var d1=(_orderQueue.length)*400;_orderQueue.push(1);
        var d2=(_orderQueue.length)*400;_orderQueue.push(1);
        postOrder(m.ticker,"yes",s.price,liveCt,s.sig,d1,true);
        postOrder(m.ticker,"no",s.price2,liveCt,s.sig,d2,true);
        log("[MM] Posted pair: "+liveCt+"x YES@"+s.price+"c + NO@"+s.price2+"c on "+m.ticker+" (reserved "+ct(liveCost)+")");
      }else{
        var d3=(_orderQueue.length)*400;_orderQueue.push(1);
        postOrder(m.ticker,s.side,s.price,ct2,s.sig,d3,false);
      }
    }
  }
  var _orderQueue=[];

  // ---- CHECK PENDING PAPER TRADES FOR SETTLEMENT ----
  function checkPending(){
    if(pending.length===0)return;
    var toCheck=pending.slice(0,10);// check up to 10 at a time
    var tickers=toCheck.map(function(p){return p.tk;}).join(",");
    api("/markets?tickers="+encodeURIComponent(tickers)+"&limit=10").then(function(d){
      var mkMap={};var mk=d.markets||[];
      for(var i=0;i<mk.length;i++)mkMap[mk[i].ticker]=mk[i];
      var resolved=[],remaining=[];
      for(var j=0;j<pending.length;j++){
        var pos=pending[j];
        var rm=mkMap[pos.tk];
        if(rm&&(rm.status==="settled"||rm.status==="determined")&&rm.result){
          if(pos.sig==="MM"&&pos.pr2){
            // MM pair: profit is guaranteed regardless of outcome
            // Payout = ct * 100 (one side always wins), Cost = ct * (pr + pr2)
            var mmPayout=pos.ct*100;
            var mmFees2=kalshiFee(pos.ct,pos.pr,true)+kalshiFee(pos.ct,pos.pr2,true);
            var mmNet2=mmPayout-pos.cost-mmFees2;
            resolved.push({pos:pos,won:true,result:rm.result,pnl:mmNet2,fees:mmFees2});
          }else{
            var won=(pos.side==="yes"&&rm.result==="yes")||(pos.side==="no"&&rm.result==="no");
            resolved.push({pos:pos,won:won,result:rm.result});
          }
        }else{
          remaining.push(pos);
        }
      }
      if(resolved.length>0){
        setPending(remaining);
        for(var k=0;k<resolved.length;k++){
          var r=resolved[k],p=r.pos;
          deployedRef.current-=p.cost;// position no longer pending
          if(p.sig==="MM"&&r.pnl!=null){
            var mmW=r.pnl;
            balRef.current+=p.cost+mmW;
            setBal(function(b){return b+p.cost+mmW;});
            setMet(function(prev){var n=cx(prev);n.w++;n.ea+=mmW;n.fe+=r.fees;
              if(n.by["MM"]){n.by["MM"].w++;n.by["MM"].e+=mmW;}
              svM(n,modeRef.current);return n;});
            updDay(true,mmW,p.cost);
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:"MM",side:"pair",ct:p.ct,pr:p.pr,won:true,pnl:mmW}].concat(prev).slice(0,50);});
            log("[SETTLED MM] "+p.tk+" +"+ct(mmW)+" spread profit ("+r.result+")","success");
          }else if(r.won){
            var win=netWin(p.ct,p.pr);
            balRef.current+=p.cost+win;
            setBal(function(b){return b+p.cost+win;});
            setMet(function(prev){var n=cx(prev);n.w++;n.ea+=win;n.fe+=feeAmt(p.ct,p.pr);
              if(n.by[p.sig]){n.by[p.sig].w++;n.by[p.sig].e+=win;}
              svM(n,modeRef.current);return n;});
            updDay(true,win,p.cost);
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:p.sig,side:p.side,ct:p.ct,pr:p.pr,won:true,pnl:win}].concat(prev).slice(0,50);});
            log("[SETTLED] WIN "+p.tk+" +"+ct(win)+" ("+r.result+")","success");
          }else{
            // Loss: cost is gone, don't return it
            setMet(function(prev){var n=cx(prev);n.l++;n.ea-=p.cost;
              if(n.by[p.sig]){n.by[p.sig].l++;n.by[p.sig].e-=p.cost;}
              svM(n,modeRef.current);return n;});
            updDay(false,-p.cost,p.cost);
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:p.sig,side:p.side,ct:p.ct,pr:p.pr,won:false,pnl:-p.cost}].concat(prev).slice(0,50);});
            log("[SETTLED] LOSS "+p.tk+" -"+ct(p.cost)+" ("+r.result+")","error");
          }
        }
        log("Pending: "+remaining.length+" positions awaiting settlement");
      }
    }).catch(function(e){});// silent fail on settlement check
  }

  // ---- AUTO-TRADE LOOP (adaptive scan throttling) ----
  useEffect(function(){
    if(tmr.current){clearTimeout(tmr.current);tmr.current=null;}
    if(!aon||est||scr!=="dash")return;

    // Calculate next scan delay based on budget utilization
    function scanDelay(){
      var total=balRef.current+deployedRef.current;
      if(total<=0)return 90000;
      var avail=maxBet();
      var pct=avail/total;// fraction of budget still available
      // Fully deployed: 300s (5 min) - settlement checks only
      // <10% budget: 180s (3 min)
      // 10-30% budget: 120s (2 min)
      // >30% budget: 90s (normal speed)
      if(avail<=0)return 300000;
      if(pct<0.10)return 180000;
      if(pct<0.30)return 120000;
      return 90000;
    }

    var run=function(){
      // Check pending paper trade settlements first
      if(paper)checkPending();

      // Portfolio sync (live mode: fetch real positions; also when idle)
      if(!paper&&!demo){
        fetchPortfolio().then(function(pf){
          if(pf){
            // Sync real cash balance from Kalshi
            balRef.current=pf.cash;setBal(pf.cash);
            // Calculate real deployed from positions + resting
            var posCost=0;
            for(var pi=0;pi<pf.positions.length;pi++)posCost+=(pf.positions[pi].totalCost||0);
            for(var ri=0;ri<pf.resting.length;ri++)posCost+=(pf.resting[ri].cost||0);
            deployedRef.current=posCost;
            log("Portfolio: "+ct(pf.cash)+" cash, "+pf.positions.length+" pos, "+pf.resting.length+" resting, "+ct(posCost)+" deployed");

            // Cancel stale resting orders (>15min old) to free capital
            cancelStaleOrders();
          }
        });
      }

      // If budget is fully exhausted, still check exits but skip full market scan
      if(maxBet()<=0&&deployedRef.current>0){
        var nextDelay=scanDelay();
        // Even when idle, do a lightweight position check with cached markets
        if(mkts.length>0)checkExits(mkts);
        log("Idle: deployed "+ct(deployedRef.current)+". Next check in "+Math.round(nextDelay/1000)+"s.");
        tmr.current=setTimeout(run,nextDelay);
        return;
      }

      // Reset cycle tracking
      cycleSpent.current=0;
      _orderQueue.length=0;
      var delay=scanDelay();
      doFetch().then(function(fresh){
        if(!canaryOk){log("Auto: skipping trades - canary validation failed","error");return;}

        // Check exit opportunities on held positions
        if(!demo)checkExits(fresh);

        // Build watchlist of near-signal markets
        buildWatchlist(fresh,cfg);

        var sg=fresh.filter(function(m){return m.signal&&!traded.current[m.ticker]&&!CANARY_SET.current[m.ticker];});
        if(sg.length>0){
          log("Auto: "+sg.length+" signals. Budget: "+ct(maxBet())+" | Next scan: "+Math.round(delay/1000)+"s | Top: "+sg[0].signal.sig+" "+sg[0].ticker);
        }else{
          log("Auto: no new signals. Next scan: "+Math.round(delay/1000)+"s");
        }
        var placed=0;
        var limit=Math.min(sg.length,20);
        for(var i=0;i<limit;i++){
          if(maxBet()<=0){log("Auto: budget exhausted (deployed "+ct(deployedRef.current)+" of "+ct(balRef.current+deployedRef.current)+")");break;}
          if(paper&&(pending.length+placed)>=MAX_PENDING){break;}
          var before=cycleSpent.current;
          doTrade(sg[i]);
          if(cycleSpent.current>before)placed++;
        }
        if(placed>0)log("Auto: placed "+placed+" trades, deployed "+ct(cycleSpent.current)+" this cycle");
      });
      // Schedule next run with adaptive delay
      tmr.current=setTimeout(run,delay);
    };
    run();
    return function(){if(tmr.current)clearTimeout(tmr.current);};
  },[aon,est,scr]);

          mr("P&L",(day.pnl>=0?"+":"")+"$"+(day.pnl/100).toFixed(2)),mr("Leveraged","$"+(day.lev/100).toFixed(2))),
        R("div",{style:P.mc},R("div",{style:P.mt},"Financial Overview"),
          mr("Balance",ct(bal)),mr("Max Leverage (50%)",ct(mb)),mr("Total Leveraged",ct(met.lv||0)),
          mr("Total P&L",(pnl>=0?"+":"")+"$"+pnl.toFixed(2)),mr("Fees Paid",ct(met.fe||0)),mr("ROI",roi+"%")),
        R("div",{style:P.mc},R("div",{style:P.mt},"Projections"),
          mr("Trades/Hour",tph.toFixed(1)),
          mr("Avg Win",met.w>0?ct(Math.round(aw)):"--"),mr("Avg Loss",met.l>0?ct(Math.round(al2)):"--"),
          mr("Proj. Daily",(projD>=0?"+$":"-$")+Math.abs(projD).toFixed(2)),
          mr("Proj. Weekly",(projW>=0?"+$":"-$")+Math.abs(projW).toFixed(2)),
          mr("Proj. Monthly",(projW*4.3>=0?"+$":"-$")+Math.abs(projW*4.3).toFixed(2))),
        R("div",{style:P.mc},R("div",{style:P.mt},"Performance"),
          mr("Evaluated",""+met.ev),mr("Signals",""+met.sg),mr("Attempted",""+met.at),mr("Filled",""+met.fl),
          mr("Fill Rate",pc(met.fl,met.at)),mr("Wins / Losses",met.w+" / "+met.l),mr("Win Rate",pc(met.w,met.fl))),
        Object.keys(met.by||{}).length>0?R("div",{style:P.mc},R("div",{style:P.mt},"By Strategy"),
          Object.keys(met.by).map(function(k){var b=met.by[k];if(!b||!b.a)return null;
            return R("div",{key:k,style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid #1a2230"}},
              R("div",{style:{fontWeight:700,color:"#aaa",fontSize:12,marginBottom:4}},k),
              mr("Filled",b.f+"/"+b.a),mr("W/L",b.w+"/"+b.l),mr("P&L","$"+((b.e||0)/100).toFixed(2)));})):null,
        R("button",{style:cx(P.btn,{marginTop:16,background:"#1a1a2e",color:"#666",fontSize:11}),
          onClick:function(){var m=freshM();setMet(m);svM(m,modeRef.current);traded.current={};eventTrades.current={};setTrades([]);setPending([]);
            if(paper){api("/portfolio/balance").then(function(b){var v=b.balance||d2c(b.balance_dollars)||0;setBal(v);balRef.current=v;deployedRef.current=0;log("Paper account reset (real balance: "+ct(v)+")");}).catch(function(){setBal(10000);balRef.current=10000;deployedRef.current=0;log("Paper account reset to $100");});}
            else{deployedRef.current=0;log("Live metrics reset");}
            cycleSpent.current=0;}},paper?"Reset Paper Account":"Reset Live Metrics")
      );})():null
    )
  );
}
