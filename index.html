function _b64(b){var r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
function _al(n){if(n<128)return[n];if(n<256)return[129,n];if(n<65536)return[130,(n>>8)&255,n&255];return[131,(n>>16)&255,(n>>8)&255,n&255];}
function importKey(pem){
var t=pem.trim(),p1=t.indexOf(“BEGIN RSA PRIVATE KEY”)>=0,b,d;
if(p1){b=t.replace(/—–BEGIN RSA PRIVATE KEY—–/,””).replace(/—–END RSA PRIVATE KEY—–/,””).replace(/\s/g,””);
d=_b64(b);var o=[48,13,6,9,42,134,72,134,247,13,1,1,1,5,0],oc=[4].concat(_al(d.length)),il=o.length+oc.length+d.length,
oh=[48].concat(_al(2+1+il)),h=oh.concat([2,1,0]).concat(o).concat(oc),pk=new Uint8Array(h.length+d.length);pk.set(h);pk.set(d,h.length);
return crypto.subtle.importKey(“pkcs8”,pk,{name:“RSA-PSS”,hash:“SHA-256”},false,[“sign”]);
}b=t.replace(/—–BEGIN PRIVATE KEY—–/,””).replace(/—–END PRIVATE KEY—–/,””).replace(/\s/g,””);

// Sports parlay/multi-outcome detection

function isMultiGame(title){
var parts=title.split(”,”);
if(parts.length<2)return false;
var ynCount=0;
for(var i=0;i<parts.length;i++){if(/^\s*(yes|no)\s+/i.test(parts[i]))ynCount++;}
return ynCount>=2;
}

function isSport(m){
// FIRST: multi-game/parlay detection (catches “yes Cleveland,yes Cincinnati,…” patterns)
if(isMultiGame(m.title))return true;
var t=(m.ticker+” “+m.title+” “+m.event_ticker).toLowerCase();
var i;
// Step 1: Whitelist check - if it contains a safe keyword, it is NOT sports
for(i=0;i<SAFE.length;i++){if(t.indexOf(SAFE[i])>=0)return false;}
// Step 2: League/org check
for(i=0;i<SPORT_LEAGUES.length;i++){if(t.indexOf(SPORT_LEAGUES[i])>=0)return true;}
// Step 3: Team name check
for(i=0;i<TEAMS.length;i++){if(t.indexOf(TEAMS[i])>=0)return true;}
// Step 4: Sports term check
for(i=0;i<SPORT_TERMS.length;i++){if(t.indexOf(SPORT_TERMS[i])>=0)return true;}
// Step 5: Pattern checks
// Player stat: “FirstName LastName: N+” or “FirstName LastName N+”
if(/[A-Z][a-z]+\s+[A-Z][a-z’]+[:\s]+\d++/.test(m.title))return true;
// Over/under sports lines
if(/(over|under)\s+\d+.?\d*\s*(runs?|points?|goals?|hits?|strikeouts?|yards?|touchdowns?|saves?|assists?|rebounds?)/i.test(m.title))return true;
// “wins by over/under X.X”
if(/wins?\s+by\s+(over|under|exactly)\s+\d/i.test(m.title))return true;
return false;
}

// ============================================================
// STRATEGY ENGINE
// Edge-based signals with scoring. Higher score = trade first.
// Only trades when there’s a quantifiable statistical edge.
// ============================================================
function dtu(iso){if(!iso)return 999;return(new Date(iso)-Date.now())/864e5;}

function analyze(m,cfg){
var days=dtu(m.close_time);
if(days<=0||days>cfg.dw)return null;
var yb=m.yes_bid,ya=m.yes_ask,nb=m.no_bid,lp=m.last_price;
var sum=yb+nb,mid=Math.round((yb+ya)/2),sp=ya-yb;
// Urgency: sooner markets score higher
var urg=days<0.25?2.0:days<0.5?1.6:days<1?1.3:days<2?1.15:days<4?1.05:1.0;

// — STRATEGY 1: ARBITRAGE —
// If YES bid + NO bid < 93, buying both sides locks in guaranteed profit
// This is risk-free edge. Extremely rare but highest priority.
if(sum>0&&sum<=93){
var arbEdge=(100-sum)/100;
return{sig:“ARB”,side:“yes”,edge:arbEdge,prob:1.0,price:yb,
label:“Arb +”+(100-sum)+“c guaranteed”,score:arbEdge*100*urg};
}

// — STRATEGY 2: VOLUME MOMENTUM —
// High 24h volume (>5k contracts) + tight spread (<= 6c) signals informed money.
// If price is directional (away from 50%), smart money is positioning.
// Edge: follow the informed flow with a conservative multiplier.
if(m.volume>=5000&&sp>=0&&sp<=6){
// YES side momentum (probability 58-85%)
if(mid>=58&&mid<=85){
var volEdge=((mid-50)/100)*0.12;
if(volEdge>=cfg.me)return{sig:“VOL”,side:“yes”,edge:volEdge,prob:mid/100,price:yb,
label:“Vol “+mid+”% “+Math.round(m.volume/1000)+“k”,score:volEdge*50*urg};
}
// NO side momentum (probability 15-42%)
if(mid>=15&&mid<=42){
var volEdge2=((50-mid)/100)*0.12;
if(volEdge2>=cfg.me)return{sig:“VOL”,side:“no”,edge:volEdge2,prob:(100-mid)/100,price:nb,
label:“Vol “+mid+”% “+Math.round(m.volume/1000)+“k”,score:volEdge2*50*urg};
}
}

// — STRATEGY 3: FADE EXTREMES —
// Markets priced > 93% or < 7% tend to overstate certainty.
// Mean reversion edge: the last few % of certainty are often mispriced.
// Only trade when liquid (spread <= 10) and within 7 days (time pressure).
if(days<=7&&sp>=0&&sp<=10){
if(mid>=93){
var fadeEdge=(mid-90)/100;
if(fadeEdge>=cfg.me)return{sig:“FADE”,side:“no”,edge:fadeEdge,prob:(100-mid)/100,price:nb,
label:“Fade “+mid+”% (overpriced YES)”,score:fadeEdge*40*urg};
}
if(mid<=7){
var fadeEdge2=(10-mid)/100;
if(fadeEdge2>=cfg.me)return{sig:“FADE”,side:“yes”,edge:fadeEdge2,prob:mid/100,price:yb,
label:“Fade “+mid+”% (underpriced YES)”,score:fadeEdge2*40*urg};
}
}

// — STRATEGY 4: TIME VALUE —
// Markets expiring < 24h with decent volume and moderate pricing.
// Near-expiry markets have sharper price discovery - volume confirms direction.
if(days<1&&m.volume>=1000&&sp>=0&&sp<=8){
if(mid>=55&&mid<=80){
var tvEdge=((mid-50)/100)*0.10;
if(tvEdge>=cfg.me)return{sig:“TVAL”,side:“yes”,edge:tvEdge,prob:mid/100,price:yb,
label:“TimeVal “+mid+”% “+Math.round(days*24)+“h left”,score:tvEdge*60*urg};
}
if(mid>=20&&mid<=45){
var tvEdge2=((50-mid)/100)*0.10;
if(tvEdge2>=cfg.me)return{sig:“TVAL”,side:“no”,edge:tvEdge2,prob:(100-mid)/100,price:nb,
label:“TimeVal “+mid+”% “+Math.round(days*24)+“h left”,score:tvEdge2*60*urg};
}
}

return null;
}

// ============================================================
// POSITION SIZING (Kelly Criterion, capped at 50% of balance)
// ============================================================
function kelly(prob,price,frac,maxCents,days){
if(!price||price<=0||price>=100||!maxCents||maxCents<=0)return 0;
var cost=price/100,b=(1-cost)/cost;
var p=Math.min(0.97,Math.max(0.03,prob||0.5));
var f=Math.max(0,(b*p-(1-p))/b);
var urg=days<0.5?1.5:days<1?1.25:days<2?1.1:1.0;
var r=Math.min(Math.round(f*frac*maxCents*urg),maxCents);
return isNaN(r)?0:r;
}

// ============================================================
// PAPER TRADE SIMULATION
// Realistic fill rates and edge realization by strategy type
// ============================================================
function sim(s){
var fr={ARB:0.95,VOL:0.78,FADE:0.70,TVAL:0.82};
var er={ARB:1.0,VOL:0.55,FADE:0.25,TVAL:0.45};
if(Math.random()>(fr[s.sig]||0.7))return{filled:false};
var realized=s.edge*(er[s.sig]||0.5);
var noise=(Math.random()-0.5)*0.06;
var trueProb=Math.min(0.97,Math.max(0.03,(s.prob||0.5)+realized+noise));
return{filled:true,won:Math.random()<trueProb};
}

// Skip dead markets: no bid, no volume = can’t trade
if(all[i].yes_bid<=0&&all[i].volume<=0){dead++;continue;}
var days=dtu(all[i].close_time);if(days<=0||days>cfg.dw)continue;
all[i].signal=analyze(all[i],cfg);sh.push(all[i]);
}
// Sort: markets with signals first (by score desc), then by close_time
sh.sort(function(a,b){
var sa=a.signal?a.signal.score:0,sb=b.signal?b.signal.score:0;
if(sa!==sb)return sb-sa;
return new Date(a.close_time)-new Date(b.close_time);
});
setMkts(sh);
var sc=sh.filter(function(m){return m.signal;}).length;
log(“Found “+sh.length+” tradeable markets (”+sp+” sports, “+dead+” dead filtered), “+sc+” signals, max bet: “+ct(maxBet()));
// Debug: log sample passed and first few titles
if(sh.length>0)log(“Sample: “+sh[0].title.slice(0,50)+(sh.length>1?” | “+sh[1].title.slice(0,50):””));
if(sh.length===0&&sp>0)log(“All markets filtered as sports - check filter”,“warn”);
setMet(function(p){var n=cx(p);n.ev+=all.length;n.sg+=sc;svM(n);return n;});
setFtg(false);return sh;
}).catch(function(e){log(“Fetch error: “+e.message,“error”);setFtg(false);return[];});

function doTrade(m){
if(!m.signal||est)return;
if(traded.current[m.ticker])return;
var s=m.signal,days=dtu(m.close_time);
var mb=maxBet();
if(mb<=0){log(“No balance available (50% cap reached)”,“warn”);return;}
var sz=kelly(s.prob,s.price,cfg.kf,mb,days);
if(sz<=0){log(“Kelly size too small for “+m.ticker,“warn”);return;}
var ct2=Math.max(1,Math.floor(sz/s.price)),cost=ct2*s.price;
// Don’t exceed 50% balance
if(cost>mb){ct2=Math.max(1,Math.floor(mb/s.price));cost=ct2*s.price;}
