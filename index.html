// ============================================================
// RSA-PSS AUTH (proven working - do not change)
// ============================================================
function _b64(b){var r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
function _al(n){if(n<128)return[n];if(n<256)return[129,n];if(n<65536)return[130,(n>>8)&255,n&255];return[131,(n>>16)&255,(n>>8)&255,n&255];}
function importKey(pem){
  var t=pem.trim(),p1=t.indexOf("BEGIN RSA PRIVATE KEY")>=0,b,d;
  if(p1){b=t.replace(/-----BEGIN RSA PRIVATE KEY-----/,"").replace(/-----END RSA PRIVATE KEY-----/,"").replace(/\s/g,"");
    d=_b64(b);var o=[48,13,6,9,42,134,72,134,247,13,1,1,1,5,0],oc=[4].concat(_al(d.length)),il=o.length+oc.length+d.length,
    oh=[48].concat(_al(2+1+il)),h=oh.concat([2,1,0]).concat(o).concat(oc),pk=new Uint8Array(h.length+d.length);pk.set(h);pk.set(d,h.length);
    return crypto.subtle.importKey("pkcs8",pk,{name:"RSA-PSS",hash:"SHA-256"},false,["sign"]);
  }b=t.replace(/-----BEGIN PRIVATE KEY-----/,"").replace(/-----END PRIVATE KEY-----/,"").replace(/\s/g,"");
  return crypto.subtle.importKey("pkcs8",_b64(b),{name:"RSA-PSS",hash:"SHA-256"},false,["sign"]);
}
function sign(key,kid,meth,path){
  var ts=""+Math.floor(Date.now()/1000),msg=new TextEncoder().encode(ts+meth+path.split("?")[0]);
  return crypto.subtle.sign({name:"RSA-PSS",saltLength:32},key,msg).then(function(s){
    var a=new Uint8Array(s),r="";for(var i=0;i<a.length;i++)r+=String.fromCharCode(a[i]);
    return{"KALSHI-ACCESS-KEY":kid,"KALSHI-ACCESS-TIMESTAMP":ts,"KALSHI-ACCESS-SIGNATURE":btoa(r)};});
}

// ============================================================
// KALSHI API (proven working - do not change)
// ============================================================
var KB="https://api.elections.kalshi.com/trade-api/v2",_px="",_kid="",_ck=null;
function setPx(u){_px=u.replace(/\/+$/,"");}
function setAuth(kid,pem){_kid=kid.trim();return importKey(pem).then(function(k){_ck=k;});}
function api(path,meth,body){
  meth=meth||"GET";var base=_px||KB;
  return sign(_ck,_kid,meth,"/trade-api/v2"+path).then(function(ah){
    var h={"Content-Type":"application/json"};var ks=Object.keys(ah);for(var i=0;i<ks.length;i++)h[ks[i]]=ah[ks[i]];
    var o={method:meth,headers:h};if(!_px)o.mode="cors";if(body)o.body=JSON.stringify(body);return fetch(base+path,o);
  }).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error("HTTP "+r.status+": "+t.slice(0,200));});return r.json();});
}

// ============================================================
// SPORTS FILTER v6 - Series-prefix approach (cheat sheet Section 5)
// Extract the series ticker (everything before the first hyphen)
// and test against known sports series prefixes.
// ============================================================
function getSeriesTicker(ticker){
  if(!ticker)return "";
  var idx=ticker.indexOf("-");
  return idx>=0?ticker.slice(0,idx):ticker;
}

// V30.11: Series cooldown - check if we've recently lost on this ticker family.
// Pulls from khist.records (Kalshi-reconstructed history). If we lost 2+ trades
// on the same series in the last `windowHrs` hours, return true to skip new entries.
// This stops fee-bleed from re-entering markets where we keep being wrong.
function seriesRecentlyLossy(records,seriesTk,windowHrs){
  if(!records||records.length===0||!seriesTk)return false;
  var cutoff=Date.now()-(windowHrs||24)*3600000;
  var losses=0,wins=0;
  for(var i=0;i<records.length;i++){
    var r=records[i];
    if(!r.ticker||(r.lastTs||0)<cutoff)continue;
    if(r.status!=="settled"&&r.status!=="closed")continue;
    if(getSeriesTicker(r.ticker)!==seriesTk)continue;
    if(r.won)wins++;else if(r.pnl<0)losses++;
  }
  // 2+ losses with no offsetting wins in same window = avoid
  return losses>=2&&losses>wins;
}

// Three-layer sports filter:
// Layer 1: KX + sport keyword (catches KXMLBHRR, KXNHLGOAL, KXNBAMENTION, KXITFWMATCH, KXUCLGAME, etc.)
// Layer 2: KXMVE + sport keyword (catches KXMVENBASINGLEGAME, KXMVESPORTSMULTIGAMEEXTENDED, etc.)
// Layer 3: Bare sport league names with exact boundary (NFL, NBA, MLBGAME, etc.)
//
// Safe non-sport KX prefixes: KXFED, KXCPI, KXSPY, KXBTC, KXHIGHTEMP, KXRECSSN, etc.

var BARE_SPORTS_RE=/^(NFL|NFLGAME|NFLSEASON|NBA|NBAGAME|NBASEASON|WNBA|WNBAGAME|NCAAB|NCAAF|NCAAW|NCAAM|NCAABGAME|MLB|MLBGAME|MLBSEASON|NHL|NHLGAME|EPL|EPLGAME|MLS|MLSGAME|UCL|UCLGAME|LALIGA|SERIEA|BUNDESLIGA|LIGUE1|WORLDCUP|EUROCUP|PGA|PGAGAME|LPGA|ATP|WTA|GRANDSLAM|UFC|UFCGAME|MMA|MMAGAME|NASCAR|NASCARGAME|F1|F1RACE|ESPORT|ESPORTS|BOXING|CRICKET|RUGBY|CFB|XFL|USFL|PARLAY)($|-)/;

// KX + sport keyword (no boundary needed - these are always followed by more letters)
// Matches: KXMLBHRR, KXNHLGOAL, KXNBAMENTION, KXITFWMATCH, KXUCLGAME, KXEPLGAME, etc.
// Does NOT match: KXFED, KXCPI, KXSPY, KXBTC, KXHIGHTEMP, KXRECSSN, KXCREDITRATING, etc.
var KX_SPORT_RE=/^KX(MLB|NBA|NHL|NFL|WNBA|NCAA|EPL|MLS|UCL|UFC|MMA|PGA|LPGA|ATP|WTA|NASCAR|F1|ITF|BOXING|CRICKET|RUGBY|SOCCER|TENNIS|ESPORT|LALIGA|SERIEA|BUNDESLIGA|LIGUE1|WORLDCUP|EUROCUP|GRANDSLAM|XFL|USFL|CFB)/;

// KXMVE + sport keyword (Kalshi multi-variable events for sports)
// Matches: KXMVESPORTSMULTIGAMEEXTENDED, KXMVENBASINGLEGAME, KXMVECROSSCATEGORY, etc.
// Does NOT match: KXMVEECON, KXMVECRYPTO, KXMVEPOLITICS, KXMVEWEATHER, etc.
var KXMVE_SPORT_RE=/^KXMVE(SPORT|CROSSCATEGORY|PARLAY|NBA|NFL|MLB|NHL|WNBA|NCAA|MLS|EPL|UCL|UFC|MMA|PGA|LPGA|ATP|WTA|NASCAR|F1|BOXING|CRICKET|RUGBY|SOCCER|TENNIS|ESPORT|BASEBALL|BASKETBALL|FOOTBALL|HOCKEY)/;

function isSport(m){
  var series=getSeriesTicker(m.ticker||"");
  var evSeries=getSeriesTicker(m.event_ticker||"");
  // Layer 1: KX + sport keyword
  if(KX_SPORT_RE.test(series)||KX_SPORT_RE.test(evSeries))return true;
  // Layer 2: KXMVE + sport keyword
  if(KXMVE_SPORT_RE.test(series)||KXMVE_SPORT_RE.test(evSeries))return true;
  // Layer 3: Bare sport league exact match
  return BARE_SPORTS_RE.test(series)||BARE_SPORTS_RE.test(evSeries);
}

// Debug version: returns which rule matched (for log paste diagnostics)
function isSportDebug(m){
  var series=getSeriesTicker(m.ticker||"");
  var evSeries=getSeriesTicker(m.event_ticker||"");
  var km=series.match(KX_SPORT_RE);
  if(km)return"kx-sport:"+km[1]+"->"+series;
  var kme=evSeries.match(KX_SPORT_RE);
  if(kme)return"kx-sport:"+kme[1]+"->"+evSeries;
  var vm=series.match(KXMVE_SPORT_RE);
  if(vm)return"kxmve-sport:"+vm[1]+"->"+series;
  var vme=evSeries.match(KXMVE_SPORT_RE);
  if(vme)return"kxmve-sport:"+vme[1]+"->"+evSeries;
  if(BARE_SPORTS_RE.test(series))return"bare-series:"+series;
  if(BARE_SPORTS_RE.test(evSeries))return"bare-event:"+evSeries;
  return null;
}

// Build a lookup set of canary tickers for fast checks
function canaryTickerSet(){
  var c=canaries(),s={};
  for(var i=0;i<c.length;i++)s[c[i].ticker]=true;
  return s;
}

// Canary validation: ensure non-sport canaries aren't misclassified by ticker detection
function validateCanaries(logFn){
  var all=canaries(),passed=0,failed=[];
  for(var i=0;i<all.length;i++){
    var serTk=getSeriesTicker(all[i].ticker);
    if(!detectSportByTicker(serTk)){
      passed++;
    }else{
      failed.push(all[i].ticker+" (ticker "+serTk+" flagged as sport)");
    }
  }
  if(logFn){
    logFn("CANARY: "+passed+"/"+all.length+" passed");
    if(failed.length>0){
      logFn("CANARY FAILURES: "+failed.join(", "),"error");
    }
  }
  return{passed:passed,total:all.length,failed:failed};
}

// ============================================================
// MARKET FETCHING - Hybrid approach (FAST)
// Step 1: GET /series (1 call) -> build set of allowed series tickers
// Step 2: Bulk paginated GET /markets?status=open&limit=1000 -> filter in-flight
// Sports is now a toggleable category, not hard-excluded.
// ============================================================

// Detect sport series by ticker (used when series has no category from API)
function detectSportByTicker(tk){
  if(KX_SPORT_RE.test(tk)||KXMVE_SPORT_RE.test(tk)||BARE_SPORTS_RE.test(tk))return true;
  return false;
}

function fetchMkts(logFn,catFilter){
  var allowedCats={};
  if(catFilter){
    var parts=catFilter.split(",");
    for(var ci=0;ci<parts.length;ci++){var ct2=parts[ci].trim();if(ct2)allowedCats[ct2]=true;}
  }
  var hasCatFilter=Object.keys(allowedCats).length>0;

  logFn("Fetching series catalog...");
  return api("/series").then(function(d){
    var seriesList=d.series||[];
    logFn("Series catalog: "+seriesList.length+" series found");
    var allowedSeries={},skippedCount=0,catMap={};
    for(var i=0;i<seriesList.length;i++){
      var s=seriesList[i];
      var cat=s.category||"";
      var tk=s.ticker||"";
      // If no category from API, detect by ticker
      if(!cat&&detectSportByTicker(tk))cat="Sports";
      if(!cat)cat="uncategorized";
      if(!catMap[cat])catMap[cat]=0;
      catMap[cat]++;
      // Apply category filter
      if(hasCatFilter&&!allowedCats[cat]){skippedCount++;continue;}
      allowedSeries[tk]=cat;
    }
    var allowedCount=Object.keys(allowedSeries).length;
    logFn("Series filter: "+allowedCount+" allowed, "+skippedCount+" filtered out");

    var cmArr=[];var cmk=Object.keys(catMap);
    for(var ci2=0;ci2<cmk.length;ci2++)cmArr.push({c:cmk[ci2],n:catMap[cmk[ci2]]});
    cmArr.sort(function(a,b){return b.n-a.n;});
    logFn("Series categories: "+cmArr.slice(0,12).map(function(x){return x.c+"("+x.n+")";}).join(", "));

    return{allowedSeries:allowedSeries,skippedCount:skippedCount,
      totalSeries:seriesList.length,allowedCount:allowedCount,catMap:catMap};
  }).catch(function(e){
    logFn("Series fetch failed ("+e.message+"), fetching unfiltered","warn");
    return{allowedSeries:null,skippedCount:0,totalSeries:0,allowedCount:0,catMap:{}};
  }).then(function(info){
    var all=[],cur="",pg=0,filterSkip=0;
    var as=info.allowedSeries;
    function go(){
      var qs="status=open&limit=1000";
      if(cur)qs+="&cursor="+encodeURIComponent(cur);
      return api("/markets?"+qs).then(function(d){
        var mk=d.markets||[];
        for(var i=0;i<mk.length;i++){
          var m=mk[i];
          if(as){
            var serTk=getSeriesTicker(m.ticker||"");
            if(!as[serTk]){filterSkip++;continue;}
          }
          all.push(norm(m));
        }
        cur=d.cursor||"";pg++;
        if(pg%20===0)logFn("Page "+pg+"... "+all.length+" markets");
        if(cur&&mk.length>0&&pg<200)return go();
        return{markets:all,filterSkip:filterSkip,pages:pg,
          skippedCount:info.skippedCount,totalSeries:info.totalSeries,
          allowedCount:info.allowedCount,catMap:info.catMap};
      });
    }
    logFn("Scanning all open markets...");
    return go();
  });
}

// ============================================================
// STRATEGY ENGINE - Category-aware with weather intelligence
// Volume thresholds lowered to match thin non-sports markets.
// ============================================================
//
// V1.0.0 STRATEGY REGISTRY
// -----------------------------------------------------------
// Each strategy registers a spec with match/analyze/decideExit
// hooks. analyze() (legacy entry point, lines below) is kept as
// a thin wrapper that runs universal gates then delegates to
// the registry. Adding a new strategy = pushing one registerStrategy()
// call. Disabling a strategy = setting enabled:false. Core code
// never has to change.
//
// Strategy spec shape:
//   {
//     name: "WX" | "FAV" | "MM" | "VALUE" | "VOL" |
//           "WEATHER" | "ENERGY" | "CRYPTO" | ...,
//     enabled: boolean,
//     priority: number,           // higher = checked first
//     match: function(m){...},    // returns bool
//     analyze: function(m,ctx){...}, // returns signal|null
//     decideExit: function(pos,m,ctx){...} // returns exit|null|undefined
//                                   // (undefined = use default exit)
//   }
//
// ctx is a context object passed to analyze() containing:
//   { cfg, mid, sp, nsp, days, urg, mFee, rtEV, in50Trap,
//     biasAdj, clampYes, clampNo, yb, ya, nb, na, lp }
//
// (everything analyze() previously had as locals)
// -----------------------------------------------------------
var STRATEGIES=[];

function registerStrategy(spec){
  if(!spec||!spec.name)return;
  if(typeof spec.match!=="function")return;
  if(typeof spec.analyze!=="function")return;
  if(typeof spec.decideExit!=="function")spec.decideExit=function(){return undefined;};
  if(typeof spec.priority!=="number")spec.priority=50;
  if(typeof spec.enabled!=="boolean")spec.enabled=true;
  STRATEGIES.push(spec);
  STRATEGIES.sort(function(a,b){return b.priority-a.priority;});
}

function runStrategies(m,ctx){
  // Returns either:
  //   - a signal object (a registered strategy fired)
  //   - {claimed:true, signal:null} (a strategy matched the ticker but returned null;
  //     this means "this market belongs to a specialist that has no opinion right
  //     now" - do NOT fall back to legacy)
  //   - null (no strategy matched; OK to fall back to legacy)
  for(var i=0;i<STRATEGIES.length;i++){
    var s=STRATEGIES[i];
    if(!s.enabled)continue;
    if(!s.match(m,ctx))continue;
    var sig=s.analyze(m,ctx);
    if(sig){
      sig.strategy=s.name;
      return sig;
    }
    // matched but no signal -> claim this market, prevent legacy fallback
    return{claimed:true,signal:null,strategy:s.name};
  }
  return null;
}

function strategyByName(name){
  for(var i=0;i<STRATEGIES.length;i++){
    if(STRATEGIES[i].name===name)return STRATEGIES[i];
  }
  return null;
}

function setStrategyEnabled(name,enabled){
  var s=strategyByName(name);
  if(s){
    s.enabled=!!enabled;
    // v1.0.0-beta.5: persist enable state across page refreshes.
    // Previously the React `enabled` field was in-memory only, so refreshing
    // the page reset every strategy back to its registered default. Now we
    // mirror it in localStorage under kt_strategyEnabled = {name: bool, ...}.
    try{
      var st={};
      try{var prev=localStorage.getItem("kt_strategyEnabled");if(prev)st=JSON.parse(prev);}catch(e){}
      st[name]=!!enabled;
      localStorage.setItem("kt_strategyEnabled",JSON.stringify(st));
    }catch(e){}
  }
}

// v1.0.0-beta.5: applies persisted enable state from localStorage to all
// currently-registered strategies. Called once during React component mount,
// AFTER all registerStrategy calls have completed but BEFORE any scan can run.
// Without this, toggling WEATHER on then refreshing the page reverted the
// strategy to its registered default (disabled in Phase 0/1.A).
function applyPersistedStrategyState(logFn){
  var st={};
  try{var raw=localStorage.getItem("kt_strategyEnabled");if(raw)st=JSON.parse(raw);}catch(e){return;}
  var keys=Object.keys(st);
  if(keys.length===0)return;
  var applied=0;
  for(var i=0;i<keys.length;i++){
    var s=strategyByName(keys[i]);
    if(s){s.enabled=!!st[keys[i]];applied++;}
  }
  if(applied>0&&typeof logFn==="function"){
    var on=[],off=[];
    for(var j=0;j<keys.length;j++){
      var sx=strategyByName(keys[j]);
      if(sx){(sx.enabled?on:off).push(sx.name);}
    }
    logFn("Restored strategy state from localStorage: "+(on.length?on.join(",")+" enabled":"")+(on.length&&off.length?"; ":"")+(off.length?off.join(",")+" disabled":""));
  }
}

// ============================================================
// V30.10: LIQUIDITY SCORING
// Kalshi's /markets endpoint returns volume_24h_fp as 0 or absent for many
// markets, so a strict "volume >= 500" gate over-rejects perfectly liquid
// markets that just don't report current-day volume. This helper produces
// a unified "tradeable depth" score that combines:
//   - actual reported volume (if present)
//   - open_interest * multiplier (OI = real held contracts = real depth)
//   - quote-presence bonus (live two-sided market with reasonable spread)
// liqMult is the user-tunable OI weight (default 0.5).
// Auto-tuner adjusts liqMult based on signal-fire rate per scan over time.
// ============================================================
function liquidityScore(m,liqMult){
  if(!m)return 0;
  var vol=m.volume||0;
  var oi=m.open_interest||0;
  var sp=(m.yes_ask||0)-(m.yes_bid||0);
  // Quote-presence bonus: both sides exist, neither extreme, spread reasonable
  var quoteBonus=0;
  if(m.yes_bid>=2&&m.yes_ask<=98&&sp>=1&&sp<=15)quoteBonus=500;
  else if(m.yes_bid>=1&&m.yes_ask<=99&&sp<=20)quoteBonus=200;
  // Take the max of: reported volume, OI-weighted depth, quote bonus
  // (not sum -- we don't want to over-credit the same liquidity from multiple angles)
  return Math.max(vol,oi*(liqMult||0.5),quoteBonus);
}

// Normal CDF approximation for probability calculation
function normCDF(x,mean,sd){
  if(sd<=0)return x>=mean?1:0;
  var z=(x-mean)/sd;
  var t=1/(1+0.2316419*Math.abs(z));
  var d=0.3989423*Math.exp(-z*z/2);
  var p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.8212560+t*1.330274))));
  return z>0?1-p:p;
}

function parseWeatherTicker(ticker){
  var parts=ticker.split("-");
  var series=parts[0];
  var isHigh=false,isLow=false,city=null,dateIdx=0,hourLST=null;

  if(/^KXHIGHTEMP$/i.test(series)){
    isHigh=true;city=parts[1]||"";dateIdx=2;
  }else if(/^KXLOWTEMP$/i.test(series)){
    isLow=true;city=parts[1]||"";dateIdx=2;
  }else if(/^KXTEMP/i.test(series)){
    // V1.0.0 fix: KXTEMP{city}{H|L} format, e.g. KXTEMPNYCH (NYC high), KXTEMPCHIL (CHI low)
    // The trailing H or L identifies high vs low. City is everything between.
    var rest=series.replace(/^KXTEMP/i,"");
    var lastChar=rest.charAt(rest.length-1).toUpperCase();
    if(lastChar==="H"){isHigh=true;city=rest.slice(0,-1);}
    else if(lastChar==="L"){isLow=true;city=rest.slice(0,-1);}
    else{
      // No H/L suffix: ambiguous; default to high (most KXTEMP markets are highs)
      isHigh=true;city=rest;
    }
    dateIdx=1;
  }else if(/^KXHIGH/i.test(series)){
    isHigh=true;city=series.replace(/^KXHIGH/i,"");dateIdx=1;
  }else if(/^KXLOWT/i.test(series)){
    isLow=true;city=series.replace(/^KXLOWT/i,"");dateIdx=1;
  }else{return null;}

  if(!city||!WEATHER_CITIES[city])return null;
  if(!parts[dateIdx])return null;
  var dateStr=parts[dateIdx];
  // V1.0.0 fix: support hour-suffix dates like "26MAY0417" (= 26MAY04 + hour 17)
  // alongside legacy "26MAY10" full-day format.
  var yrMatchH=dateStr.match(/^(\d{2})([A-Z]{3})(\d{2})(\d{2})$/);
  var yrMatch=dateStr.match(/^(\d{2})([A-Z]{3})(\d{1,2})$/);
  var months={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  var yr,mon,day;
  if(yrMatchH){
    yr=parseInt(yrMatchH[1]);mon=months[yrMatchH[2]];day=parseInt(yrMatchH[3]);
    hourLST=parseInt(yrMatchH[4]);
  }else if(yrMatch){
    yr=parseInt(yrMatch[1]);mon=months[yrMatch[2]];day=parseInt(yrMatch[3]);
  }else{return null;}
  if(mon==null)return null;
  var dt=new Date(2000+yr,mon,day);
  var dateKey=dt.toISOString().slice(0,10);
  return{city:city,coords:WEATHER_CITIES[city],isHigh:isHigh,date:dateKey,dt:dt,hourLST:hourLST};
}

function fetchWeatherForCity(cityCode){
  var c=WEATHER_CITIES[cityCode];
  if(!c)return Promise.resolve(null);
  var cached=_wxCache[cityCode];
  if(cached&&(Date.now()-cached.ts)<1800000)return Promise.resolve(cached);
  // Fetch HOURLY data for precise high/low calculation
  var url="https://api.open-meteo.com/v1/forecast?latitude="+c.lat+"&longitude="+c.lon
    +"&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min"
    +"&temperature_unit=fahrenheit&forecast_days=7&timezone=America%2FChicago";
  return fetch(url).then(function(r){return r.json();}).then(function(d){
    var daily=d.daily||{};
    var hourly=d.hourly||{};
    // Group hourly temps by date
    var byDate={};
    var times=hourly.time||[];
    var temps=hourly.temperature_2m||[];
    for(var i=0;i<times.length;i++){
      var dk=times[i].slice(0,10);// "2026-04-19"
      var hr=parseInt(times[i].slice(11,13));// hour 0-23
      if(!byDate[dk])byDate[dk]={all:[],day:[],night:[]};
      byDate[dk].all.push(temps[i]);
      if(hr>=8&&hr<=20)byDate[dk].day.push(temps[i]);// 8am-8pm for highs
      if(hr<=9||hr>=22)byDate[dk].night.push(temps[i]);// 10pm-9am for lows
    }
    var result={ts:Date.now(),hourly:byDate,
      highs:daily.temperature_2m_max||[],lows:daily.temperature_2m_min||[],
      dates:daily.time||[],name:c.name};
    _wxCache[cityCode]=result;
    return result;
  }).catch(function(e){return null;});
}

// Fetch forecasts for all weather markets, return promise
function enrichWeatherMarkets(markets,logFn){
  var wxMarkets=[];var cities={};
  for(var i=0;i<markets.length;i++){
    var wp=parseWeatherTicker(markets[i].ticker);
    if(wp){
      markets[i]._wx=wp;
      wxMarkets.push(i);
      cities[wp.city]=true;
    }
  }
  if(wxMarkets.length===0)return Promise.resolve(markets);
  var cityList=Object.keys(cities);
  logFn("Weather: "+wxMarkets.length+" markets across "+cityList.length+" cities, fetching forecasts...");
  var proms=[];
  for(var j=0;j<cityList.length;j++){
    proms.push(fetchWeatherForCity(cityList[j]));
  }
  return Promise.all(proms).then(function(){
    var enriched=0;
    for(var k=0;k<wxMarkets.length;k++){
      var m=markets[wxMarkets[k]];
      var wx=m._wx;
      var fc=_wxCache[wx.city];
      if(!fc||!fc.dates)continue;
      var dateIdx=-1;
      for(var d=0;d<fc.dates.length;d++){
        if(fc.dates[d]===wx.date){dateIdx=d;break;}
      }
      if(dateIdx>=0){
        var hd=fc.hourly[wx.date];
        if(wx.isHigh){
          // HIGH temp: use max of daytime hourly, or daily max as fallback
          var dayTemps=hd&&hd.day.length>=3?hd.day:null;
          if(dayTemps){
            var maxT=-999;for(var t=0;t<dayTemps.length;t++)if(dayTemps[t]>maxT)maxT=dayTemps[t];
            m._wxForecast=maxT;
            // Std dev of daytime temps = measure of uncertainty
            var sum2=0;for(var t2=0;t2<dayTemps.length;t2++)sum2+=(dayTemps[t2]-maxT)*(dayTemps[t2]-maxT);
            m._wxSpread=Math.sqrt(sum2/dayTemps.length);
            m._wxHourCount=dayTemps.length;
          }else{
            m._wxForecast=fc.highs[dateIdx];
            m._wxSpread=3;// default uncertainty
            m._wxHourCount=0;
          }
        }else{
          // LOW temp: use min of night/early morning hourly, or daily min
          var nightTemps=hd&&hd.night.length>=2?hd.night:null;
          if(nightTemps){
            var minT=999;for(var t3=0;t3<nightTemps.length;t3++)if(nightTemps[t3]<minT)minT=nightTemps[t3];
            m._wxForecast=minT;
            var sum3=0;for(var t4=0;t4<nightTemps.length;t4++)sum3+=(nightTemps[t4]-minT)*(nightTemps[t4]-minT);
            m._wxSpread=Math.sqrt(sum3/nightTemps.length);
            m._wxHourCount=nightTemps.length;
          }else{
            m._wxForecast=fc.lows[dateIdx];
            m._wxSpread=3;
            m._wxHourCount=0;
          }
        }
        m._wxType=wx.isHigh?"high":"low";
        m._wxCity=fc.name||wx.city;
        // Days out affects forecast error
        m._wxDaysOut=dateIdx;
        enriched++;
      }
    }
    if(enriched>0)logFn("Weather: "+enriched+" markets enriched with hourly forecast data");
    return markets;
  }).catch(function(e){
    logFn("Weather fetch error: "+e.message,"warn");
    return markets;
  });
}

// V1.0.0 Phase 1.A: helper - fetch with timeout fallback to null
function _wxFetch(url,timeoutMs){
  if(typeof timeoutMs!=="number")timeoutMs=8000;
  return new Promise(function(resolve){
    var done=false;
    var to=setTimeout(function(){if(!done){done=true;resolve(null);}},timeoutMs);
    fetch(url,{headers:{"Accept":"application/geo+json,application/json"}}).then(function(r){
      if(!r.ok){clearTimeout(to);if(!done){done=true;resolve(null);}return null;}
      return r.json();
    }).then(function(j){
      clearTimeout(to);if(!done){done=true;resolve(j);}
    }).catch(function(){
      clearTimeout(to);if(!done){done=true;resolve(null);}
    });
  });
}

// Step 1: NWS gridpoint lookup (cache 24h). Returns gridUrl + obsStation list.
function fetchNWSPoint(city){
  var st=WX_STATIONS[city];
  if(!st)return Promise.resolve(null);
  var cached=_nwsPointCache[city];
  if(cached&&(Date.now()-cached.ts)<86400000)return Promise.resolve(cached);
  var url="https://api.weather.gov/points/"+st.lat.toFixed(4)+","+st.lon.toFixed(4);
  return _wxFetch(url).then(function(j){
    if(!j||!j.properties)return null;
    var p=j.properties;
    var rec={ts:Date.now(),
      gridUrl:p.forecastHourly||"",
      pointForecast:p.forecast||"",
      stationsUrl:p.observationStations||""};
    _nwsPointCache[city]=rec;
    return rec;
  });
}

// Step 2: NWS hourly forecast (cache 1h)
function fetchNWSForecast(city){
  var cached=_nwsForecastCache[city];
  if(cached&&(Date.now()-cached.ts)<3600000)return Promise.resolve(cached);
  return fetchNWSPoint(city).then(function(pt){
    if(!pt||!pt.gridUrl)return null;
    return _wxFetch(pt.gridUrl).then(function(j){
      if(!j||!j.properties||!j.properties.periods)return null;
      var periods=j.properties.periods;
      var hourly=[];
      for(var i=0;i<periods.length;i++){
        var p=periods[i];
        if(!p.startTime||p.temperature==null)continue;
        var unit=p.temperatureUnit||"F";
        var t=p.temperature;
        if(unit==="C")t=t*9/5+32;
        hourly.push({ts:p.startTime,temp:t});
      }
      var rec={ts:Date.now(),hourly:hourly};
      _nwsForecastCache[city]=rec;
      return rec;
    });
  });
}

  var st=WX_STATIONS[city];
  if(!st)return Promise.resolve(null);
  var cached=_nwsObsCache[city];
  if(cached&&(Date.now()-cached.ts)<300000)return Promise.resolve(cached);
  var url="https://api.weather.gov/stations/"+st.station+"/observations/latest";
  return _wxFetch(url).then(function(j){
    if(!j||!j.properties)return null;
    var p=j.properties;
    var tC=p.temperature&&p.temperature.value;
    if(tC==null)return null;
    var tF=tC*9/5+32;
    var rec={ts:Date.now(),tempF:tF,obsTime:p.timestamp||"",station:st.station};
    _nwsObsCache[city]=rec;
    return rec;
  });
}

// Step 4: Open-Meteo GFS 31-member ensemble (cache 1h, 4x/day updates)
function fetchOMGfsEnsemble(city){
  var st=WX_STATIONS[city];
  if(!st)return Promise.resolve(null);
  var cached=_omGfsCache[city];
  if(cached&&(Date.now()-cached.ts)<3600000)return Promise.resolve(cached);
  var url="https://ensemble-api.open-meteo.com/v1/ensemble?latitude="+st.lat
    +"&longitude="+st.lon+"&hourly=temperature_2m&models=gfs05"
    +"&temperature_unit=fahrenheit&forecast_days=7&timezone=UTC";
  return _wxFetch(url,12000).then(function(j){
    if(!j||!j.hourly)return null;
    var times=j.hourly.time||[];
    // Open-Meteo ensemble returns temperature_2m_member01..temperature_2m_member30
    // plus the deterministic temperature_2m as member00.
    var memberKeys=[];
    var hk=Object.keys(j.hourly);
    for(var i=0;i<hk.length;i++){
      if(/^temperature_2m(_member\d+)?$/.test(hk[i]))memberKeys.push(hk[i]);
    }
    if(memberKeys.length===0)return null;
    // Build matrix: members[m][t] = temp at time t for member m
    var members=[];
    for(var m=0;m<memberKeys.length;m++){
      members.push(j.hourly[memberKeys[m]]||[]);
    }
    var rec={ts:Date.now(),times:times,members:members,memberCount:memberKeys.length};
    _omGfsCache[city]=rec;
    return rec;
  });
}

// V1.0.0 Phase 1.A (rev 2 of beta1): Visual Crossing Timeline API.
// Free tier 1000 records/day. We fetch 1 city = ~7 days of hourly data
// (168 records) per call. With 8 Tier-1 cities cached 6h, that's 8*4 = 32
// calls/day, well under quota. Cached 6h.
//
// Routes through Cloudflare Worker /proxy?url=... endpoint. Worker rev 3
// injects the API key from VC_KEY secret server-side, so the key never
// appears in the front-end.
var _vcCache={};// {city: {ts, hourly:[{ts,temp}]}}

function fetchVisualCrossing(city){
  var st=WX_STATIONS[city];
  if(!st)return Promise.resolve(null);
  var cached=_vcCache[city];
  if(cached&&(Date.now()-cached.ts)<21600000)return Promise.resolve(cached);
  if(!_px)return Promise.resolve(null);// requires worker proxy for key injection
  // Build target URL (key omitted; worker injects).
  // Visual Crossing Timeline format: /timeline/{lat,lon}/{startDate}/{endDate}
  // Fetch today through +7 days.
  var today=new Date();
  var endD=new Date(today.getTime()+7*86400000);
  function fmt(d){return d.toISOString().slice(0,10);}
  var vcTarget="https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/"
    +st.lat.toFixed(4)+","+st.lon.toFixed(4)+"/"+fmt(today)+"/"+fmt(endD)
    +"?include=hours&unitGroup=us&elements=datetimeEpoch,temp";
  var proxyUrl=_px+"/proxy?url="+encodeURIComponent(vcTarget);
  return _wxFetch(proxyUrl,12000).then(function(j){
    if(!j||!j.days)return null;
    var hourly=[];
    for(var di=0;di<j.days.length;di++){
      var hrs=j.days[di].hours||[];
      for(var hi=0;hi<hrs.length;hi++){
        var hr=hrs[hi];
        if(hr.temp==null||hr.datetimeEpoch==null)continue;
        // datetimeEpoch is Unix seconds in the requested location's local time
        // (per Visual Crossing docs). We treat it as UTC seconds for window
        // comparison since wxLSTWindow returns UTC; close enough given that
        // VC's forecast is grid-cell, not station-specific.
        hourly.push({ts:new Date(hr.datetimeEpoch*1000).toISOString(),temp:hr.temp});
      }
    }
    var rec={ts:Date.now(),hourly:hourly};
    _vcCache[city]=rec;
    return rec;
  });
}

// V1.0.0 Phase 1.A (rev 2 of beta1): Weatherbit hourly forecast.
// Free tier 50 calls/day. With 8 Tier-1 cities cached 6h, that's 8*4 = 32
// calls/day, but ALL requests count not per-city, so we keep cache TTL at 6h.
// Cached 6h (matches free-tier budget at ~32 calls/day).
//
// Routes through Cloudflare Worker /proxy?url=... endpoint. Worker rev 3
// injects the API key from WB_KEY secret server-side.
var _wbCache={};// {city: {ts, hourly:[{ts,temp}]}}

function fetchWeatherbit(city){
  var st=WX_STATIONS[city];
  if(!st)return Promise.resolve(null);
  var cached=_wbCache[city];
  if(cached&&(Date.now()-cached.ts)<21600000)return Promise.resolve(cached);
  if(!_px)return Promise.resolve(null);// requires worker proxy for key injection
  // Weatherbit hourly forecast endpoint. units=I = imperial (F).
  // hours param caps at 240; we ask for 168 (7 days).
  var wbTarget="https://api.weatherbit.io/v2.0/forecast/hourly?lat="
    +st.lat+"&lon="+st.lon+"&hours=168&units=I";
  var proxyUrl=_px+"/proxy?url="+encodeURIComponent(wbTarget);
  return _wxFetch(proxyUrl,12000).then(function(j){
    if(!j||!j.data)return null;
    var hourly=[];
    for(var i=0;i<j.data.length;i++){
      var rec=j.data[i];
      if(rec.temp==null||!rec.timestamp_utc)continue;
      // timestamp_utc is "YYYY-MM-DDTHH:MM:SS" without trailing Z; treat as UTC.
      var iso=rec.timestamp_utc;
      if(iso.indexOf("Z")<0&&iso.indexOf("+")<0)iso=iso+"Z";
      hourly.push({ts:iso,temp:rec.temp});
    }
    var out={ts:Date.now(),hourly:hourly};
    _wbCache[city]=out;
    return out;
  });
}

// Compute the LST day window (24h) for a given Kalshi market date + city.
// Per Kalshi contract terms, the CLI window is in Local Standard Time (NOT
// daylight saving), which means the same UTC offset year-round regardless
// of DST. Returns {startUTC, endUTC} as Date objects.
function wxLSTWindow(dateStr,city){
  var st=WX_STATIONS[city];
  if(!st)return null;
  var parts=dateStr.split("-");// "YYYY-MM-DD"
  var y=parseInt(parts[0]),m=parseInt(parts[1])-1,d=parseInt(parts[2]);
  // 1:00 LST same day to 0:59 LST next day in UTC.
  // LST -> UTC: add (-stdOffset) hours. e.g. NYC stdOffset=-5, so 1am LST = 6am UTC.
  var startUTC=new Date(Date.UTC(y,m,d,1-st.stdOffset,0,0));
  var endUTC=new Date(startUTC.getTime()+86400000-1);
  return{startUTC:startUTC,endUTC:endUTC};
}

// Extract day-window high or low from an hourly forecast array.
// hourly: [{ts:"ISO8601",temp:Number}]
function wxExtractHighLow(hourly,window,isHigh){
  if(!hourly||!window)return null;
  var sStart=window.startUTC.getTime(),sEnd=window.endUTC.getTime();
  var inWin=[];
  for(var i=0;i<hourly.length;i++){
    var t=new Date(hourly[i].ts).getTime();
    if(t>=sStart&&t<=sEnd)inWin.push(hourly[i].temp);
  }
  if(inWin.length===0)return null;
  var v=isHigh?-9999:9999;
  for(var j=0;j<inWin.length;j++){
    if(isHigh?inWin[j]>v:inWin[j]<v)v=inWin[j];
  }
  return{value:v,sampleCount:inWin.length};
}

// Extract day-high/low for ENSEMBLE: returns array of [member-high or member-low]
function wxExtractEnsembleHighLow(ensemble,window,isHigh){
  if(!ensemble||!ensemble.times||!ensemble.members||!window)return null;
  var sStart=window.startUTC.getTime(),sEnd=window.endUTC.getTime();
  // Find indices of times within window
  var inIdx=[];
  for(var i=0;i<ensemble.times.length;i++){
    var t=new Date(ensemble.times[i]).getTime();
    if(t>=sStart&&t<=sEnd)inIdx.push(i);
  }
  if(inIdx.length===0)return null;
  // For each member, compute member's high or low across in-window times
  var memberValues=[];
  for(var m=0;m<ensemble.members.length;m++){
    var mem=ensemble.members[m];
    var v=isHigh?-9999:9999;
    var seen=false;
    for(var k=0;k<inIdx.length;k++){
      var temp=mem[inIdx[k]];
      if(temp==null)continue;
      seen=true;
      if(isHigh?temp>v:temp<v)v=temp;
    }
    if(seen)memberValues.push(v);
  }
  if(memberValues.length===0)return null;
  // Compute mean and stddev
  var sum=0;for(var p=0;p<memberValues.length;p++)sum+=memberValues[p];
  var mean=sum/memberValues.length;
  var sq=0;for(var q=0;q<memberValues.length;q++)sq+=(memberValues[q]-mean)*(memberValues[q]-mean);
  var sd=Math.sqrt(sq/memberValues.length);
  return{members:memberValues,mean:mean,sd:sd,count:memberValues.length};
}

// ============================================================
// V1.0.0 Phase 1.A: PER-SOURCE ACCURACY LOG
// -----------------------------------------------------------
// localStorage schema:
//   kt_wxacc_v1 = {
//     "NWS": {"NYC": {"high_0d": [{forecast:76,actual:78,ts:...}, ...],
//                     "high_1d": [...],
//                     "low_0d": [...]}, ...},
//     "GFS_ENS": {...},
//     "ECMWF": {...},
//     "HRRR": {...},
//     "OPEN_METEO_BASIC": {...}  // legacy single-source for comparison
//   }
//   kt_wxbias_v1 = {
//     "NWS": {"NYC": {"high": -1.2, "low": +0.4}, ...}, ...
//   }
// Computed metrics per (source, city, type):
//   - MAE: mean(|forecast - actual|)
//   - bias: mean(forecast - actual) (signed)
//   - sample size
// ============================================================
function wxAccLoad(){
  try{
    var raw=lsg("kt_wxacc_v1");
    if(!raw)return{};
    return JSON.parse(raw);
  }catch(e){return{};}
}
function wxAccSave(obj){
  try{lss("kt_wxacc_v1",JSON.stringify(obj));}catch(e){}
}
function wxBiasLoad(){
  try{
    var raw=lsg("kt_wxbias_v1");
    if(!raw)return{};
    return JSON.parse(raw);
  }catch(e){return{};}
}
function wxBiasSave(obj){
  try{lss("kt_wxbias_v1",JSON.stringify(obj));}catch(e){}
}

// Record a forecast made for a market, to be compared to actual when settled.
// Stored in pending log; gets resolved by wxResolveForecasts() when CLI is published.
function wxLogForecast(source,city,marketType,daysOut,forecast,marketTicker){
  var acc=wxAccLoad();
  if(!acc[source])acc[source]={};
  if(!acc[source][city])acc[source][city]={};
  var key=marketType+"_"+daysOut+"d";
  if(!acc[source][city][key])acc[source][city][key]=[];
  // Avoid duplicate entries for same ticker
  var arr=acc[source][city][key];
  for(var i=arr.length-1;i>=0&&i>arr.length-20;i--){
    if(arr[i].ticker===marketTicker)return;// already logged
  }
  arr.push({forecast:forecast,actual:null,ts:Date.now(),ticker:marketTicker});
  // Trim to 200 entries per (source, city, type+daysOut)
  if(arr.length>200)arr.splice(0,arr.length-200);
  wxAccSave(acc);
}

// Compute MAE and bias for (source, city, marketType) across the most recent
// N samples (default 30). Returns {mae, bias, n} or null if insufficient data.
function wxAccStats(source,city,marketType,n){
  if(typeof n!=="number")n=30;
  var acc=wxAccLoad();
  if(!acc[source]||!acc[source][city])return null;
  // Aggregate across all daysOut buckets (high_0d, high_1d, ..., low_0d, ...)
  var matched=[];
  var keys=Object.keys(acc[source][city]);
  for(var i=0;i<keys.length;i++){
    if(keys[i].indexOf(marketType+"_")!==0)continue;
    var arr=acc[source][city][keys[i]];
    for(var j=0;j<arr.length;j++){
      if(arr[j].actual!=null)matched.push(arr[j]);
    }
  }
  if(matched.length<3)return{mae:null,bias:null,n:matched.length};
  // Most recent N
  matched.sort(function(a,b){return b.ts-a.ts;});
  matched=matched.slice(0,n);
  var sumAbs=0,sumSigned=0;
  for(var k=0;k<matched.length;k++){
    var err=matched[k].forecast-matched[k].actual;
    sumAbs+=Math.abs(err);
    sumSigned+=err;
  }
  return{mae:sumAbs/matched.length,bias:sumSigned/matched.length,n:matched.length};
}

// Inverse-MAE-cubed source weighting per OutcomeEdge methodology.
// sources: [{name:"NWS",value:76,city:"NYC",marketType:"high"}, ...]
function wxBlendForecasts(sources){
  var total=0,weightSum=0;
  var perSourceWeights={};
  for(var i=0;i<sources.length;i++){
    var s=sources[i];
    if(s.value==null||isNaN(s.value))continue;
    var st=wxAccStats(s.name,s.city,s.marketType,30);
    var w;
    if(!st||st.mae==null||st.n<5){
      // Insufficient data: uniform weight
      w=1.0;
    }else{
      // Heavy reward for accuracy; +0.5 prevents division-by-zero
      w=1.0/Math.pow(st.mae+0.5,3);
    }
    perSourceWeights[s.name]=w;
    total+=w*s.value;
    weightSum+=w;
  }
  if(weightSum===0)return null;
  return{value:total/weightSum,weights:perSourceWeights};
}

// Apply stored bias offset for a given (source, city, marketType).
// correctedForecast = rawForecast - bias.
// e.g. if NWS systematically forecasts NYC highs +1.2F too warm, bias = +1.2;
// applied = forecast - 1.2 = cooler corrected forecast.
function wxApplyBias(source,city,marketType,raw){
  var bias=wxBiasLoad();
  if(!bias[source]||!bias[source][city]||bias[source][city][marketType]==null)return raw;
  return raw-bias[source][city][marketType];
}

// Recompute bias offsets from the accuracy log (called periodically).
// Uses same EWMA-style logic: most recent 30 samples weighted equally.
function wxRecomputeBiases(){
  var acc=wxAccLoad();
  var bias={};
  var srcs=Object.keys(acc);
  for(var s=0;s<srcs.length;s++){
    var src=srcs[s];
    bias[src]={};
    var cities=Object.keys(acc[src]);
    for(var c=0;c<cities.length;c++){
      var city=cities[c];
      bias[src][city]={};
      ["high","low"].forEach(function(mt){
        var st=wxAccStats(src,city,mt,30);
        if(st&&st.bias!=null&&st.n>=10)bias[src][city][mt]=st.bias;
      });
    }
  }
  wxBiasSave(bias);
  return bias;
}

// V1.0.0 Phase 1.A: NWS Daily Climate Report (CLI) fetcher.
// CLI products are the OFFICIAL settlement source. We use them to backfill
// the per-source accuracy log with actual highs/lows. Cache permanently
// per (station, date) since CLI doesn't change once published.
//
// Endpoint structure: api.weather.gov/products/types/CLI/locations/{wfo}
// returns list of CLI products. Then GET each product's text and parse for
// the relevant station's high/low.
//
// For Phase 1.A we plumb the function but do not call it yet - Phase 1.B
// will trigger it nightly to resolve open forecast log entries.
var _nwsCliCache={};// {station_date: {high, low, ts}}

function fetchNWSDailyClimate(city,dateStr){
  // dateStr = "YYYY-MM-DD"
  var st=WX_STATIONS[city];
  if(!st)return Promise.resolve(null);
  var key=st.station+"_"+dateStr;
  if(_nwsCliCache[key])return Promise.resolve(_nwsCliCache[key]);
  // Map station to NWS WFO (Weather Forecast Office). Hardcoded for our cities;
  // alternative is to look up via /points/{lat,lon} -> properties.cwa.
  var wfoMap={
    KNYC:"OKX",KLGA:"OKX",KORD:"LOT",KMDW:"LOT",KLAX:"LOX",KMIA:"MFL",
    KAUS:"EWX",KDEN:"BOU",KPHL:"PHI",KPHX:"PSR",KBOS:"BOX",KSFO:"MTR",
    KSEA:"SEW",KATL:"FFC",KDFW:"FWD",KDAL:"FWD",KDTW:"DTX",KIAH:"HGX",
    KMSP:"MPX",KLAS:"VEF",KDCA:"LWX",KTPA:"TBW",KCLT:"GSP",KBNA:"OHX",
    KMSY:"LIX"
  };
  var wfo=wfoMap[st.station];
  if(!wfo)return Promise.resolve(null);
  // List CLI products for this WFO covering the date
  var url="https://api.weather.gov/products/types/CLI/locations/"+wfo;
  return _wxFetch(url).then(function(j){
    if(!j||!j["@graph"])return null;
    // Find product issued on or shortly after dateStr (CLI is published next morning)
    var products=j["@graph"];
    var targetDate=new Date(dateStr+"T00:00:00Z");
    var bestMatch=null,bestDelta=999*86400000;
    for(var i=0;i<products.length;i++){
      var p=products[i];
      var pTs=new Date(p.issuanceTime||p.issued||0).getTime();
      // CLI for date D is typically issued early morning on D+1
      var delta=pTs-targetDate.getTime();
      if(delta>=0&&delta<48*3600000&&delta<bestDelta){
        bestMatch=p;bestDelta=delta;
      }
    }
    if(!bestMatch||!bestMatch["@id"])return null;
    return _wxFetch(bestMatch["@id"]).then(function(prod){
      if(!prod||!prod.productText)return null;
      // Parse CLI text for high/low. CLI format is structured but verbose.
      // Look for the "TEMPERATURE" section and extract MAXIMUM/MINIMUM lines.
      var txt=prod.productText;
      var hi=null,lo=null;
      var lines=txt.split(/\n/);
      var inTemp=false;
      for(var li=0;li<lines.length;li++){
        var ln=lines[li];
        if(/^TEMPERATURE/i.test(ln))inTemp=true;
        if(inTemp){
          var maxM=ln.match(/MAXIMUM\s+(\d+)/i);
          var minM=ln.match(/MINIMUM\s+(\d+)/i);
          if(maxM&&hi==null)hi=parseInt(maxM[1]);
          if(minM&&lo==null)lo=parseInt(minM[1]);
          if(hi!=null&&lo!=null)break;
        }
        if(/^PRECIPITATION/i.test(ln)&&inTemp)inTemp=false;
      }
      if(hi==null&&lo==null)return null;
      var rec={high:hi,low:lo,ts:Date.now(),station:st.station};
      _nwsCliCache[key]=rec;
      return rec;
    });
  });
}

// V1.0.0 Phase 1.A: Forecast resolution.
// Walks the wxAccLoad log, finds entries with actual=null whose date is past,
// fetches the NWS CLI for that city/date, and fills in actual values.
// Then recomputes biases.
//
// Phase 1.A: this is plumbed but called only when user clicks "Resolve forecasts"
// button or in Phase 1.B's nightly job. We don't hammer the CLI endpoint on every
// scan - it's called lazily.
function wxResolveForecasts(maxResolve,logFn){
  if(typeof maxResolve!=="number")maxResolve=20;
  var acc=wxAccLoad();
  var srcs=Object.keys(acc);
  var pending=[];
  for(var s=0;s<srcs.length;s++){
    var src=srcs[s];
    var cities=Object.keys(acc[src]);
    for(var c=0;c<cities.length;c++){
      var city=cities[c];
      var keys=Object.keys(acc[src][city]);
      for(var k=0;k<keys.length;k++){
        var arr=acc[src][city][keys[k]];
        for(var e=0;e<arr.length;e++){
          if(arr[e].actual==null){
            // Determine the date from ticker (parseWeatherTicker)
            var wp=parseWeatherTicker(arr[e].ticker||"");
            if(!wp)continue;
            // Only resolve if date is at least 12h in the past (CLI should be out)
            var winEnd=new Date(wp.date+"T23:59:00Z").getTime();
            if(Date.now()-winEnd<12*3600000)continue;
            pending.push({src:src,city:city,key:keys[k],idx:e,date:wp.date,marketType:wp.isHigh?"high":"low",entry:arr[e]});
          }
        }
      }
    }
  }
  if(pending.length===0){
    if(logFn)logFn("[WX-V1] No pending forecasts to resolve");
    return Promise.resolve(0);
  }
  // Group pending by (city, date) for de-duped CLI fetches
  var groups={};
  for(var p=0;p<pending.length;p++){
    var g=pending[p].city+"_"+pending[p].date;
    if(!groups[g])groups[g]={city:pending[p].city,date:pending[p].date,items:[]};
    groups[g].items.push(pending[p]);
  }
  var groupKeys=Object.keys(groups);
  // Fetch CLI for each group, sequentially to respect NWS rate limits
  var resolved=0;
  if(logFn)logFn("[WX-V1] Resolving "+pending.length+" pending forecasts across "+groupKeys.length+" (city,date) groups");
  var p=Promise.resolve();
  for(var gi=0;gi<Math.min(groupKeys.length,maxResolve);gi++){
    (function(g){
      p=p.then(function(){return fetchNWSDailyClimate(g.city,g.date);}).then(function(cli){
        if(!cli)return;
        for(var i=0;i<g.items.length;i++){
          var it=g.items[i];
          var actual=it.marketType==="high"?cli.high:cli.low;
          if(actual==null)continue;
          acc[it.src][it.city][it.key][it.idx].actual=actual;
          resolved++;
        }
      });
    })(groups[groupKeys[gi]]);
  }
  return p.then(function(){
    if(resolved>0){
      wxAccSave(acc);
      wxRecomputeBiases();
      if(logFn)logFn("[WX-V1] Resolved "+resolved+" forecasts; biases recomputed","success");
    }else{
      if(logFn)logFn("[WX-V1] No forecasts could be resolved (CLI unavailable for those dates)","warn");
    }
    return resolved;
  });
}

// V1.0.0 Phase 1.A main entry point.
// Runs alongside legacy enrichWeatherMarkets in observe-only mode.
// For each Tier-1 city represented in the markets list, fetches all sources,
// extracts the LST day window, applies bias, computes per-source forecasts.
// Annotates markets with m._wxV1 = {sources, blended, ensembleProb, ...}
// then logs a summary to console.
function enrichWeatherMarketsV1(markets,logFn){
  // Find all weather markets and group by city
  var wxIdx=[];
  var citiesNeeded={};
  for(var i=0;i<markets.length;i++){
    var wp=parseWeatherTicker(markets[i].ticker);
    if(wp){
      markets[i]._wx=wp;// also populate legacy field
      wxIdx.push(i);
      if(WX_STATIONS[wp.city])citiesNeeded[wp.city]=true;
    }
  }
  if(wxIdx.length===0)return Promise.resolve(markets);
  var cityList=Object.keys(citiesNeeded);
  if(cityList.length===0)return Promise.resolve(markets);
  logFn("[WX-V1] Phase 1.A: fetching multi-source forecasts for "+cityList.length+" cities ("+wxIdx.length+" markets)");

  // For each city, run all source fetches in parallel; tolerate failures (resolve null).
  var cityProms=cityList.map(function(city){
    var inDay=false;
    // Check if any market for this city is within 36h - if so fetch HRRR
    for(var k=0;k<wxIdx.length;k++){
      var mm=markets[wxIdx[k]];
      if(mm._wx&&mm._wx.city===city){
        var dtCloseHrs=(new Date(mm.close_time)-Date.now())/3600000;
        if(dtCloseHrs<36)inDay=true;
      }
    }
    var fetches=[
      fetchNWSForecast(city).catch(function(){return null;}),
      fetchNWSObservation(city).catch(function(){return null;}),
      fetchOMGfsEnsemble(city).catch(function(){return null;}),
      fetchOMEcmwf(city).catch(function(){return null;}),
      inDay?fetchOMHrrr(city).catch(function(){return null;}):Promise.resolve(null),
      // V1.0.0 Phase 1.A (rev 2 of beta1): commercial sources via Worker proxy.
      // Each fail-soft to null if Worker proxy/keys unavailable.
      fetchVisualCrossing(city).catch(function(){return null;}),
      fetchWeatherbit(city).catch(function(){return null;})
    ];
    return Promise.all(fetches).then(function(res){
      return{city:city,nws:res[0],obs:res[1],gfs:res[2],ecmwf:res[3],hrrr:res[4],vc:res[5],wb:res[6]};
    });
  });

  return Promise.all(cityProms).then(function(cityData){
    var byCity={};
    for(var c=0;c<cityData.length;c++)byCity[cityData[c].city]=cityData[c];
    var enriched=0;
    var anyHasNws=0,anyHasGfs=0,anyHasEcmwf=0,anyHasHrrr=0,anyHasObs=0,anyHasVc=0,anyHasWb=0;

    for(var i2=0;i2<wxIdx.length;i2++){
      var m=markets[wxIdx[i2]];
      var wp=m._wx;
      var cd=byCity[wp.city];
      if(!cd)continue;
      var window=wxLSTWindow(wp.date,wp.city);
      if(!window)continue;
      var marketType=wp.isHigh?"high":"low";
      var daysOut=Math.max(0,Math.floor((window.startUTC.getTime()-Date.now())/86400000));

      // Extract per-source day-window high/low
      var sources=[];
      var src={};
      if(cd.nws){
        var nwsExt=wxExtractHighLow(cd.nws.hourly,window,wp.isHigh);
        if(nwsExt){
          var nwsCorr=wxApplyBias("NWS",wp.city,marketType,nwsExt.value);
          src.nws={raw:nwsExt.value,corrected:nwsCorr,sampleCount:nwsExt.sampleCount};
          sources.push({name:"NWS",value:nwsCorr,city:wp.city,marketType:marketType});
          anyHasNws++;
        }
      }
      if(cd.gfs){
        var gfsExt=wxExtractEnsembleHighLow(cd.gfs,window,wp.isHigh);
        if(gfsExt){
          var gfsCorr=wxApplyBias("GFS_ENS",wp.city,marketType,gfsExt.mean);
          src.gfsEns={raw:gfsExt.mean,corrected:gfsCorr,sd:gfsExt.sd,members:gfsExt.members,count:gfsExt.count};
          sources.push({name:"GFS_ENS",value:gfsCorr,city:wp.city,marketType:marketType});
          anyHasGfs++;
        }
      }
      if(cd.ecmwf){
        var ecExt=wxExtractHighLow(cd.ecmwf.hourly,window,wp.isHigh);
        if(ecExt){
          var ecCorr=wxApplyBias("ECMWF",wp.city,marketType,ecExt.value);
          src.ecmwf={raw:ecExt.value,corrected:ecCorr,sampleCount:ecExt.sampleCount};
          sources.push({name:"ECMWF",value:ecCorr,city:wp.city,marketType:marketType});
          anyHasEcmwf++;
        }
      }
      if(cd.hrrr){
        var hrExt=wxExtractHighLow(cd.hrrr.hourly,window,wp.isHigh);
        if(hrExt){
          var hrCorr=wxApplyBias("HRRR",wp.city,marketType,hrExt.value);
          src.hrrr={raw:hrExt.value,corrected:hrCorr,sampleCount:hrExt.sampleCount};
          sources.push({name:"HRRR",value:hrCorr,city:wp.city,marketType:marketType});
          anyHasHrrr++;
        }
      }
      if(cd.vc){
        var vcExt=wxExtractHighLow(cd.vc.hourly,window,wp.isHigh);
        if(vcExt){
          var vcCorr=wxApplyBias("VC",wp.city,marketType,vcExt.value);
          src.vc={raw:vcExt.value,corrected:vcCorr,sampleCount:vcExt.sampleCount};
          sources.push({name:"VC",value:vcCorr,city:wp.city,marketType:marketType});
          anyHasVc++;
        }
      }
      if(cd.wb){
        var wbExt=wxExtractHighLow(cd.wb.hourly,window,wp.isHigh);
        if(wbExt){
          var wbCorr=wxApplyBias("WB",wp.city,marketType,wbExt.value);
          src.wb={raw:wbExt.value,corrected:wbCorr,sampleCount:wbExt.sampleCount};
          sources.push({name:"WB",value:wbCorr,city:wp.city,marketType:marketType});
          anyHasWb++;
        }
      }
      if(cd.obs){
        src.observation={tempF:cd.obs.tempF,obsTime:cd.obs.obsTime,station:cd.obs.station};
        anyHasObs++;
      }

      // Blended forecast (inverse-MAE-cubed weighted)
      var blendRes=null;
      if(sources.length>0){
        blendRes=wxBlendForecasts(sources);
      }

      // Annotate market for downstream observation/strategy
      m._wxV1={
        city:wp.city,station:WX_STATIONS[wp.city]?WX_STATIONS[wp.city].station:"",
        date:wp.date,marketType:marketType,daysOut:daysOut,hourLST:wp.hourLST,
        sources:src,
        blended:blendRes?blendRes.value:null,
        blendWeights:blendRes?blendRes.weights:null,
        ensembleSpread:src.gfsEns?src.gfsEns.sd:null,
        windowStart:window.startUTC.toISOString(),
        windowEnd:window.endUTC.toISOString()
      };
      enriched++;

      // Log forecast for accuracy tracking (one entry per source per ticker per scan;
      // duplicates are filtered inside wxLogForecast). Will be resolved when market settles.
      if(src.nws)wxLogForecast("NWS",wp.city,marketType,daysOut,src.nws.corrected,m.ticker);
      if(src.gfsEns)wxLogForecast("GFS_ENS",wp.city,marketType,daysOut,src.gfsEns.corrected,m.ticker);
      if(src.ecmwf)wxLogForecast("ECMWF",wp.city,marketType,daysOut,src.ecmwf.corrected,m.ticker);
      if(src.hrrr)wxLogForecast("HRRR",wp.city,marketType,daysOut,src.hrrr.corrected,m.ticker);
      if(src.vc)wxLogForecast("VC",wp.city,marketType,daysOut,src.vc.corrected,m.ticker);
      if(src.wb)wxLogForecast("WB",wp.city,marketType,daysOut,src.wb.corrected,m.ticker);
    }

    logFn("[WX-V1] enriched "+enriched+"/"+wxIdx.length+" markets | NWS:"+anyHasNws+" GFS:"+anyHasGfs+" ECMWF:"+anyHasEcmwf+" HRRR:"+anyHasHrrr+" VC:"+anyHasVc+" WB:"+anyHasWb+" Obs:"+anyHasObs);

    // Log per-city summary (one line per city)
    for(var ci=0;ci<cityList.length;ci++){
      var cn=cityList[ci];
      var cd2=byCity[cn];
      if(!cd2)continue;
      // Find first market for this city to get a representative window
      var rep=null;
      for(var rk=0;rk<wxIdx.length;rk++){
        if(markets[wxIdx[rk]]._wx&&markets[wxIdx[rk]]._wx.city===cn){rep=markets[wxIdx[rk]];break;}
      }
      if(!rep||!rep._wxV1)continue;
      var v=rep._wxV1;
      var parts=[];
      if(v.sources.nws)parts.push("NWS="+v.sources.nws.corrected.toFixed(1));
      if(v.sources.gfsEns)parts.push("GFS_ens="+v.sources.gfsEns.corrected.toFixed(1)+"+/-"+v.sources.gfsEns.sd.toFixed(1));
      if(v.sources.ecmwf)parts.push("ECMWF="+v.sources.ecmwf.corrected.toFixed(1));
      if(v.sources.hrrr)parts.push("HRRR="+v.sources.hrrr.corrected.toFixed(1));
      if(v.sources.vc)parts.push("VC="+v.sources.vc.corrected.toFixed(1));
      if(v.sources.wb)parts.push("WB="+v.sources.wb.corrected.toFixed(1));
      if(v.sources.observation)parts.push("OBS="+v.sources.observation.tempF.toFixed(1));
      var blendStr=v.blended!=null?" => blend="+v.blended.toFixed(1)+"F":"";
      logFn("[WX-V1:"+cn+"] "+v.marketType+" "+v.date+" ("+v.daysOut+"d): "+parts.join(", ")+blendStr);
    }
    return markets;
  }).catch(function(e){
    logFn("[WX-V1] enrich error: "+e.message,"warn");
    return markets;
  });
}

// ============================================================
// V1.0.0 PHASE 2.A: ENERGY DATA LAYER (observe-only)
// -----------------------------------------------------------
// Multi-source energy commodity data pipeline. In Phase 2.A this runs in
// observe-only mode: fetches forecasts/spot prices, populates per-source
// accuracy infrastructure, logs everything. Trading still uses legacy
// generalist strategies for KXGAS/KXWTI/KXBRENT/KXNATGAS tickers; the
// ENERGY strategy slot stays disabled (placeholder).
//
// Phase 2.B (next release after Phase 1.B weather validates) will activate
// the ENERGY strategy using the bias-corrected forecasts and the lognormal /
// autoregressive probability models from KAUTO_Energy_Strategy.md Section 4.
//
// State storage:
//   kt_enacc_v1: forecast/actual sample log
//   kt_enbias_v1: per-source per-commodity bias offsets
// ============================================================

function parseEnergyTicker(ticker){
  if(!ticker)return null;
  // v1.0.0-beta.6: added KXAAAGAS/KXAAAGASD. These are AAA national daily
  // retail gas markets that started appearing on Kalshi recently. Maps to
  // commodity = GAS like KXGAS, but daily-settle instead of weekly. Without
  // this, the bot was trading them via the legacy generalist strategies
  // (FAV/VALUE) with no specialist forecast input.
  var prefixMatch=ticker.match(/^(KXAAAGAS|KXAAAGASD|KXGAS|KXGASW|KXBRENT|KXBRENTD|KXWTI|KXWTID|KXNATGAS|KXNATGASD|KXOIL)/i);
  if(!prefixMatch)return null;
  var prefix=prefixMatch[1].toUpperCase();
  var commodity;
  // Order matters: KXAAAGAS must come BEFORE generic GAS check; NATGAS before
  // generic GAS (NATGAS also contains "GAS" substring at the end).
  if(prefix==="KXAAAGAS"||prefix==="KXAAAGASD")commodity="GAS";
  else if(prefix==="KXGAS"||prefix==="KXGASW")commodity="GAS";
  else if(prefix.indexOf("BRENT")>=0)commodity="BRENT";
  else if(prefix.indexOf("NATGAS")>=0)commodity="NATGAS";
  else if(prefix.indexOf("WTI")>=0)commodity="WTI";
  else if(prefix==="KXOIL")commodity="WTI";
  else return null;
  var parts=ticker.split("-");
  var dateStr=parts[1]||"";
  var strikeStr=(parts[2]||"").replace(/^T/,"");
  var strike=parseFloat(strikeStr);
  if(isNaN(strike))return null;
  var months={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  var dh=dateStr.match(/^(\d{2})([A-Z]{3})(\d{2})(\d{2})$/);
  var d=dateStr.match(/^(\d{2})([A-Z]{3})(\d{1,2})$/);
  var w=dateStr.match(/^(\d{2})([A-Z]{3})$/);
  var settleDate=null,hourLST=null;
  if(dh){settleDate=new Date(2000+parseInt(dh[1]),months[dh[2]],parseInt(dh[3]));hourLST=parseInt(dh[4]);}
  else if(d){settleDate=new Date(2000+parseInt(d[1]),months[d[2]],parseInt(d[3]));}
  else if(w){settleDate=new Date(2000+parseInt(w[1]),months[w[2]],28);}
  else return null;
  return{commodity:commodity,settleDate:settleDate,hourLST:hourLST,strike:strike};
}

function enAccLoad(){try{var raw=lsg("kt_enacc_v1");if(!raw)return{};return JSON.parse(raw);}catch(e){return{};}}
function enAccSave(obj){try{lss("kt_enacc_v1",JSON.stringify(obj));}catch(e){}}
function enBiasLoad(){try{var raw=lsg("kt_enbias_v1");if(!raw)return{};return JSON.parse(raw);}catch(e){return{};}}
function enBiasSave(obj){try{lss("kt_enbias_v1",JSON.stringify(obj));}catch(e){}}

function enLogForecast(source,commodity,daysOut,forecast,marketTicker){
  if(forecast==null||isNaN(forecast))return;
  var acc=enAccLoad();
  if(!acc[source])acc[source]={};
  if(!acc[source][commodity])acc[source][commodity]={};
  var key=daysOut+"d";
  if(!acc[source][commodity][key])acc[source][commodity][key]=[];
  var arr=acc[source][commodity][key];
  for(var i=arr.length-1;i>=0&&i>arr.length-20;i--){
    if(arr[i].ticker===marketTicker)return;
  }
  arr.push({forecast:forecast,actual:null,ts:Date.now(),ticker:marketTicker});
  if(arr.length>200)arr.splice(0,arr.length-200);
  enAccSave(acc);
}

function enAccStats(source,commodity,n){
  if(typeof n!=="number")n=30;
  var acc=enAccLoad();
  if(!acc[source]||!acc[source][commodity])return null;
  var matched=[];
  var keys=Object.keys(acc[source][commodity]);
  for(var i=0;i<keys.length;i++){
    var arr=acc[source][commodity][keys[i]];
    for(var j=0;j<arr.length;j++){
      if(arr[j].actual!=null)matched.push(arr[j]);
    }
  }
  if(matched.length<3)return{mae:null,bias:null,n:matched.length};
  matched.sort(function(a,b){return b.ts-a.ts;});
  matched=matched.slice(0,n);
  var sumAbs=0,sumSigned=0;
  for(var k=0;k<matched.length;k++){
    var err=matched[k].forecast-matched[k].actual;
    sumAbs+=Math.abs(err);sumSigned+=err;
  }
  return{mae:sumAbs/matched.length,bias:sumSigned/matched.length,n:matched.length};
}

function enApplyBias(source,commodity,raw){
  var bias=enBiasLoad();
  if(!bias[source]||!bias[source][commodity]||bias[source][commodity].bias==null)return raw;
  return raw-bias[source][commodity].bias;
}

function enRecomputeBiases(){
  var acc=enAccLoad();
  var bias={};
  var srcs=Object.keys(acc);
  for(var s=0;s<srcs.length;s++){
    var src=srcs[s];bias[src]={};
    var cmds=Object.keys(acc[src]);
    for(var c=0;c<cmds.length;c++){
      var cmd=cmds[c];
      var st=enAccStats(src,cmd,30);
      if(st&&st.bias!=null&&st.n>=10)bias[src][cmd]={bias:st.bias,n:st.n};
    }
  }
  enBiasSave(bias);return bias;
}

function _enProxyUrl(target){return _px+"/proxy?url="+encodeURIComponent(target);}
function _enFetch(url,timeoutMs){
  if(typeof timeoutMs!=="number")timeoutMs=10000;
  return new Promise(function(resolve,reject){
    var t=setTimeout(function(){reject(new Error("timeout"));},timeoutMs);
    fetch(url).then(function(r){
      clearTimeout(t);
      if(!r.ok)return reject(new Error("status "+r.status));
      return r.json().then(resolve,reject);
    },function(e){clearTimeout(t);reject(e);});
  });
}
function _enFetchText(url,timeoutMs){
  if(typeof timeoutMs!=="number")timeoutMs=10000;
  return new Promise(function(resolve,reject){
    var t=setTimeout(function(){reject(new Error("timeout"));},timeoutMs);
    fetch(url).then(function(r){
      clearTimeout(t);
      if(!r.ok)return reject(new Error("status "+r.status));
      return r.text().then(resolve,reject);
    },function(e){clearTimeout(t);reject(e);});
  });
}

function fetchEIAWeeklyGas(){
  if(_eiaGasCache&&(Date.now()-_eiaGasCache.ts)<21600000)return Promise.resolve(_eiaGasCache);
  var url="https://api.eia.gov/v2/petroleum/pri/gnd/data/?frequency=weekly&data[0]=value&facets[series][]=EMM_EPMR_PTE_NUS_DPG&sort[0][column]=period&sort[0][direction]=desc&offset=0&length=12";
  return _enFetch(_enProxyUrl(url),15000).then(function(j){
    if(!j||!j.response||!j.response.data)return null;
    var rows=j.response.data;
    if(rows.length===0)return null;
    var series=[];
    for(var i=0;i<rows.length;i++){
      var v=parseFloat(rows[i].value);
      if(!isNaN(v))series.push({period:rows[i].period,value:v});
    }
    if(series.length===0)return null;
    var rec={ts:Date.now(),current:series[0].value,currentPeriod:series[0].period,
      lastWeek:series.length>1?series[1].value:null,
      twoWeeksAgo:series.length>2?series[2].value:null,series:series};
    _eiaGasCache=rec;return rec;
  },function(){return null;});
}

function fetchYahooFutures(symbol){
  var cur;
  if(symbol==="CL=F")cur=_yahooWtiCache;
  else if(symbol==="BZ=F")cur=_yahooBrentCache;
  else if(symbol==="NG=F")cur=_yahooNatgasCache;
  else return Promise.resolve(null);
  if(cur&&(Date.now()-cur.ts)<90000)return Promise.resolve(cur);
  var url="https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(symbol)+"?range=30d&interval=1d";
  return _enFetch(_enProxyUrl(url),10000).then(function(j){
    if(!j||!j.chart||!j.chart.result||!j.chart.result[0])return null;
    var r=j.chart.result[0];
    var meta=r.meta||{};
    var ind=r.indicators&&r.indicators.quote&&r.indicators.quote[0];
    if(!ind)return null;
    var closes=(ind.close||[]).filter(function(v){return v!=null&&!isNaN(v);});
    if(closes.length===0)return null;
    var rec={ts:Date.now(),latest:closes[closes.length-1],symbol:symbol,
      regularMarketPrice:meta.regularMarketPrice||null,
      previousClose:meta.previousClose||null,series:closes};
    if(symbol==="CL=F")_yahooWtiCache=rec;
    else if(symbol==="BZ=F")_yahooBrentCache=rec;
    else _yahooNatgasCache=rec;
    return rec;
  },function(){return null;});
}

function fetchFREDSeries(seriesId){
  var url="https://fred.stlouisfed.org/graph/fredgraph.csv?id="+encodeURIComponent(seriesId);
  var cur;
  if(seriesId==="DCOILWTICO")cur=_fredWtiCache;
  else if(seriesId==="DCOILBRENTEU")cur=_fredBrentCache;
  else if(seriesId==="DHHNGSP")cur=_fredNatgasCache;
  else if(seriesId==="GASREGW")cur=_fredGasCache;
  if(cur&&(Date.now()-cur.ts)<86400000)return Promise.resolve(cur);
  return _enFetchText(_enProxyUrl(url),15000).then(function(csv){
    if(!csv)return null;
    var lines=csv.split("\n");
    if(lines.length<2)return null;
    var series=[];
    for(var i=1;i<lines.length;i++){
      var ln=lines[i].trim();
      if(!ln)continue;
      var parts=ln.split(",");
      if(parts.length<2)continue;
      var dt=parts[0].replace(/"/g,"").trim();
      var vs=parts[1].replace(/"/g,"").trim();
      if(vs==="."||vs==="")continue;
      var v=parseFloat(vs);
      if(!isNaN(v))series.push({period:dt,value:v});
    }
    if(series.length===0)return null;
    var rec={ts:Date.now(),latest:series[series.length-1].value,
      latestPeriod:series[series.length-1].period,series:series};
    if(seriesId==="GASREGW")_fredGasCache=rec;
    else if(seriesId==="DCOILWTICO")_fredWtiCache=rec;
    else if(seriesId==="DCOILBRENTEU")_fredBrentCache=rec;
    else if(seriesId==="DHHNGSP")_fredNatgasCache=rec;
    return rec;
  },function(){return null;});
}

function enRealizedVol(prices,daysWindow){
  if(!prices||prices.length<daysWindow+1)return null;
  var slice=prices.slice(-(daysWindow+1));
  var returns=[];
  for(var i=1;i<slice.length;i++){
    if(slice[i]>0&&slice[i-1]>0){returns.push(Math.log(slice[i]/slice[i-1]));}
  }
  if(returns.length<daysWindow*0.8)return null;
  var mean=returns.reduce(function(a,b){return a+b;},0)/returns.length;
  var sq=returns.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/returns.length;
  return Math.sqrt(sq)*Math.sqrt(252);
}

function enLogNormalPAbove(spot,strike,sigmaAnnual,days){
  // v1.0.0-beta.6: stronger guards. Previously `NaN<=0` is false (NaN compares
  // false to everything), so NaN inputs slipped through and produced pAbove=NaN
  // in the log. Now require finite + positive on every input, and double-check
  // the intermediate values can't produce NaN/Infinity.
  if(!isFinite(spot)||spot<=0)return null;
  if(!isFinite(strike)||strike<=0)return null;
  if(!isFinite(sigmaAnnual)||sigmaAnnual<=0)return null;
  if(!isFinite(days)||days<=0)return null;
  var sd=sigmaAnnual*Math.sqrt(days/365);
  if(!isFinite(sd)||sd<=0)return null;
  var z=Math.log(strike/spot)/sd;
  if(!isFinite(z))return null;
  var p=1-normCDF(z);
  if(!isFinite(p))return null;
  return p;
}

function enGasForecast(currentP,lastWeekP,wtiNow7d,wtiPrior7d){
  if(currentP==null||lastWeekP==null)return null;
  var oneWeekChange=currentP-lastWeekP;
  var wtiPassThrough=0;
  if(wtiNow7d!=null&&wtiPrior7d!=null){wtiPassThrough=0.025*(wtiNow7d-wtiPrior7d);}
  return currentP+0.7*oneWeekChange+0.3*wtiPassThrough;
}

function enrichEnergyMarkets(markets,logFn){
  var enIdx=[];
  var commoditiesNeeded={};
  for(var i=0;i<markets.length;i++){
    var ep=parseEnergyTicker(markets[i].ticker);
    if(ep){markets[i]._en=ep;enIdx.push(i);commoditiesNeeded[ep.commodity]=true;}
  }
  if(enIdx.length===0)return Promise.resolve(markets);
  var cmdList=Object.keys(commoditiesNeeded);
  logFn("[EN-V1] Phase 2.A: fetching energy data for "+cmdList.length+" commodities ("+enIdx.length+" markets)");
  var fetches={};
  for(var c=0;c<cmdList.length;c++){
    var cmd=cmdList[c];
    if(cmd==="GAS"){
      fetches.eiaGas=fetchEIAWeeklyGas().catch(function(){return null;});
      fetches.fredGas=fetchFREDSeries("GASREGW").catch(function(){return null;});
      if(!fetches.eiaWti)fetches.eiaWti=fetchEIASpot("WTI").catch(function(){return null;});
      if(!fetches.fredWti)fetches.fredWti=fetchFREDSeries("DCOILWTICO").catch(function(){return null;});
    }else if(cmd==="WTI"){
      fetches.eiaWti=fetchEIASpot("WTI").catch(function(){return null;});
      fetches.yahooWti=fetchYahooFutures("CL=F").catch(function(){return null;});
      fetches.fredWti=fetchFREDSeries("DCOILWTICO").catch(function(){return null;});
    }else if(cmd==="BRENT"){
      fetches.eiaBrent=fetchEIASpot("BRENT").catch(function(){return null;});
      fetches.yahooBrent=fetchYahooFutures("BZ=F").catch(function(){return null;});
      fetches.fredBrent=fetchFREDSeries("DCOILBRENTEU").catch(function(){return null;});
    }else if(cmd==="NATGAS"){
      fetches.eiaNatgas=fetchEIANatgas().catch(function(){return null;});
      fetches.yahooNatgas=fetchYahooFutures("NG=F").catch(function(){return null;});
      fetches.fredNatgas=fetchFREDSeries("DHHNGSP").catch(function(){return null;});
    }
  }
  var keys=Object.keys(fetches);
  var proms=keys.map(function(k){return fetches[k];});
  return Promise.all(proms).then(function(results){
    var data={};
    for(var k2=0;k2<keys.length;k2++)data[keys[k2]]=results[k2];
    for(var k=0;k<enIdx.length;k++){
      var m=markets[enIdx[k]];
      var ep=m._en;
      var nowDate=new Date();
      var daysOut=Math.max(0,Math.round((ep.settleDate-nowDate)/86400000));
      var v={commodity:ep.commodity,settleDate:ep.settleDate.toISOString().slice(0,10),
        daysOut:daysOut,strike:ep.strike,sources:{}};
      if(ep.commodity==="GAS"){
        if(data.eiaGas){
          var ec=enApplyBias("EIA_GAS","GAS",data.eiaGas.current);
          v.sources.eiaGas={raw:data.eiaGas.current,corrected:ec,
            currentPeriod:data.eiaGas.currentPeriod,lastWeek:data.eiaGas.lastWeek};
          enLogForecast("EIA_GAS","GAS",daysOut,ec,m.ticker);
        }
        if(data.fredGas){
          v.sources.fredGas={raw:data.fredGas.latest,latest:data.fredGas.latest,
            latestPeriod:data.fredGas.latestPeriod};
        }
        if(data.eiaGas&&data.eiaGas.lastWeek!=null&&data.eiaWti&&data.eiaWti.series){
          var w7=data.eiaWti.series.slice(0,7);
          var w14=data.eiaWti.series.slice(7,14);
          if(w7.length>=5&&w14.length>=5){
            var w7avg=w7.reduce(function(a,b){return a+b.value;},0)/w7.length;
            var w14avg=w14.reduce(function(a,b){return a+b.value;},0)/w14.length;
            var fcGas=enGasForecast(data.eiaGas.current,data.eiaGas.lastWeek,w7avg,w14avg);
            if(fcGas!=null){
              v.model={forecast:fcGas,inputs:{current:data.eiaGas.current,lastWeek:data.eiaGas.lastWeek,wti7d:w7avg,wti14d:w14avg}};
            }
          }
        }
      }else if(ep.commodity==="WTI"||ep.commodity==="BRENT"){
        var spotKey=ep.commodity==="WTI"?"eiaWti":"eiaBrent";
        var yKey=ep.commodity==="WTI"?"yahooWti":"yahooBrent";
        var fKey=ep.commodity==="WTI"?"fredWti":"fredBrent";
        var srcEiaName="EIA_"+ep.commodity;
        var srcYahooName="YAHOO_"+ep.commodity;
        if(data[spotKey]){
          var ec2=enApplyBias(srcEiaName,ep.commodity,data[spotKey].latest);
          v.sources.eiaSpot={raw:data[spotKey].latest,corrected:ec2,latestPeriod:data[spotKey].latestPeriod};
          enLogForecast(srcEiaName,ep.commodity,daysOut,ec2,m.ticker);
        }
        if(data[yKey]){
          var yc=enApplyBias(srcYahooName,ep.commodity,data[yKey].latest);
          v.sources.yahoo={raw:data[yKey].latest,corrected:yc};
          enLogForecast(srcYahooName,ep.commodity,daysOut,yc,m.ticker);
        }
        if(data[fKey]){v.sources.fred={raw:data[fKey].latest,latestPeriod:data[fKey].latestPeriod};}
        if(data[fKey]&&data[fKey].series&&data[fKey].series.length>=31){
          var prices=data[fKey].series.map(function(s){return s.value;});
          var vol=enRealizedVol(prices,30);
          if(vol!=null)v.vol30=vol;
        }
        var spotPx=null;
        if(v.sources.yahoo)spotPx=v.sources.yahoo.corrected;
        else if(v.sources.eiaSpot)spotPx=v.sources.eiaSpot.corrected;
        if(spotPx&&v.vol30&&daysOut>0){
          var pAbove=enLogNormalPAbove(spotPx,ep.strike,v.vol30,daysOut);
          if(pAbove!=null)v.model={spot:spotPx,vol30:v.vol30,pAbove:pAbove};
        }
      }else if(ep.commodity==="NATGAS"){
        if(data.eiaNatgas){
          var enc=enApplyBias("EIA_NATGAS","NATGAS",data.eiaNatgas.latest);
          v.sources.eiaSpot={raw:data.eiaNatgas.latest,corrected:enc,latestPeriod:data.eiaNatgas.latestPeriod};
          enLogForecast("EIA_NATGAS","NATGAS",daysOut,enc,m.ticker);
        }
        if(data.yahooNatgas){
          var ync=enApplyBias("YAHOO_NATGAS","NATGAS",data.yahooNatgas.latest);
          v.sources.yahoo={raw:data.yahooNatgas.latest,corrected:ync};
          enLogForecast("YAHOO_NATGAS","NATGAS",daysOut,ync,m.ticker);
        }
        if(data.fredNatgas){
          v.sources.fred={raw:data.fredNatgas.latest,latestPeriod:data.fredNatgas.latestPeriod};
          if(data.fredNatgas.series&&data.fredNatgas.series.length>=31){
            var ngPrices=data.fredNatgas.series.map(function(s){return s.value;});
            var ngVol=enRealizedVol(ngPrices,30);
            if(ngVol!=null)v.vol30=Math.max(0.50,ngVol);
          }
        }
        var ngSpot=null;
        if(v.sources.yahoo)ngSpot=v.sources.yahoo.corrected;
        else if(v.sources.eiaSpot)ngSpot=v.sources.eiaSpot.corrected;
        if(ngSpot&&v.vol30&&daysOut>0){
          var ngP=enLogNormalPAbove(ngSpot,ep.strike,v.vol30,daysOut);
          if(ngP!=null)v.model={spot:ngSpot,vol30:v.vol30,pAbove:ngP};
        }
      }
      m._enV1=v;
    }
    var byCmd={};
    for(var li=0;li<enIdx.length;li++){
      var lm=markets[enIdx[li]];
      if(!lm._enV1)continue;
      var lc=lm._enV1.commodity;
      if(!byCmd[lc])byCmd[lc]={count:0,sample:null};
      byCmd[lc].count++;
      if(!byCmd[lc].sample)byCmd[lc].sample=lm._enV1;
    }
    var cmdsLog=Object.keys(byCmd);
    for(var ci=0;ci<cmdsLog.length;ci++){
      var bc=byCmd[cmdsLog[ci]];
      var s=bc.sample.sources;
      var parts=[];
      if(s.eiaSpot)parts.push("EIA="+s.eiaSpot.corrected.toFixed(2));
      if(s.eiaGas)parts.push("EIA="+s.eiaGas.corrected.toFixed(3));
      if(s.yahoo)parts.push("YH="+s.yahoo.corrected.toFixed(2));
      if(s.fred)parts.push("FRED="+s.fred.raw.toFixed(2));
      // v1.0.0-beta.6: include strike + daysOut in summary, and explain why
      // model is missing if pAbove was expected but couldn't be computed.
      // Previously logs showed "pAbove=NaN%" with no explanation, which made
      // it impossible to tell whether vol was missing, strike was bad, or the
      // probability math itself produced an invalid value.
      var detail=" str=$"+bc.sample.strike+" days="+bc.sample.daysOut;
      if(bc.sample.vol30!=null)detail+=" vol="+(bc.sample.vol30*100).toFixed(0)+"%";
      var modelStr="";
      if(bc.sample.model){
        if(bc.sample.model.pAbove!=null&&isFinite(bc.sample.model.pAbove))modelStr=" pAbove="+(bc.sample.model.pAbove*100).toFixed(0)+"%";
        else if(bc.sample.model.forecast!=null&&isFinite(bc.sample.model.forecast))modelStr=" forecast=$"+bc.sample.model.forecast.toFixed(3);
        else modelStr=" model=(invalid)";
      }else{
        // Explain WHY no model. Three possibilities for crude/natgas:
        // (1) no spot price, (2) no vol30 (FRED series too short or missing),
        // (3) daysOut <= 0 (settling today or past)
        var why=[];
        var hasSpot=s.yahoo||s.eiaSpot;
        if(!hasSpot)why.push("no_spot");
        if(bc.sample.vol30==null)why.push("no_vol");
        if(bc.sample.daysOut<=0)why.push("settles_today");
        if(why.length>0)modelStr=" model=skipped("+why.join(",")+")";
      }
      logFn("[EN-V1:"+cmdsLog[ci]+"] "+bc.count+" markets: "+parts.join(", ")+detail+modelStr);
    }
    return markets;
  }).catch(function(e){
    logFn("[EN-V1] enrich error: "+e.message,"warn");
    return markets;
  });
}
