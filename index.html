function _b64(b){var r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
function _al(n){if(n<128)return[n];if(n<256)return[129,n];if(n<65536)return[130,(n>>8)&255,n&255];return[131,(n>>16)&255,(n>>8)&255,n&255];}
function importKey(pem){
  var t=pem.trim(),p1=t.indexOf("BEGIN RSA PRIVATE KEY")>=0,b,d;
  if(p1){b=t.replace(/-----BEGIN RSA PRIVATE KEY-----/,"").replace(/-----END RSA PRIVATE KEY-----/,"").replace(/\s/g,"");
    d=_b64(b);var o=[48,13,6,9,42,134,72,134,247,13,1,1,1,5,0],oc=[4].concat(_al(d.length)),il=o.length+oc.length+d.length,

    var a=new Uint8Array(s),r="";for(var i=0;i<a.length;i++)r+=String.fromCharCode(a[i]);

function fetchMkts(){
  var all=[],cur="",pg=0,sportSkip=0;
  function go(){var qs="status=open&limit=1000";if(cur)qs+="&cursor="+encodeURIComponent(cur);
    return api("/markets?"+qs).then(function(d){var mk=d.markets||[];
    for(var i=0;i<mk.length;i++){
      if(isSport(mk[i])){sportSkip++;continue;}
      all.push(norm(mk[i]));
    }
    cur=d.cursor||"";pg++;if(cur&&mk.length>0&&pg<15)return go();return{markets:all,sportSkip:sportSkip};});}
  return go();
}

// ============================================================
// MARKET MOVEMENT TRACKER
// Stores price snapshots over time to detect trends
// ============================================================
var priceHistory={};// ticker -> [{ts, mid, vol}]
var HISTORY_MAX=20;// keep last 20 snapshots per market

function trackPrices(markets){
  var ts=Date.now();
  for(var i=0;i<markets.length;i++){
    var m=markets[i];
    if(m._canary)continue;
    var mid=Math.round((m.yes_bid+m.yes_ask)/2);
    if(!priceHistory[m.ticker])priceHistory[m.ticker]=[];
    var h=priceHistory[m.ticker];
    // Only add if changed or first entry
    if(h.length===0||h[h.length-1].mid!==mid){
      h.push({ts:ts,mid:mid,vol:m.volume});
      if(h.length>HISTORY_MAX)h.shift();
    }
  }
}

function getTrend(ticker){
  var h=priceHistory[ticker];
  if(!h||h.length<2)return{dir:"flat",delta:0,pts:0};
  var first=h[0].mid,last=h[h.length-1].mid;
  var delta=last-first;
  var dir=delta>2?"up":delta<-2?"down":"flat";
  return{dir:dir,delta:delta,pts:h.length};
}

// ============================================================
// STRATEGY ENGINE - NO DAYS FILTERING
// ============================================================
function analyze(m,cfg){
  var yb=m.yes_bid,ya=m.yes_ask,nb=m.no_bid,lp=m.last_price;
  if(yb<=0&&nb<=0&&lp<=0)return null;
  var sum=yb+nb,mid=Math.round((yb+ya)/2),sp=ya-yb;
  if(sp<0||sp>50)return null;

  // Get trend data for this market
  var trend=getTrend(m.ticker);
  var trendBonus=trend.dir==="up"?1.1:trend.dir==="down"?0.9:1.0;

  // --- ARBITRAGE: YES bid + NO bid < 93 ---
  if(yb>=3&&nb>=3&&sum<=93){
    var arbEdge=(100-sum)/100;
    return{sig:"ARB",side:"yes",edge:arbEdge,prob:1.0,price:yb,
      label:"Arb +"+(100-sum)+"c (Y:"+yb+" N:"+nb+")",score:arbEdge*100,
      reason:"YES bid("+yb+") + NO bid("+nb+") = "+sum+" < 93. Arb "+(100-sum)+"c spread."};
  }

  // --- VOLUME MOMENTUM: high volume + tight spread ---
  if(m.volume>=2000&&sp>=0&&sp<=8){
    if(mid>=58&&mid<=85){
      var volEdge=((mid-50)/100)*0.12*trendBonus;
      if(volEdge>=cfg.me)return{sig:"VOL",side:"yes",edge:volEdge,prob:mid/100,price:yb,
        label:"Vol YES "+mid+"% "+Math.round(m.volume/1000)+"k"+(trend.dir!=="flat"?" ["+trend.dir+"]":""),score:volEdge*50,
        reason:"Price "+mid+"% w/ "+Math.round(m.volume)+" vol, spread "+sp+"c."+
          (trend.pts>1?" Trend: "+trend.dir+" ("+trend.delta+"c over "+trend.pts+" snapshots)":"")};
    }
    if(mid>=15&&mid<=42){
      var volEdge2=((50-mid)/100)*0.12*(trend.dir==="down"?1.1:trend.dir==="up"?0.9:1.0);
      if(volEdge2>=cfg.me)return{sig:"VOL",side:"no",edge:volEdge2,prob:(100-mid)/100,price:nb,
        label:"Vol NO "+(100-mid)+"% "+Math.round(m.volume/1000)+"k"+(trend.dir!=="flat"?" ["+trend.dir+"]":""),score:volEdge2*50,
        reason:"Price "+mid+"% w/ "+Math.round(m.volume)+" vol, spread "+sp+"c."+
          (trend.pts>1?" Trend: "+trend.dir+" ("+trend.delta+"c over "+trend.pts+" snapshots)":"")};
    }
  }

  // --- FADE EXTREMES: >92% or <8% ---
  if(sp>=0&&sp<=12){
    if(mid>=92&&nb>=1){
      var fadeEdge=(mid-90)/100;
      if(fadeEdge>=cfg.me)return{sig:"FADE",side:"no",edge:fadeEdge,prob:(100-mid)/100,price:nb,
        label:"Fade "+mid+"% (buy NO @"+nb+"c)",score:fadeEdge*40,
        reason:"YES at "+mid+"%, likely overstating certainty. Buy NO @"+nb+"c."};
    }
    if(mid<=8&&yb>=1){
      var fadeEdge2=(10-mid)/100;
      if(fadeEdge2>=cfg.me)return{sig:"FADE",side:"yes",edge:fadeEdge2,prob:mid/100,price:yb,
        label:"Fade "+mid+"% (buy YES @"+yb+"c)",score:fadeEdge2*40,
        reason:"YES at "+mid+"%, likely understating probability. Buy YES @"+yb+"c."};
    }
  }

  // --- TREND SIGNAL: price moving consistently with volume ---
  if(trend.pts>=3&&Math.abs(trend.delta)>=4&&m.volume>=500&&sp>=0&&sp<=10){
    if(trend.dir==="up"&&mid>=40&&mid<=80){
      var tEdge=(Math.abs(trend.delta)/100)*0.15;
      if(tEdge>=cfg.me)return{sig:"TREND",side:"yes",edge:tEdge,prob:mid/100,price:yb,
        label:"Trend UP +"+trend.delta+"c over "+trend.pts+" snaps",score:tEdge*45,
        reason:"Price trending up "+trend.delta+"c across "+trend.pts+" snapshots. Momentum buy YES @"+yb+"c."};
    }
    if(trend.dir==="down"&&mid>=20&&mid<=60){
      var tEdge2=(Math.abs(trend.delta)/100)*0.15;
      if(tEdge2>=cfg.me)return{sig:"TREND",side:"no",edge:tEdge2,prob:(100-mid)/100,price:nb,
        label:"Trend DN "+trend.delta+"c over "+trend.pts+" snaps",score:tEdge2*45,
        reason:"Price trending down "+trend.delta+"c across "+trend.pts+" snapshots. Momentum buy NO @"+nb+"c."};
    }
  }

  return null;
}

// ============================================================
// POSITION SIZING (Kelly Criterion - asymmetric payout)
// ============================================================
function kelly(prob,price,frac,maxCents){
  if(!price||price<=0||price>=100||!maxCents||maxCents<=0)return 0;
  var cost=price/100,b=(1-cost)/cost;
  var p=Math.min(0.97,Math.max(0.03,prob||0.5));
  var f=Math.max(0,(b*p-(1-p))/b);
  var r=Math.min(Math.round(f*frac*maxCents),maxCents);
  return isNaN(r)?0:r;
}

function cx(){var o={};for(var i=0;i<arguments.length;i++){if(!arguments[i])continue;var k=Object.keys(arguments[i]);for(var j=0;j<k.length;j++)o[k[j]]=arguments[i][k[j]];}return o;}
function ct(v){return"$"+(v/100).toFixed(2);}
function pc(n,d){return d>0?Math.round(n/d*100)+"%":"--";}
function mr(l,v){return R("div",{style:{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}},R("span",{style:{color:"#888"}},l),R("span",{style:{color:"#ccc",fontFamily:"monospace"}},""+v));}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  var _s=useState("password"),scr=_s[0],setScr=_s[1];
  var _pw=useState(""),pw=_pw[0],setPw=_pw[1];
  var _e=useState(""),err=_e[0],setErr=_e[1];
  var _ld=useState(false),ld=_ld[0],setLd=_ld[1];
  var _pp=useState(true),paper=_pp[0],setPaper=_pp[1];
  var _b=useState(10000),bal=_b[0],setBal=_b[1];
  var _mk=useState([]),mkts=_mk[0],setMkts=_mk[1];
  var _lg=useState([]),logs=_lg[0],setLogs=_lg[1];
  var _ao=useState(lsg("kt_ao")==="1"),aon=_ao[0],setAon=_ao[1];
  var _es=useState(lsg("kt_es")==="1"),est=_es[0],setEst=_es[1];
  var _mt=useState(ldM),met=_mt[0],setMet=_mt[1];
  var _tb=useState("markets"),tab=_tb[0],setTab=_tb[1];
  var _ft=useState(false),ftg=_ft[0],setFtg=_ft[1];
  var _fl=useState("all"),flt=_fl[0],setFlt=_fl[1];
  var _tr=useState([]),trades=_tr[0],setTrades=_tr[1];
  var _pd=useState([]),pending=_pd[0],setPending=_pd[1];
  var _xm=useState(null),xpand=_xm[0],setXpand=_xm[1];
  var _cp=useState(true),canaryOk=_cp[0],setCanaryOk=_cp[1];
  var _cl=useState(""),canaryLog=_cl[0],setCanaryLog=_cl[1];
  var _au=useState(false),authed=_au[0],setAuthed=_au[1];
  var cfg={me:0.03,kf:0.25};
  var traded=useRef({}),tmr=useRef(null),settleTimer=useRef(null);

  function maxBet(){return Math.max(0,Math.floor(bal*0.5));}

  var log=useCallback(function(m,t){setLogs(function(p){return[{t:Date.now(),msg:m,type:t||"info"}].concat(p).slice(0,500);});},[]);

  // ---- PASSWORD GATE ----
  function doUnlock(){
    if(pw!==APP_PASSWORD){setErr("Wrong password");return;}
    setErr("");setLd(true);
    setPx(EMBEDDED_PROXY);
    setAuth(EMBEDDED_KEY,EMBEDDED_PEM).then(function(){
      return api("/portfolio/balance");
    }).then(function(b){
      var realBal=b.balance||d2c(b.balance_dollars)||0;
      setAuthed(true);
      setLd(false);
      setScr("mode");
      log("Authenticated. Real balance: "+ct(realBal));
    }).catch(function(e){
      setLd(false);
      // Still allow in - might be CORS or auth issue but we can try
      setAuthed(true);
      setScr("mode");
      log("Auth warning: "+e.message+". Continuing anyway.","warn");
    });
  }

  function goPaper(){setPaper(true);setBal(10000);setScr("dash");log("Paper trading ($100 sim balance)");if(lsg("kt_ao")==="1"){setAon(true);log("Auto-trade resuming");}}
  function goLive(){setPaper(false);setScr("dash");log("LIVE trading","warn");if(lsg("kt_ao")==="1"){setAon(true);log("Auto-trade resuming");}}

  // ---- CANARY VALIDATION ----
  function runCanaryCheck(){
    var canaries=makeCanaries();
    var passed=0;
    for(var i=0;i<canaries.length;i++){
      if(!isSport(canaries[i]))passed++;
    }
    var ok=passed>=CANARY_COUNT;
    setCanaryOk(ok);
    var msg="CANARY CHECK: "+passed+"/"+CANARY_COUNT+" passed";
    setCanaryLog(msg);
    if(!ok){
      log("CANARY FAIL: "+passed+"/"+CANARY_COUNT+" - TRADING PAUSED. Filter is catching non-sport markets!","error");
    }
    return ok;
  }

  // ---- FETCH REAL MARKETS ----
  var doFetch=useCallback(function(){
    setFtg(true);log("Fetching markets from Kalshi API...");

    // Run canary check first
    var cOk=runCanaryCheck();
    if(!cOk){
      setFtg(false);
      return Promise.resolve([]);
    }
    log("CANARY: "+CANARY_COUNT+"/"+CANARY_COUNT+" passed","success");

    return fetchMkts().then(function(res){
      var all=res.markets,sportSkip=res.sportSkip;
      log("API: "+(all.length+sportSkip)+" total, "+sportSkip+" sports filtered, "+all.length+" remaining");

      // Track price movements
      trackPrices(all);

      // Analyze signals
      var cats={},sigTypes={ARB:0,VOL:0,FADE:0,TREND:0},sigCount=0;
      for(var i=0;i<all.length;i++){
        var c=all[i].category||all[i].event_ticker||"unknown";
        if(!cats[c])cats[c]=0;
        cats[c]++;
        all[i].signal=analyze(all[i],cfg);
        if(all[i].signal){
          sigCount++;
          sigTypes[all[i].signal.sig]=(sigTypes[all[i].signal.sig]||0)+1;
        }
      }

      // Sort: signals first by score
      all.sort(function(a,b){
        var sa=a.signal?a.signal.score:0,sb=b.signal?b.signal.score:0;
        return sb-sa;
      });
      setMkts(all);

      log("SCAN: "+all.length+" markets, "+sigCount+" signals");
      var sigParts=[];
      var stk=Object.keys(sigTypes);
      for(var j=0;j<stk.length;j++){if(sigTypes[stk[j]]>0)sigParts.push(stk[j]+":"+sigTypes[stk[j]]);}
      if(sigParts.length>0)log("Signals: "+sigParts.join(", "));

      // Top categories
      var catArr=[];var ck=Object.keys(cats);
      for(var k=0;k<ck.length;k++)catArr.push({c:ck[k],n:cats[ck[k]]});
      catArr.sort(function(a,b){return b.n-a.n;});
      log("Categories: "+catArr.slice(0,8).map(function(x){return x.c+"("+x.n+")";}).join(", "));

      // Top 3 signals
      var topSigs=all.filter(function(m){return m.signal;}).slice(0,3);
      for(var n=0;n<topSigs.length;n++){
        var ts=topSigs[n];
        log("#"+(n+1)+" ["+ts.signal.sig+" sc:"+Math.round(ts.signal.score)+"] "+ts.ticker+" "+ts.signal.label);
      }

      // Track trends with movement
      var movers=[];
      for(var q=0;q<all.length;q++){
        var tr=getTrend(all[q].ticker);
        if(tr.pts>=3&&Math.abs(tr.delta)>=3){
          movers.push(all[q].ticker+" "+tr.dir+" "+tr.delta+"c");
        }
      }
      if(movers.length>0)log("Movers: "+movers.slice(0,5).join(", "));

      setMet(function(p){var n2=cx(p);n2.ev+=all.length;n2.sg+=sigCount;svM(n2);return n2;});
      setFtg(false);return all;
    }).catch(function(e){log("Fetch error: "+e.message,"error");setFtg(false);return[];});
  },[log]);

  useEffect(function(){if(scr==="dash")doFetch();},[scr]);

  // ---- SETTLE PENDING TRADES (paper mode) ----
  useEffect(function(){
    if(settleTimer.current)clearInterval(settleTimer.current);
    settleTimer.current=setInterval(function(){
      var now=Date.now();
      setPending(function(prev){
        var stillPending=[],settled=[];
        for(var i=0;i<prev.length;i++){
          var p=prev[i];
          if(now-p.placedAt>=PAPER_SETTLE_MS){
            settled.push(p);
          }else{
            stillPending.push(p);
          }
        }
        // Settle each
        for(var j=0;j<settled.length;j++){
          (function(p){
            // Use edge realization rates
            var er={ARB:1.0,VOL:0.55,FADE:0.25,TREND:0.40};
            var realized=p.edge*(er[p.sig]||0.5);
            var noise=(Math.random()-0.5)*0.06;
            var trueProb=Math.min(0.97,Math.max(0.03,(p.prob||0.5)+realized+noise));
            var won=Math.random()<trueProb;

            setMet(function(prev2){
              var n=cx(prev2);
              if(!n.by[p.sig])n.by[p.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
              if(won){
                var win=Math.round(p.contracts*(100-p.price)*(1-FEE));
                n.w++;n.by[p.sig].w++;n.ea+=win;n.by[p.sig].e+=win;
                n.fe+=Math.round(p.contracts*(100-p.price)*FEE);
                setBal(function(b){return b+win;});
                setTrades(function(t){return[{t:Date.now(),tk:p.ticker,tl:p.title,sig:p.sig,side:p.side,ct:p.contracts,pr:p.price,won:true,pnl:win,settled:true}].concat(t).slice(0,50);});
                log("["+p.sig+"] SETTLED WIN "+p.ticker+" +"+ct(win)+" ("+p.contracts+"x "+p.side+" @"+p.price+"c) after "+Math.round((Date.now()-p.placedAt)/1000)+"s","success");
              }else{
                var loss=p.cost;
                n.l++;n.by[p.sig].l++;n.ea-=loss;n.by[p.sig].e-=loss;
                setBal(function(b){return b-loss;});
                setTrades(function(t){return[{t:Date.now(),tk:p.ticker,tl:p.title,sig:p.sig,side:p.side,ct:p.contracts,pr:p.price,won:false,pnl:-loss,settled:true}].concat(t).slice(0,50);});
                log("["+p.sig+"] SETTLED LOSS "+p.ticker+" -"+ct(loss)+" ("+p.contracts+"x "+p.side+" @"+p.price+"c) after "+Math.round((Date.now()-p.placedAt)/1000)+"s","error");
              }
              svM(n);return n;
            });
          })(settled[j]);
        }
        return stillPending;
      });
    },10000);// check every 10s
    return function(){if(settleTimer.current)clearInterval(settleTimer.current);};
  },[log]);

  // ---- TRADE ----
  function doTrade(m){
    if(!m.signal||est||!canaryOk)return;
    if(m._canary)return;// never trade canaries
    if(traded.current[m.ticker])return;
    var s=m.signal;
    var mb=maxBet();
    if(mb<=0){log("No balance available","warn");return;}
    var sz=kelly(s.prob,s.price,cfg.kf,mb);
    if(sz<=0){log("Kelly size too small for "+m.ticker,"warn");return;}
    var ct2=Math.max(1,Math.floor(sz/s.price)),cost=ct2*s.price;
    if(cost>mb){ct2=Math.max(1,Math.floor(mb/s.price));cost=ct2*s.price;}

    // Cap contracts to avoid insane bets
    if(ct2>50){ct2=50;cost=ct2*s.price;}

    traded.current[m.ticker]=true;

    if(paper){
      // Check fill rate
      var fr={ARB:0.95,VOL:0.78,FADE:0.70,TREND:0.75};
      if(Math.random()>(fr[s.sig]||0.7)){
        log("["+s.sig+"] "+m.ticker+" no fill","warn");
        return;
      }

      // Add to pending - don't settle immediately
      setMet(function(p){
        var n=cx(p);n.at++;n.fl++;
        if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
        n.by[s.sig].a++;n.by[s.sig].f++;
        n.pl+=cost;n.lv+=cost;n.by[s.sig].p+=cost;
        svM(n);return n;
      });

      setPending(function(p){return p.concat([{
        ticker:m.ticker,title:m.title,sig:s.sig,side:s.side,
        contracts:ct2,price:s.price,cost:cost,
        edge:s.edge,prob:s.prob,
        placedAt:Date.now()
      }]);});

      log("["+s.sig+"] PENDING "+m.ticker+" "+ct2+"x "+s.side+" @"+s.price+"c (settles in "+Math.round(PAPER_SETTLE_MS/1000)+"s)","warn");
    }else{
      // LIVE ORDER
      api("/orders","POST",{
        ticker:m.ticker,action:"buy",side:s.side,count_fp:ct2+".00",type:"limit",
        yes_price_dollars:(s.side==="yes"?s.price/100:(100-s.price)/100).toFixed(2),
        time_in_force:"ioc"
      }).then(function(){
        log("[LIVE "+s.sig+"] "+ct2+"x "+s.side+" @"+s.price+"c "+m.ticker,"success");
      }).catch(function(e){
        traded.current[m.ticker]=false;
        log("[LIVE] Order failed "+m.ticker+": "+e.message,"error");
      });
    }
  }

  // ---- AUTO-TRADE LOOP ----
  useEffect(function(){
    if(tmr.current){clearInterval(tmr.current);tmr.current=null;}
    if(!aon||est||scr!=="dash")return;
    var run=function(){
      doFetch().then(function(fresh){
        if(!canaryOk){log("Auto: PAUSED - canary check failed","error");return;}
        var sg=fresh.filter(function(m){return m.signal&&!traded.current[m.ticker]&&!m._canary;});
        if(sg.length>0){
          log("Auto: "+sg.length+" signals. Top: "+sg[0].ticker+" ["+sg[0].signal.sig+"]");
        }else{
          log("Auto: scanning... no new signals");
        }
        var limit=Math.min(sg.length,3);// max 3 per cycle
        for(var i=0;i<limit;i++){
          if(maxBet()<=0){log("Auto: balance cap","warn");break;}
          doTrade(sg[i]);
        }
      });
    };
    run();
    tmr.current=setInterval(run,90000);
    return function(){if(tmr.current)clearInterval(tmr.current);};
  },[aon,est,scr,canaryOk]);

  function togStop(){
    var next=!est;setEst(next);lss("kt_es",next?"1":"0");
    if(next){setAon(false);lss("kt_ao","0");log("EMERGENCY STOP","error");}
    else log("E-stop released");
  }

  // ---- COMPUTED VALUES ----
  var wr=met.fl>0?met.w/met.fl:0;
  var pnl=met.ea/100;
  var roi=met.pl>0?(met.ea/met.pl*100).toFixed(1):"0.0";
  var md=paper?"PAPER":"LIVE";
  var mc=paper?"#00ff88":"#ff3b30";
  var pnlC=pnl>=0?"#00ff88":"#ff6b6b";

  // ============================================================
  // RENDER
  // ============================================================

  // PASSWORD SCREEN
  if(scr==="password")return R("div",{style:P.pg},R("div",{style:P.cd},
    R("div",{style:{fontSize:22,fontWeight:900,color:"#00ff88",marginBottom:4}},"KAUTO"),
    R("div",{style:{fontSize:12,color:"#666",marginBottom:16}},"Kalshi Auto-Trader v2"),
    R("input",{style:cx(P.inp,{textAlign:"center"}),type:"password",placeholder:"Password",value:pw,
      onChange:function(e){setPw(e.target.value);},
      onKeyDown:function(e){if(e.key==="Enter")doUnlock();}}),
    err?R("div",{style:{color:"#ff6b6b",fontSize:12,marginTop:4}},err):null,
    R("button",{style:cx(P.btn,P.bg),onClick:doUnlock,disabled:ld},ld?"Connecting...":"Unlock")));

  // MODE SELECT
  if(scr==="mode")return R("div",{style:P.pg},R("div",{style:P.cd},
    R("div",{style:{fontSize:18,fontWeight:900,color:"#00ff88",marginBottom:16}},"Connected"),
    R("button",{style:cx(P.btn,{background:"#0a1a0f",border:"2px solid #00ff8844",textAlign:"left",padding:16}),onClick:goPaper},
      R("div",{style:{fontWeight:800,color:"#00ff88"}},"Paper Trade"),
      R("div",{style:{fontSize:11,color:"#888",marginTop:4}},"Real markets, simulated orders, pending settlement")),
    R("button",{style:cx(P.btn,{background:"#1a0a0a",border:"2px solid #ff3b3044",textAlign:"left",padding:16,marginTop:10}),onClick:goLive},
      R("div",{style:{fontWeight:800,color:"#ff3b30"}},"Go Live"),
      R("div",{style:{fontSize:11,color:"#888",marginTop:4}},"Real money - use caution"))));

  // ============================================================
  // DASHBOARD
  // ============================================================
  var shown=flt==="signals"?mkts.filter(function(m){return m.signal;}):mkts;

  return R("div",{style:P.sh},
    // Header
    R("div",{style:P.hd},
      R("div",{style:{display:"flex",alignItems:"center",gap:8}},
        R("span",{style:{fontWeight:900,fontSize:16,color:"#00ff88"}},"K"),
        R("span",{style:{fontWeight:800,fontSize:13,color:"#ddd"}},"AUTO"),
        R("span",{style:{background:mc+"22",color:mc,border:"1px solid "+mc+"44",padding:"2px 8px",borderRadius:6,fontSize:10,fontWeight:800}},md),
        pending.length>0?R("span",{style:{fontSize:10,color:"#f0a030",background:"#2a1a0a",padding:"2px 6px",borderRadius:4}},pending.length+" pending"):null,
        !canaryOk?R("span",{style:{fontSize:10,color:"#ff3b30",background:"#2a0a0a",padding:"2px 6px",borderRadius:4}},"CANARY FAIL"):null),
      R("div",{style:{display:"flex",alignItems:"center",gap:10}},
        R("span",{style:{fontSize:13,color:"#ccc",fontFamily:"monospace"}},ct(bal)),
        R("button",{style:{background:est?"#444":"#ff3b30",color:"#fff",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:800,cursor:"pointer"},onClick:togStop},est?"RESUME":"STOP"))),

    // Financial bar
    R("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:1,background:"#1a2230",borderBottom:"1px solid #1a2230"}},
      R("div",{style:P.st},R("div",{style:P.sl},"LEVERAGED"),R("div",{style:P.sv},ct(met.lv||0))),
      R("div",{style:P.st},R("div",{style:P.sl},"P&L"),R("div",{style:cx(P.sv,{color:pnlC})},(pnl>=0?"+":"")+pnl.toFixed(2))),
      R("div",{style:P.st},R("div",{style:P.sl},"ROI"),R("div",{style:cx(P.sv,{color:pnlC})},roi+"%")),
      R("div",{style:P.st},R("div",{style:P.sl},"WIN RATE"),R("div",{style:P.sv},pc(met.w,met.fl)))),

    // Tabs
    R("div",{style:{display:"flex",borderBottom:"1px solid #1a2230",background:"#0a0e14"}},
      ["markets","log","metrics"].map(function(t){
        return R("button",{key:t,style:{flex:1,background:"none",border:"none",
          borderBottom:tab===t?"2px solid #00ff88":"2px solid transparent",
          color:tab===t?"#fff":"#666",padding:"10px 0",fontSize:13,fontWeight:600,cursor:"pointer"},
          onClick:function(){setTab(t);}},
          t.charAt(0).toUpperCase()+t.slice(1)+(t==="markets"?" ("+shown.length+")":""));})),

    // Body
    R("div",{style:{flex:1,padding:12,overflowY:"auto"}},

      // MARKETS TAB
      tab==="markets"?R("div",null,
        // Controls
        R("div",{style:{display:"flex",gap:8,marginBottom:10}},
          R("button",{style:cx(P.btn,{flex:"1",fontSize:12},P.bg),onClick:doFetch,disabled:ftg},ftg?"Loading...":"Refresh"),
          R("button",{style:cx(P.btn,{flex:"1",fontSize:12,background:aon?"#0a1a0f":"#1a1a2e",color:aon?"#00ff88":"#888",
            border:"1px solid "+(aon?"#00ff8844":"#333")}),
            onClick:function(){var n=!aon;setAon(n);lss("kt_ao",n?"1":"0");if(n)log("Auto-trade ON");else log("Auto-trade OFF");}},
            "Auto: "+(aon?"ON":"OFF")),
          R("button",{style:cx(P.btn,{width:"70px",fontSize:11,background:flt==="signals"?"#1a2a1a":"#1a1a2e",color:flt==="signals"?"#00ff88":"#888"}),
            onClick:function(){setFlt(flt==="all"?"signals":"all");}},flt==="all"?"All":"Sigs")),

        // Pending trades
        pending.length>0?R("div",{style:{marginBottom:12}},
          R("div",{style:{fontSize:12,fontWeight:800,color:"#f0a030",marginBottom:6}},"Pending Settlement ("+pending.length+")"),
          pending.map(function(p,i){
            var elapsed=Math.round((Date.now()-p.placedAt)/1000);
            var remaining=Math.max(0,Math.round((PAPER_SETTLE_MS-(Date.now()-p.placedAt))/1000));
            return R("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",marginBottom:3,background:"#0a0f14",border:"1px solid #2a1a0a",borderLeft:"3px solid #f0a030",borderRadius:8,fontSize:11}},
              R("div",null,
                R("span",{style:{color:"#f0a030",fontWeight:700,marginRight:6}},"PENDING"),
                R("span",{style:{color:"#aaa"}},p.ticker),
                R("span",{style:{color:"#555",marginLeft:6}},p.contracts+"x "+p.side+" @"+p.price+"c")),
              R("span",{style:{color:"#f0a030",fontSize:10}},remaining+"s left"));
          })
        ):null,

        // Settled trades
        trades.length>0?R("div",{style:{marginBottom:12}},
          R("div",{style:{fontSize:12,fontWeight:800,color:"#00ff88",marginBottom:6}},"Settled Trades"),
          trades.slice(0,8).map(function(tr,i){var c=tr.won?"#00ff88":"#ff6b6b";
            return R("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",marginBottom:3,background:"#0a0f14",border:"1px solid #1a2230",borderLeft:"3px solid "+c,borderRadius:8,fontSize:11}},
              R("div",null,
                R("span",{style:{color:c,fontWeight:700,marginRight:6}},tr.won?"WIN":"LOSS"),
                R("span",{style:{color:"#aaa"}},tr.tk),
                R("span",{style:{color:"#555",marginLeft:6}},tr.ct+"x "+tr.side+" @"+tr.pr+"c")),
              R("span",{style:{color:c,fontWeight:700,fontFamily:"monospace"}},(tr.pnl>=0?"+":"")+ct(tr.pnl)));})
        ):null,

        // Market list
        shown.length===0?R("div",{style:{color:"#555",textAlign:"center",padding:40}},ftg?"Loading...":"No markets. Hit Refresh."):null,
        shown.slice(0,200).map(function(m){
          var s=m.signal;
          var sc=s?(s.sig==="ARB"?"#00ff88":s.sig==="VOL"?"#4488ff":s.sig==="TREND"?"#dd88ff":"#ff8844"):"#1a2230";
          var isExpanded=xpand===m.ticker;
          var mid=Math.round((m.yes_bid+m.yes_ask)/2);
          var spread=m.yes_ask-m.yes_bid;
          var sum=m.yes_bid+m.no_bid;
          var trend=getTrend(m.ticker);

          return R("div",{key:m.ticker,style:{background:"#0a0f14",border:"1px solid #1a2230",borderLeft:"3px solid "+sc,borderRadius:10,padding:12,marginBottom:6,cursor:"pointer"},
            onClick:function(){setXpand(isExpanded?null:m.ticker);}},

            R("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
              R("div",{style:{fontSize:13,fontWeight:600,color:"#e0e0e0",flex:1,lineHeight:1.3}},m.title),
              trend.pts>=2?R("span",{style:{fontSize:10,color:trend.dir==="up"?"#00ff88":trend.dir==="down"?"#ff6b6b":"#555",whiteSpace:"nowrap",marginLeft:8}},
                (trend.dir==="up"?"^":trend.dir==="down"?"v":"=")+trend.delta+"c"):null),

            R("div",{style:{display:"flex",gap:8,fontSize:11,color:"#777",flexWrap:"wrap",alignItems:"center"}},
              R("span",{style:{color:"#4488ff"}},"Y "+m.yes_bid+"/"+m.yes_ask),
              R("span",{style:{color:"#ff8844"}},"N "+m.no_bid),
              R("span",null,"Mid:"+mid),
              R("span",null,"Sp:"+spread),
              m.volume>0?R("span",null,"Vol:"+(m.volume>=1e3?(m.volume/1e3).toFixed(0)+"k":Math.round(m.volume))):null,
              m.category?R("span",{style:{color:"#555",fontSize:10}},m.category):null),

            s?R("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}},
              R("div",null,
                R("span",{style:{background:sc+"22",color:sc,border:"1px solid "+sc+"44",padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:800,marginRight:6}},s.sig),
                R("span",{style:{fontSize:11,color:"#bbb"}},s.label),
                R("span",{style:{fontSize:10,color:"#666",marginLeft:6}},"edge:"+Math.round(s.edge*100)+"%")),
              R("button",{style:{background:"#00ff8818",color:"#00ff88",border:"1px solid #00ff8833",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer"},
                onClick:function(ev){ev.stopPropagation();doTrade(m);}},"Trade")):null,

            isExpanded?R("div",{style:{marginTop:8,padding:8,background:"#080c12",borderRadius:6,fontSize:11,color:"#999",lineHeight:1.6}},
              R("div",null,R("span",{style:{color:"#666"}},"Ticker: "),R("span",{style:{color:"#ccc",fontFamily:"monospace"}},m.ticker)),
              R("div",null,R("span",{style:{color:"#666"}},"Event: "),R("span",{style:{color:"#ccc"}},m.event_ticker)),
              m.category?R("div",null,R("span",{style:{color:"#666"}},"Category: "),R("span",{style:{color:"#ccc"}},m.category)):null,
              R("div",null,R("span",{style:{color:"#666"}},"YES Bid/Ask: "),R("span",{style:{color:"#4488ff"}},m.yes_bid+"c / "+m.yes_ask+"c")),
              R("div",null,R("span",{style:{color:"#666"}},"NO Bid: "),R("span",{style:{color:"#ff8844"}},m.no_bid+"c")),
              R("div",null,R("span",{style:{color:"#666"}},"Spread: "),R("span",{style:{color:"#ccc"}},spread+"c")),
              R("div",null,R("span",{style:{color:"#666"}},"Y+N sum: "),R("span",{style:{color:sum<=93?"#00ff88":"#ccc"}},sum+(sum<=93?" (ARB)":""))),
              R("div",null,R("span",{style:{color:"#666"}},"Volume: "),R("span",{style:{color:"#ccc"}},Math.round(m.volume).toLocaleString())),
              trend.pts>=2?R("div",null,R("span",{style:{color:"#666"}},"Trend: "),R("span",{style:{color:trend.dir==="up"?"#00ff88":trend.dir==="down"?"#ff6b6b":"#ccc"}},trend.dir+" "+trend.delta+"c over "+trend.pts+" snapshots")):null,
              s?R("div",{style:{marginTop:6,padding:6,background:"#0a1a0f",borderRadius:4,border:"1px solid "+sc+"33"}},
                R("div",{style:{color:sc,fontWeight:700,marginBottom:2}},"Signal: "+s.sig+" (score "+Math.round(s.score)+")"),
                R("div",{style:{color:"#bbb"}},"Side: BUY "+s.side.toUpperCase()+" @ "+s.price+"c"),
                R("div",{style:{color:"#bbb"}},"Edge: "+Math.round(s.edge*100)+"% | Prob: "+Math.round(s.prob*100)+"%"),
                s.reason?R("div",{style:{color:"#888",marginTop:4,fontStyle:"italic"}},s.reason):null
              ):R("div",{style:{marginTop:4,color:"#555"}},"No signal: "+
                (mid>=8&&mid<=92?"mid-range ("+mid+"%), no extreme/momentum":
                 spread>12?"spread too wide ("+spread+"c)":
                 "no strategy match"))
            ):null
          );
        })
      ):null,

      // LOG TAB
      tab==="log"?R("div",null,
        logs.length===0?R("div",{style:{color:"#555",textAlign:"center",padding:40}},"No logs yet"):null,
        logs.map(function(l,i){
          var c=l.type==="error"?"#ff6b6b":l.type==="success"?"#00ff88":l.type==="warn"?"#f0a030":"#888";
          return R("div",{key:i,style:{fontSize:11,color:c,padding:"4px 0",borderBottom:"1px solid #111",fontFamily:"monospace",wordBreak:"break-all"}},
            R("span",{style:{color:"#444",marginRight:6}},new Date(l.t).toLocaleTimeString()),l.msg);})
      ):null,

      // METRICS TAB
      tab==="metrics"?(function(){return R("div",null,
        R("div",{style:cx(P.mc,{borderColor:canaryOk?"#00ff8833":"#ff3b3033"})},R("div",{style:P.mt},"System Health"),
          mr("Canary Check",canaryOk?CANARY_COUNT+"/"+CANARY_COUNT+" PASS":"FAIL - TRADING PAUSED"),
          mr("Pending Trades",""+pending.length),
          mr("Price Histories",Object.keys(priceHistory).length+" markets tracked"),
          mr("Mode",paper?"Paper":"LIVE")),
        R("div",{style:P.mc},R("div",{style:P.mt},"Financial"),
          mr("Balance",ct(bal)),mr("Max Bet (50%)",ct(maxBet())),mr("Total Leveraged",ct(met.lv||0)),
          mr("Total P&L",(pnl>=0?"+":"")+"$"+pnl.toFixed(2)),mr("Fees Paid",ct(met.fe||0)),mr("ROI",roi+"%")),
        R("div",{style:P.mc},R("div",{style:P.mt},"Performance"),
          mr("Evaluated",""+met.ev),mr("Signals",""+met.sg),mr("Attempted",""+met.at),mr("Filled",""+met.fl),
          mr("Fill Rate",pc(met.fl,met.at)),mr("Wins / Losses",met.w+" / "+met.l),mr("Win Rate",pc(met.w,met.fl))),
        Object.keys(met.by||{}).length>0?R("div",{style:P.mc},R("div",{style:P.mt},"By Strategy"),
          Object.keys(met.by).map(function(k){var b=met.by[k];if(!b||!b.a)return null;
            return R("div",{key:k,style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid #1a2230"}},
              R("div",{style:{fontWeight:700,color:"#aaa",fontSize:12,marginBottom:4}},k),
              mr("Filled",b.f+"/"+b.a),mr("W/L",b.w+"/"+b.l),mr("P&L","$"+((b.e||0)/100).toFixed(2)));})):null,
        R("button",{style:cx(P.btn,{marginTop:16,background:"#1a1a2e",color:"#666",fontSize:11}),
          onClick:function(){var m=freshM();setMet(m);svM(m);traded.current={};setTrades([]);setPending([]);setBal(10000);log("Paper account reset to $100");}},"Reset Paper Account")
      );})():null
    )
  );
}

var P={
  pg:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#06080b"},
  cd:{background:"#0d1117",border:"1px solid #1a2230",borderRadius:16,padding:24,width:"100%",maxWidth:420,display:"flex",flexDirection:"column",gap:"12px"},
  sh:{minHeight:"100vh",background:"#06080b",display:"flex",flexDirection:"column"},
  hd:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid #1a2230",background:"#0a0e14"},
  st:{background:"#0a0e14",padding:"8px 6px",textAlign:"center"},
  sl:{fontSize:9,color:"#666",letterSpacing:"0.5px",textTransform:"uppercase"},
  sv:{fontSize:13,fontWeight:700,color:"#ccc",fontFamily:"monospace",marginTop:2},
  inp:{background:"#0a0f14",border:"1px solid #1a2230",borderRadius:10,padding:"10px 14px",color:"#e0e0e0",fontSize:13,width:"100%",outline:"none",display:"block"},
  btn:{border:"none",borderRadius:10,padding:"10px 16px",fontSize:14,fontWeight:700,cursor:"pointer",color:"#e0e0e0",background:"#1a2230",display:"block",width:"100%",textAlign:"center"},
  bg:{background:"#00ff8822",color:"#00ff88",border:"1px solid #00ff8844"},
  mc:{background:"#0a0f14",border:"1px solid #1a2230",borderRadius:10,padding:14,marginBottom:10},
  mt:{fontWeight:800,color:"#00ff88",marginBottom:8,fontSize:13}
};

ReactDOM.createRoot(document.getElementById("root")).render(R(App,null));
</script>
