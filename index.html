// ============================================================
// RSA-PSS AUTH (proven working - do not change)
// ============================================================
function _b64(b){var r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
function _al(n){if(n<128)return[n];if(n<256)return[129,n];if(n<65536)return[130,(n>>8)&255,n&255];return[131,(n>>16)&255,(n>>8)&255,n&255];}
function importKey(pem){
  var t=pem.trim(),p1=t.indexOf("BEGIN RSA PRIVATE KEY")>=0,b,d;
  if(p1){b=t.replace(/-----BEGIN RSA PRIVATE KEY-----/,"").replace(/-----END RSA PRIVATE KEY-----/,"").replace(/\s/g,"");
    d=_b64(b);var o=[48,13,6,9,42,134,72,134,247,13,1,1,1,5,0],oc=[4].concat(_al(d.length)),il=o.length+oc.length+d.length,
    oh=[48].concat(_al(2+1+il)),h=oh.concat([2,1,0]).concat(o).concat(oc),pk=new Uint8Array(h.length+d.length);pk.set(h);pk.set(d,h.length);
    return crypto.subtle.importKey("pkcs8",pk,{name:"RSA-PSS",hash:"SHA-256"},false,["sign"]);
  }b=t.replace(/-----BEGIN PRIVATE KEY-----/,"").replace(/-----END PRIVATE KEY-----/,"").replace(/\s/g,"");
  return crypto.subtle.importKey("pkcs8",_b64(b),{name:"RSA-PSS",hash:"SHA-256"},false,["sign"]);
}
function sign(key,kid,meth,path){
  var ts=""+Math.floor(Date.now()/1000),msg=new TextEncoder().encode(ts+meth+path.split("?")[0]);
  return crypto.subtle.sign({name:"RSA-PSS",saltLength:32},key,msg).then(function(s){
    var a=new Uint8Array(s),r="";for(var i=0;i<a.length;i++)r+=String.fromCharCode(a[i]);
    return{"KALSHI-ACCESS-KEY":kid,"KALSHI-ACCESS-TIMESTAMP":ts,"KALSHI-ACCESS-SIGNATURE":btoa(r)};});
}

// ============================================================
// KALSHI API (proven working - do not change)
// ============================================================
var KB="https://api.elections.kalshi.com/trade-api/v2",_px="",_kid="",_ck=null;
function setPx(u){_px=u.replace(/\/+$/,"");}
function setAuth(kid,pem){_kid=kid.trim();return importKey(pem).then(function(k){_ck=k;});}
function api(path,meth,body){
  meth=meth||"GET";var base=_px||KB;
  return sign(_ck,_kid,meth,"/trade-api/v2"+path).then(function(ah){
    var h={"Content-Type":"application/json"};var ks=Object.keys(ah);for(var i=0;i<ks.length;i++)h[ks[i]]=ah[ks[i]];
    var o={method:meth,headers:h};if(!_px)o.mode="cors";if(body)o.body=JSON.stringify(body);return fetch(base+path,o);
  }).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error("HTTP "+r.status+": "+t.slice(0,200));});return r.json();});
}

// ============================================================
// SPORTS FILTER v6 - Series-prefix approach (cheat sheet Section 5)
// Extract the series ticker (everything before the first hyphen)
// and test against known sports series prefixes.
// ============================================================
function getSeriesTicker(ticker){
  if(!ticker)return "";
  var idx=ticker.indexOf("-");
  return idx>=0?ticker.slice(0,idx):ticker;
}

// Three-layer sports filter:
// Layer 1: KX + sport keyword (catches KXMLBHRR, KXNHLGOAL, KXNBAMENTION, KXITFWMATCH, KXUCLGAME, etc.)
// Layer 2: KXMVE + sport keyword (catches KXMVENBASINGLEGAME, KXMVESPORTSMULTIGAMEEXTENDED, etc.)
// Layer 3: Bare sport league names with exact boundary (NFL, NBA, MLBGAME, etc.)
//
// Safe non-sport KX prefixes: KXFED, KXCPI, KXSPY, KXBTC, KXHIGHTEMP, KXRECSSN, etc.

var BARE_SPORTS_RE=/^(NFL|NFLGAME|NFLSEASON|NBA|NBAGAME|NBASEASON|WNBA|WNBAGAME|NCAAB|NCAAF|NCAAW|NCAAM|NCAABGAME|MLB|MLBGAME|MLBSEASON|NHL|NHLGAME|EPL|EPLGAME|MLS|MLSGAME|UCL|UCLGAME|LALIGA|SERIEA|BUNDESLIGA|LIGUE1|WORLDCUP|EUROCUP|PGA|PGAGAME|LPGA|ATP|WTA|GRANDSLAM|UFC|UFCGAME|MMA|MMAGAME|NASCAR|NASCARGAME|F1|F1RACE|ESPORT|ESPORTS|BOXING|CRICKET|RUGBY|CFB|XFL|USFL|PARLAY)($|-)/;

// KX + sport keyword (no boundary needed - these are always followed by more letters)
// Matches: KXMLBHRR, KXNHLGOAL, KXNBAMENTION, KXITFWMATCH, KXUCLGAME, KXEPLGAME, etc.
// Does NOT match: KXFED, KXCPI, KXSPY, KXBTC, KXHIGHTEMP, KXRECSSN, KXCREDITRATING, etc.
var KX_SPORT_RE=/^KX(MLB|NBA|NHL|NFL|WNBA|NCAA|EPL|MLS|UCL|UFC|MMA|PGA|LPGA|ATP|WTA|NASCAR|F1|ITF|BOXING|CRICKET|RUGBY|SOCCER|TENNIS|ESPORT|LALIGA|SERIEA|BUNDESLIGA|LIGUE1|WORLDCUP|EUROCUP|GRANDSLAM|XFL|USFL|CFB)/;

// KXMVE + sport keyword (Kalshi multi-variable events for sports)
// Matches: KXMVESPORTSMULTIGAMEEXTENDED, KXMVENBASINGLEGAME, KXMVECROSSCATEGORY, etc.
// Does NOT match: KXMVEECON, KXMVECRYPTO, KXMVEPOLITICS, KXMVEWEATHER, etc.
var KXMVE_SPORT_RE=/^KXMVE(SPORT|CROSSCATEGORY|PARLAY|NBA|NFL|MLB|NHL|WNBA|NCAA|MLS|EPL|UCL|UFC|MMA|PGA|LPGA|ATP|WTA|NASCAR|F1|BOXING|CRICKET|RUGBY|SOCCER|TENNIS|ESPORT|BASEBALL|BASKETBALL|FOOTBALL|HOCKEY)/;

function isSport(m){
  var series=getSeriesTicker(m.ticker||"");
  var evSeries=getSeriesTicker(m.event_ticker||"");
  // Layer 1: KX + sport keyword
  if(KX_SPORT_RE.test(series)||KX_SPORT_RE.test(evSeries))return true;
  // Layer 2: KXMVE + sport keyword
  if(KXMVE_SPORT_RE.test(series)||KXMVE_SPORT_RE.test(evSeries))return true;
  // Layer 3: Bare sport league exact match
  return BARE_SPORTS_RE.test(series)||BARE_SPORTS_RE.test(evSeries);
}

// Debug version: returns which rule matched (for log paste diagnostics)
function isSportDebug(m){
  var series=getSeriesTicker(m.ticker||"");
  var evSeries=getSeriesTicker(m.event_ticker||"");
  var km=series.match(KX_SPORT_RE);
  if(km)return"kx-sport:"+km[1]+"->"+series;
  var kme=evSeries.match(KX_SPORT_RE);
  if(kme)return"kx-sport:"+kme[1]+"->"+evSeries;
  var vm=series.match(KXMVE_SPORT_RE);
  if(vm)return"kxmve-sport:"+vm[1]+"->"+series;
  var vme=evSeries.match(KXMVE_SPORT_RE);
  if(vme)return"kxmve-sport:"+vme[1]+"->"+evSeries;
  if(BARE_SPORTS_RE.test(series))return"bare-series:"+series;
  if(BARE_SPORTS_RE.test(evSeries))return"bare-event:"+evSeries;
  return null;
}

// Build a lookup set of canary tickers for fast checks
function canaryTickerSet(){
  var c=canaries(),s={};
  for(var i=0;i<c.length;i++)s[c[i].ticker]=true;
  return s;
}

// Canary validation: ensure non-sport canaries aren't misclassified by ticker detection
function validateCanaries(logFn){
  var all=canaries(),passed=0,failed=[];
  for(var i=0;i<all.length;i++){
    var serTk=getSeriesTicker(all[i].ticker);
    if(!detectSportByTicker(serTk)){
      passed++;
    }else{
      failed.push(all[i].ticker+" (ticker "+serTk+" flagged as sport)");
    }
  }
  if(logFn){
    logFn("CANARY: "+passed+"/"+all.length+" passed");
    if(failed.length>0){
      logFn("CANARY FAILURES: "+failed.join(", "),"error");
    }
  }
  return{passed:passed,total:all.length,failed:failed};
}

// ============================================================
// MARKET FETCHING - Hybrid approach (FAST)
// Step 1: GET /series (1 call) -> build set of allowed series tickers
// Step 2: Bulk paginated GET /markets?status=open&limit=1000 -> filter in-flight
// Sports is now a toggleable category, not hard-excluded.
// ============================================================

// Detect sport series by ticker (used when series has no category from API)
function detectSportByTicker(tk){
  if(KX_SPORT_RE.test(tk)||KXMVE_SPORT_RE.test(tk)||BARE_SPORTS_RE.test(tk))return true;
  return false;
}

function fetchMkts(logFn,catFilter){
  var allowedCats={};
  if(catFilter){
    var parts=catFilter.split(",");
    for(var ci=0;ci<parts.length;ci++){var ct2=parts[ci].trim();if(ct2)allowedCats[ct2]=true;}
  }
  var hasCatFilter=Object.keys(allowedCats).length>0;

  logFn("Fetching series catalog...");
  return api("/series").then(function(d){
    var seriesList=d.series||[];
    logFn("Series catalog: "+seriesList.length+" series found");
    var allowedSeries={},skippedCount=0,catMap={};
    for(var i=0;i<seriesList.length;i++){
      var s=seriesList[i];
      var cat=s.category||"";
      var tk=s.ticker||"";
      // If no category from API, detect by ticker
      if(!cat&&detectSportByTicker(tk))cat="Sports";
      if(!cat)cat="uncategorized";
      if(!catMap[cat])catMap[cat]=0;
      catMap[cat]++;
      // Apply category filter
      if(hasCatFilter&&!allowedCats[cat]){skippedCount++;continue;}
      allowedSeries[tk]=cat;
    }
    var allowedCount=Object.keys(allowedSeries).length;
    logFn("Series filter: "+allowedCount+" allowed, "+skippedCount+" filtered out");

    var cmArr=[];var cmk=Object.keys(catMap);
    for(var ci2=0;ci2<cmk.length;ci2++)cmArr.push({c:cmk[ci2],n:catMap[cmk[ci2]]});
    cmArr.sort(function(a,b){return b.n-a.n;});
    logFn("Series categories: "+cmArr.slice(0,12).map(function(x){return x.c+"("+x.n+")";}).join(", "));

    return{allowedSeries:allowedSeries,skippedCount:skippedCount,
      totalSeries:seriesList.length,allowedCount:allowedCount,catMap:catMap};
  }).catch(function(e){
    logFn("Series fetch failed ("+e.message+"), fetching unfiltered","warn");
    return{allowedSeries:null,skippedCount:0,totalSeries:0,allowedCount:0,catMap:{}};
  }).then(function(info){
    var all=[],cur="",pg=0,filterSkip=0;
    var as=info.allowedSeries;
    function go(){
      var qs="status=open&limit=1000";
      if(cur)qs+="&cursor="+encodeURIComponent(cur);
      return api("/markets?"+qs).then(function(d){
        var mk=d.markets||[];
        for(var i=0;i<mk.length;i++){
          var m=mk[i];
          if(as){
            var serTk=getSeriesTicker(m.ticker||"");
            if(!as[serTk]){filterSkip++;continue;}
          }
          all.push(norm(m));
        }
        cur=d.cursor||"";pg++;
        if(pg%20===0)logFn("Page "+pg+"... "+all.length+" markets");
        if(cur&&mk.length>0&&pg<200)return go();
        return{markets:all,filterSkip:filterSkip,pages:pg,
          skippedCount:info.skippedCount,totalSeries:info.totalSeries,
          allowedCount:info.allowedCount,catMap:info.catMap};
      });
    }
    logFn("Scanning all open markets...");
    return go();
  });
}

var _wxCache={};// {cityCode: {ts:timestamp, highs:[],lows:[],dates:[]}}

function parseWeatherTicker(ticker){
  // Two formats:
  // 1) KXHIGHTEMP-CHI-26APR15 (series=KXHIGHTEMP, city in segment 2)
  // 2) KXHIGHAUS-26APR15-B85.5 (series=KXHIGHAUS, city embedded after KXHIGH)
  // 3) KXLOWTCHI-26APR15-B61.5 (series=KXLOWTCHI, city embedded after KXLOWT)
  var parts=ticker.split("-");
  var series=parts[0];
  var isHigh=false,isLow=false,city=null,dateIdx=0;

  if(/^KXHIGHTEMP$/i.test(series)){
    isHigh=true;city=parts[1]||"";dateIdx=2;
  }else if(/^KXLOWTEMP$/i.test(series)){
    isLow=true;city=parts[1]||"";dateIdx=2;
  }else if(/^KXHIGH/i.test(series)){
    isHigh=true;city=series.replace(/^KXHIGH/i,"");dateIdx=1;
  }else if(/^KXLOWT/i.test(series)){
    isLow=true;city=series.replace(/^KXLOWT/i,"");dateIdx=1;
  }else{return null;}

  if(!city||!WEATHER_CITIES[city])return null;
  if(!parts[dateIdx])return null;
  var dateStr=parts[dateIdx];
  var yrMatch=dateStr.match(/^(\d{2})([A-Z]{3})(\d{1,2})$/);
  if(!yrMatch)return null;
  var months={JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  var mon=months[yrMatch[2]];
  if(mon==null)return null;
  var dt=new Date(2000+parseInt(yrMatch[1]),mon,parseInt(yrMatch[3]));
  var dateKey=dt.toISOString().slice(0,10);
  return{city:city,coords:WEATHER_CITIES[city],isHigh:isHigh,date:dateKey,dt:dt};
}

function fetchWeatherForCity(cityCode){
  var c=WEATHER_CITIES[cityCode];
  if(!c)return Promise.resolve(null);
  // Cache for 30 min
  var cached=_wxCache[cityCode];
  if(cached&&(Date.now()-cached.ts)<1800000)return Promise.resolve(cached);
  var url="https://api.open-meteo.com/v1/forecast?latitude="+c.lat+"&longitude="+c.lon+"&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&forecast_days=7&timezone=America%2FChicago";
  return fetch(url).then(function(r){return r.json();}).then(function(d){
    var daily=d.daily||{};
    var result={ts:Date.now(),highs:daily.temperature_2m_max||[],lows:daily.temperature_2m_min||[],dates:daily.time||[],name:c.name};
    _wxCache[cityCode]=result;
    return result;
  }).catch(function(e){return null;});
}

// Fetch forecasts for all weather markets, return promise
function enrichWeatherMarkets(markets,logFn){
  var wxMarkets=[];var cities={};
  for(var i=0;i<markets.length;i++){
    var wp=parseWeatherTicker(markets[i].ticker);
    if(wp){
      markets[i]._wx=wp;
      wxMarkets.push(i);
      cities[wp.city]=true;
    }
  }
  if(wxMarkets.length===0)return Promise.resolve(markets);
  var cityList=Object.keys(cities);
  logFn("Weather: "+wxMarkets.length+" markets across "+cityList.length+" cities, fetching forecasts...");
  var proms=[];
  for(var j=0;j<cityList.length;j++){
    proms.push(fetchWeatherForCity(cityList[j]));
  }
  return Promise.all(proms).then(function(){
    // Attach forecast to each weather market
    var enriched=0;
    for(var k=0;k<wxMarkets.length;k++){
      var m=markets[wxMarkets[k]];
      var wx=m._wx;
      var fc=_wxCache[wx.city];
      if(!fc||!fc.dates)continue;
      var dateIdx=-1;
      for(var d=0;d<fc.dates.length;d++){
        if(fc.dates[d]===wx.date){dateIdx=d;break;}
      }
      if(dateIdx>=0){
        m._wxForecast=wx.isHigh?fc.highs[dateIdx]:fc.lows[dateIdx];
        m._wxType=wx.isHigh?"high":"low";
        m._wxCity=fc.name||wx.city;
        enriched++;
      }
    }
    if(enriched>0)logFn("Weather: "+enriched+" markets enriched with forecast data");
    return markets;
  }).catch(function(e){
    logFn("Weather fetch error: "+e.message,"warn");
    return markets;
  });
}

function analyze(m,cfg){
  var days=dtu(m.close_time);
  if(days<=0)return null;
  var yb=m.yes_bid,ya=m.yes_ask,nb=m.no_bid,na=m.no_ask||nb+4,lp=m.last_price;
  if(yb<=0&&nb<=0&&lp<=0)return null;
  if(m.volume<=0)return null;
  var sum=yb+nb,mid=Math.round((yb+ya)/2),sp=ya-yb,nsp=na-nb;
  if(sp<0||sp>50)return null;
  var urg=days<0.25?2.0:days<0.5?1.6:days<1?1.3:days<2?1.15:days<4?1.05:1.0;

  // BUY prices (what you actually pay) = ASK prices
  // Fees computed on buy price (taker fee since we cross the spread)
  var yBuy=ya;// cost to buy YES
  var nBuy=na;// cost to buy NO
  var yFee=Math.ceil(0.07*yBuy/100*(1-yBuy/100)*100);// taker fee on YES buy
  var nFee=Math.ceil(0.07*nBuy/100*(1-nBuy/100)*100);// taker fee on NO buy

  // --- WEATHER: forecast-based edge ---
  // If we have a forecast, compare to market-implied probability
  if(m._wxForecast!=null){
    var fc=m._wxForecast;// forecast temp in F
    // Parse strike from subtitle or ticker (e.g. ">55" or "B55.5")
    var strike=null;
    var subMatch=(m.subtitle||"").match(/(>|<|above|below)\s*([\d.]+)/i);
    if(subMatch)strike=parseFloat(subMatch[2]);
    if(!subMatch){
      // Try ticker suffix: -B55.5 or -T55.5
      var tkMatch=m.ticker.match(/[-](B|T)([\d.]+)$/);
      if(tkMatch)strike=parseFloat(tkMatch[2]);
    }
    if(strike!=null&&!isNaN(fc)){
      var isAbove=m._wxType==="high"?true:false;// high temp markets are "above X?"
      var belowStrike=(m.subtitle||"").toLowerCase().indexOf("below")>=0||(m.ticker.match(/[-]B[\d]/)||false);
      if(belowStrike)isAbove=false;

      var diff=fc-strike;// positive = forecast above strike
      // Calculate implied probability from forecast
      // Within 3F of strike: uncertain. Beyond 5F: high confidence.
      var fcProb;
      if(isAbove){
        fcProb=diff>5?0.90:diff>3?0.75:diff>0?0.60:diff>-3?0.40:diff>-5?0.25:0.10;
      }else{
        fcProb=diff<-5?0.90:diff<-3?0.75:diff<0?0.60:diff<3?0.40:diff<5?0.25:0.10;
      }

      var mktProb=mid/100;
      var probDiff=Math.abs(fcProb-mktProb);
      // Signal if forecast disagrees with market by >= 20%
      if(probDiff>=0.20){
        var wxSide=fcProb>mktProb?"yes":"no";
        var wxPrice=wxSide==="yes"?yBuy:nBuy;
        var wxFee=wxSide==="yes"?yFee:nFee;
        var wxEdge=probDiff;
        if(wxPrice>=1)return{sig:"WX",side:wxSide,edge:wxEdge,prob:fcProb,price:wxPrice,
          label:"WX "+m._wxCity+" fc:"+Math.round(fc)+"F vs strike:"+strike+"F "+wxSide.toUpperCase()+" @"+wxPrice+"c",
          score:wxEdge*100*urg,
          reason:"Forecast "+Math.round(fc)+"F, strike "+strike+"F (diff "+diff.toFixed(1)+"F). Forecast prob "+Math.round(fcProb*100)+"% vs market "+mid+"%. Edge: "+Math.round(probDiff*100)+"%."};
      }
    }
  }

  // --- VALUE: positive expected value after fees ---
  // Uses ASK prices (what you actually pay to buy)
  if(yBuy>=1&&nBuy>=1&&m.volume>=100&&sp<=25){
    var yProb=mid/100;var nProb=1-yProb;
    // EV = prob of win * (payout - buy price - fee) - prob of loss * (buy price + fee)
    var yEV=yProb*(100-yBuy-yFee)-nProb*(yBuy+yFee);
    var nEV=nProb*(100-nBuy-nFee)-yProb*(nBuy+nFee);
    var bestSide=yEV>=nEV?"yes":"no";
    var bestEV=Math.max(yEV,nEV);
    var bestPrice=bestSide==="yes"?yBuy:nBuy;
    var bestFee=bestSide==="yes"?yFee:nFee;
    if(bestEV>2){
      return{sig:"VALUE",side:bestSide,edge:bestEV/100,prob:bestSide==="yes"?yProb:nProb,
        price:bestPrice,
        label:"Value "+bestSide.toUpperCase()+" @"+bestPrice+"c EV:+"+bestEV.toFixed(0)+"c (fee:"+bestFee+"c)",
        score:(bestEV/100)*80*urg,
        reason:"Buy "+bestSide.toUpperCase()+" @"+bestPrice+"c (ask). EV: +"+bestEV.toFixed(1)+"c after "+bestFee+"c fee. Bid:"+yb+" Ask:"+ya+" Vol:"+Math.round(m.volume)+"."};
    }
  }

  // --- VOLUME MOMENTUM: volume >= 500 + tight spread ---
  if(m.volume>=500&&sp>=0&&sp<=12){
    if(mid>=58&&mid<=85){
      var volEdge=((mid-50)/100)*0.12;
      if(volEdge>=cfg.me)return{sig:"VOL",side:"yes",edge:volEdge,prob:mid/100,price:yBuy,
        label:"Vol YES "+mid+"% "+(m.volume>=1e3?Math.round(m.volume/1000)+"k":Math.round(m.volume))+" @"+yBuy+"c",score:volEdge*50*urg,
        reason:"Buy YES @"+yBuy+"c (ask). Mid "+mid+"%, vol "+Math.round(m.volume)+", spread "+sp+"c."};
    }
    if(mid>=15&&mid<=42){
      var volEdge2=((50-mid)/100)*0.12;
      if(volEdge2>=cfg.me)return{sig:"VOL",side:"no",edge:volEdge2,prob:(100-mid)/100,price:nBuy,
        label:"Vol NO "+(100-mid)+"% "+(m.volume>=1e3?Math.round(m.volume/1000)+"k":Math.round(m.volume))+" @"+nBuy+"c",score:volEdge2*50*urg,
        reason:"Buy NO @"+nBuy+"c (ask). Mid "+mid+"%, vol "+Math.round(m.volume)+", spread "+sp+"c."};
    }
  }

  // --- FADE EXTREMES: mean reversion on overreactions ---
  // Never fade < 12h. Volume >= 1000 for 12h-3d window.
  if(sp>=0&&sp<=20){
    var canFade=false;
    if(days>=3)canFade=true;
    else if(days>=0.5&&m.volume>=500)canFade=true;

    if(canFade&&mid>=90&&nBuy>=1){
      var fadeEdge=(mid-85)/100;
      if(fadeEdge>=cfg.me)return{sig:"FADE",side:"no",edge:fadeEdge,prob:(100-mid)/100,price:nBuy,
        label:"Fade "+mid+"% (NO @"+nBuy+"c) "+days.toFixed(1)+"d",score:fadeEdge*60*urg,
        reason:"Buy NO @"+nBuy+"c (ask). Priced "+mid+"% with "+days.toFixed(1)+"d left."};
    }
    if(canFade&&mid<=10&&yBuy>=1){
      var fadeEdge2=(15-mid)/100;
      if(fadeEdge2>=cfg.me)return{sig:"FADE",side:"yes",edge:fadeEdge2,prob:mid/100,price:yBuy,
        label:"Fade "+mid+"% (YES @"+yBuy+"c) "+days.toFixed(1)+"d",score:fadeEdge2*60*urg,
        reason:"Buy YES @"+yBuy+"c (ask). Priced "+mid+"% with "+days.toFixed(1)+"d left."};
    }
  }

  // --- TIME VALUE: expiring < 24h ---
  if(days<1&&days>0.04&&m.volume>=200&&sp>=0&&sp<=12){
    if(mid>=55&&mid<=80){
      var tvEdge=((mid-50)/100)*0.10;
      if(tvEdge>=cfg.me)return{sig:"TVAL",side:"yes",edge:tvEdge,prob:mid/100,price:yBuy,
        label:"TimeVal YES "+mid+"% "+Math.round(days*24)+"h @"+yBuy+"c",score:tvEdge*60*urg,
        reason:"Buy YES @"+yBuy+"c (ask). Expiring "+Math.round(days*24)+"h, mid "+mid+"%."};
    }
    if(mid>=20&&mid<=45){
      var tvEdge2=((50-mid)/100)*0.10;
      if(tvEdge2>=cfg.me)return{sig:"TVAL",side:"no",edge:tvEdge2,prob:(100-mid)/100,price:nBuy,
        label:"TimeVal NO "+(100-mid)+"% "+Math.round(days*24)+"h @"+nBuy+"c",score:tvEdge2*60*urg,
        reason:"Buy NO @"+nBuy+"c (ask). Expiring "+Math.round(days*24)+"h, mid "+mid+"%."};
    }
  }

  return null;
}

// ============================================================
// POSITION SIZING (Kelly Criterion)
// ============================================================
function kelly(prob,price,frac,maxCents,days){
  if(!price||price<=0||price>=100||!maxCents||maxCents<=0)return 0;
  var cost=price/100,b=(1-cost)/cost;
  var p=Math.min(0.97,Math.max(0.03,prob||0.5));
  var f=Math.max(0,(b*p-(1-p))/b);
  var urg=days<0.5?1.5:days<1?1.25:days<2?1.1:1.0;
  var r=Math.min(Math.round(f*frac*maxCents*urg),maxCents);
  return isNaN(r)?0:r;
}

// ============================================================
function sim(s){
  var fr={WX:0.90,VALUE:0.90,VOL:0.78,FADE:0.70,TVAL:0.82};
  var er={WX:0.70,VALUE:0.60,VOL:0.55,FADE:0.25,TVAL:0.45};
  if(Math.random()>(fr[s.sig]||0.7))return{filled:false};
  var realized=s.edge*(er[s.sig]||0.5);
  var noise=(Math.random()-0.5)*0.06;
  var trueProb=Math.min(0.97,Math.max(0.03,(s.prob||0.5)+realized+noise));
  return{filled:true,won:Math.random()<trueProb};
}

    // Rule: deployed must be < remaining. deployed < (bal - deployed) => deployed < bal/2
    // With configurable leverage: deployed < bal * levPct
    var cap=Math.floor(bal*levPct);
    return Math.max(0,cap-deployed);
  }

  // ---- TRADE (with canary guard + cycle-aware budgeting) ----
  function doTrade(m){
    if(!m.signal||est)return;
    if(CANARY_SET.current[m.ticker])return;
    if(!canaryOk)return;
    if(traded.current[m.ticker])return;
    if(paper&&pending.length>=MAX_PENDING){log("Max pending ("+MAX_PENDING+")","warn");return;}
    var evTk=m.event_ticker||getSeriesTicker(m.ticker);
    if(eventTrades.current[evTk]>=(MAX_PER_EVENT||1)){return;}// silent skip for event limit
    var s=m.signal,days=dtu(m.close_time);
    // Use cycle-aware budget: maxBet accounts for pending + already spent this cycle
    var mb=maxBet(cycleSpent.current);
    if(mb<=0)return;// silent - will be logged once in the loop
    var sz=kelly(s.prob,s.price,cfg.kf,mb,days);
    if(sz<=0)return;
    var ct2=Math.max(1,Math.floor(sz/s.price)),cost=ct2*s.price;
    if(cost>mb){ct2=Math.max(1,Math.floor(mb/s.price));cost=ct2*s.price;}
    if(cost<=0)return;

    traded.current[m.ticker]=true;
    if(!eventTrades.current[evTk])eventTrades.current[evTk]=0;
    eventTrades.current[evTk]++;
    // Track spending within this cycle (ref survives React batching)
    cycleSpent.current+=cost;

    if(demo){
      // Demo mode: instant sim (no real markets)
      var res=sim(s);
      setMet(function(p){
        var n=cx(p);n.at++;
        if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
        n.by[s.sig].a++;
        if(res.filled){
          n.fl++;n.by[s.sig].f++;n.pl+=cost;n.lv+=cost;n.by[s.sig].p+=cost;
          if(res.won){
            var win=netWin(ct2,s.price);
            n.w++;n.by[s.sig].w++;n.ea+=win;n.by[s.sig].e+=win;
            n.fe+=feeAmt(ct2,s.price);
            setBal(function(b){return b+win;});
            updDay(true,win,cost);
            setTrades(function(p){return[{t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,won:true,pnl:win}].concat(p).slice(0,50);});
            log("["+s.sig+"] WIN "+m.ticker+" +"+ct(win)+" ("+ct2+"x "+s.side+" @"+s.price+"c)","success");
          }else{
            n.l++;n.by[s.sig].l++;n.ea-=cost;n.by[s.sig].e-=cost;
            setBal(function(b){return b-cost;});
            updDay(false,-cost,cost);
            setTrades(function(p){return[{t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,won:false,pnl:-cost}].concat(p).slice(0,50);});
            log("["+s.sig+"] LOSS "+m.ticker+" -"+ct(cost)+" ("+ct2+"x "+s.side+" @"+s.price+"c)","error");
          }
        }else{log("["+s.sig+"] "+m.ticker+" no fill","warn");}
        svM(n);return n;
      });
    }else if(paper){
      // Paper mode: deduct cost, record pending position, resolve when market settles
      setBal(function(b){return b-cost;});
      setMet(function(p){var n=cx(p);n.at++;n.fl++;n.pl+=cost;n.lv+=cost;
        if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
        n.by[s.sig].a++;n.by[s.sig].f++;n.by[s.sig].p+=cost;svM(n);return n;});
      var pos={t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,cost:cost};
      setPending(function(p){return[pos].concat(p);});
      log("[PAPER "+s.sig+"] PLACED "+ct2+"x "+s.side+" @"+s.price+"c "+m.ticker+" (cost "+ct(cost)+", pending settlement)");
    }else{
      // Live mode - rate-limited order queue
      var orderBody={ticker:m.ticker,action:"buy",side:s.side,count:ct2,type:"limit"};
      if(s.side==="yes"){orderBody.yes_price=s.price;}
      else{orderBody.no_price=s.price;}
      // Queue with delay to avoid 429 rate limits
      var delay=(_orderQueue.length)*350;// 350ms between orders
      _orderQueue.push(1);
      var tk=m.ticker,sig=s.sig,ct3=ct2,pr=s.price,sd=s.side;
      setTimeout(function(){
        api("/portfolio/orders","POST",orderBody).then(function(){
          log("[LIVE "+sig+"] "+ct3+"x "+sd+" @"+pr+"c "+tk,"success");
        }).catch(function(e){
          traded.current[tk]=false;
          log("[LIVE] "+tk+": "+e.message,"error");
        });
      },delay);
    }
  }
  var _orderQueue=[];

  // ---- CHECK PENDING PAPER TRADES FOR SETTLEMENT ----
  function checkPending(){
    if(pending.length===0)return;
    var toCheck=pending.slice(0,10);// check up to 10 at a time
    var tickers=toCheck.map(function(p){return p.tk;}).join(",");
    api("/markets?tickers="+encodeURIComponent(tickers)+"&limit=10").then(function(d){
      var mkMap={};var mk=d.markets||[];
      for(var i=0;i<mk.length;i++)mkMap[mk[i].ticker]=mk[i];
      var resolved=[],remaining=[];
      for(var j=0;j<pending.length;j++){
        var pos=pending[j];
        var rm=mkMap[pos.tk];
        if(rm&&(rm.status==="settled"||rm.status==="determined")&&rm.result){
          // Market settled - determine win/loss
          var won=(pos.side==="yes"&&rm.result==="yes")||(pos.side==="no"&&rm.result==="no");
          resolved.push({pos:pos,won:won,result:rm.result});
        }else{
          remaining.push(pos);
        }
      }
      if(resolved.length>0){
        setPending(remaining);
        for(var k=0;k<resolved.length;k++){
          var r=resolved[k],p=r.pos;
          if(r.won){
            var win=netWin(p.ct,p.pr);
            setBal(function(b){return b+p.cost+win;});// return cost + profit
            setMet(function(prev){var n=cx(prev);n.w++;n.ea+=win;n.fe+=feeAmt(p.ct,p.pr);
              if(n.by[p.sig]){n.by[p.sig].w++;n.by[p.sig].e+=win;}
              svM(n);return n;});
            updDay(true,win,p.cost);
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:p.sig,side:p.side,ct:p.ct,pr:p.pr,won:true,pnl:win}].concat(prev).slice(0,50);});
            log("[SETTLED] WIN "+p.tk+" +"+ct(win)+" (real result: "+r.result+")","success");
          }else{
            setMet(function(prev){var n=cx(prev);n.l++;n.ea-=p.cost;
              if(n.by[p.sig]){n.by[p.sig].l++;n.by[p.sig].e-=p.cost;}
              svM(n);return n;});
            updDay(false,-p.cost,p.cost);
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:p.sig,side:p.side,ct:p.ct,pr:p.pr,won:false,pnl:-p.cost}].concat(prev).slice(0,50);});
            log("[SETTLED] LOSS "+p.tk+" -"+ct(p.cost)+" (real result: "+r.result+")","error");
          }
        }
        log("Pending: "+remaining.length+" positions awaiting settlement");
      }
    }).catch(function(e){});// silent fail on settlement check
  }

  // ---- AUTO-TRADE LOOP ----
  useEffect(function(){
    if(tmr.current){clearInterval(tmr.current);tmr.current=null;}
    if(!aon||est||scr!=="dash")return;
    var run=function(){
      // Check pending paper trade settlements
      if(paper)checkPending();
      // Reset cycle spending tracker and order queue
      cycleSpent.current=0;
      _orderQueue.length=0;
      doFetch().then(function(fresh){
        if(!canaryOk){log("Auto: skipping trades - canary validation failed","error");return;}
        var sg=fresh.filter(function(m){return m.signal&&!traded.current[m.ticker]&&!CANARY_SET.current[m.ticker];});
        if(sg.length>0){
          log("Auto: "+sg.length+" signals. Budget: "+ct(maxBet(0))+" | Top: "+sg[0].signal.sig+" "+sg[0].ticker);
        }else{
          log("Auto: scanning... no new signals");
        }
        var placed=0;
        var limit=Math.min(sg.length,20);// up to 20 trades per cycle
        for(var i=0;i<limit;i++){
          if(maxBet(cycleSpent.current)<=0){log("Auto: budget exhausted (spent "+ct(cycleSpent.current)+" this cycle)");break;}
          if(paper&&(pending.length+placed)>=MAX_PENDING){break;}
          var before=cycleSpent.current;
          doTrade(sg[i]);
          if(cycleSpent.current>before)placed++;
        }
        if(placed>0)log("Auto: placed "+placed+" trades, deployed "+ct(cycleSpent.current)+" this cycle");
      });
    };
    run();
    tmr.current=setInterval(run,90000);
    return function(){if(tmr.current)clearInterval(tmr.current);};
  },[aon,est,scr]);
