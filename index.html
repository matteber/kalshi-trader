const WORKER_CODE = `// Kalshi CORS Proxy — deploy at workers.cloudflare.com (free)
// IMPORTANT: If you deployed this before, redeploy with this exact code.
// The Kalshi API URL changed to api.elections.kalshi.com
const KALSHI = "https://api.elections.kalshi.com/trade-api/v2";
const CORS = {
  "Access-Control-Allow-Origin": "*",
  "Access-Control-Allow-Methods": "GET, POST, PUT, DELETE, OPTIONS",
  "Access-Control-Allow-Headers": "Content-Type, KALSHI-ACCESS-KEY, KALSHI-ACCESS-SIGNATURE, KALSHI-ACCESS-TIMESTAMP",
};
export default {
  async fetch(req) {
    if (req.method === "OPTIONS") return new Response(null, { headers: CORS });
    const url = new URL(req.url);
    const target = KALSHI + url.pathname + url.search;
    const headers = {};
    for (const [k, v] of req.headers) {
      if (!["host","origin","referer"].includes(k)) headers[k] = v;
    }
    const res = await fetch(target, {
      method: req.method, headers,
      body: req.method !== "GET" ? req.body : undefined,
    });
    return new Response(await res.text(), {
      status: res.status,
      headers: { "Content-Type": "application/json", ...CORS },
    });
  },
};`;

// ─── RSA-PSS signing via Web Crypto API ──────────────────────────────────────
// Web Crypto only accepts PKCS#8 ("BEGIN PRIVATE KEY").
// Kalshi sometimes gives PKCS#1 ("BEGIN RSA PRIVATE KEY") — convert it first.

function asn1Len(len) {
  if (len < 0x80) return new Uint8Array([len]);
  if (len < 0x100) return new Uint8Array([0x81, len]);
  return new Uint8Array([0x82, (len >> 8) & 0xff, len & 0xff]);
}
function asn1Wrap(tag, content) {
  const l = asn1Len(content.length);
  const out = new Uint8Array(1 + l.length + content.length);
  out[0] = tag; out.set(l, 1); out.set(content, 1 + l.length);
  return out;
}
function concatU8(...arrs) {
  const out = new Uint8Array(arrs.reduce((s, a) => s + a.length, 0));
  let i = 0; for (const a of arrs) { out.set(a, i); i += a.length; }
  return out;
}
function pkcs1ToPkcs8(der) {
  // Wrap PKCS#1 DER in PKCS#8 envelope: SEQUENCE { version, algorithmId, OCTET_STRING(pkcs1) }
  const version   = new Uint8Array([0x02, 0x01, 0x00]);
  const rsaOid    = new Uint8Array([0x30,0x0d,0x06,0x09,0x2a,0x86,0x48,0x86,0xf7,0x0d,0x01,0x01,0x01,0x05,0x00]);
  const octet     = asn1Wrap(0x04, der);
  return asn1Wrap(0x30, concatU8(version, rsaOid, octet));
}

async function importPrivateKey(pem) {
  // Accept: PKCS#8 ("BEGIN PRIVATE KEY"), PKCS#1 ("BEGIN RSA PRIVATE KEY"), or raw base64
  const isPkcs1 = pem.includes("RSA PRIVATE KEY");
  // Strip any PEM headers/footers and ALL whitespace to get clean base64
  const clean = pem
    .replace(/-----[^-]+-----/g, "")
    .replace(/\s+/g, "");
  if (!clean) throw new Error("Empty key — nothing to import.");
  let der = Uint8Array.from(atob(clean), c => c.charCodeAt(0));
  if (isPkcs1) der = pkcs1ToPkcs8(der);
  return crypto.subtle.importKey(
    "pkcs8", der.buffer,
    { name: "RSA-PSS", hash: "SHA-256" },
    false, ["sign"]
  );
}

async function rsaSign(cryptoKey, timestamp, method, pathWithoutQuery) {
  const msg = new TextEncoder().encode(`${timestamp}${method}${pathWithoutQuery}`);
  const sig = await crypto.subtle.sign({ name: "RSA-PSS", saltLength: 32 }, cryptoKey, msg);
  return btoa(String.fromCharCode(...new Uint8Array(sig)));
}

// ─── Kalshi API layer ─────────────────────────────────────────────────────────
const KALSHI_BASE = "https://api.elections.kalshi.com/trade-api/v2";
let _proxyBase  = "";
let _keyId      = "";
let _cryptoKey  = null;   // CryptoKey — set after successful import

function setProxy(url) { _proxyBase = url.replace(/\/+$/, ""); }
async function setCredentials(keyId, pemText) {
  _keyId     = keyId.trim();
  _cryptoKey = await importPrivateKey(pemText);
}

async function kalshiReq(path, method = "GET", body = null) {
  const base  = _proxyBase || KALSHI_BASE;
  const ts    = Date.now().toString();
  const signPath = ("/trade-api/v2" + path).split("?")[0];
  const sig   = await rsaSign(_cryptoKey, ts, method, signPath);
  const h = {
    "Content-Type":            "application/json",
    "KALSHI-ACCESS-KEY":       _keyId,
    "KALSHI-ACCESS-TIMESTAMP": ts,
    "KALSHI-ACCESS-SIGNATURE": sig,
  };
  const opts = { method, headers: h };
  if (!_proxyBase) opts.mode = "cors";
  if (body) opts.body = JSON.stringify(body);

  let res;
  try {
    res = await fetch(`${base}${path}`, opts);
  } catch (e) {
    const msg = e.message || "";
    if (!_proxyBase && (msg.includes("Failed to fetch") || msg.includes("Load failed") || msg.includes("NetworkError"))) {
      throw new Error("CORS_BLOCKED");
    }
    throw e;
  }

  if (!res.ok) {
    // Try to get the actual Kalshi error text — show it verbatim so nothing is hidden
    const rawText = await res.text().catch(() => "");
    let detail = rawText;
    try {
      const j = JSON.parse(rawText);
      detail = j.message || j.error || j.detail || j.code || rawText;
    } catch (_) {}
    throw new Error(`HTTP ${res.status}: ${detail}`);
  }
  return res.json();
}

// Normalize markets: handle both old integer-cents fields and new _dollars strings
function normalizeMarket(m) {
  const d2c = (d) => d != null ? Math.round(parseFloat(d) * 100) : null;
  return {
    ...m,
    yes_bid:    m.yes_bid    ?? d2c(m.yes_bid_dollars)    ?? m.last_price ?? 50,
    yes_ask:    m.yes_ask    ?? d2c(m.yes_ask_dollars)    ?? null,
    no_bid:     m.no_bid     ?? d2c(m.no_bid_dollars)     ?? null,
    no_ask:     m.no_ask     ?? d2c(m.no_ask_dollars)     ?? null,
    last_price: m.last_price ?? d2c(m.last_price_dollars) ?? 50,
  };
}

// ─── AI News Engine ──────────────────────────────────────────────────────────
async function fetchNewsSignal(marketTitle, marketProb) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{
        role: "user",
        content: `Search for the very latest news about: "${marketTitle}". Current market probability: ${marketProb}%.
Respond ONLY with valid JSON — no markdown, no preamble:
{"headlines":[{"title":"...","sentiment":"bullish"|"bearish"|"neutral","source":"..."}],"overall":"bullish"|"bearish"|"neutral","adjustment":<integer -15 to +15>,"confidence":<0-100>,"reasoning":"<one sentence>","recommended_side":"yes"|"no"|"skip"}`
      }]
    })
  });
  const data = await res.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
  return JSON.parse(clean.slice(s, e + 1));
}

// ─── Strategy (corrected) ─────────────────────────────────────────────────────
function daysUntil(iso) { return (new Date(iso) - Date.now()) / 86400000; }

function urgencyMult(days) {
  if (days < 0.5) return 1.5;
  if (days < 1)   return 1.25;
  if (days < 2)   return 1.1;
  return 1.0;
}

// FIXED: proper Kelly for prediction market contracts
// b = payout odds (profit per $1 risked), p = estimated win probability
function kellySize(estWinProb, contractPriceCents, fraction, maxCents, days) {
  const cost = contractPriceCents / 100;          // e.g. 0.60 for a 60¢ contract
  const b    = (1 - cost) / cost;                 // payout odds per $ risked
  const p    = Math.min(0.97, Math.max(0.03, estWinProb));
  const q    = 1 - p;
  const f    = Math.max(0, (b * p - q) / b);      // full Kelly fraction
  const sized = f * fraction * maxCents * urgencyMult(days);
  return Math.min(Math.round(sized), maxCents);
}

// Auto-scale exposure every $100 gain from $100 start
function calcMaxExposure(balanceCents, startCents = 10000) {
  const gain = Math.max(0, balanceCents - startCents);
  const steps = Math.floor(gain / 10000);          // +$50 per $100 gain
  return 5000 + steps * 5000;
}

function isSportsMarket(market) {

  return SPORTS_KEYWORDS.some(kw => text.includes(kw));
}

function analyzeMarket(market, config, newsData = null) {
  // Hard block: never trade sports markets
  if (isSportsMarket(market)) return null;

  const yesBid = market.yes_bid ?? market.last_price ?? 50;
  const yesAsk = market.yes_ask ?? yesBid + 4;
  const noBid  = market.no_bid  ?? (100 - yesAsk);
  const sum    = yesBid + noBid;

  // ── 1. ARBITRAGE: YES + NO sum < $1 (guaranteed profit) ──
  // Threshold: 93 — needs 7¢+ gap to clear Kalshi's ~7% fee on winnings
  if (sum <= 93) {
    const profit = 100 - sum;
    return {
      signal: "ARB", side: "both",
      estWinProb: 1.0, contractPrice: sum / 2,
      edge: profit / 100,
      label: `Arb +${profit.toFixed(1)}¢`, color: "#00ff88", quality: 100,
      why: `Risk-free: YES(${yesBid}¢) + NO(${noBid}¢) = ${sum}¢ < $1`,
    };
  }

  const marketMid = (yesBid + (100 - noBid)) / 2;
  const newsAdj   = newsData?.adjustment ?? 0;
  const newsConf  = newsData?.confidence ?? 0;
  const adjProb   = Math.max(3, Math.min(97, marketMid + newsAdj)) / 100;
  const hasStrongNews = newsData && newsConf >= config.newsMinConf && Math.abs(newsAdj) >= 5;

  // ── 2. NEWS SIGNAL: strong news shifts fair value ──
  // Only fire when AI confidence ≥ threshold (default 65%)
  if (hasStrongNews) {
    const side = newsAdj > 0 ? "yes" : "no";
    const price = side === "yes" ? yesBid : noBid;
    const estWin = side === "yes" ? adjProb : 1 - adjProb;
    const marketImplied = side === "yes" ? yesBid / 100 : noBid / 100;
    const edge = estWin - marketImplied;
    if (edge >= config.minEdge) {
      return {
        signal: "NEWS", side, estWinProb: estWin, contractPrice: price,
        edge, label: `News ${newsAdj > 0 ? "+" : ""}${newsAdj}¢ (${newsConf}% conf)`,
        color: "#c084fc", quality: Math.round(70 + newsConf * 0.3),
        why: `AI news shifts fair value by ${newsAdj}¢ with ${newsConf}% confidence`,
      };
    }
  }

  // ── 3. FADE EXTREMES: only with news confirmation ──
  // Don't fade without news support — markets can stay extreme
  if (config.fadeExtremes && hasStrongNews) {
    const rec = newsData.recommended_side;
    if (adjProb > 0.90 && rec === "no") {
      const marketImplied = noBid / 100;
      const estWin = 1 - adjProb;
      const edge = estWin - marketImplied;
      if (edge >= config.minEdge)
        return {
          signal: "FADE", side: "no", estWinProb: estWin, contractPrice: noBid,
          edge, label: `Fade ${(adjProb * 100).toFixed(0)}% + news`, color: "#ff6b6b", quality: 65,
          why: `Market overpriced at ${adjProb * 100 | 0}% — news supports reversal`,
        };
    }
    if (adjProb < 0.10 && rec === "yes") {
      const marketImplied = yesBid / 100;
      const estWin = adjProb;
      const edge = estWin - marketImplied;
      if (edge >= config.minEdge)
        return {
          signal: "FADE", side: "yes", estWinProb: estWin, contractPrice: yesBid,
          edge, label: `Fade ${(adjProb * 100).toFixed(0)}% + news`, color: "#ff6b6b", quality: 65,
          why: `Market underpriced at ${adjProb * 100 | 0}% — news supports this side`,
        };
    }
  }

  // ── 4. MARKET MAKING: DISABLED ──
  // Kalshi limit orders don't reliably capture spread — removed

  return null;
}

// ─── Realistic Demo Simulation ───────────────────────────────────────────────
// The core bug in naive simulation: using our own optimistic edge estimate as
// the true win probability. That's circular and always prints money.
// Reality: our edge estimates are noisy. We realize only a fraction of claimed edge.
const EDGE_REALIZATION = { ARB: 1.00, NEWS: 0.35, FADE: 0.20 };
const FILL_RATE        = { ARB: 1.00, NEWS: 0.72, FADE: 0.68 };  // limit orders don't always fill
const KALSHI_FEE_PCT   = 0.07;  // Kalshi takes ~7% of winning profits

function simulateTrade(signal, priceCents, costCents) {
  const type = signal.signal;

  // Simulate fill — limit orders frequently miss on fast-moving markets
  const fillRate = FILL_RATE[type] ?? 0.70;
  if (Math.random() > fillRate) return { filled: false };

  // True win probability: market implied + fraction of our claimed edge
  const marketImplied  = priceCents / 100;
  const claimedEdge    = signal.estWinProb - marketImplied;
  const realizedEdge   = claimedEdge * (EDGE_REALIZATION[type] ?? 0.30);
  // Add noise — markets are noisy even when we're right
  const noise          = (Math.random() - 0.5) * 0.06;
  const trueWinProb    = Math.max(0.02, Math.min(0.98, marketImplied + realizedEdge + noise));

  const won    = Math.random() < trueWinProb;
  const payout = won ? Math.round(costCents * ((100 - priceCents) / priceCents)) : 0;
  const fee    = won ? Math.round(payout * KALSHI_FEE_PCT) : 0;
  const net    = won ? payout - fee : -costCents;

  return { filled: true, won, net, fee, trueWinProb };
}

  };

  const handleGoLive = () => {
    setPaper(false); setDemo(false);
    setScreen("dash");
    addLog("⚡ LIVE MODE — real orders will be placed on Kalshi", "error");
  };

  const handleDemo = () => {
    setDemo(true);
    setBalance(10000);
    setMarkets(mockMarkets());
    setScreen("dash");
    tradedRef.current.clear();
    addLog("Demo mode: $100 balance · realistic edge realization (ARB 100%, NEWS 35%, FADE 20%) · 7% Kalshi fees · 70% fill rate", "warn");
  };

  // Expire demo markets as close_time passes, refresh with new ones
  useEffect(() => {
    if (!demo) return;
    const interval = setInterval(() => {
      setMarkets(prev => {
        const live = prev.filter(m => new Date(m.close_time) > new Date());
        if (live.length < prev.length) {
          const expired = prev.filter(m => new Date(m.close_time) <= new Date());
          expired.forEach(m => tradedRef.current.delete(m.ticker));
          // Add replacement markets with fresh expiry times
          const replacements = mockMarkets()
            .filter(m => !live.some(l => l.ticker === m.ticker))
            .slice(0, expired.length);
          addLog(`${expired.length} market(s) expired — refreshed`, "info");
          return [...live, ...replacements].sort((a, b) => new Date(a.close_time) - new Date(b.close_time));
        }
        return prev;
      });
    }, 10000); // check every 10s
    return () => clearInterval(interval);
  }, [demo, addLog]);

  // ── Fetch ──
  const fetchAll = useCallback(async () => {
    if (demo) return; // demo uses mock data only — paper fetches real Kalshi markets
    try {
      const [mData, pData, bData] = await Promise.all([getMarkets(), getPositions(), getBalance()]);
      const eligible = (mData.markets || [])
        .filter(m => { const d = daysUntil(m.close_time); return d > 0 && d < config.daysWindow; })
        .sort((a, b) => new Date(a.close_time) - new Date(b.close_time));
      setMarkets(eligible);
      setPositions(pData.market_positions || []);
      setBalance(bData.balance || 0);
    } catch (e) { addLog(`Fetch error: ${e.message}`, "error"); }
  }, [demo, config.daysWindow, addLog]);

  useEffect(() => { if (!demo && screen !== "login") fetchAll(); }, [demo, screen, fetchAll]);

  // ── News ──
  const fetchNews = useCallback(async (ticker, title, prob) => {
    setNewsCache(c => ({ ...c, [ticker]: { loading: true, data: null } }));
    try {
      const data = await fetchNewsSignal(title, prob);
      setNewsCache(c => ({ ...c, [ticker]: { loading: false, data } }));
      addLog(`News [${ticker}]: ${data.overall} (${data.confidence}% conf, adj ${data.adjustment >= 0 ? "+" : ""}${data.adjustment}¢)`, "news");
    } catch (e) {
      setNewsCache(c => ({ ...c, [ticker]: { loading: false, data: null } }));
      addLog(`News error: ${e.message}`, "error");
    }
  }, [addLog]);

  // ── Stop-loss check ──
  const checkStopLoss = useCallback((bal) => {
    const floor = config.startBalanceCents * (1 - config.stopLossPct);
    if (bal < floor) {
      setStopLossHit(true);
      setAutoOn(false);
      addLog(`🛑 STOP-LOSS: Account below $${(floor / 100).toFixed(0)} — auto-trade halted`, "error");
      return true;
    }
    return false;
  }, [config.startBalanceCents, config.stopLossPct, addLog]);

  // ── Auto-trade scan ──
  const runScan = useCallback(async () => {
    if (!autoOn || stopLossHit) return;
    const currentBal = balance ?? config.startBalanceCents;
    if (checkStopLoss(currentBal)) return;

    const dynamicExposure = calcMaxExposure(currentBal, config.startBalanceCents);
    addLog(`Scanning… exposure cap: $${(dynamicExposure / 100).toFixed(0)}`, "info");

    const eligible = markets
      .filter(m => { const d = daysUntil(m.close_time); return d > 0 && d < config.daysWindow; })
      .sort((a, b) => new Date(a.close_time) - new Date(b.close_time));

    let placed = 0;
    for (const m of eligible) {
      if (placed >= config.maxTradesPerScan) break;
      const nc = newsCache[m.ticker]?.data ?? null;
      const signal = analyzeMarket(m, config, nc);
      if (!signal || signal.quality < 60) continue;

      // Never trade the same market twice in a session — in reality you hold a position until expiry
      if (tradedRef.current.has(m.ticker)) continue;

      const days = daysUntil(m.close_time);
      const price = signal.side === "no" ? m.no_bid : m.yes_bid ?? m.last_price ?? 50;
      const cost = kellySize(signal.estWinProb, price, config.kellyFraction, config.maxBetCents, days);
      if (cost < 50) { addLog(`Skip ${m.ticker}: bet size too small`, "info"); continue; }

      addLog(`[${signal.signal}] ${m.title.slice(0, 40)} | bet $${(cost/100).toFixed(2)} | ${signal.label}`, "trade");

      if (demo || paper) {
        const sim = simulateTrade(signal, price, cost);
        if (!sim.filled) {
          addLog(`⟳ Order not filled (limit missed market) — ${m.ticker}`, "info");
          continue;
        }
        setPnl(p => ({ ...p, trades: p.trades + 1, wins: p.wins + (sim.won ? 1 : 0), realized: p.realized + sim.net }));
        setStats(s => ({
          ...s,
          [signal.signal]: {
            trades: (s[signal.signal]?.trades ?? 0) + 1,
            wins:   (s[signal.signal]?.wins   ?? 0) + (sim.won ? 1 : 0),
            totalReturn: (s[signal.signal]?.totalReturn ?? 0) + sim.net,
          }
        }));
        setBalance(b => (b ?? 10000) + sim.net);
        tradedRef.current.add(m.ticker);
        const feeNote = sim.fee > 0 ? ` (fee -$${(sim.fee/100).toFixed(2)})` : "";
        addLog(`${sim.won ? "✓ WIN" : "✗ LOSS"}: ${sim.net >= 0 ? "+" : ""}$${(sim.net/100).toFixed(2)}${feeNote} | true p=${(sim.trueWinProb*100).toFixed(0)}%`, sim.won ? "success" : "error");
        placed++;
      } else {
        try {
          await placeOrder(m.ticker, signal.side === "both" ? "yes" : signal.side, Math.max(1, Math.round(cost / 10)), price);
          setPnl(p => ({ ...p, trades: p.trades + 1 }));
          addLog(`✓ Order placed: ${m.ticker}`, "success");
          placed++;
        } catch (e) { addLog(`✗ Order failed: ${e.message}`, "error"); }
      }
    }
    if (placed === 0) addLog("No qualifying signals this scan", "info");
  }, [autoOn, stopLossHit, balance, config, markets, newsCache, demo, paper, checkStopLoss, addLog]);

  useEffect(() => {
    if (autoOn && !stopLossHit) {
      runScan();
      scanRef.current = setInterval(runScan, config.scanIntervalSec * 1000);
      setCountdown(config.scanIntervalSec);
      cdRef.current = setInterval(() => setCountdown(c => c <= 1 ? config.scanIntervalSec : c - 1), 1000);
    } else {
      clearInterval(scanRef.current); clearInterval(cdRef.current);
    }
    return () => { clearInterval(scanRef.current); clearInterval(cdRef.current); };
  }, [autoOn, stopLossHit, config.scanIntervalSec, runScan]);

  // ── Computed ──
  const eligible = markets
    .filter(m => { const d = daysUntil(m.close_time); return d > 0 && d < config.daysWindow; })
    .sort((a, b) => new Date(a.close_time) - new Date(b.close_time));
  const withSig = eligible.map(m => ({
    ...m,
    signal: analyzeMarket(m, config, newsCache[m.ticker]?.data ?? null),
    days: daysUntil(m.close_time),
  }));
  const currentBal  = balance ?? config.startBalanceCents;
  const dynExposure = calcMaxExposure(currentBal, config.startBalanceCents);
  const gainToNext  = Math.max(0, 10000 - ((currentBal - config.startBalanceCents) % 10000));
  const fmt$        = c => `$${(c / 100).toFixed(2)}`;
  const winRate     = pnl.trades > 0 ? ((pnl.wins / pnl.trades) * 100).toFixed(0) : "–";

  const tabs = [
    { id: "dash",      icon: "⚡", label: "Dash"     },
    { id: "markets",   icon: "📊", label: "Markets"  },
    { id: "news",      icon: "📰", label: "AI News"  },
    { id: "eval",      icon: "📈", label: "Eval"     },
    { id: "settings",  icon: "⚙️", label: "Settings" },
  ];

  // ══════════ LOGIN ══════════
  if (screen === "login") return (
    <div style={S.wrap}>
      <div style={{ ...S.card, maxWidth: 420 }}>

        {/* Logo */}
        <div style={S.logoRow}>
          <span style={S.logoK}>K</span>
          <div>
            <div style={S.logoTitle}>alshi<span style={S.badge("#00ff88")}>AUTO</span></div>
            <div style={S.logoSub}>Prediction market auto-trader</div>
          </div>
        </div>

        {/* Step 1 — get the key from Kalshi */}
        <div style={{ background:"#0a1a0f", border:"1px solid #00ff8820", borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"#00ff88", marginBottom:8 }}>Step 1 — Get your API key from Kalshi</div>
          <div style={{ fontSize:12, color:"#666", lineHeight:1.7 }}>
            Go to{" "}
            <a href="https://kalshi.com/account/profile" target="_blank" rel="noreferrer"
              style={{ color:"#00ff88", textDecoration:"none", fontWeight:700 }}>
              kalshi.com → Profile → API Keys
            </a>
            {" "}and click <strong style={{ color:"#ccc" }}>Generate New API Key</strong>.
            Kalshi will show you a <strong style={{ color:"#ccc" }}>Key ID</strong> and a{" "}
            <strong style={{ color:"#ccc" }}>Private Key</strong> — copy both.
            The private key is only shown once.
          </div>
        </div>

        {/* Step 2 — paste here */}
        <div style={{ fontSize:11, fontWeight:700, color:"#aaa" }}>Step 2 — Paste them here</div>

        <div style={S.field}>
          <label style={S.lbl}>Key ID</label>
          <input style={S.inp} type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
            value={keyId} onChange={e => setKeyId(e.target.value)} />
        </div>

        <div style={S.field}>
          <label style={S.lbl}>Private Key</label>
          <textarea style={{ ...S.inp, height:100, resize:"vertical", fontSize:11, lineHeight:1.6 }}
            placeholder={"-----BEGIN PRIVATE KEY-----\n  or\n-----BEGIN RSA PRIVATE KEY-----\n(both formats work)"}
            value={pemText} onChange={e => setPemText(e.target.value)} />
        </div>

        {err && (
          <div style={S.errBox}>
            <div style={{ fontWeight: 700, marginBottom: 4 }}>Error</div>
            <div style={{ fontSize: 11, lineHeight: 1.6, wordBreak: "break-all" }}>{err}</div>
            {err.includes("401") || err.includes("403") || err.includes("Unauthorized") || err.includes("forbidden") ? (
              <div style={{ marginTop: 8, fontSize: 11, color: "#ff9966", lineHeight: 1.6 }}>
                💡 Auth rejected — verify your Key ID and private key are from the <strong>same generated pair</strong> on Kalshi. Try generating a fresh key pair.
              </div>
            ) : err.includes("proxy") || err.includes("Worker") ? (
              <div style={{ marginTop: 8, fontSize: 11, color: "#ff9966", lineHeight: 1.6 }}>
                💡 Open your Worker on workers.cloudflare.com → Edit → make sure the URL inside says <code>api.elections.kalshi.com</code> → Deploy.
              </div>
            ) : null}
          </div>
        )}

        <button style={{ ...S.btnG, opacity: (keyId && pemText) ? 1 : 0.45 }}
          onClick={handleLogin} disabled={loading || !keyId || !pemText}>
          {loading ? "Connecting…" : "Connect →"}
        </button>

        {/* Proxy URL — collapsed, only needed if CORS blocks */}
        <ProxyField proxyUrl={proxyUrl} setProxyUrl={setProxyUrl} />

        <button style={S.btnGhost} onClick={handleDemo}>🎮 Try Demo (no account needed)</button>
        <p style={S.fine}>Real-money trading tool — only trade what you can afford to lose.</p>
      </div>
    </div>
  );

  // ══════════ MODE SELECT (shown after real login) ══════════
  if (screen === "modeselect") return (
    <div style={S.wrap}>
      <div style={{ ...S.card, gap: 16 }}>
        <div style={S.logoRow}>
          <span style={S.logoK}>K</span>
          <div>
            <div style={S.logoTitle}>alshi <span style={S.badge("#00ff88")}>AUTO v3</span></div>
            <div style={S.logoSub}>Account connected ✓ — choose trading mode</div>
          </div>
        </div>

        {/* Paper trade option */}
        <div style={{ background: "#0a1a0f", border: "2px solid #00ff8833", borderRadius: 14, padding: 18, cursor: "pointer" }}
          onClick={handlePaper}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <span style={{ fontSize: 24 }}>📊</span>
            <div>
              <div style={{ fontSize: 15, fontWeight: 800, color: "#00ff88" }}>Paper Trade</div>
              <div style={{ fontSize: 11, color: "#555" }}>Real Kalshi markets · Simulated orders</div>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[
              "✓ Live market data from your Kalshi account",
              "✓ $100 virtual balance — no real money at risk",
              "✓ Realistic simulation: fees, fill rate, edge realization",
              "✓ Best way to validate the strategy before going live",
            ].map(t => <span key={t} style={{ fontSize: 11, color: "#555" }}>{t}</span>)}
          </div>
          <button style={{ ...S.btnG, marginTop: 14, width: "100%" }}>Start Paper Trading →</button>
        </div>

        {/* Live option */}
        <div style={{ background: "#1a0a0a", border: "2px solid #ff3b3033", borderRadius: 14, padding: 18, cursor: "pointer" }}
          onClick={handleGoLive}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <span style={{ fontSize: 24 }}>⚡</span>
            <div>
              <div style={{ fontSize: 15, fontWeight: 800, color: "#ff6b6b" }}>Go Live</div>
              <div style={{ fontSize: 11, color: "#555" }}>Real Kalshi markets · Real orders · Real money</div>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[
              "⚠ Real orders will be placed on your Kalshi account",
              "⚠ Start with $100 account, $50 max exposure",
              "⚠ Run paper trading first to validate signals",
            ].map(t => <span key={t} style={{ fontSize: 11, color: "#663333" }}>{t}</span>)}
          </div>
          <button style={{ ...S.btnGhost, marginTop: 14, width: "100%", color: "#ff6b6b", borderColor: "#ff3b3033" }}>Go Live — Real Money</button>
        </div>

        <button style={{ ...S.btnGhost, fontSize: 12 }} onClick={() => { _keyId = ""; _cryptoKey = null; setScreen("login"); }}>← Back</button>
      </div>
    </div>
  );

  // ══════════ CORS ERROR SCREEN ══════════
  if (screen === "corserror") return (
    <div style={S.wrap}>
      <div style={{ ...S.card, gap: 14 }}>
        <div style={{ fontSize: 28, textAlign: "center" }}>🚧</div>
        <div style={{ fontSize: 15, fontWeight: 800, textAlign: "center" }}>Browser Blocked the Request</div>
        <div style={{ fontSize: 12, color: "#555", lineHeight: 1.7, textAlign: "center" }}>
          Kalshi's API doesn't allow direct browser calls from external apps (CORS policy). You need a free 2-minute proxy to fix this.
        </div>
        <SetupGuide expanded />
        <button style={S.btnG} onClick={() => setScreen("login")}>← Back to Login</button>
      </div>
    </div>
  );

  // ══════════ SHELL ══════════
  return (
    <div style={S.shell}>
      {/* Header */}
      <div style={S.hdr}>
        <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
          <span style={{ fontSize: 16, fontWeight: 900 }}>K<span style={{ color: "#00ff88" }}>AUTO</span></span>
          {demo  && <Tag col="#f5a623">DEMO</Tag>}
          {paper && <Tag col="#00ff88">PAPER</Tag>}
          {!demo && !paper && <Tag col="#ff6b6b">LIVE</Tag>}
          <Tag col="#00ff8888">≤{config.daysWindow}d</Tag>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 11, color: "#555" }}>{fmt$(currentBal)}</span>
          <span style={{ fontSize: 10, color: "#00ff8888" }}>exp {fmt$(dynExposure)}</span>
          {stopLossHit && <span style={{ fontSize: 9, color: "#ff3b30", fontWeight: 700 }}>🛑 STOPPED</span>}
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: autoOn && !stopLossHit ? "#00ff88" : "#1a1a1a", boxShadow: autoOn && !stopLossHit ? "0 0 8px #00ff88" : "none" }} />
        </div>
      </div>

      <div style={{ flex: 1, overflow: "auto" }}>
        {screen === "dash"     && <DashScreen {...{ pnl, withSig, eligible, autoOn, setAutoOn, stopLossHit, setStopLossHit, log, countdown, fmt$, config, dynExposure, gainToNext, winRate, currentBal, stats }} />}
        {screen === "markets"  && <MarketsScreen {...{ markets: withSig, fmt$, addLog, demo, paper, setPnl, setStats, setBalance, config, newsCache, fetchNews, tradedRef }} />}
        {screen === "news"     && <NewsScreen {...{ markets: withSig, newsCache, fetchNews }} />}
        {screen === "eval"     && <EvalScreen {...{ stats, pnl, winRate, fmt$, config }} />}
        {screen === "settings" && <SettingsScreen {...{ config, setConfig, fmt$, onLogout: () => { _keyId = ""; _cryptoKey = null; setPaper(false); setDemo(false); setAutoOn(false); setScreen("login"); } }} />}
      </div>

      <div style={S.nav}>
        {tabs.map(t => (
          <button key={t.id} style={{ ...S.navBtn, ...(screen === t.id ? { color: "#00ff88" } : {}) }} onClick={() => setScreen(t.id)}>
            <span style={{ fontSize: 16 }}>{t.icon}</span>
            <span style={{ fontSize: 8 }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function Tag({ col, children }) {
  return <span style={{ fontSize: 8, fontWeight: 700, color: col, background: col + "15", border: `1px solid ${col}30`, borderRadius: 3, padding: "2px 5px" }}>{children}</span>;
}
function UBadge({ days }) {
  const [col, txt] = days < 0.5 ? ["#ff3b30","⚡ TODAY"] : days < 1 ? ["#ff6b6b",`${(days*24).toFixed(0)}h`] : days < 2 ? ["#f5a623",`~${days.toFixed(1)}d`] : ["#444",`${days.toFixed(1)}d`];
  return <span style={{ fontSize: 9, fontWeight: 700, color: col, background: col+"15", borderRadius: 4, padding: "2px 6px", flexShrink: 0 }}>{txt}</span>;
}

// ══════════ DASHBOARD ══════════
function DashScreen({ pnl, withSig, eligible, autoOn, setAutoOn, stopLossHit, setStopLossHit, log, countdown, fmt$, config, dynExposure, gainToNext, winRate, currentBal, stats }) {
  const total    = pnl.realized + pnl.unrealized;
  const topSigs  = withSig.filter(m => m.signal && m.signal.quality >= 60).slice(0, 3);
  const gainPct  = ((currentBal - config.startBalanceCents) / config.startBalanceCents * 100).toFixed(1);
  const nextStep = gainToNext / 100;

  return (
    <div style={S.page}>
      {/* P&L */}
      <div style={S.pnlCard}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 9, color: "#333", textTransform: "uppercase", letterSpacing: 2, marginBottom: 6 }}>Session P&amp;L</div>
            <div style={{ fontSize: 40, fontWeight: 900, color: total >= 0 ? "#00ff88" : "#ff6b6b", lineHeight: 1 }}>
              {total >= 0 ? "+" : ""}{fmt$(Math.abs(total))}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10, color: "#555" }}>Account</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>{fmt$(currentBal)}</div>
            <div style={{ fontSize: 11, color: total >= 0 ? "#00ff88" : "#ff6b6b" }}>{gainPct >= 0 ? "+" : ""}{gainPct}%</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 4 }}>
          {[["Realized", fmt$(pnl.realized), "#00ff88"], ["Trades", pnl.trades, "#fff"], ["Win Rate", winRate === "–" ? "–" : winRate+"%", "#00ff88"]].map(([l, v, c]) => (
            <span key={l} style={{ fontSize: 11, color: "#555" }}>{l} <span style={{ color: c, fontWeight: 700 }}>{v}</span></span>
          ))}
        </div>
      </div>

      {/* Exposure Scaler */}
      <div style={{ background: "#0a0f14", border: "1px solid #1a2230", borderRadius: 12, padding: "13px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700 }}>Auto-Scaling Exposure</div>
            <div style={{ fontSize: 10, color: "#555", marginTop: 2 }}>+$50 exposure per $100 profit</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: "#00ff88" }}>{fmt$(dynExposure)}</div>
            <div style={{ fontSize: 10, color: "#555" }}>current cap</div>
          </div>
        </div>
        <div style={{ height: 4, background: "#111", borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${Math.min(100, ((10000 - gainToNext) / 10000) * 100)}%`, background: "#00ff88", borderRadius: 2, transition: "width 1s" }} />
        </div>
        <div style={{ fontSize: 10, color: "#555", marginTop: 5 }}>${nextStep.toFixed(2)} more profit → exposure unlocks to {fmt$(dynExposure + 5000)}</div>
      </div>

      {/* Auto-Trade Toggle */}
      <div style={{ background: "#0a0f14", border: `1px solid ${stopLossHit ? "#ff3b3033" : "#1a2230"}`, borderRadius: 12, padding: "13px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
            Auto-Trade
            {stopLossHit
              ? <span style={{ fontSize: 10, color: "#ff3b30" }}>🛑 STOP-LOSS HIT</span>
              : <span style={{ fontSize: 10, color: autoOn ? "#00ff88" : "#444" }}>{autoOn ? `● LIVE — next in ${countdown}s` : "○ OFF"}</span>
            }
          </div>
          <div style={{ fontSize: 10, color: "#444", marginTop: 3 }}>
            {stopLossHit
              ? `Halted — account fell 20%+ from start. Reset to resume.`
              : `Max ${config.maxTradesPerScan} trades/scan · ARB→NEWS→FADE priority`
            }
          </div>
        </div>
        {stopLossHit
          ? <button style={{ fontSize: 11, background: "#1a0505", border: "1px solid #ff3b3033", color: "#ff6b6b", borderRadius: 7, padding: "7px 12px", cursor: "pointer", fontFamily: "inherit" }} onClick={() => { setStopLossHit(false); addLog("Stop-loss reset manually", "warn"); }}>Reset</button>
          : <div style={{ ...S.toggle, background: autoOn ? "#00ff88" : "#111", border: `1px solid ${autoOn ? "#00ff88" : "#222"}` }} onClick={() => setAutoOn(a => !a)}>
              <div style={{ ...S.thumb, transform: autoOn ? "translateX(22px)" : "translateX(2px)" }} />
            </div>
        }
      </div>

      {/* Stats row */}
      <div style={{ display: "flex", gap: 8 }}>
        {[[eligible.length, "Markets", "#fff"], [withSig.filter(m => m.signal).length, "Signals", "#00ff88"], [Object.values({}).filter ? "–" : "–", "ARB", "#00ff88"]].map(([n, l, c]) => (

// ══════════ MARKETS ══════════
function MarketsScreen({ markets, fmt$, addLog, demo, paper, setPnl, setStats, setBalance, config, newsCache, fetchNews, tradedRef }) {
  const [filter, setFilter] = useState("signals");
  const shown = filter === "signals" ? markets.filter(m => m.signal) : markets;

  const doTrade = async (m) => {
    if (!m.signal) return;
    if (demo && tradedRef.current.has(m.ticker)) {
      addLog(`Already traded ${m.ticker} — wait for it to expire`, "warn");
      return;
    }
    const price = m.signal.side === "no" ? m.no_bid : m.yes_bid ?? m.last_price ?? 50;
    const cost  = kellySize(m.signal.estWinProb, price, config.kellyFraction, config.maxBetCents, m.days);
    addLog(`Manual trade: ${m.ticker} | bet $${(cost/100).toFixed(2)} | ${m.signal.label}`, "trade");
    if (demo || paper) {
      const sim = simulateTrade(m.signal, price, cost);
      if (!sim.filled) {
        addLog(`⟳ Order not filled — limit order missed the market`, "info");
        return;
      }
      setPnl(p => ({ ...p, trades: p.trades + 1, wins: p.wins + (sim.won ? 1 : 0), realized: p.realized + sim.net }));
      setStats(s => ({ ...s, [m.signal.signal]: { trades: (s[m.signal.signal]?.trades??0)+1, wins: (s[m.signal.signal]?.wins??0)+(sim.won?1:0), totalReturn: (s[m.signal.signal]?.totalReturn??0)+sim.net } }));
      setBalance(b => (b ?? 10000) + sim.net);
      tradedRef.current.add(m.ticker);
      const feeNote = sim.fee > 0 ? ` (fee -$${(sim.fee/100).toFixed(2)})` : "";
      addLog(`${sim.won ? "✓ WIN" : "✗ LOSS"}: ${sim.net >= 0 ? "+" : ""}$${(sim.net/100).toFixed(2)}${feeNote} | true p=${(sim.trueWinProb*100).toFixed(0)}%`, sim.won ? "success" : "error");
    } else {
      try {
        await placeOrder(m.ticker, m.signal.side === "both" ? "yes" : m.signal.side, Math.max(1, Math.round(cost / 10)), price);
        addLog("✓ Order placed", "success"); setPnl(p => ({ ...p, trades: p.trades + 1 }));
      } catch (e) { addLog(`✗ ${e.message}`, "error"); }
    }
  };

  return (
    <div style={S.page}>
      <div style={{ display: "flex", gap: 8 }}>
        {["signals","all"].map(f => (
          <button key={f} style={{ flex: 1, padding: "9px 0", background: filter === f ? "#00ff8808" : "#0a0f14", border: `1px solid ${filter === f ? "#00ff8830" : "#1a2230"}`, borderRadius: 8, color: filter === f ? "#00ff88" : "#444", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }} onClick={() => setFilter(f)}>
            {f === "signals" ? "🔥 Qualifying Signals" : "All Markets"}
          </button>
        ))}
      </div>

      {shown.length === 0 && <div style={S.empty}>No qualifying signals.<br/>Load AI news for markets to unlock NEWS signals.</div>}

      {shown.map(m => {
        const nc = newsCache[m.ticker];
        const blocked = isSportsMarket(m);
        const price = m.signal?.side === "no" ? m.no_bid : m.yes_bid ?? m.last_price ?? 50;
        const cost  = m.signal ? kellySize(m.signal.estWinProb, price, config.kellyFraction, config.maxBetCents, m.days) : 0;
        return (
          <div key={m.ticker} style={{ background: blocked ? "#0a0808" : "#0a0f14", border: `1px solid ${blocked ? "#ff3b3022" : "#1a2230"}`, borderLeft: `3px solid ${blocked ? "#ff3b30" : m.signal ? m.signal.color : "#1a2230"}`, borderRadius: 12, padding: 14, display: "flex", flexDirection: "column", gap: 10, opacity: blocked ? 0.5 : 1 }}>
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: blocked ? "#666" : "#ddd", flex: 1, lineHeight: 1.4 }}>{m.title}</div>
              {blocked ? <span style={{ fontSize: 9, fontWeight: 700, color: "#ff3b30", background: "#ff3b3015", border: "1px solid #ff3b3030", borderRadius: 4, padding: "2px 7px", flexShrink: 0 }}>⛔ SPORTS</span> : <UBadge days={m.days} />}
            </div>
            <div style={{ display: "flex" }}>
              {[["YES",`${m.yes_bid ?? m.last_price}¢`],["NO",`${100-(m.yes_bid??50)}¢`],["VOL",m.volume?(m.volume/1000).toFixed(0)+"k":"–"],["EDGE",m.signal?`${(m.signal.edge*100).toFixed(0)}%`:"–"]].map(([k,v])=>(
                <div key={k} style={{ flex:1, textAlign:"center" }}>
                  <div style={{ fontSize:14, fontWeight:700 }}>{v}</div>
                  <div style={{ fontSize:8, color:"#333", marginTop:2 }}>{k}</div>
                </div>
              ))}
            </div>
            {!blocked && m.signal && (
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
                <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
                  <span style={{ fontSize:10, fontWeight:700, color:m.signal.color, background:m.signal.color+"11", border:`1px solid ${m.signal.color}33`, borderRadius:5, padding:"2px 8px", alignSelf:"flex-start" }}>{m.signal.label}</span>
                  <span style={{ fontSize:9, color:"#555" }}>{m.signal.why} · Bet: {fmt$(cost)}</span>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  {!nc?.loading && !nc?.data && <button style={S.btnPurple} onClick={() => fetchNews(m.ticker, m.title, m.yes_bid ?? m.last_price ?? 50)}>📰 News</button>}
                  {nc?.loading && <span style={{ fontSize:11, color:"#c084fc" }}>…</span>}
                  <button style={S.btnTrade} onClick={() => doTrade(m)}>Trade →</button>
                </div>
              </div>
            )}
            {!blocked && !m.signal && (
              <button style={S.btnPurple} onClick={() => fetchNews(m.ticker, m.title, m.yes_bid ?? m.last_price ?? 50)} disabled={nc?.loading}>
                {nc?.loading ? "Fetching news…" : "📰 Load AI News to find signal"}
              </button>
            )}
            {nc?.data && <NewsSnip data={nc.data} />}
          </div>
        );
      })}
    </div>
  );
}

      <div style={{ display:"flex", gap:8 }}>
        {[
          [winRate === "–" ? "–" : winRate+"%", "Win Rate",  "#00ff88"],
          [total,                               "Trades",    "#fff"   ],
          [fmt$(Math.abs(pnl.realized)),        "P&L",       pnl.realized >= 0 ? "#00ff88" : "#ff6b6b"],

            <p style={{ fontSize:11, color:"#666", margin:"0 0 10px", lineHeight:1.6 }}>{desc}</p>

              {[["Trades", s.trades, "#fff"], ["Win Rate", wr, "#00ff88"], ["Return", fmt$(Math.abs(s.totalReturn)), s.totalReturn>=0?"#00ff88":"#ff6b6b"]].map(([l,v,c]) => (
                <div key={l}><span style={{ fontSize:10, color:"#444" }}>{l} </span><span style={{ fontSize:12, fontWeight:700, color:c }}>{v}</span></div>
              ))}

      {/* Honest limitations */}

          const exp = 5000 + i * 5000;
          return (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #0f1520" }}>
              <span style={{ fontSize:12, color:"#666" }}>Account {fmt$(bal)}</span>
              <span style={{ fontSize:12, fontWeight:700, color:"#00ff88" }}>→ {fmt$(exp)} exposure</span>
            </div>
          );
        })}
      </div>

      <button style={{ background:"transparent", color:"#ff6b6b", border:"1px solid #ff6b6b22", borderRadius:10, padding:"12px 20px", fontSize:13, cursor:"pointer", fontFamily:"inherit" }} onClick={onLogout}>
        Disconnect
      </button>
    </div>
  );
}

// ─── Proxy Field (collapsed — only needed for CORS) ──────────────────────────
function ProxyField({ proxyUrl, setProxyUrl }) {
  const [open, setOpen] = useState(!!proxyUrl);
  return (
    <div style={{ border:"1px solid #1a2230", borderRadius:10, overflow:"hidden" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", cursor:"pointer", background:"#0a0f14" }}
        onClick={() => setOpen(o => !o)}>
        <span style={{ fontSize:11, color:"#555" }}>
          {proxyUrl ? <span style={{ color:"#00ff88" }}>✓ Proxy configured</span> : "⚙️ CORS proxy (only needed if Connect fails)"}
        </span>
        <span style={{ fontSize:11, color:"#444" }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ padding:"0 14px 14px", background:"#0a0f14", display:"flex", flexDirection:"column", gap:8 }}>
          <p style={{ fontSize:11, color:"#555", margin:0, lineHeight:1.6 }}>
            If Connect fails with a network error, Kalshi's API is blocking browser requests (CORS).
            Deploy the free Cloudflare Worker below and paste its URL here.
          </p>
          <input style={{ background:"#0e141b", border:"1px solid #1a2230", borderRadius:8, padding:"9px 12px", color:"#fff", fontSize:13, fontFamily:"inherit", outline:"none" }}
            type="url" placeholder="https://your-worker.workers.dev"
            value={proxyUrl} onChange={e => setProxyUrl(e.target.value)} />
          <SetupGuide />
        </div>
      )}
    </div>
  );
}

// ─── Setup Guide Component ────────────────────────────────────────────────────
function SetupGuide({ expanded = false }) {
  const [open, setOpen] = useState(expanded);
  const [copied, setCopied] = useState(false);

  const copy = () => {
    navigator.clipboard.writeText(WORKER_CODE).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div style={{ background: "#080c10", border: "1px solid #1a2230", borderRadius: 10, overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", cursor: "pointer" }} onClick={() => setOpen(o => !o)}>
        <span style={{ fontSize: 12, fontWeight: 700, color: "#aaa" }}>🛠 Proxy Setup Guide (2 min, free)</span>
        <span style={{ fontSize: 12, color: "#555" }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ padding: "0 14px 14px", display: "flex", flexDirection: "column", gap: 10 }}>
          {[
            ["1", "Go to", "workers.cloudflare.com", "https://workers.cloudflare.com", "and create a free account"],
            ["2", "Click", "Create Worker", null, "then paste the code below"],
            ["3", "Click Deploy — copy the", "*.workers.dev URL", null, ""],
            ["4", "Paste that URL into the Proxy URL field above", "", null, ""],
          ].map(([n, pre, link, href, post]) => (
            <div key={n} style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
              <span style={{ fontSize: 11, color: "#00ff88", fontWeight: 800, flexShrink: 0 }}>{n}.</span>
              <span style={{ fontSize: 11, color: "#555", lineHeight: 1.6 }}>
                {pre}{" "}
                {href ? <a href={href} target="_blank" rel="noreferrer" style={{ color: "#00ff88", textDecoration: "none" }}>{link}</a> : <strong style={{ color: "#aaa" }}>{link}</strong>}
                {" "}{post}
              </span>
            </div>
          ))}
          <div style={{ position: "relative" }}>
            <div style={{ background: "#050709", border: "1px solid #111820", borderRadius: 8, padding: "10px 12px", fontSize: 10, color: "#555", fontFamily: "monospace", lineHeight: 1.7, maxHeight: 140, overflowY: "auto", whiteSpace: "pre-wrap" }}>
              {WORKER_CODE}
            </div>
            <button onClick={copy} style={{ position: "absolute", top: 8, right: 8, background: copied ? "#00ff8820" : "#111820", border: `1px solid ${copied ? "#00ff8844" : "#222"}`, color: copied ? "#00ff88" : "#666", borderRadius: 5, padding: "4px 8px", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>
              {copied ? "✓ Copied" : "Copy"}
            </button>
          </div>
          <p style={{ fontSize: 10, color: "#333", margin: 0, lineHeight: 1.6 }}>
            The Worker just adds CORS headers and forwards requests to Kalshi. Your credentials never leave your browser — the Worker is stateless.
          </p>
        </div>
      )}
    </div>
  );
}
