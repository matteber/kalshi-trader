      histCache.cachedAt&&(Date.now()-histCache.cachedAt<24*3600*1000);
    if(histCacheUsable){
      log("History: using cached historical fills ("+histCache.fills.length+" records, "+Math.round((Date.now()-histCache.cachedAt)/3600000)+"h old, cutoff "+(histCache.cutoffTs||"unknown")+")");
      for(var hi=0;hi<histCache.fills.length;hi++)allFills.push(histCache.fills[hi]);
      historicalFillsLoaded=histCache.fills.length;
    }

    // Sequence: live fills -> settlements -> (cutoff + historical fills if cache miss)
    // Fetching cutoff in same chain lets us log the boundary to help debug
    // "where did my old fills go" questions.
    return pageFills("",1).then(function(){
      return pageSettlements("",1);
    }).then(function(){
      if(histCacheUsable)return null;
      // Fetch cutoff timestamps once per sync when we need to re-pull historical.
      // Log them; cache for next time.
      return api("/historical/cutoff").then(function(co){
        if(co){
          khSaveCutoff({cutoff:co,fetchedAt:Date.now()});
          if(co.trades_created_ts){
            log("Kalshi historical cutoff: trades older than "+co.trades_created_ts+" are in /historical/fills (3-month live window).");
          }
        }
        return co;
      },function(err){
        log("Cutoff endpoint unavailable: "+(err&&err.message||"unknown"),"warn");
        return null;
      });
    }).then(function(co){
      if(histCacheUsable)return null;
      // Snapshot the fill count BEFORE historical fetch so we can save just
      // the historical fills (not duplicating live).
      var liveFillCount=allFills.length;
      return pageHistoricalFills("",1).then(function(){
        // Persist historical fills only (allFills now has live + historical mixed).
        var histOnly=allFills.slice(liveFillCount);
        if(histOnly.length>0){
          khSaveHistoricalFills({fills:histOnly,cachedAt:Date.now(),
            cutoffTs:co?co.trades_created_ts:null});
          log("History: cached "+histOnly.length+" historical fills for 24h.");
        }
        return null;
      });
    }).then(function(){
      var records=khReconstruct(allFills,allSettlements);
      var saved={records:records,lastSync:Date.now(),
        fillCount:allFills.length,settlementCount:allSettlements.length,
        liveFills:allFills.length-historicalFillsLoaded,
        historicalFills:historicalFillsLoaded};
      khSave(saved);setKhist(saved);
      var agg=khAggregate(records);
      // v1.0.0-beta.1+: include dollar magnitudes in the history log so we can
      // sanity-check realized P&L vs account change. Without these, "ROI 13.4%"
      // could mean +$1 or +$50 depending on cost basis - and we can't reconcile
      // with the actual account total. The discrepancy investigation needs these.
      log("History: "+allFills.length+" fills ("+(saved.liveFills||0)+" live + "+(saved.historicalFills||0)+" historical), "+allSettlements.length+" settlements -> "+
        records.length+" tickers ("+agg.settled+" settled, "+agg.won+"W "+agg.lost+"L, ROI "+agg.roi.toFixed(1)+"%)","success");
      log("History P&L: cost=$"+(agg.cost/100).toFixed(2)+", proceeds=$"+(agg.proceeds/100).toFixed(2)+", fees=$"+(agg.fees/100).toFixed(2)+", net realized=$"+(agg.pnl/100).toFixed(2)+" | open exposure=$"+(agg.openCost/100).toFixed(2)+" ("+agg.openCount+" pos) | gross wins=$"+(agg.grossWonC/100).toFixed(2)+", gross losses=$"+(agg.grossLostC/100).toFixed(2));
      // v1.0.0-beta.2: dedup log tagged with current version. Unconditional so
      // deployment is unambiguous.
      if(records._dedup){
        var dd=records._dedup;
        var ddSev=(dd.fillsDropped>0||dd.settlementsDroppedDup>0||dd.settlementsSkippedDup>0||dd.unreconstructableCount>0)?"warn":"info";
        log("Dedup [v1.0.0-beta.9]: dropped "+dd.fillsDropped+" duplicate fills, "+dd.settlementsDroppedDup+" duplicate settlements, skipped "+dd.settlementsSkippedDup+" already-processed settlements (raw: "+dd.rawFills+" fills + "+dd.rawSettlements+" settlements; tickers seen: "+(dd.dedupedSettlements-dd.settlementsSkippedDup)+")",ddSev);
        if(dd.unreconstructableCount>0){
          log("Unreconstructable: "+dd.unreconstructableCount+" tickers with real sells but missing or synthetic-only buys (original buy fills aged out of Kalshi's live tier). Excluding $"+(dd.unreconstructableProceedsC/100).toFixed(2)+" in proceeds from realized P&L to prevent phantom wins. Sample: "+dd.unreconstructableSample.join(", "),"warn");
        }
      }
      // V1.0.0-beta1.5: also flag pagination cap concern.
      // pageFills and pageSettlements both stop at page<10 (max 2000 records each).
      // If we hit the cap, history is truncated and ALL stats are misleading.
      if(allFills.length>=2000){
        log("WARNING: fills hit pagination cap (2000+); older history truncated. Stats are partial.","warn");
      }
      if(allSettlements.length>=2000){
        log("WARNING: settlements hit pagination cap (2000+); older history truncated. Stats are partial.","warn");
      }

      // V30.4: Backfill met counters from Kalshi history so live mode actually shows W/L.
      // Without this, only trades placed AFTER ledger system existed get counted.
      if(modeRef.current==="live"){
        setMet(function(prev){
          var n=cx(prev);
          // Use Kalshi numbers as authoritative for live mode
          n.w=agg.won;
          n.l=agg.lost;
          n.fl=Math.max(n.fl||0,allFills.length);// fills includes buys+sells, treat as min
          n.at=Math.max(n.at||0,agg.total);// attempted >= total tickers
          n.ea=agg.pnl;// realized P&L in cents
          n.fe=agg.fees;
          n.lv=agg.cost;// cost basis = "total leveraged" (cumulative attempts)
          // V30.5: Sync n.pl too so ROI = ea/pl computes correctly. n.pl is the
          // session's "principal at risk" used in ROI denominator - without this,
          // n.pl stays at the small in-session value (e.g. one trade = 80c)
          // making ROI explode (e.g. 261c/80c = 326%). Use cumulative cost basis.
          n.pl=agg.cost;
          svM(n,"live");
          return n;
        });
        log("Metrics backfilled from Kalshi history","success");

        // V30.4: Close any open ledger entries whose tickers have settled in Kalshi.
        // The polling-based checkLiveSettlements only sees the recent 100, so older
        // settlements never close their matching ledger entries. Use the full sync to fix.
        var ledgerClosed=0;
        for(var ri=0;ri<records.length;ri++){
          var rec=records[ri];
          if(rec.status!=="settled")continue;
          var hits=rtFindOpenByTicker(rec.ticker,"live");
          for(var hi=0;hi<hits.length;hi++){
            var le=hits[hi].r;
            // Determine if this ledger entry won based on settlement
            var won;
            if(le.sig==="MM"){won=rec.pnl>0;}
            else if(rec.settlement&&(rec.settlement.result==="yes"||rec.settlement.result==="no")){
              won=(le.side===rec.settlement.result);
            }else{won=rec.won;}// fallback to overall ticker P&L direction
            var lePnl=won?Math.round((100-le.entryPx)*le.qty-(le.qty*le.entryPx*0.0175)):
                          -(le.qty*le.entryPx);
            rtUpdate(le.id,{status:"settled",exitTs:rec.lastTs||Date.now(),
              won:won,pnl:lePnl,fees:Math.round(le.qty*le.entryPx*0.0175),
              source:"history_sync",result:rec.settlement?rec.settlement.result:""});
            ledgerClosed++;
          }
        }
        if(ledgerClosed>0)log("Ledger: closed "+ledgerClosed+" stuck-OPEN entries via history sync","success");
      }
      khSyncing.current=false;
      return saved;
    }).catch(function(e){
      log("History sync error: "+e.message,"error");
      khSyncing.current=false;
      return null;
    });
  }

  function fetchPortfolio(force){
    if(demo)return Promise.resolve(null);
    // Throttle: skip if already syncing or synced within 30s (unless forced)
    if(pfSyncing.current)return Promise.resolve(null);
    var sinceSync=Date.now()-portfolio.lastSync;
    if(!force&&sinceSync<30000&&portfolio.lastSync>0)return Promise.resolve(null);
    pfSyncing.current=true;
    return Promise.all([
      api("/portfolio/balance"),
      api("/portfolio/positions?limit=100&status=open"),
      api("/portfolio/orders?status=resting&limit=100")
    ]).then(function(res){
      var balData=res[0],posData=res[1],restData=res[2];
      var cash=balData.balance||d2c(balData.balance_dollars)||0;
      // V1.0.0-beta1.5: ALSO capture portfolio_value (Kalshi's authoritative current
      // value of all open positions in cents). This is the ground-truth number we
      // use to detect drift in our reconstructed math. If our computed
      // sum-of-totalCost differs from this by a meaningful amount, we have a bug.
      var pfValueAuth=balData.portfolio_value||d2c(balData.portfolio_value_dollars)||0;

      // Debug: log raw position fields from first result
      var rawPos=posData.market_positions||posData.positions||posData.event_positions||[];
      // Handle nested event_positions -> market_positions structure
      if(rawPos.length>0&&rawPos[0].market_positions){
        var flat=[];
        for(var ei=0;ei<rawPos.length;ei++){
          var mp=rawPos[ei].market_positions||[];
          for(var mi=0;mi<mp.length;mi++)flat.push(mp[mi]);
        }
        rawPos=flat;
      }
      if(rawPos.length>0){
        log("RAW POS: "+rawPos.length+" positions, fields: "+Object.keys(rawPos[0]).slice(0,8).join(", "));
      }

      var positions=rawPos.map(function(p){
        // V1.0.0-beta1.4 cost-basis fix.
        //
        // Kalshi v2 API position fields (per docs.kalshi.com/python-sdk/models/MarketPosition):
        //   position_fp:               net contracts (negative=NO, positive=YES, abs=qty)
        //   total_traded_dollars:      LIFETIME spend on this market (buys + sells gross).
        //                              After any partial close this OVERSTATES open exposure.
        //   market_exposure_dollars:   COST BASIS of the currently-held position. This is
        //                              what Kalshi's UI shows in the "Cost" column. Equals
        //                              avg_buy_price * remaining_qty.
        //   realized_pnl_dollars:      Locked-in P&L from already-closed portions (gross of fees)
        //   fees_paid_dollars:         Fees paid lifetime
        //
        // Bug we fixed: previously used total_traded_dollars as "cost". For positions where
        // we'd done partial closes, this inflated 'deployed' by the dollar value of the
        // closed slices. From the May 5 logs: KAUTO showed deployed $30.89-$32.09, Kalshi
        // UI showed $27.26 in open positions -- the $3.63-$4.83 gap was from partial-close
        // history on Survivor / Bitcoin / etc. tickers. market_exposure_dollars is the
        // correct field; it now matches Kalshi's portfolio total.
        var posFp=parseFloat(p.position_fp||"0");
        var qty=Math.abs(posFp);
        var side=posFp>=0?"yes":"no";
        var costBasis=d2c(p.market_exposure_dollars)||0;// cost basis of OPEN position
        var avgP=qty>0?Math.round(costBasis/qty):0;
        var fees=d2c(p.fees_paid_dollars)||0;
        var pnl=d2c(p.realized_pnl_dollars)||0;
        // Note: marketValue field name kept for backwards compat (UI consumers read it),
        // but its semantics changed: it now equals totalCost since both come from the
        // same source. Mark-to-market value comes from quote() / liveMid in the position
        // viewer, not from this field.
        return{ticker:p.ticker||"",side:side,qty:qty,
          avgPrice:avgP,marketValue:costBasis,totalCost:costBasis,
          pnl:pnl,fees:fees};
      });
      // v1.0.0-beta.9: AUTHORITATIVE realized P&L from Kalshi.
      // Sum realized_pnl_dollars across ALL positions (including closed ones with qty=0)
      // BEFORE the qty>0 filter below. This is what Kalshi's UI shows as your lifetime
      // realized P&L; it's computed by Kalshi's accounting system and is the source of
      // truth. The fills-based reconstruction we do in khReconstruct keeps producing
      // wrong numbers due to multi-side semantics ("sell no" can mean either close-yes
      // or open-short-no, and we can't always tell from the fill alone). Use Kalshi's
      // number as the headline; keep our reconstruction as diagnostic detail.
      var kalshiRealizedC=0;
      var kalshiFeesC=0;
      for(var pi=0;pi<positions.length;pi++){
        kalshiRealizedC+=positions[pi].pnl||0;
        kalshiFeesC+=positions[pi].fees||0;
      }
      // Stash on portfolio object so the reconciliation block below can use it.
      // Net of fees: realized_pnl_dollars is GROSS per Kalshi's docs.
      var kalshiRealizedNetC=kalshiRealizedC-kalshiFeesC;
      positions=positions.filter(function(p){return p.qty>0;});// filter out zero-qty settled positions for display

      var rawOrd=restData.orders||[];
      if(rawOrd.length>0){
        // V30.9: dump ALL keys + the order_id and created_time of first order
        // so we can see in the log whether the cancel logic has the data it needs
        var allKeys=Object.keys(rawOrd[0]).join(",");
        log("RAW ORD: "+rawOrd.length+" orders | id="+(rawOrd[0].order_id||"MISSING")+" | created="+(rawOrd[0].created_time||"MISSING")+" | keys: "+allKeys);
      }

      var resting=rawOrd.map(function(o){
        // Kalshi v2: yes_price/no_price as integers, or *_dollars as strings
        var pr=0;
        if(o.yes_price)pr=o.yes_price;
        else if(o.yes_price_dollars)pr=d2c(o.yes_price_dollars);
        else if(o.no_price)pr=o.no_price;
        else if(o.no_price_dollars)pr=d2c(o.no_price_dollars);
        var qty=o.remaining_count||parseInt(o.remaining_count_fp||"0")||0;
        return{id:o.order_id||o.id||"",ticker:o.ticker||"",side:o.side||"yes",
          qty:qty,price:pr,
          cost:qty*pr,
          created:o.created_time||"",
          action:o.action||"buy"};
      });
      var pf={cash:cash,positions:positions,resting:resting,lastSync:Date.now(),
        // V1.0.0-beta1.5: Kalshi's authoritative portfolio value (sum of mark-to-market
        // for all open positions). Should match Kalshi UI's "Positions" header number.
        kalshiPortfolioValue:pfValueAuth,
        // Total account = cash + portfolio value (per Kalshi). This is the ground-truth
        // number you can verify against the Kalshi UI portfolio total.
        kalshiAccountTotal:cash+pfValueAuth,
        // v1.0.0-beta.9: Kalshi-reported lifetime realized P&L. Sum of
        // realized_pnl_dollars across ALL positions (including closed/settled with
        // qty=0). Computed BEFORE the qty>0 filter. This is the authoritative
        // realized number; the fills-based reconstruction in khReconstruct keeps
        // disagreeing with it and the reconstruction is the wrong one. Used by the
        // reconciliation block so "implied starting capital" lands correctly.
        kalshiRealizedC:kalshiRealizedC,
        kalshiFeesC:kalshiFeesC,
        kalshiRealizedNetC:kalshiRealizedNetC};
      setPortfolio(pf);
      pfSyncing.current=false;

      // V1.0.0 fix: update balRef and deployedRef on EVERY successful sync,
      // not just when called from the auto-loop. Previously these refs were
      // only updated inside the auto-loop callback at line ~2988, which the
      // 30s sync throttle frequently caused to receive null. Result: the
      // bot's "Deployed" stayed at $0 while the user had real positions
      // worth several dollars, and maxBet() under-counted bankroll.
      if(!demo){
        balRef.current=cash;
        if(typeof setBal==="function")setBal(cash);
        var posCost=0;
        for(var pi2=0;pi2<positions.length;pi2++)posCost+=(positions[pi2].totalCost||0);
        for(var ri2=0;ri2<resting.length;ri2++){
          // Only count BUY orders as deployed (sells don't reserve cash)
          if((resting[ri2].action||"buy")==="buy")posCost+=(resting[ri2].cost||0);
        }
        deployedRef.current=posCost;
      }

      // V30.4: Fetch live bids for held tickers to populate marketValue (mark-to-market).
      // V30.5 fix: Kalshi returns prices as DOLLAR STRINGS (e.g. "0.5600") in *_dollars fields,
      // not integer cents in *_bid fields. Use d2c() to normalize -> integer cents.
      // Without this fix, m.yes_bid is undefined, bid=0, every position shows "(no quote)".
      if(positions.length>0){
        var tks=positions.map(function(p){return p.ticker;}).slice(0,40).join(",");
        api("/markets?tickers="+encodeURIComponent(tks)+"&limit=40").then(function(d){
          var mk=d.markets||[],byT={};
          for(var i=0;i<mk.length;i++)byT[mk[i].ticker]=mk[i];
          var quoted=0;
          var enriched=positions.map(function(p){
            var m=byT[p.ticker];
            if(!m)return p;
            // Normalize using d2c (handles both integer and dollar-string fields)
            var ybd=d2c(m.yes_bid_dollars);if(ybd==null)ybd=parseInt(m.yes_bid||"0",10)||0;
            var yad=d2c(m.yes_ask_dollars);if(yad==null)yad=parseInt(m.yes_ask||"0",10)||0;
            var nbd=d2c(m.no_bid_dollars); if(nbd==null)nbd=parseInt(m.no_bid||"0",10)||0;
            var nad=d2c(m.no_ask_dollars); if(nad==null)nad=parseInt(m.no_ask||"0",10)||0;
            var bid=p.side==="yes"?ybd:nbd;
            var ask=p.side==="yes"?yad:nad;
            var mid=Math.round((bid+ask)/2);
            var liveBid=bid>0?bid:mid;
            if(liveBid>0)quoted++;
            return cx(p,{liveBid:liveBid,liveAsk:ask,liveMid:mid,
              marketValue:p.qty*liveBid,
              lastClose:d2c(m.last_price_dollars)||0,
              quoteOk:liveBid>0});
          });
          if(quoted>0)log("Position quotes: "+quoted+"/"+positions.length+" priced");
          setPortfolio(function(prev){return cx(prev,{positions:enriched});});
        }).catch(function(e){log("Position quote fetch failed: "+e.message,"warn");});
      }
      return pf;
    }).catch(function(e){log("Portfolio sync error: "+e.message,"warn");pfSyncing.current=false;return null;});
  }

  // ---- POSITION EXIT MONITORING ----
  // V30.7: Confidence-aware exit decisions. Replaces the v30.6 "flat 3c at ask"
  // rule with a tiered policy that considers:
  //   - Original strategy (WX, FAV, VALUE, VOL, MM)
  //   - Time to settlement (held positions earn 100c if right)
  //   - Price move direction relative to our thesis
  //   - ROI on the position so far
  //   - Strict stop-loss only when thesis demonstrably broke
  // Maker pricing is "slightly greedy": for held-thesis positions we post above
  // ask hoping a hot taker overpays; for flagged-exits we post at ask for fast fill.
  //
  // Tiers (returns {action: "hold"|"sell"|"stop", price, reason}):
  //   THESIS BREAK (stop): mid moved >=15c against us AND roi <= -25%
  //                         AND original edge was small (<5c), AND >24h to close
  //                         -> exit at ask to free capital
  //   GUARANTEED HOLD: WX/FAV with thesis confirmed (mid moved toward us 5c+)
  //                    AND >=1d to close -> never sell early
  //   GREEDY HOLD: FAV/WX with ROI >= 50% AND >= 6h left -> post at ask+3c
  //                (fishing for taker overpay; unlikely but free option)
  //   STRONG HOLD: FAV with ROI 25-50% AND >= 12h left -> post at ask+2c
  //   STANDARD EXIT: VALUE/VOL with profit >= 3c -> post at ask
  //   FAST EXIT: any position with <=6h to close AND profit >= 1c -> post at ask
  //   DEFAULT: hold (no profitable + low conviction exit available)
  // V1.0.0-beta1.3: SELL_GUARD strategy registry.
  // The exit-decision policy is now a registered strategy in the same registry
  // as the entry strategies. SELL_GUARD is the DEFAULT safety net: narrow rules
  // for locking profit and avoiding stranded capital. Per-market strategies
  // (WEATHER, ENERGY, etc.) can register their own decideExit to override
  // SELL_GUARD for their tickers (e.g., weather can sell when forecast flips).
  //
  // What was REMOVED in beta1.3:
  //   - The "thesis broke" stop-loss (-15c move + roi <= -25%). This rule
  //     crystallized losses on price moves alone, with no information about
  //     the actual outcome. From the May 5 logs:
  //       * KXTSWIFTTOYSTORY: sold at 21c on a price move with 57 DAYS to settle
  //         (-44c locked in based on noise, not thesis)
  //       * KXEARNINGSMENTIONMCD: sold at 17c with 9 days to settle (-34c)
  //       * KXHILTONMENTION-MENT: sold at 46c on same-day market (-26c)
  //     Doctrine going forward: don't crystallize losses on price moves.
  //     Hold to settlement unless (a) we can lock real profit, (b) the position
  //     is essentially worthless and we can recover scrap, or (c) the strategy
  //     module that placed the bet says "thesis flipped, exit."
  //
  // What's KEPT (these are the lock-in-profit rules, NOT stop-losses):
  //   - Past-close hold (beta1.2 fix; prevents invalid_price API errors)
  //   - Time-pressure exit when within 6h AND profit available at bid
  //   - Greedy-maker post for high-ROI positions (post above ask, only fills
  //     if a taker overpays; otherwise rests harmlessly and we hold to settle)
  //   - Standard exit at ask when profit_at_ask >= 3c (the Kimmel +14c rule)
  //   - Hopeless-scrap exit (NEW): position is essentially worthless AND time
  //     remains; recover whatever bid is offering rather than zero at settle.
  //
  // How per-strategy overrides work (Phase 1.B+):
  //   - A registered entry-strategy can attach a `decideExit(pos, ctx)` field.
  //   - decideExit() dispatcher calls strategy.decideExit FIRST if present.
  //   - If it returns null, fall through to SELL_GUARD's generic rules.
  //   - Examples (future):
  //       WEATHER.decideExit -> "blended forecast just flipped against us
  //         AND days_to_settle > 0 -> sell at bid to limit loss"
  //       ENERGY.decideExit  -> "spot moved >2 sigma against position
  //         AND days_to_settle > 0 -> sell at bid"
  //   - If a per-strategy decideExit returns an exit, that wins. SELL_GUARD's
  //     rules don't run for that position this cycle.
  //
  // Net effect for now (no strategies have decideExit yet):
  //   SELL_GUARD's narrow rules are the only sell logic. Lock profit, never
  //   crystallize loss on price alone, recover scrap from hopeless positions.

  // SELL_GUARD's exit-decision logic. Returns {action, price, reason} or
  // {action:"hold", ...}. Caller treats action==="hold" or "skip" as no-op.
  function sellGuardDecideExit(pos,bid,ask,mid,daysLeft,strategy,origEdge){
    var entry=pos.avgPrice;
    var side=pos.side;
    // Past-close: never sell. Wait for settlement.
    if(daysLeft!=null&&daysLeft<=0){
      return{action:"hold",price:0,reason:"past close, awaiting settlement"};
    }
    var currentSideValue=mid;
    var priceMove=mid-entry;
    var unrealPnl=currentSideValue-entry;
    var roi=entry>0?(unrealPnl/entry):0;
    var sellFee=kalshiFee(1,bid,true);
    var profitAtBid=bid-entry-sellFee;
    var profitAtAsk=ask-entry-kalshiFee(1,ask,true);

    // ---- HOPELESS-CAUSE SCRAP (V1.0.0-beta1.3 NEW) ----
    // Position has collapsed to <=4c value AND has meaningful time to close.
    // The contract is essentially worthless; recover the scrap rather than
    // hold to a near-certain $0 at settle. Only fires when bid > 0 (someone
    // is offering to buy) AND there's still >= 0.5 days to settle (so we're
    // not in the last few hours where a flip is possible).
    // Doctrine note: this is the ONLY new "loss" sell rule; it crystallizes
    // a near-certain total loss into a partial loss. Nothing about a price
    // move triggers this -- only the absolute current bid level.
    if(mid<=4&&bid>=1&&daysLeft>=0.5&&entry>=15){
      return{action:"sell",price:bid,
        reason:"hopeless scrap (mid:"+mid+"c, bid:"+bid+"c, days:"+daysLeft.toFixed(1)+", recovering "+bid+"c vs likely $0 at settle)"};
    }

    // ---- TIME-PRESSURE FAST EXIT (final hours, in profit) ----
    if(daysLeft<=0.25&&profitAtBid>=1){
      return{action:"sell",price:ask&&ask>0?ask:bid+1,
        reason:"<6h to close, lock +"+profitAtBid+"c"};
    }

    // ---- GREEDY MAKER (very high ROI, fishing post) ----
    // Posts ABOVE the current ask. Fills only if a hot taker overpays.
    // If no taker bites, the order rests harmlessly (15-min TTL via beta1.2)
    // and we still hold the position to settlement. Pure asymmetric upside.
    if((strategy==="FAV"||strategy==="WX")&&roi>=0.50&&daysLeft>=0.25){
      var greedyPrice=Math.min(99,ask+3);
      if(greedyPrice-entry>=8){
        return{action:"sell",price:greedyPrice,
          reason:"greedy maker (roi:"+Math.round(roi*100)+"%, ask+3c="+greedyPrice+"c)"};
      }
    }

    // ---- SLIGHTLY-GREEDY MAKER (moderate ROI on FAV) ----
    if(strategy==="FAV"&&roi>=0.25&&roi<0.50&&daysLeft>=0.5){
      var slightlyGreedy=Math.min(99,ask+2);
      if(slightlyGreedy-entry>=5){
        return{action:"sell",price:slightlyGreedy,
          reason:"slightly greedy (roi:"+Math.round(roi*100)+"%, ask+2c)"};
      }
    }

    // ---- GUARANTEED-FAVORABLE HOLD ----
    // WX/FAV thesis is confirmed (priced moved 5c+ toward us) AND meaningful
    // time. We didn't take greedy maker (ROI<50%) and won't take std exit;
    // hold to settlement.
    if((strategy==="WX"||strategy==="FAV")&&priceMove>=5&&daysLeft>=1){
      return{action:"hold",price:0,
        reason:strategy+" thesis confirmed (moved +"+priceMove+"c, "+daysLeft.toFixed(1)+"d left, holding to settle)"};
    }

    // ---- STANDARD EXIT (lock real profit at ask) ----
    // The Kimmel +14c rule. Position has profit at ask >= 3c (covers fee
    // and leaves something). Sell at ask; if it fills, great; if not, the
    // 15-min TTL cancels and we re-evaluate next cycle.
    if(profitAtAsk>=3){
      return{action:"sell",price:ask&&ask>0?ask:bid+1,
        reason:(strategy||"trade")+" std exit (+"+profitAtAsk+"c at ask)"};
    }

    // ---- DEFAULT: hold ----
    // No exit rule fires. Hold to settlement and trust the original thesis.
    // Critically, NO thesis-broke rule here: a price move alone is not a
    // reason to crystallize a loss.
    return{action:"hold",price:0,
      reason:"no qualifying exit (profit_at_ask:"+profitAtAsk+"c, roi:"+Math.round(roi*100)+"%)"};
  }

  // Public dispatcher. Calls per-strategy decideExit first if present, then
  // falls through to SELL_GUARD's generic rules. See top-of-section comment
  // for the doctrine.
  function decideExit(pos,bid,ask,mid,daysLeft,strategy,origEdge){
    // Per-strategy override hook. Look up the registered strategy by name
    // (FAV/VALUE/MM/WX/VOL etc.) and call its decideExit if defined.
    // For now no entry strategy defines decideExit; this hook is the seam
    // for Phase 1.B (WEATHER) and Phase 2.B (ENERGY).
    var strategyName=strategy||(pos&&pos.strategy)||null;
    if(strategyName&&typeof STRATEGIES==="object"){
      for(var si=0;si<STRATEGIES.length;si++){
        var st=STRATEGIES[si];
        if(st&&st.name===strategyName&&st.enabled&&typeof st.decideExit==="function"){
          var override=st.decideExit({
            pos:pos,bid:bid,ask:ask,mid:mid,daysLeft:daysLeft,
            entry:pos.avgPrice,origEdge:origEdge,strategy:strategyName
          });
          if(override&&override.action&&override.action!=="passthrough"){
            return override;
          }
          // override null/passthrough -> fall through to SELL_GUARD
          break;
        }
      }
    }
    return sellGuardDecideExit(pos,bid,ask,mid,daysLeft,strategy,origEdge);
  }

  function checkExits(marketsArr){
    if(demo)return;
    var positions=portfolio.positions||[];
    if(paperRef.current){
      positions=pending.map(function(p){
        return{ticker:p.tk,side:p.side,qty:p.ct,avgPrice:p.pr,totalCost:p.cost};
      });
    }
    if(positions.length===0)return;

    var scanByT={};
    for(var si=0;si<marketsArr.length;si++)scanByT[marketsArr[si].ticker]=marketsArr[si];

    var actions={sell:0,hold:0,stop:0};
    var holdReasons=[];
    for(var i=0;i<positions.length;i++){
      var pos=positions[i];
      if(!pos.ticker||pos.qty<=0)continue;
      if(pos.side==="pair")continue;

      // V30.7: 'mid' here is ALWAYS our-side midpoint -- decideExit treats mid as the
      // current value of one of OUR contracts, so for NO positions we use no-side mid.
      var bid=null,ask=null,mid=null,title=pos.ticker,closeTime=null;
      var m=scanByT[pos.ticker];
      if(m){
        bid=pos.side==="yes"?m.yes_bid:m.no_bid;
        ask=pos.side==="yes"?m.yes_ask:m.no_ask;
        mid=Math.round((bid+ask)/2);// our-side mid, not yes-side mid
        title=m.title||pos.ticker;
        closeTime=m.close_time||"";
      }else if(pos.quoteOk&&pos.liveBid!=null){
        bid=pos.liveBid;
        ask=pos.liveAsk||(pos.liveBid+1);
        mid=pos.liveMid||Math.round((bid+ask)/2);// already our-side from portfolio quote-fetch
        title=pos.ticker;
        closeTime="";// no close time without scan match - won't trigger time-pressure rules
      }else{continue;}

      // Look up original signal context from the live ledger
      var hits=rtFindOpenByTicker(pos.ticker,"live");
      var ledgerEntry=hits.length>0?hits[0].r:null;
      var strategy=ledgerEntry?ledgerEntry.sig:null;
      var origEdge=ledgerEntry?ledgerEntry.edge:0;
      var origCloseTime=ledgerEntry?ledgerEntry.close_time:"";
      var daysLeft=dtu(closeTime||origCloseTime);

      var decision=decideExit(pos,bid,ask,mid,daysLeft,strategy,origEdge);
      actions[decision.action]=(actions[decision.action]||0)+1;
      if(decision.action==="hold"&&holdReasons.length<3){
        holdReasons.push(pos.ticker.slice(0,30)+": "+decision.reason);
      }

      if(decision.action==="sell"||decision.action==="stop"){
        var label=decision.action==="stop"?"STOP-LOSS":"EXIT";
        log(label+": "+pos.ticker+" sell "+pos.side.toUpperCase()+" @"+decision.price+"c (entry:"+pos.avgPrice+"c, bid:"+bid+"c/ask:"+ask+"c, "+pos.qty+" held) - "+decision.reason,
          decision.action==="stop"?"warn":"success");
        var execMode=opModeRef.current||"off";
        if(!paperRef.current&&(execMode==="sell_only"||execMode==="full_auto")){
          executeSell(pos.ticker,pos.side,pos.qty,decision.price,decision.action==="stop"?"STOP":"EXIT");
        }else if(execMode==="observe"){
          log("[OBSERVE] Would have placed "+label+" "+pos.ticker+" @"+decision.price+"c (not executed)");
        }
      }
    }

    // Summarize per-cycle exit outcomes
    if(actions.sell+actions.stop>0||actions.hold>0){
      log("Exit check: "+positions.length+" pos -> "+(actions.sell||0)+" sells, "+(actions.stop||0)+" stops, "+(actions.hold||0)+" holds"+
        (holdReasons.length>0?" ("+holdReasons.join(" | ")+")":""));
    }
  }

  // ---- NEAR-SIGNAL WATCHLIST ----
  // Markets within 5% of signal threshold - could become tradeable
  function buildWatchlist(marketsArr,cfg2){
    var wl=[];
    for(var i=0;i<marketsArr.length;i++){
      var m=marketsArr[i];
      if(m.signal)continue;
      var days=dtu(m.close_time);if(days<=0)continue;
      var yb=m.yes_bid,ya=m.yes_ask,nb=m.no_bid,na=m.no_ask||nb+4;
      if(yb<=0&&nb<=0)continue;
      var mid=Math.round((yb+ya)/2),sp=ya-yb;
      var dl=days<1?Math.round(days*24)+"h":days<7?days.toFixed(1)+"d":Math.round(days)+"d";
      // Near FAV YES (mid 60-64, need 65+)
      if(mid>=60&&mid<65&&sp<=12&&m.liqScore>=500){
        var triggerPrice=ya-1;
        var potEdge=((mid+3)/100+0.03)*(100-triggerPrice)-(1-(mid+3)/100)*(triggerPrice);
        wl.push({ticker:m.ticker,title:m.title,subtitle:m.subtitle||"",
          type:"FAV",reason:"Mid "+mid+"%, need 65+ for FAV YES",
          mid:mid,sp:sp,vol:m.volume,days:dl,
          trigger:"If mid hits 65c: YES @"+triggerPrice+"c",
          potEV:potEdge>0?"+"+potEdge.toFixed(0)+"c EV":"marginal",
          yb:yb,ya:ya,nb:nb,na:na});
      }
      // Near FAV NO (mid 36-40, need <=35 so NO side is 65+)
      if(mid>35&&mid<=40&&sp<=12&&m.liqScore>=500){
        var nTrigger=na-1;
        wl.push({ticker:m.ticker,title:m.title,subtitle:m.subtitle||"",
          type:"FAV",reason:"NO side "+(100-mid)+"%, need 65+ for FAV NO",
          mid:mid,sp:sp,vol:m.volume,days:dl,
          trigger:"If mid drops to 35c: NO @"+nTrigger+"c",
          potEV:"+3-5c EV",yb:yb,ya:ya,nb:nb,na:na});
      }
      // Near MM (spread 6-7c, need 8+)
      if(sp>=6&&sp<8&&m.liqScore>=1000&&mid>=20&&mid<=80){
        var mmProfit=100-(yb+1)-(nb+1)-2;// rough profit estimate
        wl.push({ticker:m.ticker,title:m.title,subtitle:m.subtitle||"",
          type:"MM",reason:"Spread "+sp+"c, need 8+ for MM",
          mid:mid,sp:sp,vol:m.volume,days:dl,
          trigger:"If spread widens to 8c: MM pair +"+mmProfit+"c",
          potEV:mmProfit>0?"+"+mmProfit+"c/pair":"marginal",
          yb:yb,ya:ya,nb:nb,na:na});
      }
      if(wl.length>=10)break;
    }
    setWatchlist(wl);
    return wl;
  }

  var CANARY_SET=useRef(canaryTickerSet());
  var ORDER_TTL_MS=15*60*1000;// 15 minutes TTL for resting orders
  var EXIT_MIN_PROFIT=3;// minimum 3c profit per contract to trigger exit

  // ---- STALE ORDER CANCELLATION ----
  // V30.9: Reads directly from portfolio.resting (set by every fetchPortfolio() call,
  // even when the throttle returns null - the previous state still has fresh data
  // from the last sync). Logs an explicit count of stale candidates and skips so
  // we can see in the log exactly why it's not cancelling.
  function cancelStaleOrders(){
    if(demo||paperRef.current)return Promise.resolve(0);
    var resting=portfolio.resting||[];
    if(resting.length===0)return Promise.resolve(0);
    var now=Date.now();
    var stale=[],totalChecked=0,skippedNoId=0,skippedNoCreated=0,tooYoung=0,buyCnt=0,sellCnt=0;
    for(var i=0;i<resting.length;i++){
      var o=resting[i];
      totalChecked++;
      // V1.0.0-beta1.2: cancel BOTH stale buys AND stale sells. Sells now have
      // server-side expiration_ts, but legacy sells from before beta1.2 don't,
      // and any sell older than the TTL has clearly been ignored by the market;
      // cancel and let the next cycle re-post at the current bid/ask.
      if(!o.id){skippedNoId++;continue;}
      if(!o.created){skippedNoCreated++;continue;}
      var age=now-new Date(o.created).getTime();
      if(age<=ORDER_TTL_MS){tooYoung++;continue;}
      if((o.action||"buy")==="sell")sellCnt++;else buyCnt++;
      stale.push({o:o,ageMin:Math.round(age/60000)});
    }
    // Diagnostic so we can see why cancellation isn't firing
    if(resting.length>0){
      log("TTL check: "+resting.length+" resting | "+stale.length+" stale (>"+Math.round(ORDER_TTL_MS/60000)+"min, "+buyCnt+" buy + "+sellCnt+" sell) | "+tooYoung+" too young | "+skippedNoId+" no-id | "+skippedNoCreated+" no-created");
    }
    if(stale.length===0)return Promise.resolve(0);

    var canceled=0;
    var chain=Promise.resolve();
    for(var j=0;j<stale.length;j++){
      (function(s){
        var order=s.o,ageMin=s.ageMin;
        chain=chain.then(function(){
          return new Promise(function(resolve){
            setTimeout(function(){
              api("/portfolio/orders/"+order.id,"DELETE").then(function(){
                canceled++;
                var refund=order.qty*order.price;
                deployedRef.current-=refund;
                balRef.current+=refund;
                setBal(function(b){return b+refund;});
                traded.current[order.ticker]=false;// allow re-entry
                log("CANCELED stale order: "+order.qty+"x "+order.side+" @"+order.price+"c "+order.ticker+" (age "+ageMin+"min, refund "+ct(refund)+")","warn");
                resolve();
              }).catch(function(e){
                log("Cancel failed "+order.ticker+" id="+order.id+": "+e.message,"error");
                resolve();
              });
            },400);// rate limit
          });
        });
      })(stale[j]);
    }
    return chain.then(function(){
      if(canceled>0)log("Canceled "+canceled+"/"+stale.length+" stale orders (>"+Math.round(ORDER_TTL_MS/60000)+"min old)","warn");
      return canceled;
    });
  }

  // ---- EXECUTE SELL (Exit Position) ----
  // Sell a held position at current bid for profit
  // V1.0.0-beta1.2: in-memory blacklists to prevent retry-loops.
  // _sellNotFound holds tickers that returned 404 market_not_found - the market
  // was delisted/settled out from under us. We stop re-trying sells on those
  // tickers; they'll clear once the position settles in Kalshi's accounting.
  // _sellInvalidPrice holds tickers that returned 400 invalid_price - typically
  // markets past their close time where 100c is no longer a valid limit. Same
  // remediation: stop posting sells, wait for settlement.
  // Both clear on page refresh (in-memory only); they're per-session safety nets.
  var _sellNotFound={},_sellInvalidPrice={};

  // V1.0.0-beta1.2: dedup helper - is there already a resting sell on this
  // (ticker, side) at this price? If so, don't re-post. Reads portfolio.resting
  // which is populated on every fetchPortfolio() call.
  function hasRestingSell(ticker,side,price){
    var resting=portfolio.resting||[];
    for(var i=0;i<resting.length;i++){
      var o=resting[i];
      if((o.action||"buy")!=="sell")continue;
      if(o.ticker!==ticker)continue;
      if(o.side&&o.side!==side)continue;
      // Price match within 1c (rounding tolerance)
      var op=o.price||0;
      if(Math.abs(op-price)<=1)return true;
    }
    return false;
  }

  function executeSell(ticker,side,qty,price,sig){
    if(demo)return;
    if(paperRef.current){
      // Paper sell: just log and credit profit
      log("[PAPER SELL] "+qty+"x "+side+" @"+price+"c "+ticker,"success");
      return;
    }
    // V1.0.0-beta1.2: blacklist guards. Skip tickers that have proven uncloseable
    // this session - prevents the 5-min spam of identical failing sells we saw
    // in the May 5 morning logs (KXWTI-26MAY04 invalid_price x9 cycles, etc).
    if(_sellNotFound[ticker]){
      // Quietly skip; one log per session is enough to surface this
      return;
    }
    if(_sellInvalidPrice[ticker]){
      return;
    }
    // V1.0.0-beta1.2: dedup. If we already have a resting sell on this ticker
    // at this price, don't post another. The existing one will fill or expire
    // (now with server-side expiration_ts).
    if(hasRestingSell(ticker,side,price)){
      return;
    }
    // Live sell: post sell order at the requested price (caller already chose
    // bid/ask/etc per decideExit).
    // V1.0.0-beta1.2: add expiration_ts so Kalshi auto-cancels stale unfilled
    // sells. Same 15-min TTL as buys. This is the structural fix for the
    // accumulating-resting-sells bug from the May 5 morning logs (36 resting
    // orders for 4 tickers, all stacked 5 min apart).
    var expTs=Math.floor((Date.now()+ORDER_TTL_MS)/1000);
    var ob={ticker:ticker,action:"sell",side:side,count:qty,type:"limit",post_only:true,
      expiration_ts:expTs};
    if(side==="yes"){ob.yes_price=price;}else{ob.no_price=price;}
    var d=(_orderQueue.length)*400;_orderQueue.push(1);
    setTimeout(function(){
      api("/portfolio/orders","POST",ob).then(function(){
        log("[LIVE SELL] "+qty+"x "+side+" @"+price+"c "+ticker,"success");
        // V30.1: close matching ledger entries (live, same ticker, same side)
        var hits=rtFindOpenByTicker(ticker,"live");
        for(var hi=0;hi<hits.length;hi++){
          var rec=hits[hi].r;
          if(rec.side===side){
            var entryCost=rec.qty*rec.entryPx;
            var exitProceeds=qty*price;
            var realizedPnl=exitProceeds-entryCost;// approximate; fees applied in settlements
            rtUpdate(rec.id,{status:"closed",exitTs:Date.now(),exitPx:price,
              won:realizedPnl>0,pnl:realizedPnl,source:"exit_sell"});
            break;
          }
        }
      }).catch(function(e){
        // V1.0.0-beta1.2: classify failures. Persistent classes -> blacklist.
        var msg=e.message||"";
        if(msg.indexOf("market_not_found")>=0||msg.indexOf("404")>=0){
          _sellNotFound[ticker]=Date.now();
          log("[LIVE SELL FAIL] "+ticker+": "+msg+" (blacklisted for session)","error");
        }else if(msg.indexOf("invalid_price")>=0){
          _sellInvalidPrice[ticker]=Date.now();
          log("[LIVE SELL FAIL] "+ticker+": "+msg+" (likely past close; blacklisted for session)","error");
        }else{
          log("[LIVE SELL FAIL] "+ticker+": "+msg,"error");
        }
      });
    },d);
  }

  // Available budget: balance * leverage% - pending deployed - cycle spent
  function deployedInPending(){return deployedRef.current;}
  function maxBet(){
    var deployed=deployedRef.current;
    var totalValue=balRef.current+deployed;
    var cap=Math.floor(totalValue*levRef.current);

  var logsLatestRef=useRef([]);
  var log=useCallback(function(m,t){setLogs(function(p){
    var next=[{t:Date.now(),msg:m,type:t||"info"}].concat(p).slice(0,500);
    logsLatestRef.current=next;
    // v1.0.0-beta.5: debounced persist of log to localStorage.
    // Refreshing the page previously wiped the log entirely. Now we keep a
    // rolling 500-entry window in kt_logEntries, written at most every 2s
    // to keep per-call overhead negligible. On reload, the log restores so
    // diagnostic context survives.
    try{
      if(!log._persistT){
        log._persistT=setTimeout(function(){
          log._persistT=null;
          try{localStorage.setItem("kt_logEntries",JSON.stringify(logsLatestRef.current.slice(0,500)));}catch(e){}
        },2000);
      }
    }catch(e){}
    return next;
  });},[]);

  // v1.0.0-beta.5: one-time init: restore log + apply persisted strategy state.
  // Uses a ref to ensure this only runs on the first render, not on every
  // re-render (React function components re-run their body on every state
  // change, so unguarded init code would fire constantly).
  var _initDone=useRef(false);
  if(!_initDone.current){
    _initDone.current=true;
    // Restore log entries from previous session.
    try{
      var raw=localStorage.getItem("kt_logEntries");
      if(raw){
        var entries=JSON.parse(raw);
        if(Array.isArray(entries)&&entries.length>0){
          // Splice in the restored entries directly to setLogs initial value
          // (setLogs(initial) replaces; we add a marker line so the user knows
          // these are from before the refresh).
          setLogs([{t:Date.now(),msg:"--- log restored from previous session ("+entries.length+" entries) ---",type:"info"}].concat(entries).slice(0,500));
        }
      }
    }catch(e){}
    // Apply persisted strategy enable state. Has to be deferred a microtask so
    // setLogs above commits first, otherwise the restore-log line gets clobbered
    // by the restore-strategies line. (Promise.resolve schedules a microtask.)
    Promise.resolve().then(function(){
      applyPersistedStrategyState(log);
    });
  }

  // V30.5: Track in-flight doFetch promise to prevent parallel scans regardless
  // of whether the call came via the auto-loop or the initial-fetch useEffect.
  var doFetchInFlight=useRef(null);

  // ---- FETCH with canary validation ----
  var doFetch=useCallback(function(){
    if(demo)return Promise.resolve(mkts);

    // (v30.3 used scanning.current+ftg but scanning.current is only set by run(),
    // not by direct doFetch() calls from the initial-fetch useEffect, leading to
    // parallel scans when the mount-effect and mode-change-effect race.)
    if(doFetchInFlight.current){

    var p=fetchMkts(log,selCats).then(function(res){
      var all=res.markets;

      log("SERIES: "+res.totalSeries+" total, "+res.allowedCount+" allowed, "+res.skippedCount+" cat-filtered");

      // Enrich weather markets with forecast data
      // V1.0.0 Phase 1.A: ALSO run new multi-source weather pipeline in parallel.
      // Both enrichers populate different fields - legacy populates _wxForecast/_wxSpread,
      // new populates _wxV1.* with multi-source breakdown. Trading still uses legacy in
      // Phase 1.A (observe-only mode for the new data).
      // v1.0.0-beta.3: also runs enrichEnergyMarkets (Phase 2.A observe-only).
      // Populates m._enV1.* for KXGAS/KXWTI/KXBRENT/KXNATGAS tickers; trading still
      // uses legacy generalist strategies. Energy data accumulates in parallel
      // with weather so when Phase 2.B activates, the bias log is already populated.

      // Category breakdown for diagnostics
      var cats={},sigCats={},sigTypes={WX:0,FAV:0,MM:0,VALUE:0,VOL:0},noSig=0;

      for(var i=0;i<all.length;i++){

        // V30.10: rebuild cfg with current liqMult so UI/auto-tune changes apply

      // Sort: signals first by score, then by close time
      all.sort(function(a,b){
        var sa=a.signal?a.signal.score:0,sb=b.signal?b.signal.score:0;
        if(sa!==sb)return sb-sa;

      });
      setMkts(all);

      var sc=all.length-noSig;
      log("SCAN COMPLETE: "+all.length+" markets, "+hasLiq+" with liquidity, "+noLiq+" empty/no bids, "+sc+" signals");

      // V30.10: Liquidity auto-tuner. Tracks signal count over recent 5 scans.
      // If average is 0 over 3+ consecutive scans -> raise liqMult (more permissive).
      // If average exceeds 8 signals/scan -> lower liqMult (more selective, avoid junk).
      // Tune amount: +/- 0.1, clamped to [0.1, 2.0].
      // User can disable via UI toggle if they want manual control.
      if(liqAutoTuneRef.current){
        recentSignalCounts.current.push(sc);
        if(recentSignalCounts.current.length>5)recentSignalCounts.current.shift();
        if(recentSignalCounts.current.length>=3){
          var avgSig=0;
          for(var rsi=0;rsi<recentSignalCounts.current.length;rsi++)avgSig+=recentSignalCounts.current[rsi];
          avgSig=avgSig/recentSignalCounts.current.length;
          var oldLiq=liqMultRef.current;
          var newLiq=oldLiq;
          if(avgSig===0&&oldLiq<2.0){
            newLiq=Math.min(2.0,oldLiq+0.1);
          }else if(avgSig>8&&oldLiq>0.1){
            newLiq=Math.max(0.1,oldLiq-0.1);
          }
          if(newLiq!==oldLiq){
            liqMultRef.current=newLiq;setLiqMult(newLiq);
            lss("kt_liq_mult",newLiq.toFixed(2));
            log("Auto-tune: liqMult "+oldLiq.toFixed(2)+" -> "+newLiq.toFixed(2)+" (avg signals/scan: "+avgSig.toFixed(1)+")","warn");
            recentSignalCounts.current=[];// reset window after tuning
          }
        }
      }

      // Event grouping stats
      var evGroups={};
      for(var eg=0;eg<all.length;eg++){
        var etk=all[eg].event_ticker||"?";
        if(!evGroups[etk])evGroups[etk]=0;
        evGroups[etk]++;
      }
      var evCount=Object.keys(evGroups).length;
      var multiOutcome=0;var largestEvent=0;
      var egk=Object.keys(evGroups);
      for(var eg2=0;eg2<egk.length;eg2++){
        if(evGroups[egk[eg2]]>1)multiOutcome++;
        if(evGroups[egk[eg2]]>largestEvent)largestEvent=evGroups[egk[eg2]];
      }
      log("Events: "+evCount+" unique ("+multiOutcome+" multi-outcome, largest: "+largestEvent+" markets)");

      // Log price diagnostics for first 5 markets (debug)
      for(var dbg=0;dbg<Math.min(5,all.length);dbg++){
        var dm=all[dbg];var dMid=Math.round((dm.yes_bid+dm.yes_ask)/2);var dSp=dm.yes_ask-dm.yes_bid;
        log("SAMPLE #"+(dbg+1)+": "+dm.ticker+" Yb:"+dm.yes_bid+" Ya:"+dm.yes_ask+" Nb:"+dm.no_bid+" Na:"+(dm.no_ask||"?")+" mid:"+dMid+" sp:"+dSp+" vol:"+Math.round(dm.volume)+" "+Math.round(dtu(dm.close_time))+"d");
      }

      // Annotate each market with its event outcome count
      for(var ea=0;ea<all.length;ea++){
        var eak=all[ea].event_ticker||"?";
        all[ea].event_outcomes=evGroups[eak]||1;
      }

      // Log signal breakdown
      var sigParts=[];
      var stk=Object.keys(sigTypes);
      for(var j=0;j<stk.length;j++){if(sigTypes[stk[j]]>0)sigParts.push(stk[j]+":"+sigTypes[stk[j]]);}
      if(sigParts.length>0)log("Signal breakdown: "+sigParts.join(", "));

      // Log market category breakdown (top 10)
      var catArr=[];var ck=Object.keys(cats);
      for(var k=0;k<ck.length;k++)catArr.push({c:ck[k],n:cats[ck[k]]});
      catArr.sort(function(a,b){return b.n-a.n;});
      var catStr=catArr.slice(0,10).map(function(x){return x.c+"("+x.n+")";}).join(", ");
      log("Market categories: "+catStr+" ["+catArr.length+" total]");

      // Log signal categories
      if(Object.keys(sigCats).length>0){
        var scArr=[];var sk=Object.keys(sigCats);
        for(var l=0;l<sk.length;l++)scArr.push({c:sk[l],n:sigCats[sk[l]]});
        scArr.sort(function(a,b){return b.n-a.n;});

      }

      // Log top 5 signals

      for(var n=0;n<topSigs.length;n++){

      }

      var modeLabel=paperRef.current?"PAPER":"LIVE";
      log("["+modeLabel+"] Budget: "+ct(maxBet())+" avail ("+Math.round(levRef.current*100)+"% of "+ct(balRef.current+deployedRef.current)+") | Cash: "+ct(balRef.current)+" | Deployed: "+ct(deployedRef.current)+" | Pending: "+pending.length+"/"+MAX_PENDING);

      setMet(function(p){var n2=cx(p);n2.ev+=all.length;n2.sg+=sc;svM(n2);return n2;});

      });// end enrichWeatherMarkets.then
    }).catch(function(e){log("Fetch error: "+e.message,"error");setFtg(false);doFetchInFlight.current=null;return[];});

  // ---- TRADE (with canary guard + cycle-aware budgeting + V30 mode awareness) ----
  function doTrade(m){
    if(!m.signal||est)return;
    if(CANARY_SET.current[m.ticker])return;
    if(!canaryOk)return;
    if(traded.current[m.ticker])return;
    // V30.11: Series cooldown - if we've lost 2+ on this ticker family in the
    // last 24h with no wins, skip. Prevents fee-bleed from chasing wrong-side bets.
    var srcSeries=getSeriesTicker(m.ticker);
    if(srcSeries&&khist.records&&seriesRecentlyLossy(khist.records,srcSeries,24)){
      log("[SERIES COOLDOWN] skip "+m.ticker+" (2+ recent losses on "+srcSeries+")");
      traded.current[m.ticker]=true;
      return;
    }
    // V1.0.0: drawdown circuit breaker
    if(drawdownEnabledRef.current&&drawdownHalt.current){
      log("[DRAWDOWN HALT] skip "+m.ticker+" (portfolio is "+(drawdownLimit*100).toFixed(0)+"% below high-water mark)","warn");
      traded.current[m.ticker]=true;
      return;
    }
    // V1.0.0: daily loss limit
    if(dailyLossEnabledRef.current&&dailyLossHalt.current){
      log("[DAILY LOSS HALT] skip "+m.ticker+" (today's P&L below "+(dailyLossLimit*100).toFixed(0)+"% threshold)","warn");
      traded.current[m.ticker]=true;
      return;
    }
    // V30: Mode gating - in OBSERVE or SELL_ONLY mode, record virtual but do not place real buy
    var mode=opModeRef.current||"off";
    if(mode==="off")return;
    if(mode==="observe"||mode==="sell_only"){
      // Record as virtual trade for learning
      vtAdd(m,m.signal);
      traded.current[m.ticker]=true;// avoid recording same scan twice
      var modeTag=mode==="observe"?"OBSERVE":"SELL-ONLY";
      log("["+modeTag+"] Virtual: "+m.signal.sig+" "+m.signal.side+" @"+m.signal.price+"c "+m.ticker);
      return;
    }
    // FULL AUTO from here
    if(paperRef.current&&pending.length>=MAX_PENDING){log("Max pending ("+MAX_PENDING+")","warn");return;}
    var evTk=m.event_ticker||getSeriesTicker(m.ticker);
    if(eventTrades.current[evTk]>=(MAX_PER_EVENT||1)){return;}// silent skip for event limit
    var s=m.signal,days=dtu(m.close_time);
    var mb=maxBet();
    if(mb<=0)return;

    // Strategy-specific sizing
    var kfAdj=cfg.kf;// default Kelly fraction
    if(s.sig==="FAV")kfAdj=0.30;// FAV: size up, edge is academically validated
    if(s.sig==="WX")kfAdj=0.15;// WX: conservative after Apr 20 losses
    if(s.sig==="MM")kfAdj=0.10;// MM: size down, fill uncertainty is high
    // MM budget cap: max 10% of total account value per MM trade
    var mmBudgetCap=s.sig==="MM"?Math.floor((balRef.current+deployedRef.current)*0.10):mb;
    var effectiveBudget=Math.min(mb,mmBudgetCap);

    var sz=kelly(s.prob,s.price,kfAdj,effectiveBudget,days);
    if(sz<=0)return;
    var ct2=Math.max(1,Math.floor(sz/s.price)),cost=ct2*s.price;
    // Per-strategy contract caps
    var maxCt=s.sig==="MM"?5:s.sig==="WX"?20:50;// MM: 5 pairs. WX: 20 max. Others: 50
    if(ct2>maxCt){ct2=maxCt;cost=ct2*s.price;}
    if(cost>effectiveBudget){ct2=Math.max(1,Math.floor(effectiveBudget/s.price));cost=ct2*s.price;}
    if(cost<=0)return;

    traded.current[m.ticker]=true;
    if(!eventTrades.current[evTk])eventTrades.current[evTk]=0;
    eventTrades.current[evTk]++;

    if(demo){
      // Demo mode: instant sim (no real markets)
      var res=sim(s);
      setMet(function(p){
        var n=cx(p);n.at++;
        if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
        n.by[s.sig].a++;
        if(res.filled){
          n.fl++;n.by[s.sig].f++;n.pl+=cost;n.lv+=cost;n.by[s.sig].p+=cost;
          if(res.won){
            var win=netWin(ct2,s.price);
            n.w++;n.by[s.sig].w++;n.ea+=win;n.by[s.sig].e+=win;
            n.fe+=feeAmt(ct2,s.price);
            setBal(function(b){return b+win;});
            updDay(true,win,cost);
            setTrades(function(p){return[{t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,won:true,pnl:win}].concat(p).slice(0,50);});
            log("["+s.sig+"] WIN "+m.ticker+" +"+ct(win)+" ("+ct2+"x "+s.side+" @"+s.price+"c)","success");
          }else{
            n.l++;n.by[s.sig].l++;n.ea-=cost;n.by[s.sig].e-=cost;
            setBal(function(b){return b-cost;});
            updDay(false,-cost,cost);
            setTrades(function(p){return[{t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,won:false,pnl:-cost}].concat(p).slice(0,50);});
            log("["+s.sig+"] LOSS "+m.ticker+" -"+ct(cost)+" ("+ct2+"x "+s.side+" @"+s.price+"c)","error");
          }
        }else{log("["+s.sig+"] "+m.ticker+" no fill","warn");}
        svM(n,modeRef.current);return n;
      });
    }else if(paperRef.current){
      if(s.sig==="MM"&&s.price2){
        // MM paper: post both sides, track as pending until settlement
        // Profit is guaranteed regardless of outcome (YES price + NO price < 100)
        var mmCt=Math.min(ct2,5);
        var mmTotalCost=mmCt*(s.price+s.price2);
        balRef.current-=mmTotalCost;deployedRef.current+=mmTotalCost;
        setBal(function(b){return b-mmTotalCost;});
        cycleSpent.current+=mmTotalCost;
        setMet(function(p){var n=cx(p);n.at++;n.fl++;n.pl+=mmTotalCost;n.lv+=mmTotalCost;
          if(!n.by["MM"])n.by["MM"]={a:0,f:0,w:0,l:0,p:0,e:0};
          n.by["MM"].a++;n.by["MM"].f++;n.by["MM"].p+=mmTotalCost;svM(n,modeRef.current);return n;});
        var pos={t:Date.now(),tk:m.ticker,tl:m.title,sub:m.subtitle||"",sig:"MM",side:"pair",
          ct:mmCt,pr:s.price,pr2:s.price2,cost:mmTotalCost};
        // V30.1: ledger entry for paper MM
        pos.ledgerId=rtAdd({mode:"paper",ticker:m.ticker,title:m.title||"",sig:"MM",side:"pair",
          entryPx:s.price,entryPx2:s.price2,qty:mmCt,cost:mmTotalCost,status:"open",
          edge:s.edge||0,close_time:m.close_time||""});
        setPending(function(p){return[pos].concat(p);});
        log("[PAPER MM] "+mmCt+"x Y@"+s.price+"c+N@"+s.price2+"c "+m.ticker+" (cost "+ct(mmTotalCost)+", pending settlement)");
      }else{
        // Single-side paper trade: deduct cost, await settlement
        balRef.current-=cost;deployedRef.current+=cost;
        setBal(function(b){return b-cost;});
        cycleSpent.current+=cost;
        setMet(function(p){var n=cx(p);n.at++;n.fl++;n.pl+=cost;n.lv+=cost;
          if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
          n.by[s.sig].a++;n.by[s.sig].f++;n.by[s.sig].p+=cost;svM(n,modeRef.current);return n;});
        var pos={t:Date.now(),tk:m.ticker,tl:m.title,title:m.title,sub:m.subtitle||"",sig:s.sig,side:s.side,ct:ct2,pr:s.price,cost:cost,edge:s.edge};
        // V30.1: ledger entry for paper single-side
        pos.ledgerId=rtAdd({mode:"paper",ticker:m.ticker,title:m.title||"",sig:s.sig,side:s.side,
          entryPx:s.price,qty:ct2,cost:cost,status:"open",
          edge:s.edge||0,close_time:m.close_time||""});
        setPending(function(p){return[pos].concat(p);});
        log("[PAPER "+s.sig+"] "+ct2+"x "+s.side+" @"+s.price+"c "+m.ticker+" (cost "+ct(cost)+", pending settlement)");
      }
    }else{
      // Live mode - rate-limited, maker orders (post_only for lower fees)
      // Calculate ACTUAL cost including both MM sides
      var liveCt=ct2;
      var liveCost=cost;
      if(s.sig==="MM"&&s.price2){
        liveCt=Math.min(ct2,5);// MM cap
        liveCost=liveCt*(s.price+s.price2);// BOTH sides
      }

      // Track budget commitment immediately (before async API call)
      deployedRef.current+=liveCost;
      balRef.current-=liveCost;
      setBal(function(b){return b-liveCost;});
      cycleSpent.current+=liveCost;

      // Record attempt in metrics
      setMet(function(p){var n=cx(p);n.at++;n.pl+=liveCost;n.lv+=liveCost;
        if(!n.by[s.sig])n.by[s.sig]={a:0,f:0,w:0,l:0,p:0,e:0};
        n.by[s.sig].a++;n.by[s.sig].p+=liveCost;svM(n,modeRef.current);return n;});

      function postOrder(tk,sd,pr,ct3,sig2,delay,isMM){
        // V30.9: Set Kalshi-side expiration_ts as belt-and-suspenders alongside
        // our own TTL cancel loop. expiration_ts is unix seconds; Kalshi auto-cancels
        // any unfilled portion after this time. Same 15-min TTL we enforce client-side.
        var expTs=Math.floor((Date.now()+ORDER_TTL_MS)/1000);
        var ob={ticker:tk,action:"buy",side:sd,count:ct3,type:"limit",post_only:true,
          expiration_ts:expTs};
        if(sd==="yes"){ob.yes_price=pr;}else{ob.no_price=pr;}
        setTimeout(function(){
          api("/portfolio/orders","POST",ob).then(function(resp){
            log("[LIVE "+sig2+"] "+ct3+"x "+sd+" @"+pr+"c "+tk,"success");
            // Record fill in metrics and trades
            setMet(function(p){var n=cx(p);n.fl++;
              if(n.by[sig2])n.by[sig2].f++;
              svM(n,modeRef.current);return n;});
            setTrades(function(p){return[{t:Date.now(),tk:tk,tl:m.title,sub:m.subtitle||"",sig:sig2,
              side:sd,ct:ct3,pr:pr,won:null,pnl:0,status:"resting"}].concat(p).slice(0,50);});
            // V30.1: ledger entry for live order
            rtAdd({mode:"live",ticker:tk,title:m.title||"",sig:sig2,side:sd,
              entryPx:pr,qty:ct3,cost:ct3*pr,status:"open",
              edge:(s&&s.edge)||0,close_time:m.close_time||"",isMM:!!isMM});
          }).catch(function(e){
            // Order rejected - return budget for THIS side
            var refund=ct3*pr;
            deployedRef.current-=refund;
            balRef.current+=refund;
            setBal(function(b){return b+refund;});
            if(!isMM)traded.current[tk]=false;// allow retry for single-side
            log("[LIVE] "+tk+" "+sd+": "+e.message,"error");
          });
        },delay);
      }
      if(s.sig==="MM"&&s.price2){
        var d1=(_orderQueue.length)*400;_orderQueue.push(1);
        var d2=(_orderQueue.length)*400;_orderQueue.push(1);
        postOrder(m.ticker,"yes",s.price,liveCt,s.sig,d1,true);
        postOrder(m.ticker,"no",s.price2,liveCt,s.sig,d2,true);
        log("[MM] Posted pair: "+liveCt+"x YES@"+s.price+"c + NO@"+s.price2+"c on "+m.ticker+" (reserved "+ct(liveCost)+")");
      }else{
        var d3=(_orderQueue.length)*400;_orderQueue.push(1);
        postOrder(m.ticker,s.side,s.price,ct2,s.sig,d3,false);
      }
    }
  }
