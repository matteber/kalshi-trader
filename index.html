  // ---- CHECK PENDING PAPER TRADES FOR SETTLEMENT ----
  function checkPending(){
    if(pending.length===0)return;
    var toCheck=pending.slice(0,10);// check up to 10 at a time
    var tickers=toCheck.map(function(p){return p.tk;}).join(",");
    api("/markets?tickers="+encodeURIComponent(tickers)+"&limit=10").then(function(d){
      var mkMap={};var mk=d.markets||[];
      for(var i=0;i<mk.length;i++)mkMap[mk[i].ticker]=mk[i];
      var resolved=[],remaining=[];
      for(var j=0;j<pending.length;j++){
        var pos=pending[j];
        var rm=mkMap[pos.tk];
        if(rm&&(rm.status==="settled"||rm.status==="determined")&&rm.result){
          if(pos.sig==="MM"&&pos.pr2){
            // MM pair: profit is guaranteed regardless of outcome
            // Payout = ct * 100 (one side always wins), Cost = ct * (pr + pr2)
            var mmPayout=pos.ct*100;
            var mmFees2=kalshiFee(pos.ct,pos.pr,true)+kalshiFee(pos.ct,pos.pr2,true);
            var mmNet2=mmPayout-pos.cost-mmFees2;
            resolved.push({pos:pos,won:true,result:rm.result,pnl:mmNet2,fees:mmFees2});
          }else{
            var won=(pos.side==="yes"&&rm.result==="yes")||(pos.side==="no"&&rm.result==="no");
            resolved.push({pos:pos,won:won,result:rm.result});
          }
        }else{
          remaining.push(pos);
        }
      }
      if(resolved.length>0){
        setPending(remaining);
        for(var k=0;k<resolved.length;k++){
          var r=resolved[k],p=r.pos;
          deployedRef.current-=p.cost;// position no longer pending
          if(p.sig==="MM"&&r.pnl!=null){
            var mmW=r.pnl;
            balRef.current+=p.cost+mmW;
            setBal(function(b){return b+p.cost+mmW;});
            setMet(function(prev){var n=cx(prev);n.w++;n.ea+=mmW;n.fe+=r.fees;
              if(n.by["MM"]){n.by["MM"].w++;n.by["MM"].e+=mmW;}
              svM(n,modeRef.current);return n;});
            updDay(true,mmW,p.cost);
            // V30.1: close ledger entry on paper MM settlement
            if(p.ledgerId)rtUpdate(p.ledgerId,{status:"settled",exitTs:Date.now(),
              won:true,pnl:mmW,fees:r.fees||0,source:"paper_settle",result:r.result});
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:"MM",side:"pair",ct:p.ct,pr:p.pr,won:true,pnl:mmW}].concat(prev).slice(0,50);});
            log("[SETTLED MM] "+p.tk+" +"+ct(mmW)+" spread profit ("+r.result+")","success");
          }else if(r.won){
            var win=netWin(p.ct,p.pr);
            balRef.current+=p.cost+win;
            setBal(function(b){return b+p.cost+win;});
            setMet(function(prev){var n=cx(prev);n.w++;n.ea+=win;n.fe+=feeAmt(p.ct,p.pr);
              if(n.by[p.sig]){n.by[p.sig].w++;n.by[p.sig].e+=win;}
              svM(n,modeRef.current);return n;});
            updDay(true,win,p.cost);
            // V30.1: close ledger on paper WIN
            if(p.ledgerId)rtUpdate(p.ledgerId,{status:"settled",exitTs:Date.now(),
              won:true,pnl:win,fees:feeAmt(p.ct,p.pr),source:"paper_settle",result:r.result});
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:p.sig,side:p.side,ct:p.ct,pr:p.pr,won:true,pnl:win}].concat(prev).slice(0,50);});
            log("[SETTLED] WIN "+p.tk+" +"+ct(win)+" ("+r.result+")","success");
          }else{
            // Loss: cost is gone, don't return it
            setMet(function(prev){var n=cx(prev);n.l++;n.ea-=p.cost;
              if(n.by[p.sig]){n.by[p.sig].l++;n.by[p.sig].e-=p.cost;}
              svM(n,modeRef.current);return n;});
            updDay(false,-p.cost,p.cost);
            // V30.1: close ledger on paper LOSS
            if(p.ledgerId)rtUpdate(p.ledgerId,{status:"settled",exitTs:Date.now(),
              won:false,pnl:-p.cost,fees:0,source:"paper_settle",result:r.result});
            setTrades(function(prev){return[{t:Date.now(),tk:p.tk,tl:p.tl,sub:p.sub||"",sig:p.sig,side:p.side,ct:p.ct,pr:p.pr,won:false,pnl:-p.cost}].concat(prev).slice(0,50);});
            log("[SETTLED] LOSS "+p.tk+" -"+ct(p.cost)+" ("+r.result+")","error");
          }
        }
        log("Pending: "+remaining.length+" positions awaiting settlement");
      }
    }).catch(function(e){});// silent fail on settlement check
  }

  // V30: ---- CHECK VIRTUAL TRADES FOR SETTLEMENT ----
  // For OBSERVE/SELL_ONLY modes: settle pending virtual trades to build learning stats
  function checkVirtualSettlement(){
    var arr=vtLoad();
    var open=[];
    for(var i=0;i<arr.length;i++){if(arr[i].settled==null)open.push({i:i,v:arr[i]});}
    if(open.length===0)return;
    // Batch up to 20 tickers per check
    var batch=open.slice(0,20);
    var tks=batch.map(function(x){return x.v.ticker;}).join(",");
    api("/markets?tickers="+encodeURIComponent(tks)+"&limit=20").then(function(d){
      var mk=d.markets||[],byT={};
      for(var i=0;i<mk.length;i++)byT[mk[i].ticker]=mk[i];
      var resolved=0;
      for(var j=0;j<batch.length;j++){
        var rec=batch[j].v,idx=batch[j].i;
        var mkt=byT[rec.ticker];
        if(mkt&&(mkt.status==="settled"||mkt.status==="determined")&&mkt.result){
          var won=(rec.side==="yes"&&mkt.result==="yes")||(rec.side==="no"&&mkt.result==="no");
          var pnl=won?(100-rec.price-Math.ceil(0.0175*rec.price/100*(1-rec.price/100)*100)):-rec.price;
          if(rec.sig==="MM"&&rec.price2){
            // MM: profit is guaranteed in spread
            var mmCost=rec.price+rec.price2;
            pnl=100-mmCost-Math.ceil(0.0175*rec.price/100*(1-rec.price/100)*100)-Math.ceil(0.0175*rec.price2/100*(1-rec.price2/100)*100);
            won=pnl>0;
          }
          vtUpdate(idx,{settled:mkt.result,won:won,pnl:pnl});
          lsRecord(rec.sig,won,pnl);
          resolved++;
        }
      }
      if(resolved>0){
        log("VIRTUAL SETTLED: "+resolved+" trades resolved","success");
        setVTrades(vtLoad());setLStats(lsLoad());
      }
    }).catch(function(e){});// silent
  }

  // V30.1: ---- CHECK LIVE TRADE SETTLEMENTS ----
  // Polls Kalshi /portfolio/settlements and closes matching ledger entries.
  // Stores last-seen settlement timestamp in kt_lastSettleTs so we only
  // process new settlements each pass.
  function checkLiveSettlements(){
    if(paperRef.current||demo)return;
    var arr=rtLoad();
    var openLive=0;
    for(var i=0;i<arr.length;i++)if(arr[i].mode==="live"&&arr[i].status==="open")openLive++;
    if(openLive===0)return;
    api("/portfolio/settlements?limit=100").then(function(d){
      var sets=d.settlements||[];
      if(sets.length===0)return;
      var lastTs=parseInt(lsg("kt_lastSettleTs")||"0",10);
      var newest=lastTs;
      var resolved=0;
      for(var si=0;si<sets.length;si++){
        var st=sets[si];
        var stTs=Math.floor(new Date(st.settled_time||st.created_time||0).getTime()/1000);
        if(stTs>newest)newest=stTs;
        if(stTs<=lastTs)continue;// already processed
        var ticker=st.ticker;
        if(!ticker)continue;
        // Determine outcome: yes_count > no_count means YES won
        // Kalshi /portfolio/settlements returns yes_total_cost_dollars, no_total_cost_dollars, revenue_dollars, market_result
        var result=st.market_result||"";// "yes" | "no" | "" (scalar)
        if(!result&&st.revenue_dollars!=null){
          // Infer from revenue + cost
          var yesCost=d2c(st.yes_total_cost_dollars||"0")||0;
          var noCost=d2c(st.no_total_cost_dollars||"0")||0;
          var revenue=d2c(st.revenue_dollars||"0")||0;
          // If we held yes and revenue > 0, yes won; etc.
          // Just use revenue vs cost for W/L
          result=revenue>(yesCost+noCost)?"win":"loss";
        }
        // Find matching open ledger entries
        var hits=rtFindOpenByTicker(ticker,"live");
        for(var hi=0;hi<hits.length;hi++){
          var rec=hits[hi].r;
          var won;
          if(rec.sig==="MM"){
            // MM pair: profit guaranteed (one side always wins)
            won=true;
          }else if(result==="yes"||result==="no"){
            won=(rec.side===result);
          }else if(result==="win"){
            won=true;
          }else if(result==="loss"){
            won=false;
          }else{
            continue;// can't determine
          }
          // Compute realized P&L
          var pnlCents;
          if(won){
            pnlCents=netWin(rec.qty,rec.entryPx);
          }else{
            pnlCents=-(rec.qty*rec.entryPx);
          }
          // If MM: payout = qty*100 - cost (both sides combined)
          if(rec.sig==="MM"&&rec.entryPx2){
            var mmPayout=rec.qty*100;
            var mmFees=kalshiFee(rec.qty,rec.entryPx,true)+kalshiFee(rec.qty,rec.entryPx2,true);
            // ledger qty is single side, cost is single side; need partner. If pair, we should only record once per market.
            // Kalshi returns ONE settlement per ticker; our two ledger entries are same ticker.
            // Process the one matching this side, partner gets handled below.
            pnlCents=mmPayout-rec.qty*(rec.entryPx+rec.entryPx2)-mmFees;
            won=pnlCents>0;
          }
          rtUpdate(rec.id,{status:"settled",exitTs:Date.now(),won:won,
            pnl:pnlCents,fees:feeAmt(rec.qty,rec.entryPx),
            source:"live_settle",result:result});
          resolved++;
          // Update live metrics so existing UI is consistent
          setMet(function(prev){var n=cx(prev);
            if(won){n.w++;n.ea+=pnlCents;n.fe+=feeAmt(rec.qty,rec.entryPx);
              if(n.by[rec.sig])n.by[rec.sig].w++,n.by[rec.sig].e+=pnlCents;
            }else{n.l++;n.ea+=pnlCents;
              if(n.by[rec.sig])n.by[rec.sig].l++,n.by[rec.sig].e+=pnlCents;}
            svM(n,modeRef.current);return n;});
          updDay(won,pnlCents,rec.qty*rec.entryPx);
        }
      }
      if(newest>lastTs)lss("kt_lastSettleTs",String(newest));
      if(resolved>0){
        log("LIVE SETTLED: "+resolved+" real trades resolved","success");
      }
    }).catch(function(e){});// silent
  }

  // ---- AUTO-TRADE LOOP (adaptive scan throttling, V30 mode-aware) ----
  useEffect(function(){
    if(tmr.current){clearTimeout(tmr.current);tmr.current=null;}
    // V30: Run if any scan-active mode is set; "off" suspends scanning entirely
    if(opMode==="off"||est||scr!=="dash")return;

    // Calculate next scan delay based on budget utilization (V30.3: longer to save Cloudflare tokens)
    function scanDelay(){
      var total=balRef.current+deployedRef.current;
      if(total<=0)return 240000;// 4 min when no balance info
      var avail=maxBet();
      var pct=avail/total;// fraction of budget still available
      // Fully deployed: 600s (10 min) - settlement checks only
      // <10% budget: 360s (6 min)
      // 10-30% budget: 300s (5 min)
      // >30% budget: 240s (4 min, normal)
      if(avail<=0)return 600000;
      if(pct<0.10)return 360000;
      if(pct<0.30)return 300000;
      return 240000;
    }

    var run=function(){
      // Prevent parallel scans
      if(scanning.current){return;}
      scanning.current=true;

      // Check pending paper trade settlements first
      if(paperRef.current)checkPending();
      // V30: Check virtual trade settlements (always - feeds learning system)
      checkVirtualSettlement();
      // V30.1: Check real (live) trade settlements
      checkLiveSettlements();

      // Portfolio sync (live mode: fetch real positions; also when idle)
      if(!paperRef.current&&!demo){
        fetchPortfolio().then(function(pf){
          if(pf){
            // V1.0.0: balRef/deployedRef are now updated INSIDE fetchPortfolio
            // (works for both auto-loop and manual sync paths). We just log here.
            log("Portfolio: "+ct(pf.cash)+" cash, "+pf.positions.length+" pos, "+pf.resting.length+" resting, "+ct(deployedRef.current)+" deployed");
            // V1.0.0-beta1.5: log Kalshi's AUTHORITATIVE values from /portfolio/balance
            // alongside our local sum-of-cost. If these don't match within a few cents,
            // we have a math bug somewhere in position parsing / cost-basis calc.
            // The kalshiAccountTotal is what Kalshi UI shows as "Portfolio" header.
            var localPosCost=0;
            for(var pkv=0;pkv<pf.positions.length;pkv++)localPosCost+=(pf.positions[pkv].totalCost||0);
            var localValueMkt=0;// mark-to-market via live quotes if available
            for(var pkv2=0;pkv2<pf.positions.length;pkv2++)localValueMkt+=(pf.positions[pkv2].marketValue||pf.positions[pkv2].totalCost||0);
            log("Kalshi auth: portfolio_value=$"+(pf.kalshiPortfolioValue/100).toFixed(2)+", total=$"+(pf.kalshiAccountTotal/100).toFixed(2)+" | local sum-of-cost=$"+(localPosCost/100).toFixed(2)+", local mark-to-market=$"+(localValueMkt/100).toFixed(2));
            var driftC=Math.abs(pf.kalshiPortfolioValue-localValueMkt);
            if(driftC>50&&pf.kalshiPortfolioValue>0){
              log("WARNING: local mark-to-market differs from Kalshi by $"+(driftC/100).toFixed(2)+". Investigation needed (live quote staleness, missing positions, or cost-basis bug).","warn");
            }
            // V1.0.0-beta1.6: account reconciliation.
            // Equation: Kalshi current account total = starting capital + realized P&L + unrealized P&L
            // We can solve for IMPLIED starting capital and check if it makes sense.
            // - Kalshi total: $X (authoritative from /portfolio/balance)
            // - realized P&L: from khAggregate (sum of pnl across closed/settled records)
            // - unrealized P&L: sum of (mark-to-market - cost basis) for open positions
            // - Implied starting = Kalshi total - realized P&L - unrealized P&L
            // If you started with $100 and the implied starting calculates to $160,
            // that's a $60 over-statement of P&L (matches the May 8 screenshot symptom).
            //
            // v1.0.0-beta.9: switched primary realized P&L source from our fills-based
            // reconstruction to Kalshi's per-position realized_pnl_dollars (summed across
            // ALL positions, including closed/settled with qty=0). The reconstruction
            // kept producing wrong numbers because Kalshi's "sell side=no" can mean
            // either close-yes OR open-short-no and we can't tell from the fill alone.
            // Kalshi's accounting system already knows which it was; using their
            // realized_pnl_dollars sidesteps that ambiguity entirely.
            try{
              var realizedAuthC=(pf.kalshiRealizedNetC!=null)?pf.kalshiRealizedNetC:0;
              var realizedLocalC=0;
              try{
                var khAggLocal=khist.records&&khist.records.length>0?khAggregate(khist.records):null;
                if(khAggLocal)realizedLocalC=khAggLocal.pnl||0;
              }catch(e2){}
              var unrealizedC=0;
              for(var prc=0;prc<pf.positions.length;prc++){
                var pp=pf.positions[prc];
                var pmv=pp.marketValue||pp.totalCost||0;
                unrealizedC+=(pmv-(pp.totalCost||0));
              }
              var impliedStartC=pf.kalshiAccountTotal-realizedAuthC-unrealizedC;
              log("Reconciliation [Kalshi auth]: total $"+(pf.kalshiAccountTotal/100).toFixed(2)+" - realized $"+(realizedAuthC/100).toFixed(2)+" - unrealized $"+(unrealizedC/100).toFixed(2)+" = implied starting $"+(impliedStartC/100).toFixed(2)+". Compare to your actual deposit.");
              var driftPnL=realizedLocalC-realizedAuthC;
              if(Math.abs(driftPnL)>100){// $1+ drift
                log("Local reconstruction vs Kalshi: local says $"+(realizedLocalC/100).toFixed(2)+", Kalshi says $"+(realizedAuthC/100).toFixed(2)+", drift=$"+(driftPnL/100).toFixed(2)+". Trust Kalshi's number; the reconstruction has a known bug with multi-side fills.","warn");
              }
            }catch(e){log("Reconciliation calc failed: "+e.message,"warn");}
            // V1.0.0: drawdown circuit breaker check.
            // Portfolio total = cash + market_value of open positions.
            // Track HWM, halt if drop exceeds limit.
            if(drawdownEnabledRef.current){
              var posValue=0;
              for(var pj=0;pj<pf.positions.length;pj++){
                posValue+=(pf.positions[pj].marketValue||pf.positions[pj].totalCost||0);
              }
              var portfolioTotalC=pf.cash+posValue;
              if(portfolioTotalC>hwmRef.current){
                hwmRef.current=portfolioTotalC;
                setHwm(portfolioTotalC);
                lss("kt_hwm",""+portfolioTotalC);
              }
              if(hwmRef.current>0){
                var ddPct=1-(portfolioTotalC/hwmRef.current);
                var prevHalt=drawdownHalt.current;
                drawdownHalt.current=ddPct>=drawdownLimit;
                if(drawdownHalt.current&&!prevHalt){
                  log("[DRAWDOWN HALT] portfolio "+ct(portfolioTotalC)+" is "+(ddPct*100).toFixed(1)+"% below HWM "+ct(hwmRef.current)+". New buy entries blocked. Switch mode to OFF or reset HWM to resume.","error");
                }else if(!drawdownHalt.current&&prevHalt){
                  log("[DRAWDOWN OK] portfolio recovered to "+(100-ddPct*100).toFixed(1)+"% of HWM. New entries allowed.","success");
                }
              }
            }
            // V1.0.0: daily loss limit check.
            // Today's loss = (HWM at start of day - portfolio now) if positive.
            // Reset at UTC midnight.
            if(dailyLossEnabledRef.current){
              var today=new Date().toISOString().slice(0,10);
              var posValue2=0;
              for(var pk=0;pk<pf.positions.length;pk++){
                posValue2+=(pf.positions[pk].marketValue||pf.positions[pk].totalCost||0);
              }
              if(dailyLossDate.current!==today){
                dailyLossDate.current=today;
                dailyLossHalt.current=false;
                lss("kt_dl_date",today);
                lss("kt_dl_start",""+(pf.cash+posValue2));
              }
              var startC=parseFloat(lsg("kt_dl_start")||"0");
              if(startC>0){
                var dayChange=(pf.cash+posValue2)-startC;
                var dayPct=dayChange/startC;
                var prevDailyHalt=dailyLossHalt.current;
                dailyLossHalt.current=dayPct<=-dailyLossLimit;
                if(dailyLossHalt.current&&!prevDailyHalt){
                  log("[DAILY LOSS HALT] today's P&L "+(dayChange>=0?"+$":"-$")+Math.abs(dayChange/100).toFixed(2)+" ("+(dayPct*100).toFixed(1)+"%) breaks "+(dailyLossLimit*100).toFixed(0)+"% threshold. Halted until midnight UTC.","error");
                }
              }
            }
          }
          // V30.9: Always run TTL check after fetchPortfolio resolves, even when
          // throttled (pf=null) - portfolio.resting still has fresh data from the
          // last sync that happened <30s ago.
          cancelStaleOrders();
        });
      }

      // If budget is fully exhausted, still check exits but skip full market scan
      if(maxBet()<=0&&deployedRef.current>0){
        var nextDelay=scanDelay();
        // Even when idle, do a lightweight position check with cached markets
        if(mkts.length>0)checkExits(mkts);
        log("Idle: deployed "+ct(deployedRef.current)+". Next check in "+Math.round(nextDelay/1000)+"s.");
        scanning.current=false;
        tmr.current=setTimeout(run,nextDelay);
        return;
      }

      // Reset cycle tracking
      cycleSpent.current=0;
      _orderQueue.length=0;
      var delay=scanDelay();
      doFetch().then(function(fresh){
        if(!canaryOk){log("Auto: skipping trades - canary validation failed","error");return;}

        // Check exit opportunities on held positions
        if(!demo)checkExits(fresh);

        // Build watchlist of near-signal markets
        buildWatchlist(fresh,cfg);

        var sg=fresh.filter(function(m){return m.signal&&!traded.current[m.ticker]&&!CANARY_SET.current[m.ticker];});
        var mTag=opModeRef.current==="full_auto"?"AUTO":opModeRef.current==="sell_only"?"SELL-ONLY":opModeRef.current==="observe"?"OBSERVE":"OFF";
        if(sg.length>0){
          log("["+mTag+"] "+sg.length+" signals. Budget: "+ct(maxBet())+" | Next scan: "+Math.round(delay/1000)+"s | Top: "+sg[0].signal.sig+" "+sg[0].ticker);
        }else{
          log("["+mTag+"] no new signals. Next scan: "+Math.round(delay/1000)+"s");
        }
        var placed=0;
        var limit=Math.min(sg.length,20);
        for(var i=0;i<limit;i++){
          if(maxBet()<=0){log("Auto: budget exhausted (deployed "+ct(deployedRef.current)+" of "+ct(balRef.current+deployedRef.current)+")");break;}
          if(paperRef.current&&(pending.length+placed)>=MAX_PENDING){break;}
          var before=cycleSpent.current;
          doTrade(sg[i]);
          if(cycleSpent.current>before)placed++;
        }
        if(placed>0)log("Auto: placed "+placed+" trades, deployed "+ct(cycleSpent.current)+" this cycle");
      });
      // Schedule next run with adaptive delay
      scanning.current=false;
      tmr.current=setTimeout(run,delay);
    };
    // v1.0.0-beta.8: wake-on-resume.
    // iOS Safari suspends setTimeout callbacks when the tab isn't visible
    // (phone locked, app backgrounded, switched tabs). When you come back, the
    // queued setTimeout may not fire for many minutes, so the bot appears dead.
    // Listen for visibilitychange and force-fire run() when the tab comes back
    // to visible, but only when it was hidden long enough to plausibly need it
    // (30s threshold avoids double-scan on a quick switch away and back).
    var hiddenSince=null;
    function onVisChange(){
      if(document.visibilityState==="hidden"){
        hiddenSince=Date.now();
      }else if(document.visibilityState==="visible"&&hiddenSince!=null){
        var hiddenFor=Date.now()-hiddenSince;
        hiddenSince=null;
        if(hiddenFor>=30000){
          log("[WAKE] Tab visible after "+Math.round(hiddenFor/1000)+"s; forcing scan");
          if(tmr.current){clearTimeout(tmr.current);tmr.current=null;}
          if(!scanning.current)run();
        }
      }
    }
    document.addEventListener("visibilitychange",onVisChange);
    run();
    return function(){
      if(tmr.current)clearTimeout(tmr.current);
      document.removeEventListener("visibilitychange",onVisChange);
    };
  },[opMode,est,scr]);

  function togStop(){
    var next=!est;setEst(next);lss("kt_es",next?"1":"0");
    if(next){setAon(false);lss("kt_ao","0");setOpMode("off");lss("kt_om","off");log("EMERGENCY STOP ACTIVATED","error");}

  // ---- COMPUTED VALUES ----
  var wr=met.fl>0?met.w/met.fl:0;
  var aw=met.w>0?met.ea/met.w:0;

  var pnl=met.ea/100;
  var roi=met.pl>0?(met.ea/met.pl*100).toFixed(1):"0.0";
  var md=paper?"PAPER":"LIVE";
  var mc=paper?"#00ff88":"#ff3b30";
  var pnlC=pnl>=0?"#00ff88":"#ff6b6b";

    R("div",{style:{fontSize:16,fontWeight:800,color:"#ff6b6b",marginBottom:12}},"CORS Proxy Needed"),

              R("div",{style:cx(P.mt,{color:"#dd88ff"})},"Projections"),
              R("div",{style:{color:"#666",fontSize:11,padding:"12px 0",textAlign:"center"}},
                "No history loaded. Tap ",R("span",{style:{color:"#dd88ff",fontWeight:700}},"Sync Portfolio + History")," in Portfolio tab."));
          }
          // Format helpers
          function fmtCents(c){var d=c/100;return(c>=0?"+$":"-$")+Math.abs(d).toFixed(2);}
          function fmtCentsAbs(c){return"$"+(Math.abs(c)/100).toFixed(2);}
          function fmtPlusMinus(val,sd){return fmtCents(val)+" \u00b1 "+fmtCentsAbs(sd);}
          function statColor(v){return v>0?"#00ff88":v<0?"#ff6b6b":"#888";}
          // Build window panels (1d, 7d, 30d, lifetime)
          var windows=[
            {label:"1 Day",days:1},
            {label:"7 Days",days:7},
            {label:"30 Days",days:30},
            {label:"Lifetime",days:0}
          ];
          var rows=windows.map(function(w){
            var s=khWindowStats(allRecs,w.days);
            return{label:w.label,days:w.days,stats:s};
          });
          var stratLifetime=khStrategyStats(allRecs,0,ledger);
          var strat7d=khStrategyStats(allRecs,7,ledger);
          return R("div",null,
            // Window grid
            R("div",{style:cx(P.mc,{borderColor:"#dd88ff33"})},
              R("div",{style:cx(P.mt,{color:"#dd88ff"})},"Projections (rolling windows)"),
              R("div",{style:{fontSize:10,color:"#666",marginBottom:8}},
                "From "+allRecs.length+" tickers in Kalshi history. Numbers are realized P&L only (open positions excluded)."),
              rows.map(function(r,i){
                var s=r.stats;
                if(!s){
                  return R("div",{key:i,style:{padding:"6px 0",borderBottom:"1px solid #1a2230",fontSize:11}},
                    R("span",{style:{color:"#aaa",fontWeight:700,marginRight:8}},r.label),
                    R("span",{style:{color:"#555"}},"insufficient data (<3 trades)"));
                }
                var wrPct=Math.round(s.winRate*100);
                return R("div",{key:i,style:{padding:"8px 0",borderBottom:"1px solid #1a2230"}},
                  R("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
                    R("span",{style:{color:"#dd88ff",fontWeight:700,fontSize:12}},r.label),
                    R("span",{style:{color:"#888",fontSize:10}},
                      s.n+" trades, "+s.wins+"W "+s.losses+"L ("+wrPct+"%), "+s.tradesPerDay.toFixed(1)+"/day")),
                  R("div",{style:{display:"flex",gap:12,fontSize:10,color:"#aaa",marginBottom:2}},
                    R("span",null,"avg win: ",R("span",{style:{color:"#00ff88"}},fmtCentsAbs(s.avgWinC))),
                    R("span",null,"avg loss: ",R("span",{style:{color:"#ff6b6b"}},fmtCentsAbs(s.avgLossC))),
                    R("span",null,"EV/trade: ",R("span",{style:{color:statColor(s.evC),fontWeight:700}},fmtCents(s.evC)))),
                  // Projections (only meaningful for the time-windowed views, not lifetime)
                  r.days>0?R("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,fontSize:10,marginTop:3}},
                    R("div",null,
                      R("div",{style:{color:"#666"}},"Daily proj"),
                      R("div",{style:{color:statColor(s.dailyProjC),fontFamily:"monospace",fontWeight:700}},fmtPlusMinus(s.dailyProjC,s.dailySdC))),
                    R("div",null,
                      R("div",{style:{color:"#666"}},"Weekly proj"),
                      R("div",{style:{color:statColor(s.weeklyProjC),fontFamily:"monospace",fontWeight:700}},fmtPlusMinus(s.weeklyProjC,s.weeklySdC))),
                    R("div",null,
                      R("div",{style:{color:"#666"}},"Monthly proj"),
                      R("div",{style:{color:statColor(s.monthlyProjC),fontFamily:"monospace",fontWeight:700}},fmtPlusMinus(s.monthlyProjC,s.monthlySdC)))
                  ):null);
              })),
            // Per-strategy table (lifetime + 7d if differing)
            stratLifetime.length>0?R("div",{style:cx(P.mc,{borderColor:"#00ccff33"})},
              R("div",{style:cx(P.mt,{color:"#00ccff"})},"By Strategy (lifetime)"),
              R("div",{style:{fontSize:10,color:"#666",marginBottom:6}},
                "Strategy mapped via live trade ledger. UNKNOWN = traded before ledger existed."),
              stratLifetime.map(function(s,i){
                var wrPct=Math.round(s.winRate*100);
                return R("div",{key:i,style:{padding:"5px 0",borderBottom:"1px solid #111",fontSize:11}},
                  R("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:1}},
                    R("span",{style:{color:"#00ccff",fontWeight:700,marginRight:8}},s.strategy),
                    R("span",{style:{color:statColor(s.totalPnlC),fontFamily:"monospace",fontWeight:700}},fmtCents(s.totalPnlC))),
                  R("div",{style:{display:"flex",gap:10,fontSize:10,color:"#888"}},
                    R("span",null,s.n+" tr"),
                    R("span",null,s.wins+"W "+s.losses+"L ("+wrPct+"%)"),
                    R("span",null,"avg win: ",R("span",{style:{color:"#00ff88"}},fmtCentsAbs(s.avgWinC))),
                    R("span",null,"avg loss: ",R("span",{style:{color:"#ff6b6b"}},fmtCentsAbs(s.avgLossC))),
                    R("span",null,"EV: ",R("span",{style:{color:statColor(s.evC),fontWeight:700}},fmtCents(s.evC)))));
              })):null,
            // 7-day strategy view (only if it differs from lifetime, ie there's recent activity)
            strat7d.length>0&&strat7d.length!==stratLifetime.length?R("div",{style:cx(P.mc,{borderColor:"#00ccff33"})},
              R("div",{style:cx(P.mt,{color:"#00ccff"})},"By Strategy (7-day)"),
              strat7d.map(function(s,i){
                var wrPct=Math.round(s.winRate*100);
                return R("div",{key:i,style:{padding:"5px 0",borderBottom:"1px solid #111",fontSize:11}},
                  R("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:1}},
                    R("span",{style:{color:"#00ccff",fontWeight:700,marginRight:8}},s.strategy),
                    R("span",{style:{color:statColor(s.totalPnlC),fontFamily:"monospace",fontWeight:700}},fmtCents(s.totalPnlC))),
                  R("div",{style:{display:"flex",gap:10,fontSize:10,color:"#888"}},
                    R("span",null,s.n+" tr"),
                    R("span",null,wrPct+"% wr"),
                    R("span",null,"EV: ",R("span",{style:{color:statColor(s.evC),fontWeight:700}},fmtCents(s.evC)))));
              })):null);
        })()
      );})():null

    )
  );
}

// ============================================================
// STYLES
// ============================================================
var P={
  pg:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#06080b"},
  cd:{background:"#0d1117",border:"1px solid #1a2230",borderRadius:16,padding:24,width:"100%",maxWidth:420,display:"flex",flexDirection:"column",gap:"12px"},
  sh:{minHeight:"100vh",background:"#06080b",display:"flex",flexDirection:"column"},
  hd:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid #1a2230",background:"#0a0e14"},
  st:{background:"#0a0e14",padding:"8px 6px",textAlign:"center"},
  sl:{fontSize:9,color:"#666",letterSpacing:"0.5px",textTransform:"uppercase"},
  sv:{fontSize:13,fontWeight:700,color:"#ccc",fontFamily:"monospace",marginTop:2},
  inp:{background:"#0a0f14",border:"1px solid #1a2230",borderRadius:10,padding:"10px 14px",color:"#e0e0e0",fontSize:13,width:"100%",outline:"none",display:"block"},
  btn:{border:"none",borderRadius:10,padding:"10px 16px",fontSize:14,fontWeight:700,cursor:"pointer",color:"#e0e0e0",background:"#1a2230",display:"block",width:"100%",textAlign:"center"},
  bg:{background:"#00ff8822",color:"#00ff88",border:"1px solid #00ff8844"},
  mc:{background:"#0a0f14",border:"1px solid #1a2230",borderRadius:10,padding:14,marginBottom:10},
  mt:{fontWeight:800,color:"#00ff88",marginBottom:8,fontSize:13}
};

ReactDOM.createRoot(document.getElementById("root")).render(R(App,null));
</script>
