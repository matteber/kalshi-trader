// === RSA-PSS Auth ===
async function importPrivateKey(pem) {
  var trimmed = pem.trim();
  var isPkcs1 = trimmed.indexOf("BEGIN RSA PRIVATE KEY") >= 0;
  var b64;
  if (isPkcs1) {
    b64 = trimmed.replace(/-----BEGIN RSA PRIVATE KEY-----/, "").replace(/-----END RSA PRIVATE KEY-----/, "").replace(/\s/g, "");
    var der = Uint8Array.from(atob(b64), function (c) {
      return c.charCodeAt(0);
    });
    var pkcs1Len = der.length;
    var seqLen = function (len) {
      if (len < 128) return [len];
      if (len < 256) return [0x81, len];
      if (len < 65536) return [0x82, len >> 8 & 0xff, len & 0xff];
      return [0x83, len >> 16 & 0xff, len >> 8 & 0xff, len & 0xff];
    };
    var oid = [0x30, 0x0d, 0x06, 0x09, 0x2a, 0x86, 0x48, 0x86, 0xf7, 0x0d, 0x01, 0x01, 0x01, 0x05, 0x00];
    var octetHeader = [0x04].concat(seqLen(pkcs1Len));
    var innerLen = oid.length + octetHeader.length + pkcs1Len;
    var outerHeader = [0x30].concat(seqLen(2 + 1 + innerLen));
    var version = [0x02, 0x01, 0x00];
    var all = outerHeader.concat(version).concat(oid).concat(octetHeader);
    var pkcs8 = new Uint8Array(all.length + der.length);
    pkcs8.set(all);
    pkcs8.set(der, all.length);
    return crypto.subtle.importKey("pkcs8", pkcs8, {
      name: "RSA-PSS",
      hash: "SHA-256"
    }, false, ["sign"]);
  }
  b64 = trimmed.replace(/-----BEGIN PRIVATE KEY-----/, "").replace(/-----END PRIVATE KEY-----/, "").replace(/\s/g, "");
  var der2 = Uint8Array.from(atob(b64), function (c) {
    return c.charCodeAt(0);
  });
  return crypto.subtle.importKey("pkcs8", der2, {
    name: "RSA-PSS",
    hash: "SHA-256"
  }, false, ["sign"]);
}
async function rsaSign(key, keyId, method, path) {
  var ts = String(Math.floor(Date.now() / 1000));
  var msg = new TextEncoder().encode(ts + method + path.split("?")[0]);
  var sig = await crypto.subtle.sign({
    name: "RSA-PSS",
    saltLength: 32
  }, key, msg);
  var arr = new Uint8Array(sig);
  var str = "";
  for (var i = 0; i < arr.length; i++) str += String.fromCharCode(arr[i]);
  return {
    "KALSHI-ACCESS-KEY": keyId,
    "KALSHI-ACCESS-TIMESTAMP": ts,
    "KALSHI-ACCESS-SIGNATURE": btoa(str)
  };
}

// === Kalshi API ===
var KALSHI_BASE = "https://api.elections.kalshi.com/trade-api/v2";
var _proxy = "",
  _keyId = "",
  _key = null;
function setProxy(url) {
  _proxy = url.replace(/\/+$/, "");
}
async function setCredentials(kid, pem) {
  _keyId = kid.trim();
  _key = await importPrivateKey(pem);
}
async function kalshiReq(path, method, body) {
  method = method || "GET";
  var base = _proxy || KALSHI_BASE;
  var authH = await rsaSign(_key, _keyId, method, "/trade-api/v2" + path);
  var h = {
    "Content-Type": "application/json"
  };
  var keys = Object.keys(authH);
  for (var i = 0; i < keys.length; i++) h[keys[i]] = authH[keys[i]];
  var opts = {
    method: method,
    headers: h
  };
  if (!_proxy) opts.mode = "cors";
  if (body) opts.body = JSON.stringify(body);
  var res;
  try {
    res = await fetch(base + path, opts);
  } catch (err) {
    var em = err.message || "";
    if (!_proxy && (em.indexOf("Failed to fetch") >= 0 || em.indexOf("Load failed") >= 0 || em.indexOf("NetworkError") >= 0)) throw new Error("CORS_BLOCKED");
    throw err;
  }
  if (!res.ok) {
    var txt = "";
    try {
      txt = await res.text();
    } catch (e2) {/* */}
    throw new Error("HTTP " + res.status + ": " + txt.slice(0, 200));
  }
  return res.json();
}
function d2c(v) {
  if (v == null || v === "") return null;
  var n = Math.round(parseFloat(v) * 100);
  return isNaN(n) ? null : n;
}
function normalizeMarket(m) {
  var yb = d2c(m.yes_bid_dollars);
  var ya = d2c(m.yes_ask_dollars);
  var nb = d2c(m.no_bid_dollars);
  var na = d2c(m.no_ask_dollars);
  var lp = d2c(m.last_price_dollars);
  var vol = parseFloat(m.volume_24h_fp || m.volume_fp || "0") || 0;
  if (yb == null) yb = lp != null ? lp : 50;
  if (ya == null) ya = yb + 4;
  if (nb == null) nb = 100 - ya;
  if (na == null) na = 100 - yb;
  if (lp == null) lp = yb;
  return {
    ticker: m.ticker || "",
    event_ticker: m.event_ticker || "",
    title: m.title || m.yes_sub_title || m.ticker || "?",
    subtitle: m.subtitle || m.yes_sub_title || "",
    close_time: m.close_time || m.latest_expiration_time || "",
    yes_bid: yb,
    yes_ask: ya,
    no_bid: nb,
    no_ask: na,
    last_price: lp,
    volume: vol
  };
}
async function fetchMarkets() {
  var all = [];
  var cursor = "";
  var pages = 0;
  while (pages < 15) {
    var qs = "status=open&limit=1000";
    if (cursor) qs += "&cursor=" + encodeURIComponent(cursor);
    var data = await kalshiReq("/markets?" + qs);
    var mkts = data.markets || [];
    for (var i = 0; i < mkts.length; i++) all.push(normalizeMarket(mkts[i]));
    cursor = data.cursor || "";
    if (!cursor || mkts.length === 0) break;
    pages++;
  }
  return all;
}

// === Strategy ===
function daysUntil(iso) {
  if (!iso) return 999;
  return (new Date(iso) - Date.now()) / 86400000;
}
function analyzeMarket(m, cfg) {
  var days = daysUntil(m.close_time);
  if (days <= 0 || days > cfg.daysWindow) return null;
  var yb = m.yes_bid,
    nb = m.no_bid,
    ya = m.yes_ask;
  var sum = yb + nb;
  var mid = Math.round((yb + ya) / 2);
  if (sum > 0 && sum <= 93) return {
    signal: "ARB",
    side: "yes",
    edge: (100 - sum) / 100,
    prob: 1.0,
    price: yb,
    label: "Arb +" + (100 - sum) + "c"
  };
  var spread = ya - yb;
  if (m.volume >= 5000 && spread <= 6 && spread >= 0) {
    if (mid >= 60 && mid <= 85) {
      var e1 = (mid - 50) / 100 * 0.15;
      if (e1 >= cfg.minEdge) return {
        signal: "VOL",
        side: "yes",
        edge: e1,
        prob: mid / 100,
        price: yb,
        label: "Vol " + mid + "%"
      };
    }
    if (mid >= 15 && mid <= 40) {
      var e2 = (50 - mid) / 100 * 0.15;
      if (e2 >= cfg.minEdge) return {
        signal: "VOL",
        side: "no",
        edge: e2,
        prob: (100 - mid) / 100,
        price: nb,
        label: "Vol " + mid + "%"
      };
    }
  }
  if (mid >= 92) {
    var e3 = (mid - 89) / 100;
    if (e3 >= cfg.minEdge) return {
      signal: "FADE",
      side: "no",
      edge: e3,
      prob: (100 - mid) / 100,
      price: nb,
      label: "Fade " + mid + "%"
    };
  }
  if (mid <= 8) {
    var e4 = (11 - mid) / 100;
    if (e4 >= cfg.minEdge) return {
      signal: "FADE",
      side: "yes",
      edge: e4,
      prob: mid / 100,
      price: yb,
      label: "Fade " + mid + "%"
    };
  }
  return null;
}
function kellySize(prob, priceCents, fraction, maxCents, days) {
  if (!priceCents || priceCents <= 0 || priceCents >= 100 || !maxCents) return 0;
  var cost = priceCents / 100,
    b = (1 - cost) / cost;
  var p = Math.min(0.97, Math.max(0.03, prob || 0.5));
  var f = Math.max(0, (b * p - (1 - p)) / b);
  var urg = days < 0.5 ? 1.5 : days < 1 ? 1.25 : days < 2 ? 1.1 : 1.0;
  var r = Math.min(Math.round(f * fraction * maxCents * urg), maxCents);
  return isNaN(r) ? 0 : r;
}

// === Simulation ===
function simulateTrade(sig) {
  var fillRates = {
    ARB: 0.95,
    VOL: 0.78,
    FADE: 0.70
  };
  var edgeRates = {
    ARB: 1.0,
    VOL: 0.55,
    FADE: 0.25
  };
  if (Math.random() > (fillRates[sig.signal] || 0.7)) return {
    filled: false
  };
  var realEdge = sig.edge * (edgeRates[sig.signal] || 0.5);
  var trueProb = Math.min(0.97, Math.max(0.03, (sig.prob || 0.5) + realEdge + (Math.random() - 0.5) * 0.06));
  var won = Math.random() < trueProb;
  return {
    filled: true,
    won: won,
    trueProb: trueProb
  };
}

}

var WORKER_CODE = 'const K="https://api.elections.kalshi.com/trade-api/v2";\nconst C={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Methods":"GET,POST,PUT,DELETE,OPTIONS","Access-Control-Allow-Headers":"Content-Type,KALSHI-ACCESS-KEY,KALSHI-ACCESS-SIGNATURE,KALSHI-ACCESS-TIMESTAMP"};\nexport default{async fetch(r){if(r.method==="OPTIONS")return new Response(null,{headers:C});const u=new URL(r.url);const t=K+u.pathname+u.search;const h={};for(const[k,v]of r.headers){if(!k.startsWith("cf-")&&k!=="host")h[k]=v;}const o={method:r.method,headers:h};if(r.body)o.body=r.body;const s=await fetch(t,o);const b=await s.arrayBuffer();const rh=new Headers(s.headers);for(const[k,v]of Object.entries(C))rh.set(k,v);return new Response(b,{status:s.status,headers:rh});}};';

// =====================================================================
function KalshiTrader() {
  var [screen, setScreen] = useState("login");
  var [keyId, setKeyId] = useState(lsGet("kt_key") || "");
  var [pemText, setPemText] = useState(lsGet("kt_pem") || "");
  var [proxyUrl, setProxyUrl] = useState(lsGet("kt_proxy") || "");
  var [err, setErr] = useState("");
  var [loading, setLoading] = useState(false);
  var [demo, setDemo] = useState(false);
  var [paper, setPaper] = useState(false);
  var [balance, setBalance] = useState(0);
  var [startBalance] = useState(10000);
  var [markets, setMarkets] = useState([]);
  var [logs, setLogs] = useState([]);
  var [autoOn, setAutoOn] = useState(lsGet("kt_auto") === "true");
  var [eStopped, setEStopped] = useState(lsGet("kt_estop") === "true");
  var [metrics, setMetrics] = useState(loadMetrics);
  var [tab, setTab] = useState("markets");
  var [fetching, setFetching] = useState(false);
  var [filter, setFilter] = useState("all");
  var cfg = {
    daysWindow: 14,
    minEdge: 0.03,
    kellyFrac: 0.25,
    maxBetCents: 500
  };
  var tradedRef = useRef({});
  var timerRef = useRef(null);
  var FEE = 0.07;
  var addLog = useCallback(function (msg, type) {
    setLogs(function (p) {
      return [{
        t: Date.now(),
        msg: msg,
        type: type || "info"
      }].concat(p).slice(0, 200);
    });
  }, []);
  var saveM = function (m) {
    lsSet("kt_metrics", JSON.stringify(m));
  };

  // -- Helpers --
  var cents = function (v) {
    return "$" + (v / 100).toFixed(2);
  };
  var pct = function (n, d) {
    return d > 0 ? Math.round(n / d * 100) + "%" : "--";
  };

  // -- Login --
  var handleLogin = async function () {
    setLoading(true);
    setErr("");
    try {
      await setCredentials(keyId, pemText);
    } catch (e) {
      setErr("Bad private key.");
      setLoading(false);
      return;
    }
    if (proxyUrl) setProxy(proxyUrl);
    try {
      var bal = await kalshiReq("/portfolio/balance");
      setBalance(bal.balance || d2c(bal.balance_dollars) || 0);
      lsSet("kt_key", keyId);
      lsSet("kt_pem", pemText);
      lsSet("kt_proxy", proxyUrl);
      setScreen("modeselect");
    } catch (e) {
      var em = e.message || "";
      if (em === "CORS_BLOCKED" || em.indexOf("Load failed") >= 0 || em.indexOf("Failed to fetch") >= 0) {
        if (!proxyUrl) setScreen("corserror");else setErr("Proxy reachable but Kalshi blocked.");
      } else if (em.indexOf("401") >= 0 || em.indexOf("403") >= 0) {
        setErr("Credentials rejected.");
      } else setErr(em);
    }
    setLoading(false);
  };
  var handlePaper = function () {
    setPaper(true);
    setDemo(false);
    setScreen("dash");
    addLog("Paper trading active");
  };
  var handleLive = function () {
    setPaper(false);
    setDemo(false);
    setScreen("dash");
    addLog("LIVE trading", "warn");
  };
  var handleDemo = function () {
    setDemo(true);
    setPaper(false);
    setBalance(10000);
    var mocks = mockMarkets();
    for (var i = 0; i < mocks.length; i++) mocks[i].signal = analyzeMarket(mocks[i], cfg);
    setMarkets(mocks);
    setScreen("dash");
    addLog("Demo mode");
  };

  // -- Fetch --
  var doFetch = useCallback(async function () {
    if (demo) return;
    setFetching(true);
    try {
      addLog("Fetching markets...");
      var all = await fetchMarkets();
      addLog("API returned " + all.length + " markets");
      var shown = [];
      for (var i = 0; i < all.length; i++) {
        var days = daysUntil(all[i].close_time);
        if (days <= 0 || days > cfg.daysWindow) continue;
        all[i].signal = analyzeMarket(all[i], cfg);
        shown.push(all[i]);
      }
      shown.sort(function (a, b) {
        return new Date(a.close_time) - new Date(b.close_time);
      });
      setMarkets(shown);
      var sigCount = shown.filter(function (m) {
        return m.signal;
      }).length;
      addLog(shown.length + " in window, " + sigCount + " signals");
      setMetrics(function (p) {
        var n = Object.assign({}, p);
        n.evaluated += all.length;
        n.signals += sigCount;
        saveM(n);
        return n;
      });
    } catch (e) {
      addLog("Fetch error: " + e.message, "error");
    }
    setFetching(false);
  }, [demo, addLog]);
  useEffect(function () {
    if (!demo && screen === "dash") doFetch();
  }, [screen]); // eslint-disable-line

  // -- Trade --
  var executeTrade = useCallback(function (m) {
    if (!m.signal || eStopped) return;
    if (tradedRef.current[m.ticker]) {
      addLog("Already traded " + m.ticker, "warn");
      return;
    }
    var sig = m.signal;
    var days = daysUntil(m.close_time);
    var size = kellySize(sig.prob, sig.price, cfg.kellyFrac, cfg.maxBetCents, days);
    if (size <= 0) return;
    var contracts = Math.max(1, Math.floor(size / sig.price));
    var costC = contracts * sig.price;
    if (demo || paper) {
      var result = simulateTrade(sig);
      tradedRef.current[m.ticker] = true;
      setMetrics(function (p) {
        var n = Object.assign({}, p);
        n.attempted++;
        if (!n.byType[sig.signal]) n.byType[sig.signal] = {
          a: 0,
          f: 0,
          w: 0,
          l: 0,
          p: 0,
          e: 0
        };
        n.byType[sig.signal].a++;
        if (result.filled) {
          n.filled++;
          n.byType[sig.signal].f++;
          n.placed += costC;
          n.leveraged += costC;
          n.byType[sig.signal].p += costC;
          if (result.won) {
            var winC = Math.round(contracts * (100 - sig.price) * (1 - FEE));
            n.wins++;
            n.byType[sig.signal].w++;
            n.earned += winC;
            n.byType[sig.signal].e += winC;
            n.fees += Math.round(contracts * (100 - sig.price) * FEE);
            setBalance(function (b) {
              return b + winC;
            });
            addLog("[" + sig.signal + "] WIN " + m.ticker + " +" + (winC / 100).toFixed(2), "success");
          } else {
            n.losses++;
            n.byType[sig.signal].l++;
            n.earned -= costC;
            n.byType[sig.signal].e -= costC;
            setBalance(function (b) {
              return b - costC;
            });
            addLog("[" + sig.signal + "] LOSS " + m.ticker + " -" + (costC / 100).toFixed(2), "error");
          }
        } else {
          addLog("[" + sig.signal + "] " + m.ticker + " -- no fill", "warn");
        }
        saveM(n);
        return n;
      });
    } else {
      kalshiReq("/orders", "POST", {
        ticker: m.ticker,
        action: "buy",
        side: sig.side,
        count_fp: contracts + ".00",
        type: "limit",
        yes_price_dollars: (sig.side === "yes" ? sig.price / 100 : (100 - sig.price) / 100).toFixed(2),
        time_in_force: "ioc"
      }).then(function () {
        tradedRef.current[m.ticker] = true;
        addLog("[LIVE] " + contracts + "x " + sig.side + " @ " + sig.price + "c " + m.ticker, "success");
      }).catch(function (e) {
        addLog("[LIVE] Failed: " + e.message, "error");
      });
    }
  }, [demo, paper, eStopped, addLog]);

  // -- Auto --
  useEffect(function () {
    if (timerRef.current) {
      clearInterval(timerRef.current);
      timerRef.current = null;
    }
    if (!autoOn || eStopped || screen !== "dash") return;
    var run = async function () {
      await doFetch();
      var sigs = markets.filter(function (m) {
        return m.signal && !tradedRef.current[m.ticker];
      });
      for (var i = 0; i < Math.min(sigs.length, 3); i++) executeTrade(sigs[i]);
    };
    run();
    timerRef.current = setInterval(run, 120000);
    return function () {
      if (timerRef.current) clearInterval(timerRef.current);
    };
  }, [autoOn, eStopped, screen]); // eslint-disable-line

  var toggleEStop = function () {
    var next = !eStopped;
    setEStopped(next);
    lsSet("kt_estop", String(next));
    if (next) {
      setAutoOn(false);
      lsSet("kt_auto", "false");
      addLog("EMERGENCY STOP", "error");
    } else addLog("E-stop released");
  };

  // -- Projections --
  var winRate = metrics.filled > 0 ? metrics.wins / metrics.filled : 0;
  var avgWin = metrics.wins > 0 ? metrics.earned / metrics.wins : 0;
  var avgLoss = metrics.losses > 0 ? metrics.placed / metrics.losses : 0; // avg cost per loss
  var elapsed = (Date.now() - (metrics.startTime || Date.now())) / 3600000; // hours
  var tradesPerHour = elapsed > 0.1 ? metrics.filled / elapsed : 0;
  var projectedDaily = tradesPerHour * 24 * (winRate * avgWin - (1 - winRate) * avgLoss) / 100;
