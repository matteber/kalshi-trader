// ─── Cloudflare Worker code ───────────────────────────────────────────────────
const WORKER_CODE = `const KALSHI = "https://api.elections.kalshi.com/trade-api/v2";
const CORS = {
  "Access-Control-Allow-Origin": "*",
  "Access-Control-Allow-Methods": "GET, POST, PUT, DELETE, OPTIONS",
  "Access-Control-Allow-Headers": "Content-Type, KALSHI-ACCESS-KEY, KALSHI-ACCESS-SIGNATURE, KALSHI-ACCESS-TIMESTAMP",
};
export default {
  async fetch(req) {
    if (req.method === "OPTIONS") return new Response(null, { headers: CORS });
    const url = new URL(req.url);
    const target = KALSHI + url.pathname + url.search;
    const headers = {};
    for (const [k, v] of req.headers) {
      if (!["host","origin","referer"].includes(k)) headers[k] = v;
    }
    const res = await fetch(target, { method: req.method, headers, body: req.method !== "GET" ? req.body : undefined });
    return new Response(await res.text(), { status: res.status, headers: { "Content-Type": "application/json", ...CORS } });
  },
};`;

// ─── RSA-PSS signing ─────────────────────────────────────────────────────────
function asn1Len(l) {
if (l < 0x80) return new Uint8Array([l]);
if (l < 0x100) return new Uint8Array([0x81, l]);
return new Uint8Array([0x82, l >> 8 & 0xff, l & 0xff]);
}
function asn1Wrap(tag, c) {
const l = asn1Len(c.length),
o = new Uint8Array(1 + l.length + c.length);
o[0] = tag;
o.set(l, 1);
o.set(c, 1 + l.length);
return o;
}
function concat(…a) {
const o = new Uint8Array(a.reduce((s, x) => s + x.length, 0));
let i = 0;
for (const x of a) {
o.set(x, i);
i += x.length;
}
return o;
}
function pkcs1ToPkcs8(der) {
const v = new Uint8Array([0x02, 0x01, 0x00]);
const oid = new Uint8Array([0x30, 0x0d, 0x06, 0x09, 0x2a, 0x86, 0x48, 0x86, 0xf7, 0x0d, 0x01, 0x01, 0x01, 0x05, 0x00]);
return asn1Wrap(0x30, concat(v, oid, asn1Wrap(0x04, der)));
}
async function importPrivateKey(pem) {
const isPkcs1 = pem.includes(“RSA PRIVATE KEY”);
const clean = pem.replace(/—–[^-]+—–/g, “”).replace(/\s+/g, “”);
if (!clean) throw new Error(“Empty key”);
let der = Uint8Array.from(atob(clean), c => c.charCodeAt(0));
if (isPkcs1) der = pkcs1ToPkcs8(der);
return crypto.subtle.importKey(“pkcs8”, der.buffer, {
name: “RSA-PSS”,
hash: “SHA-256”
}, false, [“sign”]);
}
async function rsaSign(key, keyId, method, path) {
const ts = Date.now().toString();
const msg = new TextEncoder().encode(`${ts}${method}${path.split("?")[0]}`);
const sig = await crypto.subtle.sign({
name: “RSA-PSS”,
saltLength: 32
}, key, msg);
return {
“KALSHI-ACCESS-KEY”: keyId,
“KALSHI-ACCESS-TIMESTAMP”: ts,
“KALSHI-ACCESS-SIGNATURE”: btoa(String.fromCharCode(…new Uint8Array(sig)))
};
}

// ─── Kalshi API ───────────────────────────────────────────────────────────────
const KALSHI_BASE = “https://api.elections.kalshi.com/trade-api/v2”;
let _proxy = “”,
_keyId = “”,
_key = null;
function setProxy(url) {
_proxy = url.replace(//+$/, “”);
}
async function setCredentials(keyId, pem) {
_keyId = keyId.trim();
_key = await importPrivateKey(pem);
}
async function kalshiReq(path, method = “GET”, body = null) {
const base = _proxy || KALSHI_BASE;
const authH = await rsaSign(_key, _keyId, method, “/trade-api/v2” + path);
const h = {
“Content-Type”: “application/json”,
…authH
};
const opts = {
method,
headers: h
};
if (!_proxy) opts.mode = “cors”;
if (body) opts.body = JSON.stringify(body);
let res;
try {
res = await fetch(`${base}${path}`, opts);
} catch (e) {
const m = e.message || “”;
if (!*proxy && (m.includes(“Failed to fetch”) || m.includes(“Load failed”) || m.includes(“NetworkError”))) throw new Error(“CORS_BLOCKED”);
throw e;
}
if (!res.ok) {
const t = await res.text().catch(() => “”);
let d = t;
try {
const j = JSON.parse(t);
d = j.message || j.error || j.detail || t;
} catch (*) {}
throw new Error(`HTTP ${res.status}: ${d}`);
}
return res.json();
}
function d2c(d) {
return d != null ? Math.round(parseFloat(d) * 100) : null;
}
function normalizeMarket(m) {
const yb = m.yes_bid ?? d2c(m.yes_bid_dollars) ?? m.last_price ?? 50;
const ya = m.yes_ask ?? d2c(m.yes_ask_dollars) ?? yb + 4;
const nb = m.no_bid ?? d2c(m.no_bid_dollars) ?? 100 - ya;
const lp = m.last_price ?? d2c(m.last_price_dollars) ?? 50;
const vol = m.volume ?? m.volume_24h ?? 0;
return {
…m,
yes_bid: yb,
yes_ask: ya,
no_bid: nb,
last_price: lp,
volume: vol
};
}
const getMarkets = (cursor = “”) => {
const p = new URLSearchParams({
limit: 200,
status: “open”
});
if (cursor) p.set(“cursor”, cursor);
return kalshiReq(`/markets?${p}`).then(d => ({
…d,
markets: (d.markets || []).map(normalizeMarket)
}));
};

// ─── Category Filter ──────────────────────────────────────────────────────────
// Kalshi’s official categories — we whitelist everything except sports
const ALLOWED_CATEGORIES = new Set([“politics”, “political”, “crypto”, “cryptocurrency”, “culture”, “economics”, “economic”, “tech”, “technology”, “science”, “elections”, “election”, “climate”, “environment”, “companies”, “company”, “financials”, “financial”, “finance”, “markets”, “weather”, “business”, “health”, “international”, “mentions”, “entertainment”]);
const BLOCKED_CATEGORIES = new Set([“sports”, “sport”]);

// Sports player name patterns — “yes FirstName LastName: N+”
const PLAYER_STAT_RE = /^yes\s+[A-Z][a-z]+\s+[A-Z][a-z]+\s*:/;
// Over/under scoring lines
const OVER_UNDER_RE = /\b(over|under)\s+\d+.?\d*\s*(runs?|hits?|rbis?|points?|goals?|assists?|rebounds?|yards?|touchdowns?|saves?|strikeouts?|home runs?|stolen bases?)/i;
// Sports bracket: “yes Team1, yes Team2”
const BRACKET_RE = /\b(yes|no)\s+[A-Z][a-z]+.*,\s*(yes|no)\s+[A-Z][a-z]+/;
function isSportsMarket(m) {
// 1. Use category field if Kalshi provides it
const cat = (m.category || m.event_category || “”).toLowerCase();
if (BLOCKED_CATEGORIES.has(cat)) return true;
// Don’t do further checks if category is explicitly allowed
if (cat && ALLOWED_CATEGORIES.has(cat)) return false;
const title = m.title || “”;
const ticker = m.ticker || “”;

// 2. Player stat prop market pattern
if (PLAYER_STAT_RE.test(title)) return true;
// 3. Over/under scoring
if (OVER_UNDER_RE.test(title)) return true;
// 4. Sports bracket market
if (BRACKET_RE.test(title)) return true;
// 5. Kalshi sports ticker format
if (/^KX[A-Z]*(NFL|NBA|MLB|NHL|MLS|NCAA|PGA|UFC|NASCAR)/i.test(ticker)) return true;
// 6. Explicit sports keywords (last resort — shorter list now that category does the heavy lifting)
const t = `${title} ${ticker}`.toLowerCase();
const SW = [“nfl game”, “nba game”, “mlb game”, “nhl game”, “super bowl”, “world series”, “stanley cup”, “nba finals”, “touchdown”, “home run”, “hat trick”, “slam dunk”, “overtime shootout”, “runs scored”, “rbis”, “stolen base”, “strikeouts”, “rushing yards”, “passing yards”, “over 0.5 goals”, “over 1.5 goals”, “series winner”, “game winner”];
return SW.some(kw => t.includes(kw));
}

// ─── Strategy — Multiple Edges ────────────────────────────────────────────────
function daysUntil(iso) {
return (new Date(iso) - Date.now()) / 86400000;
}
function urgencyMult(days) {
if (days < 0.5) return 1.5;
if (days < 1) return 1.25;
if (days < 2) return 1.1;
if (days < 4) return 1.05;
return 1.0;
}
function kellySize(estWinProb, priceCents, fraction, maxCents, days) {
if (!priceCents || priceCents <= 0 || priceCents >= 100 || !maxCents) return 0;
const cost = priceCents / 100;
const b = (1 - cost) / cost;
const p = Math.min(0.97, Math.max(0.03, estWinProb || 0.5));
const f = Math.max(0, (b * p - (1 - p)) / b);
const r = Math.min(Math.round(f * fraction * maxCents * urgencyMult(days)), maxCents);
return isNaN(r) ? 0 : r;
}
function analyzeMarket(market, config, extraData = null) {
if (isSportsMarket(market)) return null;
const yesBid = market.yes_bid ?? 50;
const yesAsk = market.yes_ask ?? yesBid + 4;
const noBid = market.no_bid ?? 100 - yesAsk;
const vol = market.volume ?? 0;
const sum = yesBid + noBid;
const days = daysUntil(market.close_time);

// Guard: skip markets with no real pricing
if (yesBid <= 0 || noBid <= 0) return null;

// ── 1. ARBITRAGE ─────────────────────────────────────────────────────────
if (sum <= 93) {
const profit = 100 - sum;
return {
signal: “ARB”,
side: “yes”,
estWinProb: 1.0,
contractPrice: yesBid,
edge: profit / 100,
label: `Arb +${profit.toFixed(1)}¢`,
color: “#00ff88”,
quality: 100,
why: `YES(${yesBid}¢)+NO(${noBid}¢)=${sum}¢ < $1 — guaranteed profit`
};
}
const mid = (yesBid + (100 - noBid)) / 2;

// ── 2. VOLUME-WEIGHTED MOMENTUM EDGE ──────────────────────────────────────
// High volume on a clear directional outcome = smart money signal
// If YES is >65% and volume is high (>$5k traded), the crowd is likely right
if (config.volumeEdge && vol >= config.minVolume) {
const spread = yesAsk - yesBid;
// Tight spread + high volume + clear direction = market has found true price
if (spread <= 5 && mid >= 65 && mid <= 92) {
// Ride the consensus — high volume markets tend to be efficient on direction
const edge = (mid - 62) / 100; // edge over fair coin
if (edge >= config.minEdge) {
return {
signal: “VOL”,
side: “yes”,
estWinProb: mid / 100,
contractPrice: yesBid,
edge,
label: `Vol ${(vol / 1000).toFixed(0)}k @ ${mid.toFixed(0)}%`,
color: “#00ff88”,
quality: Math.min(85, 60 + Math.floor(vol / 5000)),
why: `High volume (${(vol / 1000).toFixed(0)}k) with tight spread confirms ${mid.toFixed(0)}% probability`
};
}
}
if (spread <= 5 && mid >= 8 && mid <= 35) {
const edge = (38 - mid) / 100;
if (edge >= config.minEdge) {
return {
signal: “VOL”,
side: “no”,
estWinProb: (100 - mid) / 100,
contractPrice: noBid,
edge,
label: `Vol ${(vol / 1000).toFixed(0)}k @ ${mid.toFixed(0)}%`,
color: “#00ff88”,
quality: Math.min(85, 60 + Math.floor(vol / 5000)),
why: `High volume (${(vol / 1000).toFixed(0)}k) confirms NO at ${mid.toFixed(0)}%`
};
}
}
}

// ── 3. FADE EXTREMES (standalone, no news required) ──────────────────────
// Very extreme markets >92% or <8% tend to be overpriced due to recency bias
if (config.fadeExtremes) {
if (mid > 92 && mid <= 98) {
const edge = (mid - 90) / 100;
if (edge >= config.minEdge) return {
signal: “FADE”,
side: “no”,
estWinProb: (100 - mid) / 100,
contractPrice: noBid,
edge,
label: `Fade ${mid.toFixed(0)}%`,
color: “#ff6b6b”,
quality: 62,
why: `Market at ${mid.toFixed(0)}% is historically overpriced — fading extreme`
};
}
if (mid < 8 && mid >= 2) {
const edge = (10 - mid) / 100;
if (edge >= config.minEdge) return {
signal: “FADE”,
side: “yes”,
estWinProb: mid / 100,
contractPrice: yesBid,
edge,
label: `Fade ${mid.toFixed(0)}%`,
color: “#ff6b6b”,
quality: 62,
why: `Market at ${mid.toFixed(0)}% is historically underpriced`
};
}
}

// ── 4. WEATHER SIGNAL ────────────────────────────────────────────────────
if (extraData?.type === “weather” && extraData.confidence >= config.newsMinConf && Math.abs(extraData.adjustment) >= 5) {
const adj = extraData.adjustment;
const adjMid = Math.max(3, Math.min(97, mid + adj));
const side = adj > 0 ? “yes” : “no”;
const price = side === “yes” ? yesBid : noBid;
const estWin = side === “yes” ? adjMid / 100 : (100 - adjMid) / 100;
const marketImplied = price / 100;
const edge = estWin - marketImplied;
if (edge >= config.minEdge) return {
signal: “WTHR”,
side,
estWinProb: estWin,
contractPrice: price,
edge,
label: `Weather ${adj > 0 ? "+" : ""}${adj}¢ (${extraData.confidence}%)`,
color: “#38bdf8”,
quality: 65,
why: `Weather data: ${extraData.reasoning}`
};
}
return null;
}

// ─── Paper Trade Simulation ───────────────────────────────────────────────────
const EDGE_REAL = {
ARB: 1.00,
VOL: 0.55,
FADE: 0.25,
WTHR: 0.45
};
const FILL_RATE = {
ARB: 1.00,
VOL: 0.78,
FADE: 0.65,
WTHR: 0.70
};
const KALSHI_FEE = 0.07;
function simulateTrade(signal, priceCents, costCents) {
if (!priceCents || priceCents <= 0 || !costCents || costCents <= 0) return {
filled: false
};
const type = signal.signal;
if (Math.random() > (FILL_RATE[type] ?? 0.70)) return {
filled: false
};
const implied = priceCents / 100;
const claimed = signal.estWinProb - implied;
const realized = claimed * (EDGE_REAL[type] ?? 0.30);
const noise = (Math.random() - 0.5) * 0.06;
const trueP = Math.max(0.02, Math.min(0.98, implied + realized + noise));
const won = Math.random() < trueP;
const payout = won ? Math.round(costCents * ((100 - priceCents) / priceCents)) : 0;
const fee = won ? Math.round(payout * KALSHI_FEE) : 0;
return {
filled: true,
won,
net: won ? payout - fee : -costCents,
fee,
trueWinProb: trueP
};
}

// ─── Circuit Breaker ──────────────────────────────────────────────────────────
// Stops trading automatically if too many errors or consecutive losses
function makeCircuitBreaker() {
let errors = 0,
consecLosses = 0;
const RESET_MS = 10 * 60 * 1000; // reset error count every 10 min
let lastErrorTs = 0;
return {
recordError() {
if (Date.now() - lastErrorTs > RESET_MS) errors = 0;
errors++;
lastErrorTs = Date.now();
return errors;
},
recordLoss() {
consecLosses++;
return consecLosses;
},
recordWin() {
consecLosses = 0;
},
shouldTrip(maxErrors = 5, maxLosses = 6) {
return errors >= maxErrors || consecLosses >= maxLosses;
},
reset() {
errors = 0;
consecLosses = 0;
},
status() {
return {
errors,
consecLosses
};
}
};
}
const breaker = makeCircuitBreaker();
